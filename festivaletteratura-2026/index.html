o",0],["Giuseppe Pastore",0],["Nicolò Porcelluzzi",1]],"raw":"Emanuele Atturo e Giuseppe Pastore con Nicolò Porcelluzzi","d":"sab","h":"12:15","l":"palazzo san sebastiano","pr":"7,50 €","tg":["sport","lingua e parole","media e giornalismo"],"de":"Il calcio italiano è attraversato dalle sue guerre di religione. Negli ultimi anni, per esempio, sembra essersi consolidata una apparente divisione – “giochisti” contro “risultatisti”, filosofia del bel gioco contro pragmatismo – che dice molto meno di tattica e molto di più di come la stampa costruisca narrazioni, identità e fazioni. Ma è un fenomeno isolato, o il sintomo di qualcosa di più profondo nel modo in cui lo sport viene raccontato? Emanuele Atturo e Giuseppe Pastore, tra i giornalisti sportivi più attenti alle trasformazioni del loro mestiere, si confrontano con Nicolò Porcelluzzi su cosa stia succedendo alla scrittura sportiva in Italia: i nuovi formati, le comunità di lettori, il rapporto tra analisi tattica e narrazione culturale, e il rischio che i dualismi alimentati dai media finiscano per oscurare quello che succede in campo. Per l’incontro è previsto un servizio di interpretazione nella lingua dei segni italiana."},{"n":"153","t":"A CHI APPARTIENE INTERNET?","p":[["Tim Berners-Lee",0],["Riccardo Luna",1]],"raw":"Tim Berners-Lee con Riccardo Luna","d":"sab","h":"12:15","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["tecnologia e IA","politica e attualità","diritti e società"],"f":["laboratorio"],"de":"Nel dicembre del 1990, nei laboratori del CERN di Ginevra, Tim Berners-Lee inventò qualcosa che avrebbe trasformato in profondità ogni aspetto della vita umana: il World Wide Web. Nel giro di pochi anni internet avrebbe cambiato il modo in cui ci informiamo, lavoriamo, ci amiamo e ci odiamo. Decise di non brevettare la sua invenzione: la consegnò all’umanità, perché restasse uno spazio aperto e un bene comune. Quella vocazione delle origini sembra oggi lontana. La rete è ormai un terreno di conquista, dove il potere si concentra in poche piattaforme, i feed si popolano di eserciti di bot e di contenuti sfornati dalle IA e gli algoritmi erodono la nostra salute mentale e la tenuta delle nostre democrazie. Intervistato da Riccardo Luna (Qualcosa è andato storto), Tim Berners-Lee (Questo è per tutti) porta a Festivaletteratura il racconto di cosa internet è stato e cosa è diventato, ma soprattutto una tesi controcorrente: il degrado dell’ecosistema digitale non è irreversibile.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"154","t":"L’UMANITÀ IN NATURA","p":[["Andrea Wulf",0],["Telmo Pievani",1]],"raw":"Andrea Wulf con Telmo Pievani","d":"sab","h":"12:15","l":"basilica palatina di santa barbara","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["natura e animali","storia","filosofia e idee"],"de":"Sono pensatori radicali quelli indagati da Andrea Wulf nelle sue magnifiche biografie. Da oltre un decennio, la storica tedesca tratteggia come minuziose cartografie le vite di scienziati e letterati europei che tra Sette e Ottocento, in pieno fervore illuministico e nel mezzo di una transizione epocale, seppero improntare il nostro modo di leggere la storia umana nell’alveo di una più vasta storia naturale. Ne è certamente riprova l’avventurosa biografia del barone Alexander von Humboldt, al centro del fortunato saggio L’invenzione della natura, come anche quella del suo mentore e ispiratore Georg Forster, etnologo, naturalista e scrittore di viaggio che Wulf strappa tenacemente all’oblio nel recente La scoperta dell’umanità. Insieme a Telmo Pievani, l’autrice ricostruisce le tappe di un viaggio che inizia al seguito della seconda spedizione di James Cook, passa attraverso lo studio dei popoli indigeni e delle diverse culture del mondo, per terminare nei fermenti politici che infiammano l’Europa durante la Rivoluzione francese.","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"155","t":"SULLE TRACCE DELL’ODIO","p":[["Massimo Cracco",0],["Ilaria Rossetti",0],["Igiaba Scego",1]],"raw":"Massimo Cracco e Ilaria Rossetti con Igiaba Scego","s":"avere trent'anni","d":"sab","h":"12:15","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["diritti e società","narrativa","politica e attualità"],"de":"Mai come oggi il termometro politico sembra essere tanto sensibile al tema dell’odio. Migranti, gruppi minoritari, reietti, persone senza una fissa dimora: le ultradestre globali trovano nei margini individui su cui costruire consenso di larga scala. Chi odiano i trentenni elettori di oggi? Chi odiavano invece i trentenni di mezzo secolo fa? Nella Verona degli anni Ottanta descritta da Massimo Cracco (Corpi di Cristo) un atto violento reifica l’odio che i personaggi hanno verso i cosiddetti “deviati”. E se avvolgessimo il nastro di cento anni, cosa scopriremmo? Forse che c’è un filo rosso tra la storia coloniale violentissima in Abissinia e il legame tra le nuove generazioni e i gruppi neofascisti, come racconta Ilaria Rossetti (Qualcuno da odiare). L’istigazione all’odio ha contraddistinto il discorso politico moderno: da dove viene e come è possibile disarmarlo? Intorno a queste domande si confrontano Massimo Cracco e Ilaria Rossetti. Dialoga con loro Igiaba Scego."},{"n":"156","t":"NOLDE VS. DESIATI. ROUND 1","p":[["Emma Nolde",0],["Mario Desiati",0],["Marta Bacigalupo",1]],"raw":"Emma Nolde e Mario Desiati con Marta Bacigalupo","s":"bonus track","d":"sab","h":"12:15","l":"teatro bibiena","pr":"7,50 €","tg":["musica","narrativa"],"de":"“Vuoi fidarti se ti dico starai meglio / che ci trasferiamo là quando è il momento”, canta Emma Nolde in Berlino. E non è un caso se, ad affiancare la cantautrice toscana (Nuovospaziotempo) sul palco troviamo lo scrittore Mario Desiati (Spatriati, Malbianco), che conosce molto bene sia Berlino, sia il tema letterario della necessità di partire, fuggendo da una provincia in cui lo spazio sembra rimpicciolirsi e soffocare chi cerca la propria identità. In dialogo insieme a Marta Bacigalupo, i due artisti si confrontano sul modo in cui canzoni e romanzi possano diventare valvola di sfogo di timori generazionali, elaborare traumi personali e aiutare a mettersi completamente a nudo, spogliandosi della paura di raccontarsi."},{"n":"157","t":"TUTTI GLI ALTROVE ALLA FINE DEL MONDO","p":[["Federico Campagna",0],["Luca Molinari",1]],"raw":"Federico Campagna con Luca Molinari","d":"sab","h":"12:15","l":"aula magna dell'universita","pr":"7,50 €","tg":["filosofia e idee","storia"],"de":"È possibile sopravvivere alla Storia? Dagli albori dell’umanità la “fine del mondo” non è mai stata un evento unico e definitivo, ma qualcosa di sperimentato ogni volta che una civiltà o un sistema condiviso di valori sono crollati irreversibilmente. Quando ciò che è familiare si dissolve e i punti di riferimento vengono meno, chi resta è costretto a confrontarsi con un profondo senso di disorientamento. In quel vuoto si apre una domanda inevitabile: dove trovare una nuova opportunità di esistenza, sia essa geografica o interiore? Il filosofo Federico Campagna (Altrimondi) ha dedicato una riflessione a come i popoli del Mediterraneo abbiano, nel corso del tempo, “osato migrare verso il punto zero dell’immaginazione, dove idee e valori potevano essere nuovamente estratti nell’infinita virtualità del possibile”. Dei molti modi in cui chi abita i margini della Storia può ricominciare, Campagna discute insieme all’architetto Luca Molinari."},{"n":"158","t":"FANTASTICO!!!","p":[["Nicola Cinquetti",0],["Nicola Lucchi",0],["Alice Torreggiani",1]],"raw":"Nicola Cinquetti e Nicola Lucchi con Alice Torreggiani","e":"dagli 11 ai 14 anni","d":"sab","h":"14:15","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["fantastico e horror","giallo e noir","infanzia ed educazione"],"f":["per ragazzi"],"de":"Che differenza c’è tra giallo e thriller? E tra fantasy e fantastico? Cosa si definisce mostruoso e cosa ci fa più paura quando leggiamo una storia? Ma soprattutto, cosa cerchiamo e cosa troviamo nelle storie fantastiche e di mistero? Forse Nicola Cinquetti ci direbbe che George, il protagonista de La bestia di Waltanna, cerca di soddisfare la sua infinita e rischiosissima curiosità, senza cui tante storie non esisterebbero affatto! Forse Nicola Lucchi ci racconterebbe che Daniel e Luna, i protagonisti della serie di Daniel Ghost e de I guardiani dela memoria, si sarebbero invece volentieri risparmiati tutte quelle disavventure, e che se ne vadano all’inferno fantasmi e maledizioni! Toccherà a ragazze e ragazzi del pubblico tentare di metterli d’accordo, destreggiandosi tra un Nicola professore di Storia e Filosofia e un Nicola esperto di cinema e televisione… un binomio fantastico!"},{"n":"159","t":"UMANAMENTE ARTIFICIALE O ARTIFICIALMENTE UMANO?","p":[["Irene Fabbri",0]],"raw":"Irene Fabbri","s":"vedi n. 142 / spazio rio / lezioni orizzontali - in gioco","d":"sab","h":"14:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["tecnologia e IA","lingua e parole","gioco"],"f":["lezione"]},{"n":"160","t":"MASCHERE MATTE E MOSTRI DA PASSEGGIO","st":"laboratorio di fantazoologia da parata","p":[["Ruggge",0]],"raw":"Ruggge","e":"dagli 8 ai 12 anni","v":"vedi n. 1","d":"sab","h":"14:30","l":"cappella di palazzo del mago","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["arte e fotografia","miti e fiabe","infanzia ed educazione"],"f":["per bambini","laboratorio"]},{"n":"161","t":"IL DIFFICILE SOGNO ITALIANO","p":[["Alec Ross",0],["Giacomo Bottos",1]],"raw":"Alec Ross con Giacomo Bottos","d":"sab","h":"14:30","l":"palazzo san sebastiano","pr":"7,50 €","tg":["economia e lavoro","politica e attualità"],"de":"“In Italia si vive bene e c’è molto da insegnare agli Stati Uniti, ma mancano crescita economica, salari adeguati e un vero ascensore sociale. Vorrei che i giovani tentassero di cambiare il Paese, invece di cambiare Paese” sostiene Alec Ross (Il nostro futuro). D’altra parte, ogni giorno leggiamo notizie sconfortanti relative al numero di persone che lasciano lo Stivale: tra il 2011 e il 2024 sono emigrati 630.000 giovani, con un valore di capitale umano pari al 7,5% del PIL. Ross, già consulente per l’innovazione nell’amministrazione Obama ed esperto di politiche tecnologiche, desidera un futuro migliore per l’Italia, in cui ci siano meno timore nei confronti delle nuove generazioni e dell’innovazione, una burocrazia meno fumosa e una maggiore meritocrazia. Affiancato da Giacomo Bottos, l’autore di The italian dream. Riprendersi il futuro spiegherà perché avere un sogno, una visione, non è in contraddizione con l’essere pragmatici e può essere il motore di un nuovo modello di crescita."},{"n":"162","t":"UNA VITA SENZA ATTESA DI CATASTROFE","p":[["Pajtim Statovci",0],["Marco Archetti",1]],"raw":"Pajtim Statovci con Marco Archetti","d":"sab","h":"14:30","l":"teatro bibiena","pr":"7,50 €","tg":["narrativa","migrazioni e confini"],"de":"In fin dei conti è tutto ciò che desideriamo, eppure è semplicissimo dimenticarlo nell’agio di una quotidianità incolore. Pajtim Statovci invece ce lo ricorda in tutte le opere che hanno incastonato un pezzo della sua voce, trasformandola in storie impossibili da dimenticare. Le transizioni, Gli invisibili, Il mio gatto Jugoslavia e La mucca partorisce di notte non sono soltanto un corpus narrativo che attesta da più di un decennio la crescita di uno dei massimi talenti letterari dei nostri giorni, ma rappresentano le stazioni di un viaggio sofferto che parte dal Kosovo e giunge in Finlandia, rimescola identità, lingue, sessi, rabbie e desideri tramutandoli ora in un soliloquio d’amore, ora in una furiosa celebrazione che si rigenera da un passato pieno di sofferenza. Lo scrittore Marco Archetti (La luce naturale) incontra un (ex) enfant prodige della letteratura europea maturato in tutto il suo fulgore.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con FILI – Finnish Literature Exchange."},{"n":"163","t":"DI CHI È IL MIO CORPO?","p":[["Cleo Bissong",0],["Silvia Demozzi",0],["Simonetta Bitasi",1]],"raw":"Cleo Bissong e Silvia Demozzi con Simonetta Bitasi","s":"yq – young questions","e":"dai 14 anni","d":"sab","h":"14:30","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["corpo e benessere","genere e femminismo","diritti e società"],"f":["per ragazzi"],"de":"Cosa vuol dire possedere il proprio corpo oggi? E in che relazione stanno gli altri rispetto a esso? Per decenni, è stato al centro di cambiamenti sociali e culturali, lotte e rivoluzioni, ma non è semplice capire a che punto siamo arrivati, né quanto il flusso comunicativo in cui siamo immersi influenzi il nostro sguardo sul nostro corpo e su quello degli altri. A confrontarsi con gli e le adolescenti, e con il pubblico di ogni età, su canoni estetici, desiderio femminile, condizionamenti invisibili, autodeterminazione ed educazione sessuo-affettiva saranno la fumettista Cleo Bissong, che con Ma siamo ancora qui a parlarne? si interroga sui progressi che abbiamo o non abbiamo fatto, e la docente Silvia Demozzi, tra le autrici del Dizionario di genere."},{"n":"164","t":"LA VERSIONE DI YANEZ","p":[["Luigi Guarnieri",0],["Marco Malvaldi",1]],"raw":"Luigi Guarnieri con Marco Malvaldi","d":"sab","h":"14:30","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["narrativa","storia"],"de":"“Era di media statura, robusto, di pelle bianchissima, con lineamenti fieri, labbra beffarde e sottili, indizio d’una ferrea volontà, e occhi grigi, vivissimi, freddi”. Sul finire dell’Ottocento, sua maestà Emilio Salgari donò a migliaia di lettori le gesta piratesche di Sandokan, entrate nella leggenda insieme ai misteri dell’oceano Indiano anche grazie a un formidabile coprotagonista: il corsaro portoghese Yanez de Gomera. Lo scrittore Luigi Guarnieri, grande appassionato di letteratura d’avventura del XIX secolo, immagina la vecchiaia di uno dei più amati eroi salgariani (impersonato tra l’altro da un indimenticabile Philippe Leroy nel celebre adattamento televisivo degli anni Settanta) per ricostruire in Yanez – e in un divertente dialogo con Marco Malvaldi – una sorprendente versione del perenne sodalizio tra il nobile avventuriero e la “Tigre della Malesia”."},{"n":"165","t":"LA PAROLA “ANTISEMITA”","p":[["Houria Bouteldja",0],["Valentina Pisanty",0],["Lorenzo Alunni",1]],"raw":"Houria Bouteldja e Valentina Pisanty con Lorenzo Alunni","s":"kaléidoscope français","d":"sab","h":"14:30","l":"aula magna dell'universita","pr":"7,50 €","tg":["geopolitica e guerre","diritti e società","lingua e parole"],"de":"La guerra in corso in Medio Oriente ha reso più urgente una domanda che attraversa il dibattito pubblico da anni: quando si criticano le azioni di Israele si è automaticamente antisemiti? E quando, invece, quella parola viene usata come un’arma per mettere a tacere voci legittime di dissenso? La semiologa Valentina Pisanty (Antisemita. Una parola in ostaggio), da tempo studiosa della retorica del razzismo, pone al centro della discussione un nodo che dopo il 7 ottobre 2023 è diventato esplosivo: la progressiva e strumentale sovrapposizione tra antisemitismo e antisionismo. Della ridefinizione di un concetto che sposta il baricentro dal pregiudizio antiebraico di matrice storica all’ostilità verso le scelte politiche e militari di un governo e dello slittamento semantico che, in un contesto geopolitico polarizzato, svuota di significato un termine che ha una storia tragica Pisanty discute insieme all’attivista Houria Bouteldja (Maranza di tutto il mondo, unitevi!). Houria Bouteldja parlerà in francese, con interpretazione consecutiva in italiano."},{"n":"166","t":"ANTONELLO GERBI E IL NUOVO MONDO","p":[["Sandro Gerbi",0],["Gabriela Wiener",0],["Maria Matilde Benzoni",1]],"raw":"Sandro Gerbi e Gabriela Wiener con Maria Matilde Benzoni","d":"sab","h":"14:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["storia","memoria e biografia","viaggi e luoghi"],"de":"A metà Settecento, naturalisti e filosofi che non avevano mai attraversato l’oceano sentenziarono l’inferiorità del Nuovo Mondo e dei suoi abitanti: a ricostruire e smontare quel pregiudizio secolare lo storico ed economista Antonello Gerbi avrebbe dedicato la sua opera più nota, La disputa del Nuovo Mondo. Costretto all’esilio in Perù dalle leggi razziali nel 1938, Gerbi rimase nel paese fino al 1948, e in quel decennio limegno non smise mai di osservare, scrivere e fotografare: con lo sguardo di un europeo colto ma mai esotizzante, scattò migliaia di immagini di Lima, delle Ande, dei volti indigeni, ritratti non come oggetto etnografico ma come protagonisti della storia del Paese. Queste fotografie, custodite nell’Archivio Storico Intesa Sanpaolo, sono state ora raccolte per la prima volta in volume, Dall’Europa al Perù. Fotografie di Antonello Gerbi (1930-1948). A raccontare la figura di Gerbi saranno il figlio Sandro Gerbi e la storica Maria Matilde Benzoni, autrice del volume. Con loro si confronta la scrittrice peruviana Gabriela Wiener, che nei suoi romanzi ha narrato le fratture che nei decenni successivi hanno continuato ad attraversare la società del suo Paese. Gabriela Wiener parlerà in spagnolo, con interpretazione consecutiva in italiano."},{"n":"167","t":"COME SI METTE IN MOSTRA LA MODA?","p":[["Judith Clark",0]],"raw":"Judith Clark","s":"lezioni orizzontali","d":"sab","h":"14:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["arte e fotografia","storia"],"f":["lezione"],"de":"“Ogni volta che, in un’opera d’arte, incontriamo un’incongruenza o una semplificazione che ci appare ’non realistica’ o ’non fedele al vero’ – come accade di continuo dovremmo almeno chiederci: quale altro aspetto della realtà osservata o dell’evento immaginato questa notazione ’irrealistica’ riesce a rendere più vivido?”. A partire da questa riflessione dello storico dell’arte T.J. Clark, la docente ed exhibition-maker Judith Clark (Prefigured: Fashion and Exhibition-making) dialogherà con i partecipanti sui criteri attraverso i quali giudichiamo un’esposizione. Nelle mostre di moda, i curatori sono spesso accusati di enfasi ed esagerazioni: silhouette amplificate, parrucche teatrali, attualizzazioni divergenti da una rigorosa ricostruzione storico-sociale. Ma quale potere rivelatore può celarsi nell’anomalia?","no":"L’autrice parlerà in italiano."},{"n":"168","t":"IL COMUNE SENTIRE","p":[["Laura Ferreri",0],["Carlotta Lega",0],["Marco S. Sozzi",0],["Elisabetta Tola",1]],"raw":"Laura Ferreri, Carlotta Lega e Marco S. Sozzi con Elisabetta Tola","d":"sab","h":"14:30","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["musica","scienza","mente e psicologia"],"de":"Marco S. Sozzi (Storia del suono) è un fisico, Carlotta Lega e Laura Ferreri (Cervello in musica), invece, neuroscienziate cognitive. A Festivaletteratura si incontrano per analizzare insieme uno dei linguaggi umani più universali e misteriosi, quello della musica. Come nasce il suono che si traduce in melodia, e che effetto ha sul nostro cervello? Tra circuiti neurali e rapporti armonici, passando dalla matematica alla psicologia, Ferreri, Lega e Sozzi guideranno il pubblico in un viaggio dietro le quinte della musica, per meglio comprendere i principi multidisciplinari che ne stanno alla base. Conduce l’incontro la giornalista scientifica Elisabetta Tola."},{"n":"169","t":"UN PO’ QUEEN E UN PO’ TEENAGER","p":[["Luciana Littizzetto",0],["Chiara Valerio",1]],"raw":"Luciana Littizzetto con Chiara Valerio","d":"sab","h":"14:45","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["cinema e tv","genere e femminismo","teatro e performance"],"de":"Luciana Littizzetto ha portato la sua pungente ironia sul piccolo schermo fin dal 1991, legando il proprio nome a trasmissioni iconiche come Avanzi, Zelig, Mai dire gol e – naturalmente – Che tempo che fa. Ma la televisione non è il solo medium che ha visto protagonista la comica e attrice torinese, che da sempre ha saputo valorizzare la leggerezza sia al cinema, sia sulla carta stampata (Sola come un gambo di sedano). L’autrice torna a Mantova dopo oltre vent’anni, per raccontare al pubblico una (nuova) prima volta, l’esordio al romanzo con Il tempo del la la la, che affronta l’avanzare dell’età dal punto di vista femminile: “È quel momento della vita in cui ti fermi e non sai più da che parte andare. Come in certe canzoni, quando l’autore perde l’ispirazione, non trova più le parole e va avanti con un la la la”. Ne parla insieme a Chiara Valerio (La fila alle poste). Per l’incontro è previsto un servizio di interpretazione nella lingua dei segni italiana."},{"t":"DALLE FORESTE DEL CONGO","p":[["Adriana Parrella",0]],"raw":"Adriana Parrella","s":"accenti","d":"sab","h":"15:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["natura e animali","geopolitica e guerre","ambiente e clima"],"de":"“In tanti posti in cui ho vissuto, la natura è lungi dall’essere asservita all’uomo”: Adriana Parrella lavora in ambito umanitario per Medici Senza Frontiere e ha svolto missioni in numerosi Paesi, tra cui Repubblica Centrafricana, Haiti, Siria e Repubblica Democratica del Congo. Proprio quest’ultima fa da sfondo a Dal punto in cui il sentiero scompare, opera ispirata alla sua esperienza sul campo, che getta uno sguardo letterariamente inesplorato sul terzo settore."},{"n":"170","t":"IL SUONO DELLA PAROLA","st":"laboratorio a voce alta (e bassa)","p":[["Pino Costalunga",0]],"raw":"Pino Costalunga","e":"dai 7 ai 10 anni","d":"sab","h":"15:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["lingua e parole","teatro e performance","infanzia ed educazione"],"f":["per bambini","laboratorio"],"de":"Ognuno di noi ha una sua voce inconfondibile, e quando parliamo le parole non escono tutte uguali in una lunga sequenza monotona, ma si alzano, si abbassano, si fanno sottilissime o esplodono fragorose. Cambiare tono o intensità della voce ci viene naturale, ma possiamo imparare a governare ancor meglio questo straordinario strumento, se vogliamo dare maggiore forza espressiva a quel che diciamo. Pino Costalunga – coautore di Scrive chi legge – ci insegnerà ad assecondare la natura musicale delle parole e a restituire peso alle pause e ai silenzi. Un gioco per sperimentare tutto quello che la nostra voce può fare, ogni volta che apriamo bocca."},{"n":"171","t":"EREDITÀ E CONDIZIONI DI CONFINE","p":[["Lidija Dimkovska",0],["Ema Stefanovska",1]],"raw":"Lidija Dimkovska con Ema Stefanovska","d":"sab","h":"16:00","l":"tempio di san sebastiano","pr":"7,50 €","tg":["poesia","migrazioni e confini","genere e femminismo"],"de":"“Ti farebbe bene un proiettile in testa, / un salto dal ponte o una vena tagliata, / l’acido cloridrico nel tè, la cintura da uomo al collo, / al momento sbagliato, nel posto sbagliato / la morte è risveglio, vulcano, terremoto, / vuoi morire, però non come gli altri.” Il confine non è mai soltanto una linea: è una condizione dell’esistenza contemporanea. Nella scrittura di Lidija Dimkovska, e in particolare in Condizioni di confine, questa dimensione assume una forma concreta, attraversata da esperienze di appartenenza e spaesamento, di continuità e frattura tra culture, lingue e paesi diversi. In questo continuo slittamento, il confine smette di essere soltanto ciò che separa e diventa ciò che mette in relazione, producendo forme inattese di vicinanza e di distanza. Condizioni di confine si configura così come un’esplorazione poetica delle identità contemporanee, intese non come dati stabili ma come processi in costante ridefinizione. L’autrice dialogherà con la traduttrice Ema Stefanovska.","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano."},{"t":"FLÂNEUR DI PAROLE","p":[["Dutch Nazari",0]],"raw":"Dutch Nazari","s":"accenti","d":"sab","h":"16:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["musica","poesia","lingua e parole"],"de":"“Una delle cose che amo di più del girare l’Italia per suonare è (...) ascoltare gli accenti, gli slang; e quelli che mi colpiscono di più me li porto dietro, come bagaglio utile per un pezzo, per una poesia, o semplicemente nel mio vocabolario”. Dutch Nazari, cantautore e rapper che colleziona voci e parole come ricordi di viaggio, racconta come i suoni raccolti in locali e osterie diventano spesso linfa della sua scrittura."},{"n":"172","t":"A COLPI DI… ZAINO!","p":[["Angelo Mozzillo",0],["Davide Panizza",0],["Valentina Vitali",1]],"raw":"Angelo Mozzillo e Davide Panizza con Valentina Vitali","e":"dai 9 ai 12 anni","d":"sab","h":"16:15","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["infanzia ed educazione","viaggi e luoghi","fumetto e illustrazione"],"f":["per bambini"],"de":"Uno scrittore e un illustratore che lavorano spesso insieme (Bello il bosco ma non ci vivrei, La rivolta degli elfi) e sono grandi amici vengono costretti a condividere un’avventura bucolica del parco del Mincio sulle tracce di Virgilio. Da escursionisti improbabili e improvvisati quali sono, si stanno in qualche modo preparando per attraversare i luoghi virgiliani, ma prima è meglio che chiedano consigli alle bambine e ai bambini di Mantova su come prepare lo zaino giusto, per esser pronti ad ogni evenienza e ad ogni imprevisto… Per loro fortuna ad aiutarli, ma anche a giudicare il loro lavoro, ci sarà l’esperta scienziata ed escursionista fotografa Valentina Vitali (Anima animale). Ma alla fine saranno proprio piccole e piccoli lettori a valutare lo zaino perfetto!"},{"n":"173","t":"CASA DOLCE CASA?","p":[["Vincenzo Latronico",0],["Olimpia Zagnoli",0],["Marianna Albini",1]],"raw":"Vincenzo Latronico e Olimpia Zagnoli con Marianna Albini","d":"sab","h":"16:30","l":"teatro bibiena","pr":"7,50 €","tg":["città e architettura","economia e lavoro","arte e fotografia"],"de":"Cosa significa, oggi, possedere una casa? Per millennial e Gen Z la domanda non trova risposte facili: abitare uno spazio proprio, radicarsi in un luogo, si è trasformato in un privilegio raro e, quando lo si conquista, in un sogno ambivalente. “La casa è parte del patto sociale, ma per la mia generazione ha smesso di esserlo” afferma Vincenzo Latronico, autore abituato a esplorare le dinamiche abitative nelle sue opere (Le perfezioni, La chiave di Berlino o Una splendida rovina, in uscita a settembre), dove comprare casa non chiude la questione ma la apre: cosa resta del desiderio di una vita diversa quando ci si scontra con i soldi, con gli altri, con se stessi? Insieme all’illustratrice e grafica Olimpia Zagnoli – che segue il progetto artistico-immobiliare Casafutura su Instagram – Latronico ragionerà di come la casa non sia solo un diritto che si erode, ma il luogo su cui si proietta un’idea di vita diversa, e su cui spesso si infrange. A presiedere la “riunione di condominio” sarà Marianna Albini, conduttrice di gruppi di lettura."},{"n":"174","t":"COLONIZZARE LA LINGUA","p":[["Yaryna Grusha",0],["Jana Karšaiová",0],["Francesca Zoppei",1]],"raw":"Yaryna Grusha e Jana Karšaiová con Francesca Zoppei","s":"passports","e":"dai 14 anni","d":"sab","h":"16:30","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["migrazioni e confini","lingua e parole","storia"],"f":["per ragazzi"],"de":"Due autrici che hanno scelto la lingua italiana anche per dare voce ai loro Paesi, ripercorrono con i loro romanzi la recente storia dell’Europa dell’Est, a partire dall’occupazione sovietica che non è stata solo militare ma anche culturale con l’imposizione della lingua russa a scapito delle lingue nazionali. Così Yaryna Grusha, docente di Lingua e letteratura ucraina presso l’Università Statale di Milano, in L’album blu racconta una famiglia e il suo Paese di origine, dal disastro di Chornobyl (così in ucraino), che l’ha portata fin da bambina in Italia, sino alla guerra in corso. Mentre Jana Karšaiová in Io non parlo russo ripercorre i legami familiari e in particolare il rapporto padre-figlia, mostrando nello stesso tempo i nodi politici e sociali della Slovacchia contemporanea, tra aspirazioni europeiste e istanze populiste. Sulle complesse dinamiche della storia recente che condizionano le esistenze delle persone comuni e sui confini fisici e virtuali difficili da attraversare, le due autrici si confrontano sotto la guida della scrittrice e bibliotecaria Francesca Zoppei."},{"n":"175","t":"L’INTERNET CHE AVREBBE POTUTO ESSERE","p":[["Eleonora C. Caruso",0],["Lorenzo Fantoni",0],["Dario Bassani",1]],"raw":"Eleonora C. Caruso e Lorenzo Fantoni con Dario Bassani","d":"sab","h":"16:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["tecnologia e IA","media e giornalismo"],"de":"C’era un momento in cui internet sembrava qualcos’altro. Prima dei social network, prima degli algoritmi di raccomandazione e dei riassunti di Gemini, c’erano visioni radicalmente diverse di cosa potesse diventare la rete. Cos’è rimasto di quelle visioni? E cosa si è perso, o è stato deliberatamente smantellato, lungo la strada che ci ha portati dove siamo? Insieme a Dario Bassani, ne parleranno Eleonora C. Caruso e Lorenzo Fantoni. Con il suo Backroom Caruso ha scritto un romanzo che prova a ricostruire una realtà ormai perduta, quella dove internet non era ancora una vetrina performativa, orientata al successo, ma uno spazio di ricerca e libera sperimentazione. Nel suo ultimo saggio Fantoni (Quello che non è salvato è perso) porta avanti la stessa ricerca ma in chiave saggistica, cercando di recuperare “quel backup polveroso e dimenticato, un frammento della memoria dell’internet che avremmo potuto avere e che ci è scivolata tra le dita”."},{"n":"176","t":"COME RICONOSCERE UNA DERIVA AUTORITARIA","p":[["Michele Ainis",0],["Carlo Galli",0],["Vincenzo Satta",1]],"raw":"Michele Ainis e Carlo Galli con Vincenzo Satta","d":"sab","h":"16:45","l":"palazzo san sebastiano","pr":"7,50 €","tg":["politica e attualità","diritti e società"],"de":"Nel far pendere tutta la bilancia decisionale sul potere di governo, l’autoritarismo dimostra sempre di compiere, nei fatti, una regressione costituzionale su vasta scala. Rispetto al Novecento molto è cambiato, ma non l’erosione democratica di fondo: fomentare le paure del presente e agitarle sul popolo non coincide infatti con il sacrificio di libertà fondamentali in nome della sicurezza sociale? O con azioni marcatamente illiberali come il ricorso sistematico alla decretazione d’urgenza, lo scavalcamento del Parlamento, la delegittimazione della magistratura, l’intimidazione della stampa, la limitazione del diritto di sciopero o di manifestazione? Il costituzionalista Michele Ainis (Capocrazia, Fascismo bianco) e il filosofo Carlo Galli (La destra al potere, Necessità della politica), guidati da Vincenzo Satta, anch'egli studioso di Diritto costituzionale, conversano di rotte perigliose verso il pensiero unico tra giurisprudenza e filosofia politica, storia e attualità."},{"n":"177","t":"LA COSA DEGLI ABITI NON CONOSCE STATO NÉ FERMEZZA","p":[["Giulia Calvi",0],["Michele Lodone",1]],"raw":"Giulia Calvi con Michele Lodone","d":"sab","h":"16:45","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["storia","arte e fotografia","genere e femminismo"],"de":"Così Cesare Vecellio in De gli habiti antichi et moderni di diverse parti del mondo (1590) ragiona sul problema del costume e dell’aspetto fisico in un mondo che si incammina lentamente verso la globalizzazione. Elemento di meraviglia nei racconti dei viaggiatori e oggetto d’indagine dei primi libri di costume, l’abito, o meglio la tendenza a coprire il corpo, assurge – nella visione europea – a evidenza visiva della superiorità culturale degli esploratori, al punto da diventare discriminante per la costruzione dell’iconografia delle personificazioni dei continenti. Ne parleremo con la storica e docente Giulia Calvi (Vestire il mondo), intervistata dallo storico Michele Lodone."},{"n":"178","t":"COME SI COSTRUISCE UN MONDO?","p":[["Federico Campagna",0]],"raw":"Federico Campagna","s":"lezioni orizzontali","d":"sab","h":"17:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["filosofia e idee","scienza"],"f":["lezione"],"de":"La realtà che ci circonda prende la forma portata in dono dai nostri limiti biologici, dalla nostra formazione culturale, dalle contingenze che ci hanno messo al mondo. Ma quanti e quali mondi si affiancano a quello che ci sembra “il nostro”? È possibile farne di nuovi, ma soprattutto, è possibile mantenere una certa eleganza nel fare-mondo, ovvero – seguendo l’etimologia di “eleganza” – di scegliere e di costruirlo con cura? Federico Campagna lavora da anni sul confine tra pratica filosofica e worldbuilding. Partendo da queste condizioni di esistenza, proveremo a capire quali strumenti abbiamo a disposizione per costruire realtà alternative, e a quale prezzo. La costruzione di altri mondi non come evasione, fuga da una presunta realtà, ma come metodo di pensiero."},{"t":"ALEX","p":[["Federico Buffa",0],["Marco Caronna",1]],"raw":"Federico Buffa con Marco Caronna","s":"accenti","d":"sab","h":"17:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["sport","memoria e biografia"],"de":"“Sono Alex Zanardi, e se non avessi avuto l’incidente in cui ho perso le gambe ora non sarei così felice”: la forza, la tenacia e la positività del pilota bolognese scomparso lo scorso maggio sono state d’esempio per milioni di persone. Federico Buffa, accompagnato dalla chitarra di Marco Caronna (con cui ha ideato lo spettacolo sportivo-teatrale Ribelli), ricorda la vicenda di un campione che non ha mai smesso di scrivere nuove regole del gioco."},{"n":"179","t":"RIDARE VOCE","p":[["Nathacha Appanah",0],["Espérance Hakuzwimana",1]],"raw":"Nathacha Appanah con Espérance Hakuzwimana","s":"kaléidoscope français","d":"sab","h":"17:00","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["narrativa","memoria e biografia","migrazioni e confini"],"de":"Come una sorta di rabdomante delle storie sopite, taciute o dimenticate, Nathacha Appanah, per la prima volta a Mantova, attinge spesso alle vicende della sua famiglia per riflettere e farci riflettere su colonialismo, razzismo, migrazioni, violenza di genere. E mentre in Memoria fragile mostra come i nostri corpi portano i segni della storia delle nostre origini, ripercorrendo la migrazione dei suoi antenati dall’India alle Mauritius, in La notte nel cuore intreccia due storie vere di femminicidio che, grazie alla letteratura, diventano di tutte e tutti noi: “… scrivendo ho capito lentamente che ogni donna che incontravo, di cui conoscevo la storia, era una parte di me, quindi erano tutte in me queste donne”. La scrittrice mauriziana, più volte candidata al Prix Goncourt e vincitrice del Prix Femina si confronta sul valore ma anche sull’uso distorto delle storie con la scrittrice Espérance Hakuzwimana.","no":"L’autrice parlerà in francese, con interpretazione consecutiva in italiano."},{"n":"180","t":"IL MONDO IN UN TRATTO","st":"laboratorio di esplorazione letteraria","p":[["Armin Greder",0]],"raw":"Armin Greder","e":"dai 14 ai 17 anni","d":"sab","h":"17:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["fumetto e illustrazione","arte e fotografia"],"f":["per ragazzi","laboratorio"],"de":"Come sarebbe sbirciare dentro il laboratorio di un illustratore e capire come si muove tra i propri lavori? Quali pensieri lo guidano? E cosa succederebbe se addirittura si potesse prendere in mano una matita e creare qualcosa insieme a lui? A Festivaletteratura Armin Greder, illustratore che ha ricevuto i più grandi riconoscimenti in tutto il mondo (L’isola, Mediterraneo, Voi, L’orsa maggiore, Poi sei arrivata tu), incontra lettori e lettrici per un confronto e uno scambio su cosa vuol dire disegnare la contemporaneità e le sue storie, raccontare quello che ci circonda, scegliere cosa dire, usare la lingua per rendere tangibili i pensieri. E provare a farlo insieme, un tratto alla volta.","no":"L’autore parlerà in italiano."},{"n":"181","t":"CRISI AMBIENTALE E SANITARIA","p":[["Luca Savarino",0],["Paolo Vineis",0],["Silvia Lazzaris",1]],"raw":"Luca Savarino e Paolo Vineis con Silvia Lazzaris","d":"sab","h":"17:00","l":"aula magna dell'universita","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["ambiente e clima","salute e medicina","scienza"],"de":"Anni fa, le Nazioni Unite usarono il termine “tripla crisi planetaria”, per riferirsi alle ramificazioni della crisi ambientale in atto ormai da tempo: il cambiamento climatico, la scomparsa della biodiversità e l’inquinamento atmosferico. I governi mondiali, però, sembrano non voler affrontare la catastrofe ecologica e il degrado degli ecosistemi non fa altro che aumentare l’incidenza di malattie, aggravando le condizioni di vita e colpendo in modo diseguale le diverse fasce – anche geografiche – della popolazione. Chi dispone di meno risorse è più esposto ai rischi e ha minori possibilità di accesso alle cure, ampliando così le disuguaglianze sanitarie. Luca Savarino, professore di Bioetica, e l’epidemiologo Paolo Vineis (autori di Come sopravvivere alla crisi ambientale) si confrontano su un problema universale, provando a immaginare quali soluzioni collettive sarebbe necessario mettere in gioco per scardinare le “visioni di corto respiro e la rivendicazione di interessi particolari” della politica. Li incontra la giornalista scientifica Silvia Lazzaris."},{"t":"LA FABBRICA DEI NEURONI","p":[["Marta Paterlini",0]],"raw":"Marta Paterlini","s":"lavagne – onde cerebrali","d":"sab","h":"17:00","l":"piazza mantegna","pr":"ingresso libero","tg":["scienza","mente e psicologia","salute e medicina"],"f":["lezione"],"de":"Per decenni ci si è chiesti se il cervello adulto producesse nuovi neuroni. Oggi sappiamo che nell’ippocampo, chiave per memoria e apprendimento, la neurogenesi può continuare per tutta la vita. Identificate le cellule d’origine e le prime fasi di sviluppo, e aprendo una finestra sulla neurogenesi adulta si è visto però che i cervelli differiscono: in alcuni la neurogenesi è più attiva, in altri più limitata. Capire questi processi significa chiedersi quanto lo stile di vita possa influenzare la plasticità cerebrale e la neurogenesi, e consente di studiare nuove strategie terapeutiche per le malattie neurodegenerative e della salute mentale."},{"n":"182","t":"L’AMOUR TOUJOURS","p":[["Felicia Kingsley",0],["Chiara Codecà",1]],"raw":"Felicia Kingsley con Chiara Codecà","d":"sab","h":"17:00","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["narrativa"],"de":"L’amore, si sa, non passa mai di moda; è un sentimento che, in letteratura, ha smosso mari e monti, causato conflitti e guidato i passi di centinaia di epigoni di Giulietta e Romeo. Felicia Kingsley (Due cuori in affitto, Non è un paese per single) di giorno è architetta, ma la notte racconta l’evoluzione delle relazioni attraverso quello che un tempo era chiamato “romanzo rosa”. Scrittrice più letta in Italia per tre anni consecutivi, Kingsley spiega che il romance è sempre stato in movimento: “Tutti i generi evolvono per sintonizzarsi con i tempi. Io racconto una storia, ma allo stesso tempo restituisco una cartolina della società in cui viviamo”. Per la prima volta a Festivaletteratura, l’autrice di Mezzanotte a Parigi porterà il pubblico presente in un viaggio nel Feliciaverso, con l’aiuto di Chiara Codecà (Dillo con Jane Austen)."},{"n":"183","t":"TRASFORM-AZIONI","st":"laboratorio taglio e piega","p":[["Agnese Baruzzi",0]],"raw":"Agnese Baruzzi","e":"dai 3 ai 6 anni","d":"sab","h":"17:00","l":"casa del mantegna","pr":"7,50 €","ic":["accompagnatore adulto richiesto"],"tg":["arte e fotografia","infanzia ed educazione","editoria e traduzione"],"f":["per bambini","laboratorio"],"de":"Ci sono libri che non solo raccontano una storia, ma si trasformano letteralmente sotto le dita. Un cerchio che si fa tana, una linea che diventa il profilo di una creatura misteriosa: nel lavoro di Agnese Baruzzi (Trasformacose) la pagina è un congegno in cui niente è mai ciò che appare. In questo laboratorio, l’autrice invita bambine e bambini e i loro genitori a lavorare a quattro mani tra pieghe, tagli e incastri, condividendo il gesto della costruzione e dando vita a un piccolo oggetto interattivo capace di cambiare forma e svelare nuove figure a ogni tocco."},{"n":"184","t":"CHIACCHIERE A COLORI","p":[["Hervé Tullet",0]],"raw":"Hervé Tullet","s":"kaléidoscope français","e":"dai 3 anni","d":"sab","h":"18:00","l":"cinema oberdan","pr":"10,00 €","tg":["arte e fotografia","infanzia ed educazione","fumetto e illustrazione"],"f":["per bambini","percorso/visita"],"de":"Hervé Tullet arriva a teatro per un incontro decisamente fuori dagli schemi. Solo in scena, svela i suoi segreti: il suo percorso, i riti creativi, le ispirazioni artistiche, i trucchi del mestiere. Sfogliando le pagine dei suoi libri, invita il pubblico a cantare, seguendo il tratto di una linea che fa le onde o un cerchio che si stringe e poi si allarga. Ma c’è una regola speciale: il microfono è riservato esclusivamente ai più piccoli. Solo le bambine e i bambini potranno fare domande e dialogare con l’artista. E per finire, tutti sul palco per allestire una grande mostra collettiva! Progetto realizzato e ideato da Hervé Tullet, con la regia di Leo Tullet.","no":"L’autore parlerà in italiano."},{"t":"IL FUOCO SACRO DELLA SCRITTURA","p":[["Tommy Wieringa",0],["Ilenia Caito",1]],"raw":"Tommy Wieringa con Ilenia Caito","d":"sab","h":"18:00","l":"piazza dei libri","pr":"ingresso libero","ic":["streaming"],"tg":["scrittura e lettura","narrativa"],"de":"con l’Ambasciata e Consolato Generale del Regno dei Paesi Bassi in Italia.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con il Nederlands Letterenfonds (Fondazione neerlandese per la letteratura) e Sul Fuoco sacro della scrittura vedi p. 105"},{"n":"185","t":"NIEVO INCONTRA NIEVO","st":"3. il garibaldino e il polemista","p":[["Maurizio Bertolotti",0],["Attilio Motta",0],["Martina Dal Cengio",1]],"raw":"Maurizio Bertolotti e Attilio Motta con Martina Dal Cengio","d":"sab","h":"18:00","l":"biblioteca teresiana","pr":"7,50 €","tg":["storia","politica e attualità","Mantova e territorio"],"de":"Ippolito Nievo fu protagonista diretto della stagione risorgimentale. Arruolatosi già nel 1859 nei Cacciatori delle Alpi di Garibaldi, partecipò alla spedizione dei Mille, ricoprendo incarichi di responsabilità nell’amministrazione dell’impresa. L’impegno nelle fila garibaldine fu – ça va sans dire – stimolo per Nievo per un’intensa produzione saggistica legata alla riflessione sul significato politico dell’esperienza dell’esercito popolare e all’osservazione delle disparità culturali ed economiche delle diverse regioni d’Italia che si andavano a unire. Una scrittura che trova eco nei numerosissimi interventi pubblicati negli anni precedenti in riviste umoristico-satiriche su molteplici temi di attualità. A dialogare questa volta saranno Maurizio Bertolotti, curatore degli Scritti garibaldini nell’edizione nazionale delle Opere di Nievo, e Attilio Motta, che per la stessa edizione ha curato gli Scritti politici e di attualità e gli Scritti di letteratura. Conduce Martina Dal Cengio.","no":"Per Nievo incontra Nievo vedi n. 47; su Tutto Nievo minuto per minuto vedi p. 152"},{"n":"186","t":"MASCHERE MATTE E MOSTRI DA PASSEGGIO","st":"laboratorio di fantazoologia da parata","p":[["Ruggge",0]],"raw":"Ruggge","e":"dagli 8 anni","v":"vedi n. 1","d":"sab","h":"18:00","l":"cappella di palazzo del mago","pr":"7,50 €","tg":["arte e fotografia","miti e fiabe","infanzia ed educazione"],"f":["per bambini","laboratorio"]},{"n":"187","t":"CLASSIFICAZIONI UMANE","p":[["Gergely Péterfy",0],["Igiaba Scego",0],["Melania G. Mazzucco",1]],"raw":"Gergely Péterfy e Igiaba Scego con Melania G. Mazzucco","d":"sab","h":"18:15","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["storia","diritti e società","narrativa"],"de":"Gergely Péterfy è uno dei più autorevoli scrittori ungheresi contemporanei. Romanziere, saggista, giornalista e animatore culturale, ha dedicato gran parte della sua opera alla storia culturale dell’Europa centrale e ai temi della libertà, della memoria e dell’identità del continente. Finalmente tradotto in Italia, in Il barbaro impagliato racconta la storia di Angelo Solimano, arrivato in Europa come schiavo, diventato uno scienziato e una figura rispettata della Vienna illuminista; ma alla morte, nel 1796, il suo corpo verrà impagliato per essere esposto al Gabinetto Imperiale di Storia Naturale. Così l’uomo che in vita era stato accolto nei salotti aristocratici e apprezzato come intellettuale veniva trasformato, dopo la morte, in un oggetto da osservare. Igiaba Scego – nel graphic novel Figli della foresta, con le immagini di Chiara Abastanotti – restituisce memoria e dignità a Tukuba e Makunka, due bambini “pigmei” deportati dall’Africa all’Europa per essere osservati, classificati, analizzati e che rappresentano due simboli delle rimozioni sul passato coloniale italiano. Di razzismo, violenza anche culturale, memoria storica e nazionalismo parleranno con la scrittrice Melania G. Mazzucco. Gergely Péterfy parlerà in italiano."},{"n":"188","t":"HOMO EDENS","p":[["Marino Niola",0],["Stefano Scansani",1]],"raw":"Marino Niola con Stefano Scansani","d":"sab","h":"18:15","l":"tempio di san sebastiano","pr":"7,50 €","tg":["cibo","filosofia e idee","storia"],"de":"Nel 1979, nel messaggio di fine anno agli italiani, il presidente Pertini disse “si svuotino gli arsenali, si colmino i granai”: qualcuno potrebbe scherzosamente dire “non fate la guerra, fate la pasta”. La cultura culinaria è uno dei campi più interessanti degli studi antropologici, vera e propria carta d’identità di un popolo e, al contempo, ricca di incroci e delle contaminazioni che le le strade della Storia e delle migrazioni hanno impresso all’utilizzo del cibo. Da tempo l’antropologo Marino Niola, autore di La cucina dei perché (ma anche Homo dieteticus, Si fa presto a dire cotto, Non tutto fa brodo), si dedica allo studio dell’alimentazione e al suo rapporto con le attività umane, rifiutando una diffusa visione odierna che immagina il cibo come sola nutrizione: “è vero che gli uomini mangiano per vivere, ma a differenza degli altri animali vivono anche per mangiare”. Lo incontra il giornalista Stefano Scansani."},{"n":"189","t":"POSSIAMO PARLARNE?","p":[["Samy Ramos",0],["Luigi Dal Cin",1]],"raw":"Samy Ramos con Luigi Dal Cin","e":"dai 7 ai 10 anni","d":"sab","h":"18:15","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["infanzia ed educazione","mente e psicologia","narrativa"],"f":["per bambini","spettacolo/lettura"],"de":"Come si parla di tutte quelle cose che il mondo degli adulti finge di non vedere? Samy Ramos (Dove andiamo quando moriamo?) e Luigi Dal Cin (Il più grande spettacolo) nei loro libri hanno saputo prendere le parole più belle, le hanno mescolate con grazia alle illustrazioni, e sono riusciti così ad affrontare alcuni di quei temi di cui spesso gli adulti non vogliono parlare. Un incontro che finalmente rende visibile l’invisibile e che permette di parlare ad alta voce di grandi questioni.","no":"L’autrice parlerà in spagnolo, con interpretazione consecutiva in italiano."},{"n":"190","t":"CASA: DOVE SI È INCEPPATO IL SISTEMA?","p":[["Ezio Micelli",0],["Camillo Magni",1]],"raw":"Ezio Micelli con Camillo Magni","d":"sab","h":"18:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["città e architettura","economia e lavoro","politica e attualità"],"de":"“Siamo di fronte a un’emergenza casa e questo in modo quasi paradossale, perché la popolazione italiana non cresce e abbiamo un vasto numero, diversi milioni, di immobili non utilizzati. Come conciliare questi dati apparentemente discordanti e dare senso a questo tema?”. Economista ed esperto di economia urbana, Ezio Micelli è professore ordinario presso l’Università IUAV di Venezia: la sua attività scientifica si concentra sui processi di valorizzazione immobiliare, sulle trasformazioni urbane e sul ruolo degli strumenti economici nella pianificazione. Anche a partire dalla sua esperienza nell’Housing Advisory Board della Commissione europea, in conversazione con l’architetto Camillo Magni, Micelli tenterà in questo incontro di mettere a fuoco i nodi della questione abitativa contemporanea a livello locale e sovranazionale, tra politiche pubbliche e mercato, tra casa come diritto e casa come asset finanziario."},{"t":"QUANDO I SENSI SI PARLANO","p":[["Carlotta Lega",0]],"raw":"Carlotta Lega","s":"lavagne – onde cerebrali","d":"sab","h":"18:30","l":"piazza mantegna","pr":"ingresso libero","tg":["scienza","mente e psicologia"],"f":["lezione"],"de":"Perché associamo spontaneamente colori ai suoni, forme ai nomi e sapori alle emozioni? Sebbene queste associazioni siano comuni a tutti, in alcune persone diventano esperienze percettive automatiche e straordinarie, note come sinestesia. La lavagna esplorerà cosa ci insegnano la psicologia e le neuroscienze su questo affascinante dialogo tra i sensi, mostrando come il cervello costruisca la nostra esperienza del mondo integrando continuamente informazioni provenienti da modalità sensoriali diverse."},{"n":"191","t":"UN MONDO IN TUTTI I SENSI","p":[["Maurizio Casiraghi",0]],"raw":"Maurizio Casiraghi","s":"sfogliare l’universo – lezioni grandi","d":"sab","h":"18:30","l":"chiesa di san cristoforo","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["natura e animali","scienza"],"f":["lezione"],"de":"Il mondo come lo vediamo noi è come la nostra vista e, più in generale, i nostri sensi, ci permettono di farne esperienza. Un cane, una tigre, una zanzara hanno una percezione di quanto ci sta intorno molto distante dalla nostra, perché i loro apparati sensoriali sono – per così dire – tarati su scale completamente diverse. Questo vuol dire che ciò che riteniamo “oggettivo” non lo è affatto, e che – cambiando occhi – il mondo non è più lo stesso. Grazie ad alcuni degli albi presenti nella biblioteca meraviglia – Zoottica, Zoodorato, Vedo non vedo stravedo, Eye to eye e altri – lo zoologo Maurizio Casiraghi ci accompagna in un’esperienza percettiva animale, facendoci scoprire come i sensi degli animali siano peraltro ben più dei cinque che noi siamo abituati a utilizzare.","no":"Su Sfogliare l’universo vedi p. 126"},{"n":"192","t":"LA NATURA MADRE ANTICA","p":[["Giulia Sissa",0],["Guido Rebecchini",1]],"raw":"Giulia Sissa con Guido Rebecchini","d":"sab","h":"18:30","l":"palazzo te","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["natura e animali","filosofia e idee","storia"],"de":"idee naturali Nel secondo appuntamento di idee naturali, Giulia Sissa, studiosa di antichità classiche, ci riporta al mondo greco e latino, alle prime rappresentazioni dell'armonia del cosmo e delle forze incontrollabili del caos, tra miti e culti misterici, speculazione filosofica e vita quotidiana, guidandoci a trovarne le risonanze nella riflessione sulla natura del nostro tempo.","no":"Per idee naturali vedi n. 118"},{"n":"193","t":"LA SFIDA","p":[["Niccolò Ammaniti",0],["Antonio Manzini",0]],"raw":"reading inedito di e con Niccolò Ammaniti e Antonio Manzini","d":"sab","h":"19:00","l":"palazzo san sebastiano","pr":"7,50 €","tg":["narrativa","teatro e performance"],"f":["spettacolo/lettura"],"de":"Niccolò Ammaniti e Antonio Manzini, due dei più amati protagonisti della narrativa italiana contemporanea, uniscono il loro talento per un evento speciale: il reading di un nuovo racconto inedito scritto a quattro mani. Tra ironia e suspense, affondi grotteschi e note malinconiche, i due autori regaleranno al pubblico del Festival una narrazione “in viva voce” del tutto originale."},{"n":"194","t":"NON CHIAMATEMI BAMBINA PRODIGIO","p":[["Helen Oyeyemi",0],["Lella Costa",1]],"raw":"Helen Oyeyemi con Lella Costa","d":"sab","h":"19:00","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["narrativa","memoria e biografia"],"de":"Quando Helen Oyeyemi era ancora alle superiori, inviò quasi per gioco venti pagine di una storia che stava scrivendo a un’agenzia letteraria trovata sulla rubrica telefonica: la risposta fu entusiastica e quelle poche pagine divennero La bambina Icaro, romanzo fantasy che lanciò la sua carriera. Nata in Nigeria e cresciuta a Londra, Oyeyemi mescola la cultura di entrambi i luoghi in una produzione che – ispirata da Poe e Stephen King – naviga tra l’onirico e il soprannaturale. Libri che cambiano il testo ogni volta che vengono aperti, donne in cui convivono multiple e vivissime personalità, bizzarri disordini alimentari, misteriose bambine giunte dall’Africa… Per la prima volta ospite a Mantova, l’autrice di Una nuova nuova me (in uscita a settembre) dialogherà con Lella Costa, spiegandoci che “non scrivo realismo magico. Chiamo ciò che faccio, semplicemente, storie”.","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"195","t":"CANZONI BALLERINE","p":[["Giovanna Pezzetta",0]],"raw":"Giovanna Pezzetta","s":"mah! – mantegna after hours","e":"dai 6 anni","d":"sab","h":"19:00","l":"casa del mantegna","pr":"7,50 €","tg":["musica","infanzia ed educazione"],"f":["per bambini","spettacolo/lettura"],"de":"Giovanna Pezzetta da anni scrive canzoni per bambine e bambini, gioca coi suoni, incrocia gli stili. Per MAH! proporrà un’allegra selezione dei suoi cocktail musicali, invitando grandi e piccoli a mescolare voci, muoversi a ritmo e fare festa! E se a forza di cantare vi si seccherà la gola, non preoccupatevi: i minicocktail ispirati alle sue canzoni saranno lì per dissetarvi.","no":"Su MAH! vedi n. 122"},{"t":"I BAMBINI HANNO DIRITTO ALLA PRIVACY?","p":[["Silvia Demozzi",0]],"raw":"Silvia Demozzi","s":"accenti","d":"sab","h":"19:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["infanzia ed educazione","diritti e società","tecnologia e IA"],"de":"L’Articolo 16 della Convenzione ONU sui Diritti dell’Infanzia e dell’Adolescenza del 1989 afferma che anche bambini e bambine hanno diritto a una vita privata. Sin dai primissimi anni, infatti, la privacy è parte della costruzione dell’identità e della fiducia. Un adulto consapevole dovrebbe sempre interrogarsi rispetto a quanto le sue interazioni con l’infanzia siano capaci di sostare su una soglia di osservazione e rispetto, oppure se rischino, talvolta, di invadere e colonizzare."},{"n":"196","t":"CHI ABITA IL MONDO CON NOI?","p":[["Simon Armitage",0],["Peter Florence",1]],"raw":"Simon Armitage con Peter Florence","d":"sab","h":"19:00","l":"chiesa di santa maria della vittoria","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["poesia","natura e animali","ambiente e clima"],"de":"Alveari, tane, nidi, rifugi: forme dell’abitare che precedono il genere umano e continueranno a esistere quando non ci sarà più. Nelle poesie di Fiorire e nidificare, la più recente raccolta di Simon Armitage, il paesaggio naturale diventa un archivio di relazioni, presenze e storie che invitano a ripensare il nostro posto nel mondo. Attraverso una scrittura che intreccia precisione descrittiva, immaginazione e memoria del folklore, Armitage costruisce una geografia dell’abitare capace di attraversare i confini tra specie e di interrogare il rapporto tra umano e non umano. Le sue poesie guardano alla natura non come a uno sfondo, ma come a una realtà complessa e vitale, abitata da forme di intelligenza, adattamento e convivenza che sfuggono alle nostre categorie abituali. Ne emerge un invito a osservare il mondo da una prospettiva decentrata, riconoscendo nelle molteplici forme dell’abitare una rete di esistenze interconnesse, fragile e condivisa.","no":"Gli autori parleranno in inglese, con interpretazione consecutiva in italiano."},{"n":"197","t":"LA LUNGA SCIA DEL COLONIALISMO","p":[["Amitav Ghosh",0],["Matteo De Giuli",1]],"raw":"Amitav Ghosh con Matteo De Giuli","d":"sab","h":"19:00","l":"piazza castello","pr":"8,50 €","ic":["consapevolezza verde","streaming"],"tg":["storia","geopolitica e guerre","ambiente e clima"],"de":"Correva l’anno 2009 e, a Festivaletteratura, andava in scena una retrospettiva dedicata ad Amitav Ghosh (La grande cecità, Il palazzo degli specchi, Le linee d’ombra), in cui la traduttrice Anna Nadotti introduceva il pubblico ai temi cruciali della sua narrazione e dei suoi reportage. Lo scrittore, giornalista e antropologo indiano si è infatti sempre diviso tra il romanzo e il racconto storico della “parabola del colonialismo” e dei suoi effetti sul territorio: spostandosi tra Calcutta e Mumbai, tra Londra, Hong Kong e Canton, Ghosh ha cercato di riconciliare la letteratura con l’attenzione alla crisi climatica, in relazione però a una lunga scia di eventi passati che ne hanno delineato i confini. “Credo che un romanzo debba riflettere la realtà nella quale è scritto” afferma l’autore del recente L’occhio fantasma: insieme a Matteo De Giuli spiegherà perché non è solo la scienza a poter parlare in nome della natura.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"198","t":"CHI POSSIEDE IL MONDO","p":[["Alessandro Volpi",0],["Riccardo Staglianò",1]],"raw":"Alessandro Volpi con Riccardo Staglianò","d":"sab","h":"19:15","l":"aula magna dell'universita","pr":"7,50 €","tg":["economia e lavoro","politica e attualità"],"de":"In poco più di vent’anni tre fondi d’investimento – BlackRock, Vanguard e State Street – sono passati dai margini al cuore dell’economia mondiale: detengono quote enormi del capitale delle più grandi aziende mondiali, influenzando prezzi, scenari economici e politici. Lo storico dell’economia Alessandro Volpi ne ha fatto il bersaglio di due libri, I padroni del mondo e La guerra della finanza: una concentrazione di potere che, sostiene, svuota da dentro mercato e democrazia. Attorno a loro si combatte oggi una guerra interna al capitalismo, tra la finanza tradizionale e il fronte di criptovalute e hedge fund su cui punta Trump, tra dazi e difesa del dollaro. E in questa partita l’Europa è la preda più ambita: i suoi risparmi sono ormai legati alle Borse americane, una trappola della dipendenza che restringe i margini di manovra dei governi ed erode lo stato sociale. Ne discute con Volpi il giornalista Riccardo Staglianò (Tassare i milionari)."},{"n":"199","t":"IL RICHIAMO DELL’ABISSO: DA “L’ORRORE DI DUNWICH”","p":[["Compagnia della Lettura",0],["Luca Scarlini",0],["Spartaco Cortesi",0]],"raw":"un’installazione sonora con le voci della Compagnia della Lettura adattamento di Luca Scarlini; musiche e suoni di Spartaco Cortesi","s":"i miti oscuri di h.p. lovecraft","v":"vedi n. 60","d":"sab","h":"19:30","l":"sotterranei del castello di san giorgio","pr":"7,50 €","tg":["fantastico e horror","musica","teatro e performance"]},{"t":"DAL BALCONE","st":"più un affaccio che un concerto","p":[["Dutch Nazari",0]],"raw":"Dutch Nazari","d":"sab","h":"19:45","l":"piazza concordia","pr":"ingresso libero","tg":["musica","poesia"],"f":["spettacolo/lettura"],"de":"Rime, incastri, citazioni e un debito dichiarato con la poesia e i poetry slam. Dagli esordi fino al recente disco Guarda le luci amore mio – titolo preso in prestito da Annie Ernaux –, Dutch Nazari porta nel rap una sensibilità letteraria rara, costruendo il suo “cantautorap” tra beat ed elettronica. Accompagnato alla chitarra da Sicket, producer dei suoi album, Nazari si affaccerà dal balcone di piazza Concordia per guardare, appunto, le luci e la folla."},{"t":"CHE DOMANDE! IN PIAZZA","p":[["Claudia Durastanti",0],["Simone Pieranni",0]],"raw":"Claudia Durastanti e Simone Pieranni con la redazione di Che domande!","d":"sab","h":"20:30","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["media e giornalismo","filosofia e idee"],"de":"Che domande! è il podcast di Festivaletteratura che dal 2024 pone ad autrici e autori presenti al Festival domande sul nostro tempo che vanno dritte al punto, senza lasciare spazio a risposte superficiali o a vuoti giri di parole. Registrato dal vivo al Festival e pubblicato successivamente, quest’anno il podcast vive una sua serata live, durante la quale la scrittrice Claudia Durastanti (Falsi amici) e il giornalista Simone Pieranni (Lo specchio americano) proveranno a rispondere ad alcune domande in stile… Che domande!"},{"t":"ALLE RAGAZZE PIACE IL VERDE","p":[["Elisabetta Tola",0]],"raw":"Elisabetta Tola","s":"accenti","d":"sab","h":"20:30","l":"tenda sordello","pr":"ingresso libero","ic":["consapevolezza verde","streaming"],"tg":["ambiente e clima","genere e femminismo","scienza"],"de":"Una carrellata di scienziate e di attiviste di ieri e di oggi che si sono battute per difendere la natura come bene collettivo e come punto di partenza per costruire una società più equa e una vita migliore. Elisabetta Tola, autrice del podcast She Green e coautrice di Le ragazze e il colibrì, ci mostra come – anche nel campo ambientale – le donne si siano dimostrate pioniere."},{"t":"BLURANDEVÙ","p":[["Kento",0]],"raw":"Kento","d":"sab","h":"20:45","l":"seminario vescovile - aula magna","pr":"ingresso libero","tg":["musica","diritti e società"],"de":"Francesco “Kento” Carlo (Con una pistola alla tempia, Il nonno, il rapper e altri ribelli) è un veterano della scena hip hop italiana e, oltre alla carriera da solista, ha militato in formazioni storiche dello Stivale come Gli Inquilini e Kalafro Sound Power. Il musicista, formatore e scrittore di Reggio Calabria da anni porta la sua arte nelle carceri minorili, dove conduce laboratori di scrittura e dialoga delle tematiche che da sempre contraddistinguono la sua produzione: periferie, lotta alle mafie e diritti umani. Sappiamo che Kento “non si fida dei re Mida / né dei beat da hit parade”, ma – se la parola è confronto e mezzo per la crescita e il cambiamento individuali – siamo certi che “risponderà per le rime” ai ragazzi e alle ragazze di Blurandevù. Per l’incontro è previsto un servizio di interpretazione nella lingua dei segni italiana."},{"t":"COLLABORARE","p":[["Fabrizio Luisi",0]],"raw":"Fabrizio Luisi","s":"lavagne – meccaniche di gioco","d":"sab","h":"21:00","l":"piazza mantegna","pr":"ingresso libero","tg":["gioco","filosofia e idee"],"f":["lezione"],"de":"Una volta raccontati i giochi progettati per il dominio sull’altro e l’accumulo delle risorse, è ora di cambiare prospettiva radicalmente: Fabrizio Luisi ci accompagnerà nel mondo dei giochi cooperativi, quelli in cui i giocatori non si combattono tra loro ma affrontano insieme un ostacolo comune. Un genere esploso nell’ultimo ventennio, che ribalta le premesse competitive di molta tradizione ludica: cosa significa progettare e giocare un gioco in cui la vittoria (o la sconfitta!) sono collettive?"},{"n":"200","t":"AMBIENTARSI","st":"lezione/laboratorio","p":[["Marco Bartoli",0],["Erica Barzoni",0]],"raw":"Marco Bartoli ed Erica Barzoni","s":"spazio rio","v":"vedi n. 127","d":"sab","h":"21:00","l":"pontile pescherie di giulio romano","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["ambiente e clima","scienza","natura e animali","Mantova e territorio"],"f":["laboratorio","lezione"]},{"t":"EMANUELE: LETTURA SCENICA","p":[["Accademia Teatrale “Francesco Campogalliani”",0],["Maria Grazia Bettini",0],["Maurizio Bertolotti",0]],"raw":"Accademia Teatrale “Francesco Campogalliani” adattamento di Maria Grazia Bettini; introduce lo spettacolo Maurizio Bertolotti","s":"tutto nievo minuto per minuto","d":"sab","h":"21:00","l":"via tasso","pr":"ingresso libero","tg":["teatro e performance","narrativa","Mantova e territorio"],"de":"“Emanuele vuol fare una speculazione – vuol spendere un milione di franchi per occupare un posto nella società: voglio anche supporre per un momento che questo posto meriti una spesa così enorme. Ma questo posto lo guadagnerà egli?”. Appena ventenne, passati da poco i moti del 1848, Ippolito Nievo compone il suo primo dramma teatrale basandosi sul tema ardente dell’antisemitismo e dei moti tellurici che, a partire dalla Rivoluzione francese, mutarono anche la millenaria condizione degli israeliti in Europa, lambendo altresì Mantova e Sabbioneta, allora tra le comunità ebraiche più vaste d’Italia. È qui che Nievo, lui stesso amico di giovani ebrei idealisti desiderosi di emanciparsi nella nuova società, concepisce un profluvio di perfetti dialoghi al vetriolo, in cui le forze della conservazione, dell’intolleranza e della cupidigia – rappresentate ora dal vecchio Giosuè, ora dal gentile profittatore di turno – si contrappongono all’universalismo e alla fratellanza tra i popoli, trasformando gli stereotipi in dramma e il quotidiano in poesia. Davanti alla scuola elementare che di Nievo porta oggi il nome, l’Accademia Teatrale “Francesco Campogalliani” mette per la prima volta in scena gli enormi conflitti da cui le pagine di Emanuele, a tutt’oggi lucidissime, trassero vita e vigore.","no":"Su Tutto Nievo minuto per minuto vedi p. 152"},{"n":"201","t":"CARTA, INCHIOSTRO E NOTIZIE","p":[["Beppe Severgnini",0]],"raw":"Beppe Severgnini","d":"sab","h":"21:15","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["media e giornalismo","storia"],"de":"Sin dalla prima edizione del 1997, Festivaletteratura ha dato ampio spazio ai temi del giornalismo e del reportage, portando – in un gremito Cortile della Cavallerizza – l’uruguaiano Eduardo Galeano a confrontarsi col pubblico presente. Era solo uno dei tanti eventi che avrebbero chiamato sui palchi di Mantova nomi del calibro di Natalia Aspesi, Katerina Gordeeva, Tiziano Terzani, Svetlana Aleksievič o Robert Fisk. Beppe Severgnini (Socrate, Agata e il futuro) – che da oltre trent’anni scrive per il Corriere della Sera – ha visto, per lavoro e per passione, scorrere fiumi di inchiostro che raccontano l’evoluzione del mondo della stampa: attingendo al vasto bacino di materiali del nostro archivio condurrà i presenti in un viaggio attraverso le grandi figure legate al settore dell’informazione, ragionando di come lo scorrere del tempo e i progressi tecnologici abbiano profondamente modificato il mestiere del giornalista, senza però intaccarne il cuore."},{"n":"202","t":"FAR-VENETO: FUGA DALLA PROVINCIA","p":[["Nicole Trevisan",0],["Enrico Trevisiol",0],["Alessandra Castellazzi",1]],"raw":"Nicole Trevisan ed Enrico Trevisiol con Alessandra Castellazzi","s":"avere trent'anni","d":"sab","h":"21:15","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["narrativa","viaggi e luoghi","economia e lavoro"],"de":"Spesso dalla provincia si desidera fuggire, ma, una volta lontani, ha su di noi un richiamo irresistibile – è un legame famigliare, geografico, di classe. Proprio per questo, vivere in quello spazio significa anche abitarne il tempo di quando si era persone diverse e con sogni ancora da realizzarsi. “Parlavamo spesso di mandare affanculo tutti, di viaggiare e andare lontani, licenziarsi e prendere degli aerei e andare via proprio, vivere nel presente e niente prima e niente dopo” dice il protagonista del libro di Trevisiol; “Manco da anni, ho messo ampi spazi tra me e questo posto per dimenticarmene, ma non riesco a impedire alla nostalgia di passare sotto la porta” riflette la protagonista di Trevisan: sono i due estremi di quell’esperienza. Accompagnati da Alessandra Castellazzi, che porta in questo dialogo la prospettiva di un’altra terra piatta, Nicole Trevisan (Malefica) ed Enrico Trevisiol (Un eroe dei nostri tempi) raccontano i trentenni, gli eroi e le anti-eroine del decennio presente nel loro modo di attraversare la propria vasta pianura dell’incertezza."},{"n":"203","t":"RIDERNE, ALMENO","p":[["Dario Ferrari",0],["Giulia Scomazzon",0],["Massimo Cirri",1]],"raw":"Dario Ferrari e Giulia Scomazzon con Massimo Cirri","d":"sab","h":"21:15","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["narrativa","mente e psicologia"],"de":"L’incapacità – o l’impossibilità – di costruire una vita adulta funzionale può diventare, all’occorrenza, anche materia per un racconto venato di comicità. Dario Ferrari (L’idiota di famiglia) e Giulia Scomazzon (8.6 gradi di separazione) nei loro romanzi hanno dato vita a due personaggi che, varcata la soglia dell’età adulta, non sanno molto bene come andare oltre. Da una parte un traduttore di opere dimenticabili, con un mestiere ormai insidiato dall’intelligenza artificiale e alle prese con il deperimento di un padre ingombrante; dall’altra una “bevitrice funzionale” della provincia veneta che osserva la fine di una storia d’amore tenendosi insieme tra spritz e ansiolitici. Due figli esemplari di una generazione a cui era stato promesso molto di più, e per la quale l’(auto)ironia è spesso il modo più onesto di dire la verità. A dialogare con loro, lo psicologo e conduttore Massimo Cirri."},{"n":"204","t":"FORSE GLASGOW NON VOLEVA BENE A ME","p":[["Douglas Stuart",0],["Mario Desiati",1]],"raw":"Douglas Stuart con Mario Desiati","d":"sab","h":"21:30","l":"palazzo san sebastiano","pr":"7,50 €","tg":["narrativa","memoria e biografia","genere e femminismo"],"de":"“Nel quartiere in cui vivevamo i libri non erano ben visti, soprattutto se a leggerli era un ragazzo. Erano per le ragazze o le donne, tuttalpiù. Se ti beccavano a leggere potevano pestarti”. Negli anni Ottanta e Novanta del secolo scorso, crescere come persone queer nelle periferie operaie di Glasgow significava sentirsi fuori posto: giudicati dagli altri, talvolta incompresi persino dalla propria famiglia e vittime di un sistema dominato da machismo e bullismo nei confronti di chi era bollato come diverso. È un tema che torna con forza nell’opera di Douglas Stuart, fashion designer statunitense di origine scozzese che ha vinto il Booker Prize nel 2020 con il suo esordio nella narrativa, Storia di Shuggie Bain. Affiancato da Mario Desiati (Malbianco), l’autore di Il giovane Mungo e del recente John figlio di John si racconta al pubblico presente, in un dialogo intimo sul ritorno in luoghi in cui non sempre ci si è sentiti accolti e sulle molte forme dell’amore.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"205","t":"CONCERTO PER FLEUR","p":[["NicoNote",0],["Luca Scarlini",0]],"raw":"NicoNote e Luca Scarlini","d":"sab","h":"21:30","l":"teatro bibiena","pr":"15,00 €","tg":["musica","poesia"],"f":["spettacolo/lettura"],"de":"“Il senso del possesso che fu prealessandrino”: quante volte abbiamo canticchiato Sentimiento nuevo senza chiederci da dove venisse quel bizzarro ma musicalissimo accostamento? Alcuni sodalizi vivono discreti il pudore di un’amicizia, e questo favorisce due individui a trovare l’uno nell’altra una comunione spirituale assai rara. Così fu il legame tra la scrittrice Fleur Jaeggy e il cantautore Franco Battiato. Oltre ai brani firmati assieme, ci sono testi, in questa storia ricostruita da Luca Scarlini e musicata da NicoNote, che dagli anni Settanta attraversano quattro decenni come preziosi fil rouge: basti pensare a I beati anni del castigo, definito da Battiato “un libro assoluto”, ma soprattutto a Le statue d’acqua, una delle prose più criptiche di Fleur che per l’artista siciliano fu una rivelazione duratura, destinata a improntare album come Patriots, La voce del padrone, Dieci stratagemmi, e ad accompagnare capolavori della canzone come L’oceano di silenzio."},{"t":"IMMAGINANDO","p":[["Cleo Bissong",0],["Sadagari",0],["Daniele Serra",0]],"raw":"Cleo Bissong, Sadagari e Daniele Serra","s":"accenti","d":"sab","h":"21:30","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["fumetto e illustrazione","arte e fotografia"],"de":"Da dove si parte per disegnare una storia? Come prendono forma oggetti, luoghi, personaggi, interi universi che, tavola dopo tavola, si trasformano mirabilmente in racconto? Trenta minuti a disposizione per curiosare sul tavolo da lavoro di tre narratrici e narratori per immagini, tra matite, colori, schizzi, appunti, libri e opere d’ispirazione."},{"n":"206","t":"UNA LINGUA PER DOMARLI","p":[["Gian Piero Piretto",0],["Eugenio Cau",1]],"raw":"Gian Piero Piretto con Eugenio Cau","d":"sab","h":"21:30","l":"aula magna dell'universita","pr":"7,50 €","tg":["lingua e parole","geopolitica e guerre","politica e attualità"],"de":"perpetrato da tempo un deliberato atto di manomissione, gettando le basi di una guerra ideologica e materiale di cui il conflitto tra Russia e Ucraina è sì l’episodio più devastante, ma non isolato. Chi ha ristretto l’orizzonte semantico di lemmi come Sobórnost’ (l’unione spirituale tra individui) o rússkaja dušá (anima russa) fino a renderli oggetti odiosi e contundenti, oggi stringe tra le mani un autentico vaso di Pandora, ma comprendere quelle parole nella loro origine e interezza forse può contribuire a placare la tempesta. Ne parlano insieme lo storico e slavista Gian Piero Piretto (L’ultimo spettacolo, Il paese di Putin) e il giornalista Eugenio Cau, curatore di Globo.","no":"Sul russo ereditato (e reinventato) da mostri sacri della letteratura, la propaganda putiniana ha"},{"t":"VOLUME!","p":[["Irvine Welsh",0]],"raw":"Irvine Welsh","d":"sab","h":"22:00","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["musica","narrativa"],"de":"Il rapporto tra Irvine Welsh e la musica è sempre stato viscerale: la techno e l’acid house pulsano nelle pagine dei suoi romanzi come una colonna sonora interna. Per una notte, piazza Alberti diventa (un po’) l’Edimburgo di Renton, Spud, Begbie e Sick Boy: l’autore di Trainspotting e Acid House sveste i panni dello scrittore per salire in consolle. ccio affa ù un pi erto onc un c che A Festivaletteratura quest’anno la musica scende dall’alto. In tre diverse serate, s i trasforma in platea, e il palco è un balcone che si ap re sulla folla. Tre artisti si affacciano dal balcone una sera ciascuno, per regalare al pubbli co del Festival tre set acustici e raccolti, da ascolta re con il naso all’insù. I concerti sono reali zzati grazie al s ostegno d i"},{"n":"207","t":"YOGA PER LEGGERE","p":[["Susanna Binelli",0]],"raw":"Susanna Binelli","v":"vedi n. 69","d":"dom","h":"8:00","l":"casa del mantegna","pr":"7,50 €","tg":["corpo e benessere"]},{"n":"208","t":"UNA FRATTURA NELL’ORDINE MORALE","p":[["Didier Fassin",0],["Veronica Fernandes",1]],"raw":"Didier Fassin con Veronica Fernandes","s":"kaléidoscope français","d":"dom","h":"10:00","l":"palazzo san sebastiano","pr":"7,50 €","tg":["storia","filosofia e idee","diritti e società"],"de":"“A che serve la Storia?” si chiedeva Marc Bloch nella sua Apologia della storia. Per Cicerone il suo ruolo era quello di “maestra di vita”, eppure l’uomo sembra incorrere negli stessi errori in un circolo senza fine: la distruzione di Gaza e l’uccisione di migliaia di civili palestinesi iniziate dopo l’attacco di Hamas del 7 ottobre 2023 hanno scosso le fondamenta morali della comunità internazionale. L’Occidente, però, attraverso i suoi stati e apparati mediatici sembra ancora marginalizzare le voci di dissenso, usando la parola “antisemita” come arma impropria. “Le analisi critiche della situazione, le prese di posizione in difesa dell’ordine internazionale sono stigmatizzate, punite” afferma l’antropologo e sociologo Didier Fassin, che in Una strana disfatta ha analizzato la censura giornalistica dei diretti testimoni del genocidio e il trattamento riservato a chi chiede l’applicazione del diritto internazionale. Ne discute insieme alla giornalista Veronica Fernandes.","no":"L’autore parlerà in francese, con interpretazione consecutiva in italiano."},{"n":"209","t":"ANIME ANALOGICHE","p":[["Johan Harstad",0],["Ludovica Lugli",1]],"raw":"Johan Harstad con Ludovica Lugli","d":"dom","h":"10:00","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["narrativa","cinema e tv"],"de":"Autore di prose e testi teatrali, Johan Harstad ha trovato tanto nella storia, quanto nella cultura pop e cinematografica del secondo Novecento, una miniera da cui si liberano meravigliose gemme romanzesche. L’allunaggio dell’Apollo 11 nel ’69, con i suoi eroi in primo e secondo piano, diviene così l’occasione per riflettere sulla bellezza dello stare in ombra insieme al sommesso e talentuoso protagonista di Che ne è stato di te, Buzz Aldrin?, mentre in Max, Mischa e l’Offensiva del Tet, l’autore norvegese assembla migliaia di tessere di una monumentale storia d’amore, che si dipana tra Europa e Stati Uniti, tra la guerra in Vietnam e gli anni Novanta, Apocalypse Now e l’arte contemporanea, catturando l’esatto momento in cui le nostre solide memorie analogiche sprofondano nella frammentazione e nel disincanto dell’era digitale. Lo incontra la giornalista Ludovica Lugli. vegia in Italia.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con NORLA (Norwegian Literature Abroad) e con la Reale Ambasciata di Nor-"},{"n":"210","t":"FUORI LUOGO, PAROLE ALIENE","st":"laboratorio di osservazione di ecosistemi acquatici","p":[["Marco Bartoli",0]],"raw":"Marco Bartoli","s":"spazio rio","e":"dai 12 anni","v":"vedi n. 35","d":"dom","h":"10:00","l":"pontile pescherie di giulio romano","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["scienza","natura e animali","ambiente e clima","Mantova e territorio"],"f":["per ragazzi","laboratorio"]},{"n":"211","t":"PERDERSI NEI COLORI","p":[["Annie Cohen-Solal",0],["Melania G. Mazzucco",1]],"raw":"Annie Cohen-Solal con Melania G. Mazzucco","s":"kaléidoscope français","d":"dom","h":"10:00","l":"teatro bibiena","pr":"7,50 €","tg":["arte e fotografia","memoria e biografia","migrazioni e confini"],"de":"Nel 1913, quando aveva appena dieci anni, Mark Rothko fuggì con la famiglia dalla Lettonia per sottrarsi alle persecuzioni antiebraiche e approdare a Portland, negli Stati Uniti. L’angoscia e lo spaesamento della condizione di immigrato non lo abbandonarono mai e furono motore della sua iconica produzione artistica fatta di grandi pannelli cromatici. Tra gli esponenti più celebri della color field painting e pioniere dell’astrattismo, Rothko cercava la decostruzione in favore della ricerca dell’interiorità più pura: “Io filmo il nulla, tu dipingi il nulla”, gli disse il celebre regista Michelangelo Antonioni. Per ragionare del lascito di una delle maggiori personalità artistiche del Novecento, la storica Annie Cohen-Solal (Mark Rothko. Riparare il mondo) si confronta con la scrittrice Melania G. Mazzucco.","no":"L’autrice parlerà in italiano."},{"t":"BLURANDEVÙ","p":[["Igiaba Scego",0]],"raw":"Igiaba Scego","d":"dom","h":"10:00","l":"seminario vescovile - aula magna","pr":"ingresso libero","tg":["narrativa","migrazioni e confini"],"de":"“Io sono quella che sono per effetto di questa fusione tra due mondi” afferma la scrittrice Igiaba Scego (Cassandra a Mogadiscio, Figli dello stesso cielo, La mia casa è dove sono, La linea del colore): nata in Italia da genitori fuggiti dalla dittatura di Siad Barre in Somalia, indaga nelle sue opere la ricerca dell’identità in chi deve “portare con sé casa quando si sposta in un altro luogo”. Colonialismo, afrodiscendenza, letteratura migrante sono temi che nella sua opera si riverberano tanto nei romanzi per adulti quanto nella produzione per adolescenti (Figli della foresta): “Bambini e ragazzi sono un pubblico ideale, perfetto. Non sono […] esseri umani meno sofisticati. Hanno modi di accedere alla vita completamente diversi, spesso più profondi”. A dialogare con lei saranno le ragazze e i ragazzi di Blurandevù."},{"n":"212","t":"IL TERRITORIO È LA GUERRA","p":[["Eyal Weizman",0],["Nicolò Porcelluzzi",1]],"raw":"Eyal Weizman con Nicolò Porcelluzzi","d":"dom","h":"10:00","l":"aula magna dell'universita","pr":"7,50 €","tg":["geopolitica e guerre","città e architettura","diritti e società"],"de":"Come si dimostra un crimine che si c
