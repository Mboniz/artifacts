<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Festivaletteratura 2026 — Programma</title>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<meta name="robots" content="noai, noimageai">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{
  --blu:#1d3fa3; --blu-scuro:#142c74; --giallo:#f5c400; --rosso:#e63329;
  --verde:#007a33; --rosa:#ef7fae; --crema:#faf8f3; --carta:#ffffff;
  --inchiostro:#1a1a1a; --grigio:#6b6b6b; --linea:#e6e2d8;
  --c-mer:#007a33; --c-gio:#f5c400; --c-ven:#ef7fae; --c-sab:#e63329; --c-dom:#1d3fa3; --c-tutti:#6b6b6b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--crema);color:var(--inchiostro);font-size:15px;line-height:1.45;
  padding-bottom:calc(64px + env(safe-area-inset-bottom))}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
a{cursor:pointer}
.chip,.filterbtn,.abtn,.heart{transition:transform .12s ease,background .15s,color .15s}
.chip:active,.filterbtn:active,.abtn:active{transform:scale(.95)}

/* ---------- header ---------- */
header{background:var(--blu);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:900}
header h1{font-size:19px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;line-height:1.1}
header h1 .tre{display:inline-block;background:var(--rosso);color:#fff;border-radius:50%;
  width:26px;height:26px;line-height:26px;text-align:center;font-size:14px;margin-left:6px;vertical-align:2px}
header .sub{font-size:12px;opacity:.85;margin-top:2px}

/* ---------- tab bar ---------- */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--carta);border-top:1px solid var(--linea);
  display:flex;z-index:1000;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;padding:9px 2px 7px;font-size:10.5px;font-weight:600;color:var(--grigio);
  display:flex;flex-direction:column;align-items:center;gap:2px}
nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--blu)}
nav button .bdg{position:absolute;margin-left:26px;margin-top:-3px;background:var(--rosso);color:#fff;
  font-size:9px;font-weight:800;border-radius:8px;min-width:15px;height:15px;line-height:15px;text-align:center;padding:0 3px}

/* ---------- chips giorno ---------- */
.daybar{display:flex;gap:6px;overflow-x:auto;padding:10px 14px 8px;scrollbar-width:none;background:var(--crema);
  position:sticky;top:57px;z-index:800;border-bottom:1px solid var(--linea)}
.daybar::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:6px 13px;border-radius:20px;font-size:13px;font-weight:700;
  background:var(--carta);border:1.5px solid var(--linea);color:var(--inchiostro)}
.chip.on{background:var(--blu);border-color:var(--blu);color:#fff}
.chip small{display:block;font-size:10px;font-weight:500;opacity:.75;line-height:1}

/* ---------- filtri ---------- */
.filterbtn{display:flex;align-items:center;gap:6px;margin:8px 14px 0;padding:7px 12px;border-radius:10px;
  background:var(--carta);border:1.5px solid var(--linea);font-size:13px;font-weight:600;color:var(--blu)}
.filterbtn .dot{background:var(--rosso);color:#fff;border-radius:9px;font-size:10px;font-weight:800;padding:1px 6px}
.fpanel{margin:8px 14px 0;background:var(--carta);border:1.5px solid var(--linea);border-radius:12px;padding:12px;display:none}
.fpanel.open{display:block}
.fpanel h4{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--grigio);margin:10px 0 6px}
.fpanel h4:first-child{margin-top:0}
.fchips{display:flex;flex-wrap:wrap;gap:6px}
.fchips .chip{font-size:12px;padding:5px 11px;font-weight:600}
select.fsel{width:100%;padding:9px 10px;border:1.5px solid var(--linea);border-radius:9px;font-size:14px;
  background:var(--carta);color:var(--inchiostro);font-family:inherit;appearance:auto}
.freset{margin-top:12px;width:100%;padding:8px;border-radius:9px;background:var(--crema);font-size:13px;font-weight:600;color:var(--rosso)}

/* ---------- lista eventi ---------- */
.count{padding:10px 16px 4px;font-size:12px;color:var(--grigio)}
.gruppo-h{padding:14px 16px 6px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;
  display:flex;align-items:center;gap:8px}
.gruppo-h .pallino{width:10px;height:10px;border-radius:50%}
.card{background:var(--carta);margin:0 12px 8px;border-radius:12px;border:1px solid var(--linea);
  padding:11px 12px;display:flex;gap:11px;align-items:flex-start;position:relative}
.card{cursor:pointer;transition:background .12s,transform .1s}
.card:active{background:#efece3;transform:scale(.985)}
.num{flex:0 0 34px;width:34px;height:34px;border-radius:50%;background:var(--blu);color:#fff;
  font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:2px}
.num.free{background:var(--carta);color:var(--blu);border:2px solid var(--blu);font-size:15px}
.cbody{flex:1;min-width:0}
.ctime{font-size:12px;font-weight:700;color:var(--blu);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ctime .gratis{background:var(--verde);color:#fff;font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:7px;text-transform:uppercase}
.ctime .eta{background:var(--giallo);color:#4d3c00;font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:7px}
.ctit{font-size:14.5px;font-weight:800;line-height:1.22;margin:2px 0 1px;text-transform:uppercase}
.caut{font-size:12.5px;color:var(--inchiostro);margin-bottom:2px}
.cluogo{font-size:11.5px;color:var(--grigio)}
.ctags{margin-top:5px;display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;font-weight:600;background:var(--crema);border:1px solid var(--linea);border-radius:6px;padding:1.5px 6px;color:#555}
.heart{flex:0 0 auto;padding:4px;margin:-4px -4px 0 0}
.heart svg{width:23px;height:23px;stroke:#c9c3b6;fill:none;stroke-width:1.9}
.heart.on svg{stroke:var(--rosso);fill:var(--rosso)}
@keyframes hpop{0%{transform:scale(1)}45%{transform:scale(1.45)}100%{transform:scale(1)}}
.heart.pop svg{animation:hpop .32s ease}
.scard{cursor:pointer;transition:background .12s}
.scard:active{background:#efece3}
#toast{position:fixed;left:50%;transform:translateX(-50%) translateY(16px);bottom:calc(76px + env(safe-area-inset-bottom));
  background:var(--inchiostro);color:#fff;font-size:13.5px;font-weight:700;padding:10px 18px;border-radius:24px;
  box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:2000;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;display:flex;gap:7px;align-items:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast .th{color:#ff6b61}
.vuoto{padding:44px 24px;text-align:center;color:var(--grigio);font-size:14px}

/* ---------- modale dettaglio ---------- */
.overlay{position:fixed;inset:0;background:rgba(20,25,40,.55);z-index:1500;display:none}
.overlay.open{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;top:52px;background:var(--crema);z-index:1600;
  border-radius:18px 18px 0 0;display:none;flex-direction:column;overflow:hidden}
.sheet.open{display:flex}
.sheet-head{background:var(--blu);color:#fff;padding:14px 16px;border-radius:18px 18px 0 0;flex:0 0 auto;position:relative}
.sheet-head .x{position:absolute;top:10px;right:10px;color:#fff;font-size:24px;padding:6px 10px;line-height:1}
.sheet-head .snum{display:inline-flex;width:30px;height:30px;border-radius:50%;background:#fff;color:var(--blu);
  font-weight:800;font-size:13px;align-items:center;justify-content:center;margin-bottom:6px}
.sheet-head h2{font-size:17px;font-weight:800;text-transform:uppercase;line-height:1.2;padding-right:34px}
.sheet-head .ssub{font-size:12.5px;font-style:italic;opacity:.9;margin-top:2px}
.sheet-body{flex:1;overflow-y:auto;padding:14px 16px 30px;-webkit-overflow-scrolling:touch}
.riga{display:flex;gap:10px;margin-bottom:9px;font-size:13.5px}
.riga .ic{flex:0 0 20px;text-align:center}
.riga b{font-weight:700}
.riga a{color:var(--blu);font-weight:600;text-decoration:none}
.persone-list{margin:4px 0 10px}
.persona{display:inline-block;background:var(--carta);border:1.5px solid var(--linea);border-radius:18px;
  padding:4px 11px;margin:0 5px 6px 0;font-size:12.5px;font-weight:600}
.persona small{color:var(--grigio);font-weight:500}
.sdesc{font-size:14px;line-height:1.55;margin-top:10px}
.snote{font-size:12.5px;color:var(--grigio);font-style:italic;margin-top:10px;border-top:1px solid var(--linea);padding-top:8px}
.sheet-actions{display:flex;gap:8px;margin:14px 0 4px}
.abtn{flex:1;padding:11px;border-radius:11px;font-size:14px;font-weight:700;text-align:center;text-decoration:none}
.abtn.fav{background:var(--carta);border:2px solid var(--rosso);color:var(--rosso)}
.abtn.fav.on{background:var(--rosso);color:#fff}
.abtn.maps{background:var(--blu);color:#fff;border:2px solid var(--blu)}
.stagwrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}

/* ---------- autori & luoghi ---------- */
.search{margin:12px 14px 4px;position:relative}
.search input{width:100%;padding:11px 13px 11px 38px;border:1.5px solid var(--linea);border-radius:12px;
  font-size:15px;background:var(--carta);font-family:inherit;color:var(--inchiostro)}
.search svg{position:absolute;left:11px;top:12px;width:19px;height:19px;stroke:var(--grigio);fill:none;stroke-width:2;stroke-linecap:round}
.aletter{padding:12px 16px 4px;font-size:15px;font-weight:800;color:var(--blu)}
.arow{background:var(--carta);margin:0 12px 6px;border-radius:11px;border:1px solid var(--linea)}
.arow-h{padding:11px 34px 11px 13px;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14.5px;cursor:pointer;position:relative;transition:background .12s}
.arow-h:active{background:#efece3}
.arow-h::after{content:'';position:absolute;right:14px;top:50%;width:8px;height:8px;border-right:2px solid var(--grigio);border-bottom:2px solid var(--grigio);transform:translateY(-70%) rotate(45deg);transition:transform .2s}
.arow.open .arow-h::after{transform:translateY(-30%) rotate(-135deg)}
.arow-h .cnt{font-size:11px;font-weight:700;background:var(--blu);color:#fff;border-radius:10px;padding:2px 8px;flex:0 0 auto;margin-left:8px}
.arow-ev{border-top:1px solid var(--linea);padding:9px 13px;font-size:12.5px;display:none}
.arow.open .arow-ev{display:block}
.mini-ev{display:flex;gap:8px;padding:7px 18px 7px 0;align-items:baseline;cursor:pointer;position:relative;border-radius:7px;transition:background .12s}
.mini-ev:active{background:#efece3}
.mini-ev::after{content:'›';position:absolute;right:4px;top:50%;transform:translateY(-55%);color:#c9c3b6;font-size:17px;font-weight:700}
.mini-ev .md{flex:0 0 58px;font-weight:700;color:var(--blu);font-size:11.5px;text-transform:capitalize}
.mini-ev .mt{flex:1;font-weight:600}
.mini-ev .mruolo{font-size:10px;color:var(--grigio)}
.lrow-addr{font-size:11.5px;color:var(--grigio);font-weight:400;margin-top:1px}

/* ---------- diario ---------- */
#map{height:300px;margin:10px 14px;border-radius:14px;border:1.5px solid var(--linea);z-index:1}
.dstat{margin:0 14px 8px;font-size:12.5px;color:var(--grigio)}
.step{margin:0 14px 0;display:flex;gap:10px}
.step .rail{flex:0 0 34px;display:flex;flex-direction:column;align-items:center}
.step .rail .rnum{width:28px;height:28px;border-radius:50%;background:var(--blu);color:#fff;font-weight:800;
  font-size:12.5px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.step .rail .rline{flex:1;width:2px;background:var(--linea);min-height:12px}
.step .scard{flex:1;background:var(--carta);border:1px solid var(--linea);border-radius:11px;padding:9px 11px;margin-bottom:4px}
.step .scard .stime{font-size:12px;font-weight:800;color:var(--blu)}
.step .scard .stit{font-size:13.5px;font-weight:700;text-transform:uppercase;line-height:1.2}
.step .scard .sluo{font-size:11.5px;color:var(--grigio)}
.transfer{margin:0 14px;padding:2px 0 6px 5px;display:flex;gap:10px;align-items:center}
.transfer .rail2{flex:0 0 24px;display:flex;justify-content:center}
.transfer .rail2 span{width:2px;background:repeating-linear-gradient(var(--grigio) 0 3px,transparent 3px 7px);height:100%;min-height:26px;display:block}
.transfer .tinfo{font-size:11.5px;color:var(--grigio)}
.transfer .tinfo b{color:var(--inchiostro)}
.warn{background:#fff3cd;border:1.5px solid var(--giallo);color:#6b5400;font-size:11.5px;font-weight:600;
  border-radius:8px;padding:5px 9px;margin-top:6px}
.dvuoto{padding:36px 26px;text-align:center;color:var(--grigio)}
.dvuoto .big{font-size:38px;margin-bottom:8px}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script id="dati" type="application/json">{"eventi":[{"t":"MUSEO ETNOGRAFICO DI FESTIVALETTERATURA","d":"tutti","hh":"mercoledì 9 16:00 19:00 da giovedì 10 a sabato 12 9:00 19:00 | domenica 13 9:00 18:00","l":"palazzo del podesta - museo virgilio","pr":"ingresso libero","tg":["Mantova e territorio","arte e fotografia"],"de":"Chi era l’Homo festivalensis? Da dove veniva? A quali pratiche rituali si dedicava ogni anno al termine dell’estate, quando migrava verso le paludose rive del fiume Mincio? A queste domande tenta di rispondere il Museo Etnografico di Festivaletteratura, a partire dagli eccezionali reperti rinvenuti nell’area di Mantova che testimoniano di queste inusuali cerimonie letterarie risalenti a tremila (o trenta?) anni fa. Tra oggetti che riportano alla cultura materiale e alla quotidianità (tazze, magliette di cotone, biciclette in alluminio), espressioni già evolute dell’arte e della stampa, artefatti e paramenti del rito dal significato simbolico ancora non del tutto chiarito – tra i quali i severi totem blu e i “pass” in carta plastificata –, il Museo ricostruisce la vita e le abitudini della comunità che pratica(va) Festivaletteratura in un racconto che si distingue per rigore pseudoscientifico e metodica ironia. Articolato in dieci sezioni tematiche e corredato di numerosi documenti video-fotografici, il percorso espositivo presenta per la prima volta alcuni pezzi la cui esistenza era attestata finora solo da fonti indirette (tra cui il primigenio “libretto rosso” o il regolamento del gioco “Festivalopoli”), che non mancheranno di sorprendere anche i festivalologi più esperti."},{"t":"SPAZIO RIO","e":"dagli 8 anni 18:30","d":"tutti","hh":"mercoledì 9 14:30 18:30 da giovedì 10 a sabato 12 10:00 13:00; 14:30 18:30 | domenica 13 10:00 13:00; 14:30 17:00","l":"pontile pescherie di giulio romano","pr":"ingresso libero","tg":["scienza","ambiente e clima","natura e animali","Mantova e territorio"],"f":["per bambini"],"de":"A Mantova il legame tra esseri umani, acqua e territorio è profondo e identitario. È una relazione fatta di mutue interazioni, di paesaggi trasformati dalle conoscenze e dalle tecnologie umane, e di una natura che ha saputo adattarsi, influenzando a sua volta la vita e la storia di chi vive in questi luoghi. Da questo rapporto con l’acqua nasce Spazio Rio, il laboratorio a filo d’acqua che Festivaletteratura dedica alla conoscenza e al dialogo tra scienza e società. Nell’open lab, aperto tutti i giorni alle Pescherie di Giulio Romano, sono previste attività permanenti di osservazione e monitoraggio dell’ecosistema del Rio, esperimenti ludico-scientifici, dialoghi e momenti di confronto tra il pubblico del Festival e chi ogni giorno fa, vive e si relaziona con la ricerca scientifica.","no":"Lo Spazio Rio è realizzato in collaborazione con DOS – Laboratorio di Storia e Comunicazione della Scienza dell’Università di Ferrara e con il Laboratorio di Ecologia Acquatica del Dipartimento di Scienze Chimiche, della Vita e della Sostenibilità Ambientale dell’Università di Parma."},{"t":"BIBLIOTECA MERAVIGLIA","s":"sfogliare l’universo","e":"dai 5 anni","d":"tutti","hh":"mercoledì 9 16:00 20:00 da giovedì 10 a sabato 12 10:00 20:00 | domenica 13 10:00 18:00","l":"chiesa di san cristoforo","pr":"ingresso libero","tg":["infanzia ed educazione","editoria e traduzione","fumetto e illustrazione"],"f":["per bambini"],"de":"La Biblioteca Meraviglia è un’oasi dedicata alla lettura e alla scoperta della produzione di albi illustrati di nonfiction per l’infanzia del nuovo millennio; uno spazio libero e giocoso dove sfogliare libri, scoprire l’universo e restare incantati. Oltre seicento albi provenienti da tutto il mondo occuperanno gli scaffali appositamente disegnati per la biblioteca: negli ampi spazi dell’ex chiesa o nel giardino segreto che si apre a fianco, piccoli e grandi frequentatori del Festival potranno guardare, prendere tra le mani, leggere in totale libertà volumi davvero insoliti per formato, colore, rilevanza delle immagini rispetto ai classici libri di divulgazione per bambine e bambini, e che propongono un approccio alla conoscenza decisamente non convenzionale, affidato in modo pressoché esclusivo all’esperienza estetica e sensoriale. I bibliotecari e le bibliotecarie della Meraviglia saranno a disposizione di chi vorrà farsi guidare nell’esplorazione di questo mare magnum di pubblicazioni. La selezione dei volumi nasce dalla ricerca condotta da Giorgia Grilli, docente di letteratura per l’infanzia all’Università di Bologna e autrice di L’incanto del mondo.","no":"La Biblioteca Meraviglia è realizzata in collaborazione con la Rete Bibliotecaria Mantovana e con la Biblioteca di Scienze dell’Educazione “Mario Gattullo” – Alma Mater Studiorum – Università di Bologna. Su Sfogliare l’universo vedi p. 126"},{"t":"NIEVOBUS","p":[["La Compagnia della Lettura",0]],"raw":"letture “circolari” dalla Storia filosofica dei secoli futuri La Compagnia della Lettura","s":"tutto nievo minuto per minuto","d":"tutti","hh":"mercoledì 9 e giovedì 10 orario corse 15:59, 16:59, 17:59 | venerdì 11 e sabato 12 orario corse 9:59, 10:59, 11:59, 15:59, 16:59, 17:59, 18:59 | domenica 13 orario corse 9:53, 10:53, 11:53, 15:53, 16:53","l":"piazza concordia","pr":"ingresso con biglietto apam","tg":["narrativa","Mantova e territorio","teatro e performance"],"de":"La Storia filosofica dei secoli futuri non è altro che “la fioritura pensante di tre secoli avvenire […] ottenuta con tal precisione, che sfido un critico tedesco a trovarci di che ridire”. Immaginandola come il risultato di un esperimento chimico-filosofico di scrittura automatica, ottenuto esponendo “mezz’oncia di fosforo e una dramma di plutonio” diluiti nell’inchiostro “alla temperatura media condensata e avvicendata di trecentosessantatrè inverni e di trecentosessantatrè estati”, Ippolito Nievo ci propone con la Storia filosofica un divertissement visionario in cui si alternano la sua sconfinata fiducia nel “nuovo” e il pessimismo che segna la stagione politica successiva all’armistizio di Villafranca. Per chi vorrà scoprire che cosa ci riserverà – o avrebbe dovuto riservarci – il futuro secondo Nievo fino al 2222, basterà salire sull’autobus circolare urbano nei giorni del Festival. A bordo di questo avveniristico mezzo di trasporto, le lettrici e i lettori della Compagnia della Lettura ci sveleranno le sorprendenti profezie contenute in questo libro, dalla nascita dell’Unione Europea all’apertura del Canale di Suez, dalla diffusione dei narcotici all’avvento dei robot, dalla distruzione per decreto dei libri anteriori al 2000 fino all’affermarsi dell’era dell’apatia.","no":"Le letture della Storia filosofica si terranno sulle corse della linea CC Circolare APAM negli orari indicati con partenza dalla fermata di Piazza Concordia. Per partecipare occorre munirsi del biglietto urbano del costo di 1,60€, acquistabile a bordo con carta contactless, con le App Dropticket e MooneyGo, presso l'APAM Infopoint di Piazza Cavallotti (aperto da lunedì a venerdì 7.30 - 18.30 e sabato 7.30 - 13.30) o nei punti vendita indicati all’indirizzo apam.it/it/dove-acquistare. Su Tutto Nievo minuto per minuto vedi p. 152"},{"t":"IN TRENTA PAROLE","d":"tutti","hh":"mercoledì 9 16:00 22:00 da giovedì 10 a sabato 12 10:00 22:00 | domenica 13 10:00 18:00","l":"piazza dei libri","pr":"ingresso libero","tg":["scrittura e lettura","narrativa"],"de":"Bastano trenta parole per raccontare un groviglio di passioni, la sorpresa di un incontro, un ricordo che riaffiora, un incanto che si spegne? Questa è la sfida che Festivaletteratura ha lanciato quest’estate alla grande comunità di lettori e lettrici, autori e autrici, che lo segue edizione dopo edizione: scrivere un racconto di tante parole quanti sono gli anni del Festival, indipendentemente dalla lingua, dallo stile o dal genere scelto. I componimenti arrivati in questi mesi vengono finalmente esposti sulla grande parete narrativa che attraversa l’installazione di In trenta parole. Chi ancora non si fosse cimentato nell’impresa potrà farlo nei giorni del Festival alla postazione allestita alla Piazza dei Libri, offrendo il proprio contributo d’autore a questa grande antologia all’aria aperta."},{"t":"TELEFONI DA FAVOLA","p":[["Daniele Fior",0],["Tanja Fior",0]],"raw":"a cura di Daniele e Tanja Fior","e":"dai 5 anni","d":"tutti","hh":"mercoledì 9 16:00 19:00 da giovedì 10 a sabato 12 10:00 19:00 | domenica 13 10:00 18:00","l":"casa del mantegna","pr":"ingresso libero","tg":["miti e fiabe","infanzia ed educazione"],"f":["per bambini"],"de":"Per entrare in comunicazione diretta con il mondo delle favole purtroppo le moderne tecnologie digitali servono a poco. Dovete scusarli, ma orchi affamati di bambini, streghe abituate a maneggiare zampe di rospo e creste di gallina, principi e principesse impegnati tutto il giorno a combattere draghi e ad attraversare foreste incantate spesso si dimenticano di mettere in carica il cellulare. Ecco perché – quando vogliamo stare a sentire le loro storie – i vecchi telefoni a rotella sono decisamente più affidabili. Per venire incontro a questa trascurata richiesta di un accessibile servizio di telefonia fiabesca, ecco che Festivaletteratura ha chiesto a Daniele e Tanja Fior di installare una serie di apparecchi pubblici per consentire a bambine e bambini (e anche agli adulti) di contattare tutti i Pinocchi, le doppie Charlotte, i draghi e gli animali parlanti del caso. Un punto di ascolto on demand all’ombra del giardino della Casa del Mantegna, pensato per chi – tra un evento e l’altro – sente l’irrefrenabile desiderio di immergersi in un universo incantato."},{"t":"TIPOGRAFIA MANTEGNA","p":[["Duo/Atelier Super-Grotesque",0]],"raw":"Duo/Atelier Super-Grotesque","s":"la casetta editrice","e":"dai 6 anni","d":"tutti","hh":"mercoledì 9 16:00 19:00 da giovedì 10 a sabato 12 10:00 13:00; 15:00 19:00 | domenica 13 10:00 13:00; 15:00 18:00","l":"casa del mantegna","pr":"ingresso libero","tg":["editoria e traduzione","infanzia ed educazione","arte e fotografia"],"f":["per bambini","laboratorio"],"de":"Riapre la Tipografia Mantegna, la rinomata stamperia tecnico-ludico-artigianale che già si era fatta apprezzare a Festivaletteratura 2025. Seguendo la tradizione dei tipografi ambulanti del Rinascimento, il Duo/Atelier Super-Grotesque lascerà le verdi terre della Sassonia per scendere a Mantova con il suo laboratorio mobile di stampa, con tanto di inchiostri, carte, tamponi e accessori di legatoria. Del resto, si sa: al Festival le storie che reclamano di essere pubblicate sono tante, e la Tipografia Mantegna anche quest’anno resterà aperta da mercoledì a domenica, per non privare nessuno del piacere di tornarsene a casa con un elegante volumetto fresco di stampa. Al suo interno, chi vorrà apprendere i primi rudimenti della nobile arte tipografica potrà cimentarsi con la produzione di libri che si leggono… dai buchi, imparare a usare un foglio in tutte le sue pieghe o impaginare una copertina combinando lettere e parole lasciate da chissà chi!","no":"Su La casetta editrice vedi p. 125"},{"t":"NIEVO PER CARTE E IMMAGINI","s":"tutto nievo minuto per minuto","d":"tutti","hh":"mercoledì 9 16:00 19:00 da giovedì 10 a sabato 12 9:00 19:00 | domenica 13 9:00 18:00","l":"biblioteca teresiana","pr":"ingresso libero","tg":["storia","narrativa","Mantova e territorio"],"f":["percorso/visita"],"de":"Un itinerario a tappe attraverso la vita e l’immaginario di Ippolito Nievo, dalle pagine autografe allo sceneggiato televisivo. Il percorso espositivo allestito presso la Biblioteca Teresiana si offre al pubblico come enciclopedia minima dell’autore delle Confessioni d’un italiano, mettendo in relazione le carte manoscritte, le principali edizioni a stampa delle sue opere, i numeri delle riviste che ne accolsero gli interventi critici e politici, i cimeli risorgimentali e quanto di Nievo è arrivato sul piccolo schermo. Cuore dell’esposizione sarà l’autografo delle Confessioni, in deposito presso la biblioteca Teresiana, insieme ad alcune lettere di mano dell’autore, mentre nello spazio di TeleIppolito si proietteranno alcune parti dello sceneggiato Rai La Pisana del 1960 e altre produzioni televisive. Un ricco apparato iconografico tratto dalle illustrazioni di diverse edizioni italiane e straniere delle Confessioni animerà infine gli scaffali della prima sala Teresiana, grazie alla collaborazione della Biblioteca Nazionale Centrale di Firenze e la Biblioteca Comunale “Joppi” di Udine. BLURANDEVÙ Si accende il microfono, lampeggiano le luci, ragazze e ragazzi danno vita a un serrato confronto all’ultimo libro – o al primo ricordo – con artisti, giornalisti e scrittori. Questa la formula di Blurandevù, che anche nel 2026 illumina il Seminario Vescovile con quattro vivacissimi appuntamenti in cui autrici e autori si mettono in gioco rispondendo alle domande delle magliette blu. Volontari, all’intervista! giovedì 10 ore 20:45 Rita Petruccioli venerdì 11 ore 20:45 Francesco Costa Con il sabato 12 ore 20:45 Kento sostegno di domenica 13 ore 10:00 Igiaba Scego","no":"Su Tutto Nievo minuto per minuto vedi p. 152"},{"t":"INCONTRO INAUGURALE","d":"mer","h":"11:30","l":"tenda sordello","tg":["Mantova e territorio"],"de":"Il tempo di soffiare su trenta candeline, e si parte! Festivaletteratura scende in piazza a inaugurare la sua trentesima edizione, ritrovandosi come sempre con la sua famiglia allargata di amici, volontari, sostenitori e autori da tutto il mondo per un breve saluto e un brindisi benaugurante. E il bello deve ancora venire!","no":"Il brindisi inaugurale è offerto da Garda Doc."},{"n":"1","t":"MASCHERE MATTE E MOSTRI DA PASSEGGIO","st":"laboratorio di fantazoologia da parata","p":[["Ruggge",0]],"raw":"Ruggge","e":"dagli 8 ai 12 anni","d":"mer","h":"14:30","l":"cappella di palazzo del mago","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["arte e fotografia","miti e fiabe","infanzia ed educazione"],"f":["per bambini","laboratorio"],"de":"Ruggge – al secolo Ruggero Asnago – è un diffusore di entusiasmo collettivo nonché un mangiatore di pizza noto in tutti e cinque i continenti. Visto il suo inappuntabile curriculum, è stato chiamato quest’anno a Festivaletteratura per organizzare una grande parata strampalata con cui fare esplodere di gioia la città. Per preparare questo festoso evento servono però mascheroni zoomorfi, mostri semoventi, sagome di creature terrificanti o comiche da indossare, agitare e far sfilare durante il corteo. L’officina di fantazoologia creativa servirà proprio a questo: con carte, cartoni, stoffe e vari materiali riciclati bambine, bambini e adulti potranno creare insieme a Ruggge il proprio animalesco pupazzo da portare in parata, con o senza coda."},{"t":"IL FUOCO SACRO DELLA SCRITTURA","p":[["Geoff Dyer",0],["Elsa Riccadonna",1]],"raw":"Geoff Dyer con Elsa Riccadonna","d":"mer","h":"16:00","l":"piazza dei libri","pr":"ingresso libero","ic":["streaming"],"tg":["scrittura e lettura","narrativa"],"de":"Migliaia, decine di migliaia, forse centinaia di migliaia sono i nuovi libri che ogni anno vengono pubblicati nel mondo. Come è possibile? Che cosa si nasconde dietro questa stupefacente proliferazione di romanzi, saggi, poemi in tutte le lingue conosciute? Una sordida speculazione economica? Un’oscura macchinazione universale? No. C’è soltanto un fuoco. Una fiamma che scalda l’ingegno, muove la fantasia, incendia l’immaginazione. Chi è toccato dal fuoco lo sa, o almeno lo crediamo. Per toglierci ogni dubbio, anche quest’anno dieci autrici e autori italiani e internazionali ci spiegheranno da dove nasce la loro ispirazione e perché non le si può resistere. Dieci conversazioni confidenziali sulla natura dello scrivere, a portata di lettrici e lettori.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"2","t":"CI VUOLE UNA VACANZA!","p":[["Chiara Armellini",0]],"raw":"Chiara Armellini","s":"la casetta editrice","e":"dai 6 ai 10 anni","d":"mer","h":"16:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["arte e fotografia","infanzia ed educazione","viaggi e luoghi"],"f":["per bambini","laboratorio"],"de":"Un laboratorio creativo per inventare le vacanze più bizzarre e divertenti di sempre! I partecipanti saranno invitati a rispondere a tre semplici domande attraverso delle cartoline illustrate con la tecnica del collage. Le pagine realizzate verranno poi raccolte in un libro méli-mélo, da sfogliare e mescolare liberamente per dar vita a infinite nuove soluzioni di viaggio!","no":"Su La casetta editrice vedi p. 125"},{"n":"501","t":"TRADURRE LIBRI PER ADOLESCENTI","p":[["Laura Cangemi",0],["Francesca Mignemi",0],["Chiara Codecà",1]],"raw":"Laura Cangemi e Francesca Mignemi con Chiara Codecà","s":"libri in classe con read more– nel cantiere della letteratura giovanile","d":"mer","h":"16:30","l":"politecnico di milano - campus di mantova","pr":"ingresso gratuito con prenotazione","tg":["editoria e traduzione","infanzia ed educazione","scrittura e lettura"],"f":["laboratorio"],"de":"Come ci si pone di fronte a una traduzione di letteratura giovanile? Cambia qualcosa sapendo che i destinatari privilegiati sono adolescenti e che il testo è stato scritto per loro? Ne parleranno Laura Cangemi, una delle più conosciute e premiate traduttrici italiane che opera dallo svedese e dall’inglese, e la formatrice, ricercatrice indipendente ed esperta di letteratura per l’infanzia e l’adolescenza Francesca Mignemi, insieme a Chiara Codecà."},{"t":"VISITA GUIDATA ALLA BIBLIOTECA MERAVIGLIA","p":[["Giorgia Grilli",0]],"raw":"Giorgia Grilli","s":"sfogliare l’universo","e":"dai 5 anni","d":"mer","h":"16:30","l":"chiesa di san cristoforo","pr":"ingresso libero","tg":["infanzia ed educazione","editoria e traduzione","fumetto e illustrazione"],"f":["per bambini","percorso/visita"],"de":"Se ci trovassimo improvvisamente di fronte a seicento albi illustrati, uno più bello dell’altro, in un posto che invita alla lettura, da dove partiremmo? Giorgia Grilli, che ha scelto e studiato in L’incanto del mondo i libri presenti alla Biblioteca Meraviglia, ci guida all’interno dell’ex chiesa di San Cristoforo per aiutarci a scoprire le sue varie sezioni, i richiami tra uno scaffale e l’altro, le particolarità di alcuni dei titoli più innovativi ed emblematici. La visita è anche l’occasione per condividere il senso e il metodo della ricerca che è alla base della selezione, ma soprattutto per sottolineare la rivoluzione che questi albi, “caratterizzati da domande, più che da risposte, da sollecitazioni sensoriali, più che da discorsi esplicativi, da suggestioni che aprono a molteplici interpretazioni, più che da predefinite nozioni”, hanno portato nella letteratura di divulgazione per l’infanzia.","no":"Su Sfogliare l’universo vedi p. 126"},{"n":"3","t":"TRA REALTÀ E FINZIONE","p":[["Adam Gidwitz",0],["Marco Malvaldi",1]],"raw":"Adam Gidwitz con Marco Malvaldi","e":"dagli 11 anni","d":"mer","h":"16:30","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["narrativa","storia","infanzia ed educazione"],"f":["per ragazzi"],"de":"“Per vivere una finzione, Max, bisogna avere una strana relazione con la verità. Devi credere alla finzione che stai vivendo, e la tua mente deve essere totalmente, fin nel profondo, libera dalla verità. Solo che… non la puoi perdere, la verità. La devi tenere chiusa in una scatola nel sottoscala della cantina del tuo cervello. Certi giorni potresti addirittura faticare a trovarla. Ma se scappa via, se è perduta… lo sei anche tu”. Il nuovo romanzo di Adam Gidwitz, Max nella casa delle spie, ci aiuta a riconoscere come le storie possano influenzare le persone, a partire dalla propaganda nazista. Così storia, avventura, fantasy, giallo si uniscono in un romanzo mozzafiato che illumina anche molti aspetti della Storia europea e della Seconda guerra mondiale, come l’acclamato scrittore americano per ragazzi racconta a Marco Malvaldi.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"4","t":"SE FOSSI UNA TIGRE (O UN CANE, O UN PINGUINO…)","p":[["Federico Appel",0]],"raw":"Federico Appel","e":"dai 7 ai 10 anni","d":"mer","h":"17:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["infanzia ed educazione","mente e psicologia","natura e animali"],"f":["per bambini"],"de":"Ti è mai capitato di avere paura di qualcuno o di non voler andare a scuola perché non ti sentivi al sicuro? Se avessi potuto trasformarti in un animale per farti coraggio e superare l’ostacolo, quale avresti scelto? Con Federico Appel – che insieme a Stefano Boonen ha immaginato come possono fare una bambina o bambino a diventare tigri (E se fossi una tigre?) – proveremo a trovare soluzioni e aiuti animali scherzosi o coraggiosi per affrontare grandi e piccole paure."},{"n":"5","t":"SOPRAVVIVENZE. LA CITTÀ EUROPEA CONTEMPORANEA","p":[["Paola Viganò",0],["Annalisa Metta",1]],"raw":"Paola Viganò con Annalisa Metta","d":"mer","h":"17:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["città e architettura","ambiente e clima","politica e attualità"],"de":"Per secoli, la città europea è stata il teatro dell’emancipazione: dalle libertà comunali al welfare novecentesco, dal disegno dello spazio pubblico alle promesse di benessere e riscatto, in Europa vivere in città ha a lungo significato ampliare le possibilità della vita individuale e collettiva. Eppure, oggi subentra, forse torna, la questione della sopravvivenza stessa, “nella città” e “della città”, minacciata da condizioni ambientali sempre più avverse, crisi energetiche, emergenze sanitarie, finanche dallo spettro della guerra. Disporre di ombra, acqua, rifugi è il requisito minimo ma non ovunque garantito, per rendere ancora possibile la vita urbana: è una condizione biologica e, non di meno, politica, al cui cospetto cambiano il progetto e l’idea di città, cui si chiede di essere abitabile ancor prima che abilitante. Forse allora la sopravvivenza è la più radicale forma di emancipazione del nostro tempo. Della città europea, tra storia, crisi e futuro, ci parla Paola Viganò, professoressa di urbanistica allo IUAV di Venezia e all’École Polytechnique Fédérale di Losanna, in dialogo con Annalisa Metta."},{"t":"LOVECRAFT IN ITALIA","p":[["Luca Scarlini",0]],"raw":"Luca Scarlini","s":"accenti / i miti oscuri di h.p. lovecraft","d":"mer","h":"17:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["fantastico e horror","narrativa","editoria e traduzione"],"de":"In Italia H.P. Lovecraft inizia a essere percepito come un autore importante dagli anni Sessanta, con grande ritardo rispetto al mondo anglosassone e anche a quello francese. Il creatore di uno dei pochi miti ancora perduranti del Novecento è giunto a noi grazie alle storie di Urania, legate al magistero di Fruttero & Lucentini, e senz’altro attraverso il fumetto. Lovecraft sedusse anche scrittori come Angelo Maria Ripellino, che in Praga magica usa i suoi viscidi incubi marini per parlare del quadro dell’Acqua di Giuseppe Arcimboldo, o come Giorgio Manganelli, che scrisse de Le montagne della follia nel suo capitale La letteratura come menzogna.","no":"Su I miti oscuri di H.P. Lovecraft vedi p. 153"},{"n":"6","t":"SHAKESPEARE AL DI LÀ DEL MURO","p":[["Isabella Hammad",0],["Veronica Fernandes",1]],"raw":"Isabella Hammad con Veronica Fernandes","d":"mer","h":"17:30","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["teatro e performance","geopolitica e guerre","narrativa"],"de":"Quando nel 2023 Granta ha compilato, come fa ogni dieci anni, l’elenco dei migliori giovani romanzieri britannici – la stessa lista che in passato aveva indicato Salman Rushdie, Kazuo Ishiguro, Zadie Smith – tra i nomi c’era quello dell’anglo-palestinese Isabella Hammad. Nel suo romanzo Entra il fantasma – candidato, fra gli altri, al Premio Strega Europeo –, l’occupazione e l’identità palestinese trovano la loro eco in un dramma di quattro secoli fa. Sonia, attrice della diaspora, torna nella terra della sua famiglia e si ritrova a recitare un Amleto in arabo da mettere in scena in Cisgiordania: portare Shakespeare “al di là del muro” diventa allora un atto di resistenza creativa, in cui il teatro e la vita sotto occupazione si intrecciano fino a confondersi. Riletta in chiave palestinese, la tragedia shakespeariana diventa per Hammad il modo per interrogare il rapporto tra arte e politica e la complessità di un’identità che si misura con la Storia. Dialoga con lei la giornalista Veronica Fernandes.","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con Civitella Ranieri."},{"n":"7","t":"SE UN DRONE BUSSA ALLA TUA PORTA","p":[["Mariarosaria Taddeo",0],["Dario Bassani",1]],"raw":"Mariarosaria Taddeo con Dario Bassani","d":"mer","h":"17:30","l":"aula magna dell'universita","pr":"7,50 €","tg":["tecnologia e IA","geopolitica e guerre","filosofia e idee"],"de":"Fino a qualche decennio fa, il rischio di delegare la guerra a sofisticate tecnologie informatiche sembrava un monito confinato nella cerchia delle peggiori distopie letterarie. Oggigiorno, invece, l’uso massiccio dell’IA in ambito militare salda il patto tra multinazionali sempre più opache e governi sempre più autoritari, trovando nella tutela della sicurezza nazionale un nodo moralmente debole ma decisivo. In un campo in cui la discrepanza tra etica e profitto si accentua pericolosamente, discuteremo con la filosofa Mariarosaria Taddeo – docente di Digital Ethics e autrice del saggio Codice di guerra – se regolamentare la governance dell’intelligenza artificiale sia un’opzione ormai inderogabile, a maggior ragione quando parliamo di difesa. La incontra Dario Bassani, responsabile editoriale della rivista Lucy sui mondi e autore del saggio Giocare alla guerra."},{"n":"8","t":"RIMUOVERE L’INESSENZIALE","p":[["David Szalay",0],["Sandro Veronesi",1]],"raw":"David Szalay con Sandro Veronesi","d":"mer","h":"18:00","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["narrativa","scrittura e lettura"],"de":"La scrittura in prosa di David Szalay è paragonabile alla poesia, con la quale condivide l’uso più efficiente possibile della sintesi e “l’estrema concisione”, come un quadro in cui poche pennellate rendono immediatamente l’idea di ciò che l’autore voleva comunicare. E se c’è una cosa che riesce bene allo scrittore anglo-magiaro è quella di esplorare, all’interno della sua opera, le problematiche legate all’identità maschile e il modo in cui questa si rapporta al passare del tempo e all’invecchiamento. “I miei personaggi spesso sembrano abbastanza sgradevoli, soprattutto se paragonati a molti altri personaggi di libri e film. Ma, per quel che vale, penso che siano più simili alle persone reali” sostiene l’autore di Turbolenza, Tutto quello che è un uomo e Nella carne (che gli è valso il Booker Prize nel 2025). Affiancato da Sandro Veronesi (Caducità), Szalay si racconterà al pubblico presente.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"9","t":"GLI OGGETTI SONO STORIE","p":[["Michele De Lucchi",0],["Paolo Ferrarini",1]],"raw":"Michele De Lucchi con Paolo Ferrarini","d":"mer","h":"18:00","l":"teatro bibiena","pr":"7,50 €","tg":["arte e fotografia","città e architettura"],"de":"Burocrazia, tecnica e sogno: sono i naturali esiti – che è necessario collegare tra loro – delle attività di architetto, designer e artista secondo Michele De Lucchi. Eppure il loro punto di origine rimane il medesimo: creare un futuro migliore per chi usufruisce del prodotto di queste discipline. Più volte vincitore del Compasso d’Oro, De Lucchi ha sempre operato al confine tra sperimentazione e industria, trasformando le proprie idee in sedie, strumenti per la cucina, lampade, ma anche in sedi di banche, uffici postali e infrastrutture. Dai primi anni Ottanta del secolo scorso, con Ettore Sottsass e il gruppo Memphis, fino alla recente mostra Il conforto dell’architetto a Palazzo Molteni di Milano, il creativo ferrarese ripercorrerà le tappe della sua carriera e spiegherà come “si pensi alla nostra disciplina come prevalentemente scientifica e tecnologica, ma in realtà è tutt’altro che una materia tecnica. Risponde allo spirito del tempo”. Lo incontra Paolo Ferrarini, autore del podcast Parola progetto."},{"t":"IL FUOCO SACRO DELLA SCRITTURA","p":[["Jana Karšaiová",0],["Ilenia Caito",1]],"raw":"Jana Karšaiová con Ilenia Caito","d":"mer","h":"18:00","l":"piazza dei libri","pr":"ingresso libero","ic":["streaming"],"tg":["scrittura e lettura","narrativa"],"no":"Sul Fuoco sacro della scrittura vedi p. 105"},{"t":"LA MIA STORIA CON LA LETTURA","p":[["Cleo Bissong",0],["Simonetta Bitasi",1]],"raw":"Cleo Bissong con Simonetta Bitasi","s":"read more – circuiti di lettura integrati","d":"mer","h":"18:00","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["scrittura e lettura"],"de":"Nessuno è nato lettore, e non c’è un modo giusto per diventarlo. Ognuno di noi con la lettura ha la sua storia: c’è chi tra i libri – volente o nolente – ci è cresciuto, chi invece se li è andati a cercare, chi li ha incontrati per caso, chi ha avuto la fortuna di trovare qualcuno che glieli facesse amare, chi non se n’è mai innamorato e forse sta bene lo stesso. Una cosa è certa: le “carriere” di lettrici e lettori non sono mai uguali tra loro, né tanto meno scontate. Ad esempio: come sono diventati lettori – ammesso che lo siano! – scrittori, artisti, giornalisti che a Festivaletteratura vengono proprio a parlare di libri? A cinque di loro abbiamo chiesto di raccontare la propria storia con la lettura dalle origini e senza omissioni, tra passioni e incertezze, scoperte e abbandoni, rimpianti e speranze per il futuro."},{"n":"10","t":"MASCHERE MATTE E MOSTRI DA PASSEGGIO","st":"laboratorio di fantazoologia da parata","p":[["Ruggge",0]],"raw":"Ruggge","e":"dagli 8 anni","v":"vedi n. 1","d":"mer","h":"18:00","l":"cappella di palazzo del mago","pr":"7,50 €","tg":["arte e fotografia","miti e fiabe","infanzia ed educazione"],"f":["per bambini","laboratorio"]},{"n":"11","t":"AMICIZIE DIETRO AI FORNELLI","p":[["Lucia Visonà",0],["Diletta Sereni",1]],"raw":"Lucia Visonà con Diletta Sereni","d":"mer","h":"18:30","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["cibo","narrativa"],"de":"In un’epoca in cui la cucina è spesso relegata a intricati show televisivi o ai più disparati manuali di ricette elaborate da chef superstar, è una inaspettata sorpresa trovarsi catapultati in una fiaba culinaria che ci traghetta tra i quartieri di Parigi, alla scoperta di piatti esotici e specialità francesi. Lucia Visonà (all’esordio con il romanzo Il cuoco giapponese) conosce come le sue tasche la città della torre Eiffel e ha voluto spostare l’attenzione dal lato tecnico della cucina a quello umano, indubbiamente romantico ma meno patinato di quanto ci è dato immaginare, “perché una città che cambia di continuo non può essere un cliché”. Insieme alla giornalista Diletta Sereni (tra le fondatrici del progetto editoriale L’integrale), Visonà parlerà di come a volte il cibo sia un tramite per approfondire le relazioni e uno strumento per la crescita personale."},{"n":"12","t":"LA VOCE CHE SFIDA IL REGIME","p":[["Lina Attalah",0],["Paola Caridi",1]],"raw":"Lina Attalah con Paola Caridi","d":"mer","h":"19:00","l":"palazzo san sebastiano","pr":"7,50 €","tg":["media e giornalismo","geopolitica e guerre","politica e attualità"],"de":"Il turbolento contesto geopolitico del Nordafrica – e in particolare quello dell’Egitto – è forse tra i più intricati da analizzare, ed è grazie a figure come quella di Lina Attalah che abbiamo la possibilità di leggere con maggiore chiarezza quanto avviene nel Paese bagnato dal Nilo. La giornalista e attivista del Cairo è cofondatrice del portale di informazione Mada Masr e da sempre è impegnata nella lotta per la sopravvivenza della stampa indipendente sotto il regime militare di al-Sisi, “perché sapere è il primo passo per criticare”. La sua penna ha raccontato le rivolte di piazza Tahrir, le rivoluzioni in Siria e le elezioni presidenziali in Iran, adottando la costante strategia di “mettere la paura tra parentesi mentre faccio quello che devo fare e poi affrontarla dopo, in un secondo momento. Ma non posso fingere che non ci sia, non esiste il coraggio e basta”. Dell’eterna lotta tra verità delle fonti e censura Attalah dialoga con l’esperta di Medio Oriente Paola Caridi (Sudari).","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con Civitella Ranieri."},{"n":"13","t":"THE CALL OF CTHULHU","p":[["Sean Branney",0],["Andrew Leman",0],["Luca Scarlini",0]],"raw":"di Sean Branney e Andrew Leman | USA, 2005, 47’ presenta il film Luca Scarlini con un videomessaggio dei registi","s":"i miti oscuri di h.p. lovecraft","d":"mer","h":"21:00","l":"cinema oberdan","pr":"7,50 €","tg":["cinema e tv","fantastico e horror"],"de":"Scritto nel 1926, Il richiamo di Cthulhu è uno degli astri più agghiaccianti e attrattivi nel firmamento dell’horror novecentesco, tanto da determinarne il corso. Fedele al racconto lungo in cui troneggia con i suoi sibilanti tentacoli il mostro lovecraftiano per antonomasia, la H.P. Lovecraft Historical Society – che da decenni custodisce e rilancia l’opera dello scrittore di Providence – ha riportato in vita l’incubo di Cthulhu attraverso un piccolo ma geniale escamotage degno delle migliori fandom: quello di girare un mediometraggio come nel 1926, in pieno trionfo del film muto, con tanto di partitura sinfonica e mimiche trasognate ma senza rinunciare a un’ibridazione fra tecnologie moderne ed effetti artigianali. Il risultato è un gioiello cinematografico che restituisce gli spasmi di una traboccante inventiva, tra sette deliranti, isole inconcepibili ed equipaggi perduti.","no":"Su I miti oscuri di H.P. Lovecraft vedi p. 153"},{"n":"14","t":"CIÒ CHE RESTA, CIÒ CHE RITORNA","p":[["Sarah Lubala",0],["Carmen Gallo",1]],"raw":"Sarah Lubala con Carmen Gallo","d":"mer","h":"21:00","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["poesia","migrazioni e confini"],"de":"“Sono stata cresciuta / seguendo il vangelo congolese / posso insegnarti come si fa a dimenticare / il posto da cui vieni / a venerare l’ampia strada davanti a te / le mani aperte / in questo modo: / fa’ che ciascun palmo / sia una lettera / rivolta al cielo”. In Una storia di sparizione, la poeta congolese Sarah Lubala costruisce un intenso viaggio nella memoria familiare e collettiva, attraversato dalle esperienze dello sradicamento, della migrazione e della violenza storica. Il tempo della raccolta assume la forma di un fiume in cui passato e presente si intrecciano continuamente, mentre dalle sue acque riaffiorano figure femminili, ricordi e storie che sembravano destinate a scomparire. La sparizione evocata nel titolo non coincide però con una cancellazione definitiva: è piuttosto il punto da cui prende avvio una ricerca di voce, appartenenza e continuità. Attraverso una scrittura capace di tenere insieme dimensione intima e storia collettiva, Lubala interroga le eredità lasciate dal colonialismo, le fratture dell’esilio e la trasmissione della memoria tra generazioni. Conduce l’incontro la scrittrice e poeta Carmen Gallo.","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con il Festival Cabudanne de Sos Poetas."},{"n":"15","t":"DAEMON","p":[["Motus",0],["Enrico Casagrande",0],["Alexia Sarantopoulou",0]],"raw":"Motus con Enrico Casagrande e Alexia Sarantopoulou","d":"mer","h":"21:00","l":"tempio di san sebastiano","pr":"15,00 €","tg":["teatro e performance","fantastico e horror"],"de":"Daemon è una allucinazione partorita dalla mente della giovane Mary Shelley, che sogna a occhi aperti e, mentre si aggira fra boschi e nebbie, improvvisamente vede questa strana creatura muoversi veloce, danzare in un rave immaginario, gridando di rabbia e spavento, e inizia a dialogare con lei. Allucinazioni forse dovute al clima umido e alla pioggia incessante di quell’“anno senza estate”? Daemon racconta di quel terribile click che fa convertire l’amore in odio, la benevolenza in violenza; di quell’incepparsi del meccanismo amoroso che provoca un ribaltamento dalle conseguenze irreversibili. È focalizzato sul “divenir cattivo” della creatura: su come un essere senza identità, senza storia, solo come un cervo inseguito, fa mondo a sé e si ribella, appiccando fuoco alla casa amata. Il fuoco invita a cogliere il valore trasformativo e insorgente della rabbia, come primo gesto/modalità di reazione a un sistema antropocentrico che sta schiacciando ogni voce non conforme. Regia e drammaturgia Daniela Nicolò ed Enrico Casagrande; luci e video Daniela Nicolò, in collaborazione con Eduard Popescu; fonica Martina Ciavatta."},{"n":"16","t":"SGUARDI PARALLELI: GABRIELE BASILICO E ALDO ROSSI","p":[["Giovanna Calvenzi",0],["Luca Molinari",1]],"raw":"Giovanna Calvenzi con Luca Molinari","d":"mer","h":"21:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["arte e fotografia","città e architettura"],"de":"Per più di vent’anni Gabriele Basilico, uno dei protagonisti più significativi della fotografia italiana e internazionale contemporanea, ha raccontato il mondo di architetture di Aldo Rossi. Entrambi formatisi al Politecnico di Milano, entrambi milanesi, i due s’inseguono tra scatti e scritti attraversando la metamorfosi di Milano e ragionando su un linguaggio dell’architettura alla ricerca di nuovi archetipi e immaginari capaci di rileggere la Storia e la fragile modernità del secondo Novecento. Di questo e tanto altro discuteranno Giovanna Calvenzi, curatrice fotografica, insieme a Luca Molinari."},{"n":"17","t":"USED TO SAY, I LIKE CHOPIN","p":[["Giovanni Bietti",0]],"raw":"Giovanni Bietti","d":"mer","h":"21:00","l":"teatro bibiena","pr":"7,50 €","tg":["musica","storia"],"de":"“Le opere di Chopin sono cannoni sepolti sotto i fiori” affermava Robert Schumann: il compositore e pianista polacco è certamente nell’Olimpo dei più grandi musicisti della Storia, complice la sua tendenza al perfezionismo e “la dialettica magica tra il rigore della costruzione e la totale libertà del gesto” che caratterizza le sue opere. Il musicologo Giovanni Bietti (Fryderyk Chopin. La musica), seduto al fidato pianoforte, accompagnerà il pubblico in un viaggio tra Varsavia e Parigi al ritmo di valzer, mazurke, Notturni e Sonate, per raccontare ai presenti come nacque la geniale produzione di un ragazzo tormentato da problemi di salute, ma divenuto un gigante del periodo romantico, capace – come diceva George Sand – “di far parlare a un solo strumento la lingua dell’infinito”."},{"n":"18","t":"DEDICATO A MARGUERITE YOURCENAR","p":[["Tiziano Colombi",0],["Elena Petrassi",0],["Sandra Petrignani",0],["Annarosa Buttarelli",1]],"raw":"Tiziano Colombi, Elena Petrassi e Sandra Petrignani con Annarosa Buttarelli","d":"mer","h":"21:00","l":"aula magna dell'universita","pr":"7,50 €","tg":["narrativa","memoria e biografia"],"de":"Vaga con maestria tra il ricordo del passato e una lucida lungimiranza su cosa avrebbe riservato il futuro la produzione letteraria di Marguerite Yourcenar (L’opera al nero). Tra le più importanti scrittrici francesi del Novecento, prima donna a essere eletta all’Académie française, Yourcenar fece pronunciare all’Adriano delle sue Memorie parole che rispecchiano non solo la sua grande curiosità per il viaggio come apertura al nuovo, ma soprattutto “l’ambientalismo sovversivo” dell’autrice di origine belga, espresso nella conferenza del 1987 Se vogliamo provare ancora a salvare la Terra: “Mi sentivo responsabile della bellezza del mondo”. Dei grandi protagonisti della sua opera – il tempo, la Storia, il lavoro di scardinamento degli schemi legati al genere e la riflessione sulla libertà – discutono Tiziano Colombi (Dialogo con Marguerite Yourcenar), Sandra Petrignani (La scrittrice abita qui) e la poetessa Elena Petrassi. Coordina l’incontro Annarosa Buttarelli (Pensiero osceno)."},{"t":"IL FUTURO DEI COMMONS","p":[["Paola Viganò",0]],"raw":"Paola Viganò","s":"accenti","d":"mer","h":"21:30","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["città e architettura","politica e attualità","ambiente e clima"],"de":"Per commons intendiamo quegli spazi materiali e immateriali – piazze, cortili, giardini, biblioteche, scuole, mercati, ma anche relazioni, saperi, memorie e pratiche d’uso – che una comunità riconosce come rilevanti per la propria vita collettiva e che vengono mantenuti e governati attraverso processi condivisi. Un common non è definito solo dalla proprietà pubblica o privata, ma soprattutto dalle relazioni che effettivamente abilita. Che peso hanno oggi i commons nelle nostre città, e quale ruolo possono assumere nella loro trasformazione?"},{"n":"19","t":"UN LUPO IN PARADISO: BENVENUTI A STRANALANDIA","p":[["Stefano Benni",0],["Pirro Cuniberti",0],["Daniel Pennac",0],["Clara Bauer",1],["Ximo Solano",0],["Gigio Alberti",0],["Pako Ioffredo",0]],"raw":"reading teatrale tratto da Stranalandia di Stefano Benni e Pirro Cuniberti con testi originali di Daniel Pennac, in collaborazione con Clara Bauer, Pako Ioffredo e Ximo Solano in scena Daniel Pennac, Gigio Alberti e Pako Ioffredo","d":"mer","h":"21:30","l":"piazza castello","pr":"30,00 €","tg":["teatro e performance","narrativa","fantastico e horror"],"de":"C’è un luogo che non compare sulle mappe. Non ha confini, ma ha una porta. E sulla porta c’è scritto: “Stranalandia. Studio di consulenza psicologica per animali smarriti”. Dentro, su una poltrona un po’ consumata, siede un lupo. Non ulula. Ascolta. È un lupo che non divora nessuno. Al massimo divora le parole quando diventano troppo serie. Quel lupo è Stefano Benni. Daniel Pennac lo racconta così: non come un monumento, non come una statua, ma come uno psicanalista gentile che, in paradiso, riceve nel suo studio tutti gli animali feriti del nostro tempo. Un luogo dove l’assurdo non è evasione, ma diagnosi. Dove la fantasia è una terapia collettiva. Dove l’ironia non serve a scappare, ma a restare. Oggi entriamo anche noi in quello studio. Non per commemorare. Ma per sederci, ascoltare, e forse confessare qualcosa. Il lupo non è scomparso. Ha solo cambiato indirizzo. Una produzione Elastica in collaborazione con CompagnieMia. Musiche di Alice Loup, disegni di Pirro Cuniberti, da un’idea di Francesca Parisini e Brunella Torresini, regia di Clara Bauer e Ximo Solano, video designer e disegno luci di Ximo Solano."},{"n":"20","t":"UN LIBRO CON LA TUA VOCE","p":[["Daniele Fior",0],["Tanja Fior",0]],"raw":"Daniele e Tanja Fior","s":"laboratorio audioeditoriale","e":"dai 7 agli 11 anni","d":"gio","h":"10:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["editoria e traduzione","infanzia ed educazione","lingua e parole"],"f":["per bambini","laboratorio"],"de":"Alla Casa del Mantegna anche quest’anno c’è una casetta editrice dove si può imparare a stampare libri di carta: bizzarri e originali fin che si vuole, ma sempre da leggere con gli occhi e sfogliare con le mani. Esistono però libri di tutt’altra consistenza, che non affaticano la vista… ma si fanno sentire! Insieme a Daniele e Tanja Fior, fondatori di una casa discografica di letteratura, i e le partecipanti a questo laboratorio proveranno a registrare la prima traccia di un audiolibro corale. Il testo che farà da spartito sarà La conferenza degli animali di Erich Kästner: la sfida sarà creare un ambiente sonoro adatto all’atmosfera della storia, calarsi nei panni di uno dei protagonisti, e non mangiarsi le parole davanti al microfono!"},{"n":"21","t":"MAPPA DI SÉ, MAPPA DI ME","p":[["Cristina Bellemo",0]],"raw":"Cristina Bellemo","s":"la casetta editrice","e":"dai 6 ai 10 anni","d":"gio","h":"10:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["infanzia ed educazione","arte e fotografia","viaggi e luoghi"],"f":["per bambini"],"de":"Quando pensiamo agli atlanti ci vengono subito alla mente luoghi remoti e affascinanti, quasi irraggiungibili se non con la più straordinaria delle fantasie. Eppure la nostra quotidianità è fatta di tanti piccoli, piccolissimi viaggi, fuori e dentro di noi, tra quello che ci sta subito intorno e quello che scopriamo nel nostro cuore. Cristina Bellemo ci aiuterà a disegnare queste specialissime mappe con matite, colori, pezzetti di carta, ritagli di stoffa, che rilegate insieme si trasformeranno in un grande atlante universale delle terre intime.","no":"Su La casetta editrice vedi p. 125"},{"n":"22","t":"SOGNARE FORTE","st":"laboratorio collettivo di immaginazione con pernottamento in tenda","p":[["Rita Elvira Adamo",0],["Dario Bassani",0],["Maurizio Casiraghi",0],["Ludosofici",0]],"raw":"Rita Elvira Adamo, Dario Bassani e Maurizio Casiraghi con i Ludosofici","e":"dagli 11 ai 13 anni","d":"gio","h":"10:00","l":"parco museo virgilio - forte di pietole","pr":"50,00 €","ic":["no accompagnatori adulti"],"tg":["infanzia ed educazione","filosofia e idee","gioco"],"f":["per ragazzi","laboratorio"],"de":"C’è ancora molto da sognare forte! Dopo gli esercizi collettivi visionari dello scorso anno, quest’anno l’esperienza si ripete ancora più forte. Isolati temporaneamente dal mondo e protetti dalle mura che cingono il Parco Museo Virgilio al Forte di Pietole, trenta ragazze e ragazzi si ritroveranno a immaginare scenari per un futuro da abitare, accompagnati da autrici e autori aperti all’utopia. L’esperienza sarà totale: 32 ore da vivere immersi nella natura del Forte, dormendo in tenda, mangiando allo stesso tavolo, lavorando a possibili grammatiche per il tempo che verrà. Niente è definito in partenza, tutto prenderà forma nel pensare insieme. La sfida è di tracciare una linea del tempo, da condividere con l’intera comunità del Festival, lungo la quale provare a sognare il mondo come potrebbe essere nel 2056, nel pieno della loro età adulta, e nel 2086, quando saranno anziani, definendo inedite e concrete prospettive. L’attività di Sognare Forte inizierà giovedì 10 alle ore 9:00 al pontile B1 Navi Andes sul lago di Mezzo per il trasferimento al Parco Museo Virgilio e si concluderà venerdì 11 alle ore 18:30 con ritorno allo stesso pontile. Il pernottamento avverrà in tenda: ogni partecipante dovrà portare materassino e sacco a pelo. Il pranzo e la cena di giovedì e la colazione e il pranzo di venerdì saranno offerti da Festivaletteratura. Non è consentita la partecipazione a una sola giornata di attività. La richiesta di partecipazione va inoltrata a sognareforte@festivaletteratura.it entro il 28 agosto. vedi anche p. 181"},{"n":"23","t":"PASSAGGI SEGRETI","p":[["Hélène Vignal",0],["Vera Salton",1]],"raw":"Hélène Vignal con Vera Salton","s":"kaléidoscope français","e":"dagli 11 ai 14 anni","d":"gio","h":"11:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["narrativa","infanzia ed educazione"],"f":["per ragazzi"],"de":"Ci sono libri che raccontano di avventure incredibili e mondi fantastici, di grandissime imprese e di eroi mitici. E poi ci sono libri che raccontano tutto quello che sta in mezzo, sotto, di lato, dietro a queste storie, nei passaggi segreti che i lettori e le lettrici percorrono per cercare racconti che parlino di loro, delle cose piccole, ma che sono anche enormi, che accadono ogni giorno, di cosa vuol dire sentirsi invisibili e diversi, ma anche coraggiosi e pieni di risorse. Sono le storie della scrittrice francese Hélène Vignal, da Passare col rosso e Diario di un ragazzo invisibile, passando per Troppa fortuna, che arriva a Mantova per parlare di storie grandi e piccole insieme a ragazze e ragazzi. A guidarla, munita di mappa e bussola, sarà la libraia Vera Salton.","no":"L’autrice parlerà in francese, con interpretazione consecutiva in italiano."},{"t":"PROSSIMA FERMATA LAMBRATE","p":[["Gino Marchitelli",0]],"raw":"Gino Marchitelli","s":"accenti","d":"gio","h":"11:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["giallo e noir","città e architettura"],"de":"Milano è una città fumosa, carica di nebbie che ben si prestano a nascondere misteri da risolvere: Gino Marchitelli conosce bene la città meneghina e l’ha trasformata nella protagonista dei suoi gialli (Milano non ha memoria, Sangue nel Redefossi, Il fantasma del Giambellino, Panico a Milano): unitevi a lui mentre – per mezz’ora – piazza Sordello verrà lambita dal fiume Lambro."},{"n":"502","t":"PARLARE DI LIBRI CON GLI ADOLESCENTI","p":[["Filomena Grimaldi",0],["Ada Facchini",0],["Marianna Albini",1]],"raw":"Filomena Grimaldi e Ada Facchini con Marianna Albini","s":"libri in classe con read more– nel cantiere della letteratura giovanile","d":"gio","h":"12:00","l":"politecnico di milano - campus di mantova","pr":"ingresso gratuito con prenotazione","tg":["scrittura e lettura","infanzia ed educazione","editoria e traduzione"],"f":["laboratorio"],"de":"Come dice Aidan Chambers, per creare una lettrice o un lettore servono tanti libri, un luogo dove trovarli e l’occasione di parlarne. Che siano gruppi di lettura in libreria come fa da molti anni Filomena Grimaldi, o in biblioteca, a scuola e in altri luoghi come nei tanti progetti ideati e curati da Ada Facchini, l’importante è l’accoglienza e il dialogo sui libri e non solo."},{"t":"IL FUOCO SACRO DELLA SCRITTURA","p":[["Ilaria Tuti",0],["Elsa Riccadonna",1]],"raw":"Ilaria Tuti con Elsa Riccadonna","d":"gio","h":"12:00","l":"piazza dei libri","pr":"ingresso libero","ic":["streaming"],"tg":["scrittura e lettura","narrativa"],"no":"Sul Fuoco sacro della scrittura vedi p. 105"},{"n":"24","t":"VEDO GIALLO","p":[["Cristina Cassar Scalia",0],["Vera Salton",1]],"raw":"Cristina Cassar Scalia con Vera Salton","e":"dai 7 ai 10 anni","d":"gio","h":"14:15","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["giallo e noir","infanzia ed educazione","scrittura e lettura"],"f":["per bambini"],"de":"Quali sono gli elementi che distinguono un romanzo giallo di successo da una storia del crimine come tante altre? L’atmosfera di mistero che avvolge tutta la vicenda? I continui colpi di scena? Gli indizi disseminati tra le pagine? Il fascino dell’investigatore, o dell’assassino? Scrivere di delitti richiede un talento non indifferente: pochi sono gli scrittori e le scrittrici capaci di tenerci con il fiato sospeso fino all’ultima pagina! Cristina Cassar Scalia, maestra indiscussa del genere (Il ladro dei ricordi, scritto insieme al nipote Giulio), ci svelerà quali sono gli ingredienti indispensabili per costruire un giallo appassionante, in compagnia della libraia Vera Salton."},{"n":"25","t":"ANDANDO SEMPRE VERSO CASA","p":[["Sepp Mall",0],["Ilaria Tuti",0],["Simonetta Bitasi",1]],"raw":"Sepp Mall e Ilaria Tuti con Simonetta Bitasi","d":"gio","h":"14:30","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["narrativa","storia"],"de":"La storia novecentesca di regioni liminali d’Europa, come il Tirolo e la Carnia, riesuma scelte tragiche e devastazioni, che rincorrono come cani da guerra il destino di popoli e famiglie lasciando intatti piccoli barlumi d’umanità. Nei romanzi di Ilaria Tuti (Ed è un poco la notte e un poco l’alba) e Sepp Mall (Un cane andò in cucina), questi miracoli del tempo irrompono con la forza di un’istantanea strappata alla furia dei conflitti mondiali. Per Tuti hanno il volto di una donna indomita che davanti a una nuova invasione barbarica e alla nascita della Kosakenland tiene saldo il timone della sua comunità trasformando la disperazione in stupore, la paura in accoglienza; per Mall sono i pensieri di un bambino che ai tempi delle Opzioni in Alto Adige e della violenza totalitaria, ricuce una casa sfilacciata dal lutto e dall’assassinio con la forza della memoria. Li incontra Simonetta Bitasi. Sepp Mall parlerà in tedesco, con interpretazione consecutiva in italiano."},{"n":"26","t":"USCIRE DAL CORO DEL PATRIARCATO","p":[["Giulia Sissa",0],["Annarosa Buttarelli",1]],"raw":"Giulia Sissa con Annarosa Buttarelli","d":"gio","h":"14:30","l":"palazzo san sebastiano","pr":"7,50 €","tg":["filosofia e idee","genere e femminismo"],"de":"La cronaca della filosofia occidentale può essere considerata un coro di voci maschili che, nel corso della Storia, hanno contribuito a creare una visione prevalente in cui la donna era relegata a un ruolo ancillare, consolidando l’idea che fosse estranea al potere e incapace di compiere riflessioni profonde. Eppure un “controcanto” si è levato già nell’antica Grecia in opposizione alle imposizioni patriarcali, uscendo dagli schemi imposti per ripensare la differenza di genere. La grecista Giulia Sissa (Controcanto) ha individuato tre figure che “hanno saputo scardinare la banalità”: Sofocle, Platone – sua è la frase “Non c’è alcuna occupazione nella gestione dello Stato che appartenga alla donna in quanto donna, né all’uomo in quanto uomo” – e Derrida. In dialogo con la filosofa Annarosa Buttarelli (Pensiero osceno) Sissa ripercorrerà le tracce lasciate da chi ha cercato di smontare “opposizioni binarie, dicotomie e polarità tra contrari, come se quei contrari esaurissero tutto ciò che si può pensare”."},{"n":"27","t":"LA MIA PROSA È POESIA","p":[["Eva Baltasar",0],["Silvia Righi",1]],"raw":"Eva Baltasar con Silvia Righi","d":"gio","h":"14:30","l":"teatro bibiena","pr":"7,50 €","tg":["poesia","narrativa"],"de":"“Ho passato quindici anni scrivendo poesie senza mai pensare di cambiare genere, fino a quando una psicologa mi chiese di scrivere la mia autobiografia in quattro pagine, come esercizio terapeutico. Pensavo sarebbe stato semplice, ma mi resi presto conto di quanto fosse noioso. Così iniziai a mentire per rendere il testo più interessante” raccontava pochi anni fa la poeta e scrittrice catalana Eva Baltasar, parlando del suo romanzo d’esordio Permafrost. Per la prima volta ospite a Festivaletteratura, l’autrice di Mammut e Decadenza e fascino condurrà i presenti tra le strade di una Barcellona cruda, dove il malessere della società passa attraverso lo sguardo ironico e disincantato di protagoniste femminili intente a “polverizzare” i luoghi comuni sulla sessualità e sulle comodità del capitalismo. Di come ritmo, musicalità e ricerca della parola siano necessari tanto nella poesia quanto nella prosa, Baltasar discuterà insieme alla poeta Silvia Righi.","no":"L’autrice parlerà in catalano, con interpretazione consecutiva in italiano."},{"n":"28","t":"MASCHERE MATTE E MOSTRI DA PASSEGGIO","st":"laboratorio di fantazoologia da parata","p":[["Ruggge",0]],"raw":"Ruggge","e":"dagli 8 ai 12 anni","v":"vedi n. 1","d":"gio","h":"14:30","l":"cappella di palazzo del mago","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["arte e fotografia","miti e fiabe","infanzia ed educazione"],"f":["per bambini","laboratorio"]},{"n":"29","t":"PAROLE COME BOMBE","p":[["Federico Faloppa",0],["Grace Fainelli",1]],"raw":"Federico Faloppa con Grace Fainelli","d":"gio","h":"14:30","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["lingua e parole","diritti e società","media e giornalismo"],"de":"Il fenomeno dell’hate speech è tristemente sempre più diffuso online, dove lo schermo di un computer o di un telefono dà un senso di impunità a chi si infiamma in commenti violenti ai danni del prossimo. In un periodo storico in cui i conflitti interessano più zone del globo, siamo quotidianamente “bombardati” anche da un linguaggio militarizzato e da una retorica marziale da parte del mondo politico e mediatico, che certamente non migliora la situazione. Il linguista Federico Faloppa (#Odio, Brevi lezioni sul linguaggio) ha ragionato sulle responsabilità della parola e della sua capacità di creare nemici in ogni dove o farci pensare a guerre “giuste” e armi “intelligenti”. Affiancato da Grace Fainelli (Decolonizzare lo sguardo), l’autore di Disarmare il discorso tenterà di “mettere in luce la progressiva normalizzazione di meccanismi e pratiche che armano non soltanto le nostre società, ma anche il nostro lessico quotidiano e il nostro immaginario”."},{"n":"30","t":"DAL SILENZIO ALLA PAROLA","st":"Il mito come macchina della voce","p":[["Carmen Gallo",0],["Nadeesha Uyangoda",1]],"raw":"Carmen Gallo con Nadeesha Uyangoda","d":"gio","h":"14:30","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["miti e fiabe","poesia","genere e femminismo"],"de":"Che cosa accade quando una voce viene ridotta al silenzio? E in che modo può trovare nuove forme per tornare a esistere? Attraversando uno dei miti più violenti e perturbanti della tradizione classica, Carmen Gallo esplora il rapporto tra trauma, memoria e linguaggio. La storia di Procne e Filomela diventa così uno spazio di tensione tra perdita e resistenza, tra ciò che viene cancellato e ciò che continua a cercare espressione. In un continuo dialogo tra antico e contemporaneo, il mito si rivela uno strumento ancora vivo per interrogare le ferite del presente e le possibilità della parola poetica di dare forma a ciò che sembra irrappresentabile. Un percorso tra silenzio e voce, assenza e testimonianza, a partire dall’ultimo libro di poesie di Gallo, Procne Machine, in dialogo con la scrittrice Nadeesha Uyangoda."},{"n":"31","t":"IL FUTURO CI DIMENTICHERÀ? NOI E LA MEMORIA DIGITALE","p":[["Federico Valacchi",0]],"raw":"Federico Valacchi","s":"lezioni orizzontali","d":"gio","h":"14:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["tecnologia e IA","memoria e biografia","storia"],"f":["lezione"],"de":"“Chi conserva la traccia? Il dato che dovrà dire di un presente distratto, troppo impegnato nel nuovo gioco per pensare alla conservazione di sé? Il nostro futuro ci aspetta spaventato all’idea di non riconoscerci.” La memoria digitale è apparentemente evanescente, a causa della continua obsolescenza dei supporti. C’è speranza che, nel mare magnum di dati che la cultura contemporanea produce, si sedimenti un patrimonio stabile e durevole, testimone del nostro tempo? Da queste domande parte la discussione con Federico Valacchi (Archivio: concetti e parole)."},{"t":"I CEMENTI DEL POTERE","p":[["Gian Piero Piretto",0]],"raw":"Gian Piero Piretto","s":"accenti","d":"gio","h":"15:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["città e architettura","storia","arte e fotografia"],"de":"Sono colossi parlanti: raccontano di battaglie, dittature e rivoluzioni che dispersero come foglie milioni di esseri umani. Dagli Spomenici jugoslavi ai Colossi della dinastia Kim in Corea del Nord, Gian Piero Piretto (Memorie di pietra, Il radioso avvenire) passa in rassegna alcuni celebri esempi di architettura brutalista socialista, chiedendosi perché ancora ci affascinino e quale eredità architettonica – e politica – lascino a un presente in cerca di ancoraggi o furie iconoclaste."},{"n":"32","t":"IL MALPAESE","p":[["Tullio Avoledo",0],["Maurizio Torchio",0],["Carlo Lucarelli",1]],"raw":"Tullio Avoledo e Maurizio Torchio con Carlo Lucarelli","d":"gio","h":"15:00","l":"aula magna dell'universita","pr":"7,50 €","tg":["narrativa","politica e attualità"],"de":"C’è una retorica irricevibile che accompagna molte narrazioni dell’Italia di oggi: è un sogno contraddittorio di tradizione e ricchezza, nostalgia e rinnovamento, che attraversa borgate e grandi città, lacerate invece da un colossale mutamento antropologico che si protrae da decenni. Nei romanzi noir di Tullio Avoledo (Come si uccide un gentiluomo, Ultimo valzer di una ragazza perbene) e Maurizio Torchio (La peggiore specie), il trittico territorio/famiglia/impresa viene spinto da una prosa cristallina fino al suo punto di rottura. Emerge così un mondo di menzogne rapaci e assassine che nessun personaggio, qualunque sia il lato della barricata in cui ha scelto di collocarsi, riesce davvero a guidare, tantomeno a redimere. Eppure il grido dell’innocente – sia esso uno dei tanti animali da macello che riempiono le nostre tavole, o il volto di una sfrontata ventenne vittima di un mondo adulto e abominevole – è il fantasma che continua a interrogarci. Dialoga insieme agli autori Carlo Lucarelli."},{"n":"33","t":"ATTENTI A QUEI TIMBRI!","st":"laboratorio a colpo d’inchiostro","p":[["Chiara Armellini",0]],"raw":"Chiara Armellini","e":"dai 3 agli 8 anni","d":"gio","h":"16:00","l":"casa del mantegna","pr":"7,50 €","ic":["accompagnatore adulto richiesto"],"tg":["arte e fotografia","infanzia ed educazione"],"f":["per bambini","laboratorio"],"de":"Un clack sul cuscinetto dell’inchiostro, un paf deciso sul foglio bianco… ed ecco che dal nulla spunta un naso gigante, una gamba a strisce o un cappello strampalato! Insieme a Chiara Armellini (Io cambierò il mondo e Ti faccio a pezzetti) i piccoli artisti e le piccole artiste scopriranno come l’arte possa anche nascere da un semplice gesto geometrico. Questo laboratorio sarà una vera officina di stampa a misura di bambino: giocando con forme, colori e timbri speciali creati dall’illustratrice, i partecipanti si divertiranno a smontare e rimontare la realtà. Il risultato? Personaggi unici, strambi e irresistibilmente buffi pronti a raccontare la loro storia."},{"t":"NEGARE IL DISSENSO","p":[["Annalisa Camilli",0]],"raw":"Annalisa Camilli","s":"accenti","d":"gio","h":"16:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["politica e attualità","diritti e società","media e giornalismo"],"de":"Il Decreto Sicurezza 2026 ha introdotto ulteriori strette sulle manifestazioni, trasformando in reato specifiche forme di dissenso, come i blocchi stradali o ferroviari, e andando a colpire soprattutto attiviste e attivisti. La giornalista Annalisa Camilli (Divieto di protestare) analizza queste limitazioni alla libertà di protesta e il modo in cui i governi tentano di arginare con la repressione le mobilitazioni sociali."},{"n":"34","t":"SCRIVERE MI SEMBRA LA COSA CHE SO FARE MEGLIO","p":[["Sandro Veronesi",0]],"raw":"Sandro Veronesi","d":"gio","h":"16:15","l":"palazzo san sebastiano","pr":"7,50 €","tg":["scrittura e lettura","narrativa"],"de":"Sandro Veronesi (due volte vincitore del Premio Strega con Caos calmo e Il colibrì) si è laureato in architettura, ma l’amore per la letteratura era già insito tra le righe della sua tesi, incentrata su Victor Hugo. Da allora, la creatività dello scrittore fiorentino si è concretizzata sulle pagine di numerosi romanzi, divenuti, nel loro complesso, una sorta di geografia dei temi cari all’autore. Eppure, in questa mappa, esistono ancora luoghi inesplorati: nel recente Caducità, Veronesi ha raccolto per la prima volta tutti i racconti pubblicati nella sua carriera, partendo proprio da un inedito scritto a soli 24 anni, e – con qualche saggio di lettura dal vivo – racconterà al pubblico del Festival di questo lavoro di aggregazione letteraria che ha richiesto, per la sua costruzione, un vero e proprio viaggio a ritroso nel tempo."},{"n":"35","t":"FUORI LUOGO, PAROLE ALIENE","st":"laboratorio di osservazione di ecosistemi acquatici","p":[["Marco Bartoli",0]],"raw":"Marco Bartoli","s":"spazio rio","e":"dai 12 anni","d":"gio","h":"16:15","l":"pontile pescherie di giulio romano","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["scienza","natura e animali","ambiente e clima","Mantova e territorio"],"f":["per ragazzi","laboratorio"],"de":"Nelle acque di Mantova, come in gran parte degli ecosistemi italiani, si trovano sempre più spesso organismi che definiamo “alieni”: piante e animali introdotti in un ambiente diverso dal loro da un’azione umana, che, trovando condizioni favorevoli, proliferano rapidamente trasformando sistemi ed equilibri. Con l’aiuto di ecologi ed esperti di comunicazione della scienza esploreremo da vicino queste specie sorprendenti: come sono fatte, come e da dove arrivano, perché si diffondono, quali impatti possono avere e, soprattutto, come il linguaggio che usiamo per descriverle può cambiare la nostra percezione sulla loro presenza. Insieme cercheremo le parole giuste e gli strumenti più efficaci per raccontarle senza allarmismi né banalizzazioni, definendo un modo consapevole di parlare di natura fuori luogo.","no":"Su Spazio Rio vedi p. 91"},{"n":"36","t":"A TUTTO MEDIOEVO!","p":[["Manlio Castagna",0],["Adam Gidwitz",0],["Antonio Montefusco",0]],"raw":"Manlio Castagna, Adam Gidwitz e Antonio Montefusco","e":"dagli 11 ai 14 anni","d":"gio","h":"16:15","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["storia","infanzia ed educazione","narrativa"],"f":["per ragazzi"],"de":"Un’epoca buia di ignoranza e superstizione? Il Medioevo è spesso vittima di falsi miti mentre in realtà fu un periodo dinamico e fondamentale per la nascita dell’Europa, caratterizzato da grandi innovazioni tecnologiche, filosofiche e artistiche, oltre che da una sorprendente vivacità sociale e culturale. Contro gli stereotipi sul Medioevo il Festival schiera Adam Gidwitz – autore de La leggenda dei tre bambini magici e del loro cane santo, romanzo storico ambientato nel 1242 nella Francia di Luigi IX che Booklist ha inserito fra i 50 migliori libri per ragazzi del XXI secolo – e Manlio Castagna che in Il Medioevo dalla A alla Zazzera ci fa scoprire questo periodo storico come non lo abbiamo mai letto, tra brividi, leggende e storie avvincenti. I due scrittori si sfideranno a colpi di storie medievali sotto la supervisione di Antonio Montefusco, esperto di letteratura latina medievale. Adam Gidwitz parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"37","t":"LE CREPE E LE FONDAMENTA","p":[["Enrico Giovannini",0],["Lea Ypi",0],["Andrea Pareschi",1]],"raw":"Enrico Giovannini e Lea Ypi con Andrea Pareschi","s":"l’europa, in prospettiva","d":"gio","h":"16:15","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["politica e attualità","
