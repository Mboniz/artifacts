geopolitica e guerre","economia e lavoro"],"de":"Nell’epoca delle “policrisi”, segnata da conflitti, instabilità geopolitiche, trasformazioni economiche e crescenti tensioni sociali e ambientali, l’Unione Europea continua a rappresentare un punto di riferimento. Proprio la portata delle sfide sociali, economiche e ambientali del presente, tuttavia, mette alla prova la capacità dell’UE di rispondere in modo efficace mantenendo vitali i propri principi fondativi. In che modo le attuali priorità e politiche europee, decise e attuate insieme agli Stati membri, si confrontano con gli ideali di dignità umana, libertà, democrazia e uguaglianza? La filosofa politica Lea Ypi e l’economista Enrico Giovannini si interrogheranno su cosa significhi oggi promuovere la giustizia sociale e la sostenibilità in un continente sotto pressione. Dialoga con loro il politologo Andrea Pareschi. Lea Ypi parlerà in italiano.","no":"In collaborazione con Pandora rivista."},{"n":"38","t":"SPEZZERANNO LE SPADE E NE FARANNO ARATRI","p":[["Lucio Caracciolo",0],["Matteo Maria Zuppi",0],["Paola Caridi",1]],"raw":"Lucio Caracciolo e Matteo Maria Zuppi con Paola Caridi","d":"gio","h":"16:30","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["religione e spiritualità","geopolitica e guerre","politica e attualità"],"de":"Nella benedizione Urbi et Orbi datata 8 maggio 2025, papa Leone XIV (E pace sia!) parlò per la prima volta di una pace “disarmata e disarmante”, termini che, nel gennaio di quest’anno, vennero ribaditi nel messaggio che il Pontefice fece per la Giornata Mondiale della Pace, in un discorso ricco di richiami al disarmo – fisico e spirituale – e fermo nel considerare scandaloso che “si faccia la guerra per raggiungere la pace”. Partendo dagli interventi del Papa, dalla sua attività diplomatica e dalle pratiche messe in atto dalla Chiesa per resistere alla violenza dei conflitti, si confrontano al Festival il cardinale Matteo Maria Zuppi – presidente della CEI –, il direttore di Limes Lucio Caracciolo (La pace è finita) e la giornalista Paola Caridi (Pace e guerra): insieme ragioneranno di un tema oggi più che mai vitale, contro le tenebre di chi si ostina a “chiamare realistiche le narrazioni prive di speranza”."},{"n":"39","t":"LENTAMENTE SBIADIREMO","p":[["Ermanno Cavazzoni",0]],"raw":"Ermanno Cavazzoni","d":"gio","h":"16:30","l":"teatro bibiena","pr":"7,50 €","tg":["narrativa","memoria e biografia"],"f":["spettacolo/lettura"],"de":"Era il settembre del 2001 e il pubblico del Festival ascoltava rapito un reading di Gianni Celati, scrittore e figura centrale del secondo Novecento, capace di raccontare la nostra pianura con immagini nitide quanto una foto di Luigi Ghirri. L’autore di Verso la foce è venuto a mancare nel 2022 ma, come spesso accade, il suo ricordo continua a vivere attraverso le testimonianze di chi gli era vicino. Gli era molto legato Ermanno Cavazzoni, sceneggiatore dell’ultimo film di Fellini, che conobbe Celati a un convegno nella Casa di Ariosto nel lontano 1985 e che a lui ha dedicato Storia di un’amicizia: in un incontro performativo fatto di letture, memorie e divagazioni, Cavazzoni traghetterà il pubblico in un viaggio tra aneddoti di personaggi eccentrici e conversazioni filosofiche ai tavoli delle osterie bolognesi… “un chiacchierare per arrivare a capire cos’è che uno ci sta a fare al mondo”."},{"n":"40","t":"STORIA DI UN UOMO QUALUNQUE","p":[["Geoff Dyer",0],["Emanuele Atturo",1]],"raw":"Geoff Dyer con Emanuele Atturo","d":"gio","h":"16:30","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["memoria e biografia","narrativa"],"de":"“Sapevo da un po’ che avrei voluto scrivere qualcosa sulla mia infanzia e sul modo in cui sono cresciuto: non perché siano particolarmente interessanti, ma proprio perché non lo sono. Perché essendo un uomo qualunque, sono indicativi dei cambiamenti socioeconomici del periodo fra la fine degli anni ’50 e il 1977” afferma Geoff Dyer riguardo alla sua ultima opera Compiti a casa. Come è accaduto con numerosi gruppi punk britannici degli anni Settanta – i Chelsea cantavano “abbiamo il diritto di lavorare” –, Dyer parte da un’esperienza personale per dipingere un quadro della working class inglese di quel periodo, riflettendo universalmente sulle classi sociali attraverso i ricordi costruiti sulle strade di Cheltenham. Ospite a Mantova nel lontano 2000, l’autore di Natura morta con custodia di sax tornerà a incontrare il pubblico di Festivaletteratura, condividendo il palco insieme al giornalista Emanuele Atturo (Roger Federer è esistito davvero).","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"41","t":"IL DISINCANTO DI BELFAST","p":[["Wendy Erskine",0],["Ilenia Caito",1]],"raw":"Wendy Erskine con Ilenia Caito","d":"gio","h":"16:30","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["narrativa","viaggi e luoghi","politica e attualità"],"de":"Non è una città addomesticabile Belfast, anche se sono ormai lontani gli anni dei Troubles che hanno visto aspri scontri tra la comunità cattolica e i protestanti dell’Ulster. Wendy Erskine è nata proprio nella capitale nordirlandese e sa bene come descrivere “una città oscura che ancora non ha appreso a parlare onestamente di sé dopo le tragedie della guerra civile” e le persone che la abitano. Così accade con la working class dei racconti di Dolce casa e con le madri e gli altri personaggi del romanzo I benefattori, in cui esplora il rapporto tra genitorialità, violenza di genere e privilegio sociale. “Ciò che mi ha spinto a scrivere è stata la consapevolezza di non vedere il mondo, così come lo vedevo io, riflesso in gran parte della narrativa” afferma l’autrice, che a Mantova si confronterà con Ilenia Caito, animatrice di gruppi di lettura.","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con Literature Ireland."},{"n":"42","t":"TERAPIE PER LIBRI MORTI","p":[["Matei Vișniec",0],["Marco Archetti",1]],"raw":"Matei Vișniec con Marco Archetti","d":"gio","h":"16:45","l":"aula magna dell'universita","pr":"7,50 €","tg":["narrativa","teatro e performance"],"de":"Tutto, nei romanzi di Vișniec, è fulgido e straniante come una tazza di porcellana in mezzo a un uragano. Non è un caso che l’autore rumeno sia anche uno dei maggiori drammaturghi europei viventi, cresciuto dietro la Cortina di ferro salmodiando Beckett e Ionesco, Bulgakov e Kafka: al centro della sua conversazione con Marco Archetti ci sono pagine in cui l’assurdo si tramuta in vero, il sarcasmo in stupore. E allora non diventa difficile assistere a dialoghi tête-à-tête fra Hitler e Stalin (Un secolo di nebbia); vedere in azione bizzarre comunità di esuli strette attorno a editori senza casa editrice (Sindrome da panico nella Città dei Lumi); ascoltare luciferini mercanti di parole che tendono la mano a scrittori in crisi (Il venditore di incipit per romanzi). Perché – come insegnava André Breton – “solo il meraviglioso è bello”.","no":"L’autore parlerà in francese, con interpretazione consecutiva in italiano."},{"n":"43","t":"DISARMARE LE PAROLE","p":[["Federico Faloppa",0]],"raw":"Federico Faloppa","s":"lezioni orizzontali","d":"gio","h":"17:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["lingua e parole","media e giornalismo","politica e attualità"],"f":["lezione"],"de":"Mentre si moltiplicano gli appelli pubblici a “disarmare le parole” e il dibattito sui social e nei media sembra sempre più segnato da modalità aggressive e polarizzanti, una domanda si impone: è sufficiente abbassare i toni per costruire una convivenza più civile? O esistono termini che non possono essere considerati semplicemente opinioni, perché feriscono, escludono e alimentano l’odio? Il sociolinguista Federico Faloppa (Disarmare il discorso. Sulla militarizzazione del linguaggio) propone una riflessione sul potere delle parole nello spazio pubblico contemporaneo. Attraverso esempi tratti dalla cronaca recente e dalla comunicazione digitale, si cercherà di capire come distinguere il conflitto legittimo dalla violenza verbale, la critica dall’attacco alla persona, la libertà di espressione dai discorsi d’odio. Disarmare il linguaggio non significa rinunciare al dissenso, ma imparare a riconoscere quali parole aprono il confronto e quali, invece, lo rendono impossibile."},{"n":"44","t":"MY RAGE IS A SILENT RAVING","st":"laboratorio per chi non ha voce","p":[["Motus",0]],"raw":"Motus","e":"dai 13 anni","d":"gio","h":"17:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["teatro e performance","genere e femminismo","poesia"],"f":["per ragazzi","laboratorio"],"de":"Il workshop prende il titolo da un verso della poesia di Susan Stryker My Words to Victor Frankenstein Above the Village of Chamounix: Performing Transgender Rage. È un viaggio collettivo di svelamento, cura reciproca e scoperta di nuove possibili alleanze attraverso una serie di momenti partecipativi, attività di ricerca ed esercizi semplici e divertenti, adatti anche a chi non ha alcuna esperienza di laboratori teatrali o performativi. Un percorso verso la scoperta del proprio corpo e delle sue zone d’ombra, un accadimento collettivo pensato per dare voce a chi spesso voce non ha. I Motus conducono dal 2023 una ricerca artistica sull’interdipendenza tra discriminazione e odio, che si sviluppa intorno a Frankenstein di Mary Shelley."},{"t":"LA CONTRORA","p":[["Annalisa Metta",0]],"raw":"Annalisa Metta","s":"accenti – territori resilienti","d":"gio","h":"17:00","l":"tenda sordello","pr":"ingresso libero","ic":["consapevolezza verde","streaming"],"tg":["città e architettura","ambiente e clima","viaggi e luoghi"],"de":"Nell’Italia meridionale, “controra” è il nome delle prime, sonnolente, ore dei pomeriggi estivi, quando fa troppo caldo e le attività quotidiane si fermano per lasciare spazio al riposo. Ma è ben più che una dormitina. È un dispositivo spaziale e temporale con cui le società mediterranee hanno storicamente negoziato il rapporto con la luce abbacinante, la scarsità d’acqua, il caldo estremo, espressione di una cultura del limite, dell’attesa e della sincronia con i cicli climatici. Nell’urgenza della transizione ecologica, la controra suggerisce che adattarsi non significa soltanto innovare tecnicamente, ma modificare comportamenti, abitudini e immaginari e che si può sostituire il comfort atopico con modalità diverse di permanenza, attraversamento e uso di luoghi e tempi peculiari."},{"n":"45","t":"GIOIE E DOLORI DELLA (RI)TRADUZIONE","p":[["Carmen Gallo",0],["Vincenzo Latronico",0],["Marta Olivi",1]],"raw":"Carmen Gallo e Vincenzo Latronico con Marta Olivi","d":"gio","h":"18:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["editoria e traduzione","lingua e parole"],"de":"Se tradurre significa sempre mettersi al servizio di un’opera in lingua altra, da traghettare verso un pubblico nuovo, ritradurre un classico è un vero e proprio lavoro di archeologia del testo. Per il ritraduttore l’impresa è dunque ancor più ardua, poiché le vecchie traduzioni, spesso ampiamente note e amate dal pubblico, sono ormai entrate nel canone, quasi quanto gli originali. Eppure i classici sono organismi vivi, che continuano a parlarci dopo decenni o dopo secoli, e meritano di essere reincontrati e riletti, con voci sempre nuove. Per parlarci di queste impervie vie della ritraduzione non c’è nessuno di più adatto di coloro che le percorrono ogni giorno: Carmen Gallo (Procne Machine), poeta e traduttrice del capolavoro di T.S. Eliot, La terra devastata, che nel suo percorso di riscoperta è stato perfino ribattezzato, e Vincenzo Latronico (Le perfezioni), scrittore e traduttore di George Orwell e de Il conte di Montecristo, romanzo di Alexandre Dumas che continua ad appassionare un gran numero di lettori. Dialogano a Mantova con Marta Olivi, traduttrice."},{"t":"IL FUOCO SACRO DELLA SCRITTURA","p":[["Nicola Gardini",0],["Ilenia Caito",1]],"raw":"Nicola Gardini con Ilenia Caito","d":"gio","h":"18:00","l":"piazza dei libri","pr":"ingresso libero","ic":["streaming"],"tg":["scrittura e lettura","narrativa"],"no":"Sul Fuoco sacro della scrittura vedi p. 105"},{"t":"DOVE VA L’ENERGIA DEL MONDO","p":[["Roberto Battiston",0]],"raw":"Roberto Battiston","s":"lavagne – energie","d":"gio","h":"18:00","l":"piazza mantegna","pr":"ingresso libero","ic":["consapevolezza verde"],"tg":["scienza","ambiente e clima"],"f":["lezione"],"de":"L’entropia è la misura della dispersione di energia in un sistema, legata a doppio filo col secondo principio della termodinamica. Ma cosa lega le grandi leggi della fisica alla vita quotidiana, al clima, alle risorse del pianeta e al nostro futuro? Roberto Battiston (Energia), già presidente dell’Agenzia Spaziale Italiana, porterà il pubblico a scoprire come le leggi fondamentali dell’universo parlino anche di noi, dell’ambiente in cui viviamo e delle sfide che ci attendono."},{"n":"46","t":"UN FUMETTO TIRA L’ALTRO!","st":"laboratorio di fumetto a tutto campo","p":[["Federico Appel",0]],"raw":"Federico Appel","e":"dagli 8 ai 12 anni","d":"gio","h":"18:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["fumetto e illustrazione","infanzia ed educazione","editoria e traduzione"],"f":["per bambini","laboratorio"],"de":"Da dove si parte per scrivere un fumetto? Come si sceglie una storia? È diverso disegnare un fumetto di sport o un fumetto storico? Preparatevi tutte le domande possibili, perché mentre sarete impegnati con matite e colori potrete avere l'opportunità di chiacchierare con un fumettista che fa anche il traduttore, l’editor, il grafico, quello che intercetta le storie da pubblicare. Insomma, un vero e proprio incontro fortunato! Potrete raccontarlo un giorno, ovviamente a fumetti…"},{"t":"LA MIA STORIA CON LA LETTURA","p":[["Francesca Mannocchi",0],["Elsa Riccadonna",1]],"raw":"Francesca Mannocchi con Elsa Riccadonna","s":"read more – circuiti di lettura integrati","d":"gio","h":"18:00","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["scrittura e lettura"],"no":"Su La mia storia con la lettura vedi p. 101"},{"n":"47","t":"NIEVO INCONTRA NIEVO","st":"1. il poeta e il narratore","p":[["Sara Cerneaz",0],["Silvia Contarini",0],["Martina Dal Cengio",1]],"raw":"Sara Cerneaz e Silvia Contarini con Martina Dal Cengio","s":"tutto nievo minuto per minuto","d":"gio","h":"18:00","l":"biblioteca teresiana","pr":"7,50 €","tg":["narrativa","poesia","storia","Mantova e territorio"],"de":"“E voglio scrivere, scrivere, scrivere… finché altri avrà pazienza di leggere ed al di là. Voglio scrivere in verso, in prosa, in tragico, in comico, in sublime, in burlesco…”. Quanti scrittori convivono, in Ippolito Nievo? Nella sua breve e bruciante esistenza, Nievo ha composto liriche e drammi pastorali, tragedie e cronache di costume, ha riempito le riviste dell’epoca dei suoi articoli di attualità politica, di critica sociale, teatrale e letteraria, ha sperimentato tra i primi la fantascienza e con Le Confessioni d’un italiano ci ha lasciato il grande romanzo del Risorgimento. Per attraversare la sua imponente produzione letteraria senza farsi prendere dalle vertigini, abbiamo chiesto a un critico musicale e a cinque esperti ed esperte dell’opera nieviana di farci da guide, mettendo a confronto in ogni incontro due delle molteplici voci di questo incontenibile autore. Nel primo appuntamento saranno in dialogo il Nievo poeta, sperimentatore e aperto alla modernità, e il Nievo narratore, autore non solo delle celeberrime Confessioni, ma anche ad esempio de Il barone di Nicastro, fonte di ispirazione diretta per Il barone rampante di Italo Calvino. A prenderne le parti saranno rispettivamente Sara Cerneaz, curatrice della recente edizione della raccolta poetica Le lucciole, e Silvia Contarini, già direttrice di diversi progetti di ricerca dedicati a Nievo e collaboratrice all’edizione nazionale delle sue opere. Conduce Martina Dal Cengio.","no":"Su Tutto Nievo minuto per minuto vedi p. 152"},{"n":"48","t":"CAPITALE TERRENO E PROFITTO CELESTE","st":"Bernardino da Siena: predicare per regolare il mercato","p":[["Giacomo Todeschini",0],["Luca Ughetti",1]],"raw":"Giacomo Todeschini con Luca Ughetti","s":"la parola in piazza","d":"gio","h":"18:00","l":"tempio di san sebastiano","pr":"7,50 €","tg":["economia e lavoro","religione e spiritualità","storia"],"de":"I predicatori parlano spesso di economia: dal pulpito guardano dentro le botteghe, nelle coscienze dei mercanti e dei cittadini, spiegano quali guadagni sono leciti, quali pratiche mettono in pericolo l’anima, quali comportamenti rafforzano una comunità e quali la danneggiano. Sono proprio i frati francescani a scrivere manuali di grande diffusione sull’economia medievale. Pur vivendo di elemosine e senza possedere beni individuali, compongono opere che entrano nel vivo e nel dettaglio delle dinamiche di scambio. Nelle prediche di Bernardino da Siena, usura e povertà, reputazione e credito diventano così parole decisive per capire non solo la salvezza individuale, ma il funzionamento di una società. A mostrare quanto il linguaggio economico medievale continui a riguardarci sarà lo storico Giacomo Todeschini, affiancato da Luca Ughetti.","no":"Su La parola in piazza vedi p. 183"},{"n":"49","t":"MASCHERE MATTE E MOSTRI DA PASSEGGIO","st":"laboratorio di fantazoologia da parata","p":[["Ruggge",0]],"raw":"Ruggge","e":"dagli 8 anni","v":"vedi n. 1","d":"gio","h":"18:00","l":"cappella di palazzo del mago","pr":"7,50 €","tg":["arte e fotografia","miti e fiabe","infanzia ed educazione"],"f":["per bambini","laboratorio"]},{"n":"50","t":"SUONI E SOGNI IN PUNTA DI PIEDI","st":"laboratorio di esplorazione sensoriale notturna","p":[["Cristina Bellemo",0]],"raw":"Cristina Bellemo","e":"dai 3 ai 6 anni","d":"gio","h":"18:15","l":"casa del mantegna","pr":"7,50 €","ic":["accompagnatore adulto richiesto"],"tg":["infanzia ed educazione","musica","natura e animali"],"f":["per bambini","laboratorio"],"de":"Cosa succede quando il mondo si addormenta? La notte custodisce un mistero fatto di silenzi e piccoli rumori quasi invisibili, un tempo sconosciuto in cui l’immaginazione si accende. Cristina Bellemo (Amelia, Poesie notturne) invita bambini, bambine e adulti a mettersi in ascolto: attraverso oggetti insoliti e piccoli strumenti, la realtà si mescolerà ai racconti del sonno e alle parole della notte, in un viaggio in punta di piedi."},{"n":"51","t":"SOSTENIBILITÀ E FUTURO: DUE FACCE DELLA STESSA MEDAGLIA","p":[["Enrico Giovannini",0],["Alessio Malcevschi",1]],"raw":"Enrico Giovannini con Alessio Malcevschi","d":"gio","h":"18:15","l":"palazzo san sebastiano","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["ambiente e clima","economia e lavoro","politica e attualità"],"de":"Quando si parla di sviluppo sostenibile, in pochi hanno ragionato e lavorato sul tema più di Enrico Giovannini (L’utopia sostenibile, Scegliere il futuro). Economista e statistico, due volte Ministro della Repubblica, Giovannini sottoscrive fermamente i valori dell’Agenda 2030 dell’ONU e sostiene la necessità di un approccio cooperativo tra economia civile e sociale per il raggiungimento di un equilibrio che non sia solo ambientale: “La sostenibilità non è solo preservare il pianeta per le generazioni future, ma garantire che tutti abbiano opportunità eque di prosperare”. Per tale motivo è vitale una visione di lungo periodo da parte di governi e imprese, per le quali la transizione energetica comporta un aumento di competitività. Di come temi quali la povertà, l’energia, il lavoro, le disuguaglianze e il cambiamento climatico possano essere affrontati soltanto attraverso una visione sistemica e con la collaborazione tra forze politiche, Giovannini ragiona insieme all’esperto di sostenibilità alimentare Alessio Malcevschi."},{"n":"52","t":"C’È QUALCOSA CHE MI MANCA","p":[["Annalisa Metta",0]],"raw":"Annalisa Metta","s":"sfogliare l’universo – lezioni grandi","d":"gio","h":"18:30","l":"chiesa di san cristoforo","pr":"7,50 €","tg":["filosofia e idee","natura e animali","infanzia ed educazione"],"f":["lezione"],"de":"Ogni metamorfosi è un processo doppio e spesso asimmetrico, è insieme moltiplicazione e sottrazione. Spalanca possibilità, perché consente l’adattamento, l’invenzione, la sopravvivenza in condizioni mutate, ma è anche sparizione, perché comporta la rinuncia a qualcosa che non è più compatibile con il nuovo assetto. Osservare la metamorfosi degli esseri viventi, dei luoghi, degli elementi climatici significa perciò dubitare sia dell’idea celebrativa del cambiamento come progresso lineare, sia dell’idea conservativa della perdita come pura rinuncia. Significa restare dentro una tensione e riconoscere che ogni continuità si costruisce sopra una serie di scomparse e che ogni genealogia interrotta apre comunque a una nuova forma di esistenza, dunque a un futuro, sempre. C’è qualcosa che mi manca: quel che non c’è, ancora, e quel che non c’è, più.","no":"Su Sfogliare l’universo vedi p. 126"},{"n":"53","t":"CONFINI GEOGRAFICI E DI VITA","p":[["Anna Dietzel",0],["Francesca Silvestre",0],["Christian Elia",1]],"raw":"Anna Dietzel e Francesca Silvestre con Christian Elia","s":"passports","e":"dai 14 anni","d":"gio","h":"18:30","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["migrazioni e confini","memoria e biografia","storia"],"f":["per ragazzi"],"de":"Due libri che prendono il via da generazioni diverse e che ripercorrono la parabola di esilio della famiglia materna, restituendoci così uno spaccato di storia recente del nostro paese che rischia di essere dimenticata: Anna Dietzel in Qui io non conto ricostruisce con parole e immagini la vita della nonna Miranda a partire da quella dei suoi genitori Marika e Jošef, esuli sloveni che si sono rifiutati di italianizzare il loro cognome e di abbandonare la lingua madre. Lasciata Gorizia, ceduta agli italiani e invasa dai fascisti, tentano la sorte prima a Parma, dove moriranno i due figli piccoli, poi a Rimini dove nel 1926, in piena epoca fascista, nasce Miranda, e infine a Verona. Qui cresce Miranda sempre divisa tra due lingue, due paesi e la sensazione di essere una straniera in entrambi. Lasciandosi guidare da quel dialetto bumbaro che è soprattutto lingua del ricordo, Francesca Silvestre si ispira a episodi personali per raccontare l’esodo istriano della famiglia materna a partire da Dignano d’Istria (Storie bumbare). Due narrazioni intime che diventano memoria collettiva, testimonianze di eterne divisioni e lutti, come racconteranno a Mantova al giornalista Christian Elia."},{"n":"54","t":"UNA CITTÀ IN FORMA DI VIRGILIO","p":[["Stefano Scansani",0]],"raw":"Stefano Scansani","s":"percorsi","d":"gio","h":"18:30","l":"piazza virgiliana","pr":"10,00 €","tg":["Mantova e territorio","storia","viaggi e luoghi"],"f":["percorso/visita"],"de":"Duemila anni di fortuna letteraria universale in seicento metri mantovani. Monumenti onorari, miti fondativi, devozioni popolari, gironi danteschi, luoghi interattivi fra pietre e strade, cresciuti insieme all’isola del Mincio. Dal monumento novecentesco di piazza Virgiliana al Museo, inaugurato nel 2024 per immaginare la città com’era al tempo del Poeta, la “parva Mantua”, e quindi scoprire dove s’intersecano e incontrano ancora Virgilio e Dante Alighieri, Sordello e Baldassarre Castiglioni, Petrarca e Teofilo Folengo, Shakespeare e Seamus Heaney. E alla fine che succede? Nonostante il volto di Virgilio sia inafferrabile, esso emerge e si fa esplorare nella morfologia letteraria di Mantova. Il racconto passeggiante, e un po’ straniante, è con Stefano Scansani. Il percorso partirà dal monumento di Virgilio in piazza Virgiliana e si concluderà al Museo Virgilio al Palazzo del Podestà. La durata complessiva prevista è di 1h 30’ circa. Si consigliano scarpe comode e una scorta d’acqua, nel caso di temperature elevate."},{"n":"55","t":"L’AMORE È PRESENZA","p":[["Stefano Rulli",0],["Marina Viola",0],["Massimo Cirri",1]],"raw":"Stefano Rulli e Marina Viola con Massimo Cirri","d":"gio","h":"18:30","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["salute e medicina","mente e psicologia","memoria e biografia"],"de":"Dagli anni Ottanta a oggi l’incidenza delle diagnosi di autismo nei nuovi nati è aumentata di duecento volte: le famiglie che crescono figlie e figli neurodivergenti hanno bisogno di strategie condivise e azioni innovative per sostenere terapie e ricerca e spesso il sistema sanitario e quello scolastico non hanno i mezzi per fornire il supporto pratico necessario. La scrittrice Marina Viola (Il volo del tacchino) e lo sceneggiatore e regista Stefano Rulli (Il figlio più bello, Un silenzio particolare) sono entrambi genitori di figli con disturbo dello spettro autistico e si confrontano su rinunce e paure, ma anche scoperte e gioie vissute nel loro percorso familiare. Insieme allo psicologo e giornalista Massimo Cirri spiegheranno perché “forse il punto non è diventare qualcuno, ma essere se stessi, stare bene nel mondo”. Evento realizzato in collaborazione con Fondazione Futuro e Associazione Casa del Sole Onlus."},{"n":"56","t":"L’ECO CHE NON SI SPEGNE","p":[["Mario Andreose",0],["Davide Ferrario",0],["Elisabetta Sgarbi",0],["Anna Maria Lorusso",1]],"raw":"Mario Andreose, Davide Ferrario ed Elisabetta Sgarbi con Anna Maria Lorusso","d":"gio","h":"18:30","l":"teatro bibiena","pr":"7,50 €","tg":["narrativa","editoria e traduzione","filosofia e idee"],"de":"Umberto Eco è senza dubbio una delle figure centrali della letteratura internazionale del Novecento, capace di plasmare i mondi del libro e dell’accademia tramite la sua attività di studioso della cultura di massa. “A voler trovare connessioni, se ne trovano sempre…” scriveva Eco ne Il pendolo di Foucault e, a dieci anni dalla sua scomparsa, si incontrano, per ricordarlo e seguire la fitta ragnatela di un lascito che sa unire cultura alta e bassa, Mario Andreose ed Elisabetta Sgarbi – legati allo scrittore piemontese da lungo sodalizio editoriale – e Davide Ferrario, regista dei documentari Umberto Eco: la biblioteca del mondo e Pensiero in movimento, che raccontano l’immensa collezione di libri dell’autore di Baudolino. Dialoga con loro Anna Maria Lorusso, docente di Semiotica presso l'Università di Bologna."},{"n":"57","t":"VA’ E RIPARA LA MIA CHIESA","p":[["Alessandro Barbero",0]],"raw":"Alessandro Barbero","d":"gio","h":"18:45","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["storia","religione e spiritualità"],"de":"La sera del 3 ottobre 1226 “sorella Morte” accolse tra le sue braccia Giovanni di Pietro di Bernardone, figura tra le più importanti della cristianità, universalmente conosciuto come Francesco d’Assisi. Alessandro Barbero, in occasione degli 800 anni dalla morte del patrono d’Italia, ha compiuto nel suo San Francesco un vasto lavoro di ricostruzione storica sulle versioni scomparse delle sue biografie, per tentare di districarsi tra le fonti contraddittorie giunte fino a noi. Promotore del dialogo interconfessionale, pauperista, ambientalista, poeta… Qual è la versione più rispondente alla realtà dell’autore del Cantico delle creature? Tra mito, fake news e documenti d’archivio, Barbero guiderà il pubblico del Festival alla ri-scoperta del “giullare di Dio”."},{"t":"NERI SPIRITI DELLA FORESTA","p":[["Luca Crovi",0]],"raw":"Luca Crovi","s":"accenti","d":"gio","h":"19:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["fantastico e horror","storia","miti e fiabe"],"de":"Ci fu un tempo in cui anime eccelse come quelle di Marco Aurelio e Lucio Vero vennero duramente messe alla prova. Un tempo in cui selve, villaggi e città dell’Impero Romano pullulavano di Marcomanni in guerra, e in cui la paura dell’altro regnava sovrana insieme alla peste Antonina e a indecifrabili maledizioni nascoste nella foresta. Un tempo lontano, incredibilmente vicino, che Luca Crovi reimmagina come un moderno Galeno nel romanzo L’aquila e i lupi, solcando insieme a lettrici e lettori le acque oscure del Danubio."},{"n":"58","t":"IL LAVORO NON TI AMA","p":[["Luigi Chiarella",0],["Luca Giommoni",0],["Eleonora C. Caruso",1]],"raw":"Luigi Chiarella e Luca Giommoni con Eleonora C. Caruso","s":"avere trent'anni","d":"gio","h":"19:00","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["economia e lavoro","narrativa"],"de":"Non molto tempo fa i trentenni andavano in qualche grande capitale europea a fare i camerieri. Nel libro di Luigi Chiarella, il protagonista finisce tra il personale di sala di ristoranti italiani a Vienna, coacervi di stereotipi. C’era forse un tempo in cui il lavoro amava i trentenni, e loro amavano il lavoro – ma appare molto lontano. Magari, come immagina Luca Giommoni, in un futuro prossimo manderemo i disoccupati indietro nel tempo, per trovare loro un impiego che nel presente non esiste. In questa progressiva distanza e trasformazione, si è persa la dimensione collettiva e ha preso il suo posto invece l’alienazione dell’individuo in forme sempre più frammentate. Tra fantascienza e memoria personale, Luigi Chiarella (Risto Reich) e Luca Giommoni (Nero) si confrontano su due generazioni di giovani lavoratori inchiodati a lavori precari e mal pagati, con pochi diritti e sfruttati. Li accompagna in questa conversazione Eleonora C. Caruso (Backroom)."},{"n":"59","t":"MI RITROVAI PER UNA SELVA OSCURA","p":[["Pilar Quintana",0],["Ludovica Lugli",1]],"raw":"Pilar Quintana con Ludovica Lugli","d":"gio","h":"19:15","l":"aula magna dell'universita","pr":"7,50 €","tg":["narrativa","fantastico e horror"],"de":"Quando pensiamo al romanzo gotico, ci immaginiamo cupi castelli battuti dalla pioggia e circondati da foreste che sembrano dipinte in bianco e nero. Pilar Quintana, vincitrice della XVI edizione del Premio IILA-Letteratura, ha trasportato nella giungla verde del Sudamerica ciò che potremmo definire “gotico tropicale”: attraverso gli sguardi di madri, figlie e compagne la scrittrice colombiana racconta universi familiari in cui il meccanismo inceppato degli affetti è “una tormentosa abitudine, che si trasmette attraverso le generazioni”. E, d’altra parte, l’autrice del recente Notte nera, che ha vissuto per nove anni nella foresta pluviale, ne conosce bene le insidie: “Credo che ci metta a confronto con la nostra ombra. A noi piace molto il nostro lato luminoso, nella selva dobbiamo incontrare anche il buio”. Di letteratura, femminismo, violenza di genere e del potere della natura Quintana discute insieme alla giornalista Ludovica Lugli.","no":"L’autrice parlerà in spagnolo, con interpretazione consecutiva in italiano. In collaborazione con IILA – Organizzazione Internazionale Italo-Latino Americana."},{"n":"60","t":"IL RICHIAMO DELL’ABISSO: DA “L’ORRORE DI DUNWICH”","p":[["Compagnia della Lettura",0],["Luca Scarlini",0],["Spartaco Cortesi",0]],"raw":"un’installazione sonora con le voci della Compagnia della Lettura adattamento di Luca Scarlini; musiche e suoni di Spartaco Cortesi","s":"i miti oscuri di h.p. lovecraft","d":"gio","h":"19:30","l":"sotterranei del castello di san giorgio","pr":"7,50 €","tg":["fantastico e horror","musica","teatro e performance"],"de":"Certe storie si ascoltano al buio, in mezzo a impossibili chiarori verdastri, dove ogni fuoco è spento e gli Antichi risuonano insieme al canto sinistro dei caprimulgi. Qui si racconta ciò che accadde agli abitanti di un misero villaggio del Massachusetts, quando gli uomini di una famiglia blasfema divorarono i formulari del Necronomicon, il Maledetto tra i libri maledetti, spalancando una porta su abissi senza fondo. Dalla valle del Miskatonic alle paludi del Mincio, nelle segrete gonzaghesche che raccolsero secoli di preghiere e maledizioni, Luca Scarlini, Spartaco Cortesi e le voci della Compagnia della Lettura vi regalano una manciata di minuti inquieti, rievocando dal tramonto alla notte le epifanie degli Antichi tratte da uno dei migliori racconti lovecraftiani. L’installazione sonora sarà aperta da giovedì 10 a sabato 12 settembre, in 6 turni giornalieri della durata di 40 minuti ciascuno, con un massimo di 30 partecipanti per turno. Al momento dell’acquisto del biglietto si potranno scegliere giorno e orario del proprio turno, che non saranno in alcun modo modificabili. Orari di accesso: 19:30; 20:10; 21:00; 21:40; 22:20; 23:00. Si raccomanda la massima puntualità. L’ingresso sarà dal prato del Castello di San Giorgio.","no":"Su I miti oscuri di H.P. Lovecraft vedi p. 153"},{"t":"DAL BALCONE","st":"più un affaccio che un concerto","p":[["Dente",0]],"raw":"Dente","d":"gio","h":"19:45","l":"piazza concordia","pr":"ingresso libero","tg":["musica"],"f":["spettacolo/lettura"],"de":"Maestro del gioco di parole e dell’ironia malinconica, Dente è una delle voci storiche dell’indie italiano, anzi uno dei suoi “padri nobili”. Da Anice in bocca al recente Santa tenerezza, l’artista di Fidenza ha fatto dell’amore e delle sue complicazioni la materia delle sue canzoni. Dall’alto del balcone, farà scendere sulla piazza fatta platea una manciata di brani scelti."},{"t":"LA SICILIA TRA LETTERATURA E POLITICA","p":[["Maria Attanasio",0]],"raw":"Maria Attanasio","s":"accenti","d":"gio","h":"20:30","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["poesia","politica e attualità","storia"],"de":"L’impegno politico e la ricerca storica sono fondativi della vasta opera di Maria Attanasio (La rosa inversa): la poetessa e scrittrice di Caltagirone da sempre è impegnata a sottrarre all’oblio esistenze marginalizzate, attraverso il recupero di figure storiche dimenticate, soprattutto femminili, la cui riscoperta permette una comprensione più profonda non solo del passato, ma anche della Sicilia contemporanea."},{"t":"BLURANDEVÙ","p":[["Rita Petruccioli",0]],"raw":"Rita Petruccioli","d":"gio","h":"20:45","l":"seminario vescovile - aula magna","pr":"ingresso libero","tg":["fumetto e illustrazione","fantastico e horror"],"de":"Non è compito facile portare Euripide nello spazio, eppure Rita Petruccioli è riuscita nell’impresa di trasformare Medea in un fumetto di fantascienza: l’illustratrice e fumettista romana è abile cantrice di sogni, speranze e paure degli adolescenti, che riesce a trasportare – nel guizzo di un segno a matita – dal Rinascimento (Isa vince tutto, Isa vince ancora) all’antica Roma (Eneide), passando per i più classici viaggi on the road (Ti chiamo domani) o tra i sentimenti A Blurandevù, questa volta a parti invertite, confiderà i suoi sogni, le sue speranze, le sue paure, conscia della necessità del fumetto di scardinare gli stereotipi e di sapersi immedesimare nel punto di vista altrui."},{"n":"61","t":"LA MIA PICCOLA PATRIA, DIETRO LA LINEA GOTICA","p":[["Giovanni Lindo Ferretti",0],["Davide Ferrario",1],["Michele Rossi",0]],"raw":"Giovanni Lindo Ferretti con Davide Ferrario e Michele Rossi","d":"gio","h":"21:00","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["musica","storia","memoria e biografia"],"de":"Nel 1996 i CSI – Consorzio Suonatori Indipendenti pubblicano Linea Gotica, un album che a trent’anni di distanza resta uno dei più importanti e influenti della musica italiana degli ultimi decenni. Il disco mette a fuoco l’essenza dei CSI: una formazione che non somiglia a nessun’altra, capace di tenere insieme la durezza del punk e la solennità di una preghiera. Di questa epopea il critico e studioso Michele Rossi è stato testimone e – nel recente Ho visto un’alba blu. Un racconto letterario dei CSI – narratore e cronista. Come lo è stato il regista Davide Ferrario, che accompagna e filma la band da quasi trent’anni: dal documentario Sul 45° parallelo (1997) fino al film che oggi sta dedicando alla loro tournée. In piena, attesissima reunion dei CSI, Giovanni Lindo Ferretti torna a Mantova – dove era stato ospite della prima edizione del Festival, nel 1997 – per riattraversare, insieme a questi due compagni di viaggio, una delle vicende musicali più radicali della storia italiana."},{"n":"62","t":"SUL MARE SVENTOLA BANDIERA GIALLA","p":[["Cristina Cassar Scalia",0],["Valentina Fornelli",0],["Luigi Caracciolo",1]],"raw":"Cristina Cassar Scalia e Valentina Fornelli con Luigi Caracciolo","d":"gio","h":"21:00","l":"palazzo san sebastiano","pr":"7,50 €","tg":["giallo e noir","migrazioni e confini","viaggi e luoghi"],"de":"La distanza in linea d’aria tra Catania e il punto più vicino delle coste algerine è di appena settecento chilometri, ma la distanza letteraria che separa le loro calde spiagge è più breve ancora. Vanina Guarrasi è vicequestore della Squadra mobile di Catania, Carla Berio è investigatrice privata in Algeria: le due donne sono separate dal Mediterraneo, ma accomunate dalla passione per le indagini e sono le protagoniste dei romanzi gialli di Cristina Cassar Scalia (Le terme dell’indirizzo, Mandorla amara, Sabbia nera) e Valentina Fornelli (al suo esordio con La costellazione del pesce). Siete pronti a farvi traghettare nei vicoli di Algeri e sotto i bastioni del Castello Ursino? A navigare con le autrici sarà Luigi Caracciolo."},{"n":"63","t":"LESSICO MIGRANTE MEDITERRANEO","p":[["Equipaggio della Tanimar",0],["Christian Elia",1]],"raw":"Equipaggio della Tanimar con Christian Elia","d":"gio","h":"21:00","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["migrazioni e confini","lingua e parole","media e giornalismo"],"de":"“Sulle migrazioni si è costruita una narrazione tossica, che poi si radica attraverso un insieme di parole che circolano in continuazione e che saturano l’immaginario collettivo” spiega l’equipaggio della Tanimar, barca a vela utilizzata da un gruppo di ricercatori e ricercatrici per studiare la mobilità migrante nel Mediterraneo. Per cercare di invertire la rotta della prospettiva lessicale egemonica, raccontando il viaggio a partire da un linguaggio nato come forma di resistenza, gli antropologi del due alberi hanno individuato 42 parole (Controdizionario del confine) che appartengono alla lingua franca di chi attraversa il mare. Sono termini ibridi dalla forte stratificazione semantica, frutto di una mescolanza di differenti lingue ed esperienze, che restituiscono un punto di vista diverso da quello del mondo dei media e della politica. Incontra l’equipaggio della Tanimar il giornalista Christian Elia."},{"n":"64","t":"[ÒDIO]","p":[["Motus",0],["Marianna Albini",0]],"raw":"un film / documentario di Motus | Italia, 2026, 90’ presentano il film i registi con Marianna Albini","d":"gio","h":"21:00","l":"cinema oberdan","pr":"7,50 €","tg":["cinema e tv","teatro e performance","diritti e società"],"de":"Cosa significa per te la parola Odio? Senti di odiare qualcuno o qualcosa? [ÒDIO] è un’opera polifonica che risuona come drammaturgia corale: è un tessuto di sguardi e testimonianze contrastanti sul dilagare della violenza, emerso dall’incontro con decine di giovani di diverse nazionalità e background. [ÒDIO] è l’approdo finale della lunga ricerca teatrale dei Motus sul romanzo Frankenstein (o il Moderno Prometeo) di Mary Shelley, iniziata nel 2023, ed è anche un viaggio nella “darkness” contemporanea, infestata da rigurgiti fascisti e autoritari, per provare a comprendere – come scrive Şeyda Kurt – e non solo condannare. È un invito a immaginare, nonostante “tutta la merda che ci circonda”, una società di tenerezza radicale."},{"t":"DOMINARE","p":[["Dario Bassani",0]],"raw":"Dario Bassani","s":"lavagne – meccaniche di gioco","d":"gio","h":"21:00","l":"piazza mantegna","pr":"ingresso libero","tg":["gioco","filosofia e idee"],"f":["lezione"],"de":"In questa prima lavagna dedicata ai giochi da tavolo, alla loro storia e soprattutto a come influenzano il nostro stare al mondo, Dario Bassani (Giocare alla guerra) racconta la nascita e la diffusione di quei giochi che mettono al centro il dominio e la conquista: giochi in cui l’obiettivo è espandersi, sconfiggere gli avversari, controllare il territorio. Dai classici come Risiko ai wargame più sofisticati, Bassani esplora cosa ci dice questa famiglia di giochi sul modo in cui immaginiamo il conflitto, il potere e la vittoria (e perché continuiamo a trovarli così avvincenti)."},{"n":"65","t":"QUANDO LA BOCCA DIVENTA BECCO","p":[["Jean Boucault",0],["Johnny Rasse",0],["Silvia Mengali",1]],"raw":"Jean Boucault e Johnny Rasse con Silvia Mengali","s":"kaléidoscope français","d":"gio","h":"21:00","l":"tempio di san sebastiano","pr":"7,50 €","tg":["natura e animali","musica","infanzia ed educazione"],"de":"Puli puli puli pu fa il tacchino/qua qua qua qua l’ochetta cantavano Cochi e Renato… se però volete conoscere dei veri esperti nell’imitare i versi dei volatili, l’incontro con il duo francese formato da Jean Boucault e Johnny Rasse, conosciuti come les chanteurs d’oiseaux, saprà soddisfare la vostra curiosità. Cresciuti insieme tra i pascoli nel nord della Francia, in un villaggio visitato ogni anno da oltre trecento specie migratorie, fin da piccoli hanno imparato a trasformare fischi e vocalizzi in suoni che rispecchiano in tutto e per tutto gorgheggi e cinguettii degli uccelli, partecipando – prima da rivali e poi da amici – alle gare di canto ornitologico a livello locale ed europeo. Di questa passione condivisa, divenuta collaborazione lavorativa e vera forma d’arte, gli autori di Quando imparammo a cantare come gli uccelli raccontano alla libraia Silvia Mengali, facendoci immergere nella natura, in volo tra le nubi bianche e le fronde degli alberi.","no":"Gli autori parleranno in francese, con interpretazione consecutiva in italiano."},{"n":"66","t":"IL VOLO E LA GABBIA","p":[["Claudia Durastanti",0],["Nadeesha Uyangoda",0]],"raw":"Claudia Durastanti e Nadeesha Uyangoda","d":"gio","h":"21:15","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["narrativa","scrittura e lettura"],"de":"“Il Saggio, d’altronde, è il volo libero che non deve render conto a nessuna gabbia narrativa; è l’appagamento che una mente trova in sé stessa dopo essersi posata sul mondo”, scrive Claudia Durastanti in Falsi amici. Dopo avere frequentato le diverse forme della narrazione – dal racconto breve, al romanzo, all’autofiction –, l’autrice di La straniera e Missitalia fa un ulteriore passo e approda alla forma saggistica pura, per affrontare temi come la classe sociale, il linguaggio, l’identità e la maternità. Al suo percorso se ne intreccia uno di segno opposto. Nadeesha Uyangoda arriva alla narrativa dopo i saggi L’unica persona nera nella stanza e Corpi che contano: con Acqua sporca, il suo fortunato romanzo di esordio, ha attraversato il confine verso la finzione, che le concede “una libertà che la saggistica, per sua stessa postura, non permette”. Eppure ritrova lì gli stessi nodi: la classe, la lingua, la maternità, l’identità. Due autrici a confronto, due traiettorie speculari alla ricerca, in fondo, della stessa libertà. Come a dire che ogni forma diventa gabbia, e ogni passaggio di confine è un modo di tornare liberi."},{"n":"67","t":"OPERAZIONE MASSACRO","p":[["Rodolfo Walsh",0],["Mauro Pescio",0]],"raw":"Rodolfo Walsh raccontato da Mauro Pescio","d":"gio","h":"21:30","l":"teatro bibiena","pr":"15,00 €","tg":["media e giornalismo","storia","narrativa"],"de":"Operazione Massacro è il libro che ha inaugurato il giornalismo narrativo, anticipando di alcuni anni A sangue freddo di Truman Capote. Tutto parte da una frase che Rodolfo Walsh, giornalista e appassionato di scacchi, raccoglie per caso in un caffè di La Plata: “uno dei fucilati è ancora vivo”. Siamo nell’Argentina del 1956, e quelle parole riportano alle esecuzioni sommarie di civili seguite alla rivolta dei generali Tanco e Valle contro la giunta militare che aveva da poco deposto Perón. L’insurrezione era stata repressa sanguinosamente e nessuno aveva più avuto il coraggio di parlarne, ma a partire da quella frase Walsh inizia a indagare, a cercare i sopravvissuti, a riannodare i fili di questa oscura vicenda, arrivando a pubblicare la sua inchiesta prima a puntate sulla rivista Mayoría e successivamente in un libro destinato a diventare un classico. Mauro Pescio riattraversa Operazione Massacro dando nuova vita ai suoi umanissimi protagonisti travolti dalla Storia, in una presentazione che restituisce forza e attualità alla limpida lezione di impegno civile lasciata dal giornalista argentino. Una produzione SUR."},{"t":"IL MEGLIO CHE SI PUÒ LEGGERE","p":[["Ermanno Cavazzoni",0],["Maria Arampatzi",1]],"raw":"Ermanno Cavazzoni con Maria Arampatzi","s":"accenti","d":"gio","h":"21:30","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["narrativa","musica"],"de":"Una serata dedicata ai fan di musica da balera e di letteratura comica, stralunata, delicatamente surreale. Ermanno Cavazzoni torna sulla pista degli accenti per leggere i suoi autori prediletti, accompagnato dalla fisarmonica di Maria Arampatzi."},{"n":"68","t":"INTELLIGENZA ARTIFICIALE E PERCEZIONE DEL SÉ","p":[["Vittorio Gallese",0],["Mario Desiati",1]],"raw":"Vittorio Gallese con Mario Desiati","d":"gio","h":"21:30","l":"aula magna dell'universita","pr":"7,50 €","tg":["tecnologia e IA","mente e psicologia","filosofia e idee"],"de":"Nella recente enciclica Magnifica humanitas, papa Leone XIV ha trattato un tema oggi ampiamente dibattuto, quello del nostro rapporto con l’intelligenza artificiale: “Da neuroscienziato cognitivo, considero particolarmente importante il fatto che il Papa rifiuti una concezione puramente strumentale della tecnica. L’IA non è descritta come qualcosa di esterno all’umano, ma come una dimensione ormai intrecciata con la nostra vita quotidiana” afferma Vittorio Gallese. L’autore di Il sé digitale ha a lungo studiato l’incidenza delle nuove tecnologie sulla nostra percezione, analizzando la capacità di elaborare sensazioni e relazioni in un mondo sempre più pervaso da versioni incorporee dell’individuo e da ricordi (per non dire pensieri!) dettati da algoritmi. Di questi “fantasmi relazionali”, la nuova alterità introdotta dall’IA, Gallese ragiona insieme allo scrittore Mario Desiati (Malbianco)."},{"t":"VOLUME!","p":[["Wunder Tandem",0]],"raw":"Wunder Tandem","d":"gio","h":"22:00","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["musica"],"de":"Sassy-dizzy-disco-pinkpunk? Due voci, una fisarmonica e un mini drum set: le Wunder Tandem sono un duo dall’animo disco-punk, cross-gender e leopardato. Nella notte di piazza Alberti mescoleranno il patinato e lo spettinato, proporranno l’improponibile e metteranno tutti a ballare con i loro scriteriati mash-up. La copertina del catalogo è stampata su Offset Premium Soporset 300 g/m2. Gli interni sono stampati su Offset Premium"},{"n":"69","t":"YOGA PER LEGGERE","p":[["Susanna Binelli",0]],"raw":"Susanna Binelli","d":"ven","h":"8:00","l":"casa del mantegna","pr":"7,50 €","tg":["corpo e benessere"],"de":"Trascorrere ventiquattr’ore all’inseguimento di autrici e autori, sottoposti alle più disparate sollecitazioni letterarie, può risultare davvero impegnativo anche per le lettrici e i lettori più inclini al sacrificio. Susanna Binelli ci invita a iniziare le nostre giornate al Festival con una pratica gentile che dona energia, regola il sistema nervoso, e rende la mente attenta e ricettiva. Nella prima parte dell’evento verrà risvegliato il corpo con esercizi di Pranayama (respirazione), Surya Namaskar (saluti al sole) e Vinyasa (brevi sequenze); nella seconda si esploreranno posizioni da tenere più a lungo, anche durante la lettura! L’attività è aperta anche ai principianti. Si pratica scalzi con abiti comodi, adatti al movimento. Si consiglia di portare una bottiglietta d’acqua e un tappetino."},{"n":"70","t":"“TUTTO IL MONDO È VEDOVO”. PER AMELIA ROSSELLI","p":[["Stefano Bottero",0],["Francesco Brancati",0],["Chiara Portesine",0]],"raw":"Stefano Bottero, Francesco Brancati e Chiara Portesine","d":"ven","h":"10:00","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["poesia"],"de":"In occasione dell’anniversario della sua morte, Festivaletteratura dedica un incontro alla poesia di Amelia Rosselli, una delle voci più rilevanti della poesia italiana, tra le più radicali del Novecento europeo. Nell'opera di Rosselli il plurilinguismo, l’esilio e la dislocazione non sono semplici condizioni biografiche o temi di riflessione, ma elementi strutturali della lingua stessa, che si frantuma, si ricompone, devia continuamente rispetto a ogni forma di stabilità. La sua scrittura nasce dentro una tensione costante tra ordine e scarto, tra ritmo e interruzione, in cui la storia – personale e collettiva – si deposita come materia instabile, mai definitivamente risolta. Ripercorrerne l’opera significa allora confrontarsi con una lingua che non descrive il mondo ma lo attraversa in stato di crisi, trasformando l’irrequietezza storica e biografica in una straordinaria avventura formale. Intervengono la critica Chiara Portesine e i critici Stefano Bottero e Francesco Brancati."},{"n":"71","t":"ELETTRIZZANTE!","p":[["Federico Appel",0]],"raw":"Federico Appel","s":"la casetta editrice","e":"dai 7 ai 10 anni","d":"ven","h":"10:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["infanzia ed educazione","fumetto e illustrazione","editoria e traduzione"],"f":["per bambini"],"de":"Avete presente Mr. Frik? Un tipo lungo lungo, carnagione verde brillante, un sorrisone da ottanta denti se non di più? Questo enigmatico coccodrillo che attraversa molte delle storie scritte e illustrate da Federico Appel (La mossa del coccodrillo, Ma il leone non c’era) sarà il protagonista del libro collettivo che andremo a creare in questo laboratorio. Poche parole, ma moltissimo colore: ogni partecipante dovrà occuparsi di un capitolo con matite, pennelli e tempere. Le tavole prodotte andranno a formare uno leporello quasi infinito, con un colpo di scena a ogni piega!","no":"Su La casetta editrice vedi p. 125"},{"n":"72","t":"MASCHERE MATTE E MOSTRI DA PASSEGGIO","st":"laboratorio di fantazoologia da parata","p":[["Ruggge",0]],"raw":"Ruggge","e":"dagli 8 ai 12 anni","v":"vedi n. 1","d":"ven","h":"10:00","l":"cappella di palazzo del mago","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["arte e fotografia","miti e fiabe","infanzia ed educazione"],"f":["per bambini","laboratorio"]},{"t":"IL NOIR ALL’ESPERTO","p":[["Fabio Federici",0],["Paolo Boldrini",1]],"raw":"Fabio Federici con Paolo Boldrini","s":"accenti","d":"ven","h":"10:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["giallo e noir"],"de":"Fabio Federici (Il se e il ma delle investigazioni) ha una lunga carriera investigativa alle spalle: colonnello dell’Arma dei Carabinieri e criminologo, si è occupato negli anni di numerose inchieste in materia di criminalità organizzata. Dopo numerosi saggi arriva al romanzo con Il pigiama rosa e racconterà ai presenti come dal mestiere e dall’esperienza possa nascere un noir in cui ogni indizio ruota su ingranaggi ben oliati."},{"t":"MEGLIO DI UN ROMANZO","st":"1. pitching in piazza","p":[["Annalisa Camilli",0],["Simone Pieranni",0],["Christian Elia",1]],"raw":"Annalisa Camilli e Simone Pieranni con Christian Elia","d":"ven","h":"10:00","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["media e giornalismo","scrittura e lettura"],"f":["lezione"],"de":"Tornano le lezioni di giornalismo a cielo aperto di Meglio di un romanzo. La valutazione di due progetti di reportage narrativo presentati da giovani under 30 che hanno risposto alla call for papers 2026 sarà l’occasione per discutere di come partire da una storia raccolta o da uno spunto di cronaca per sviluppare un progetto giornalistico di più ampio respiro. Giudici della sessione di pitching saranno Annalisa Camilli (Divieto di protestare) e Simone Pieranni, autore dei podcast Altri Orienti e Fuori da qui."},{"n":"73","t":"LEGGERE LE CARTE DELLA MIGRAZIONE","p":[["Equipaggio della Tanimar",0]],"raw":"Equipaggio della Tanimar","s":"lezioni orizzontali - in gioco","d":"ven","h":"10:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["migrazioni e confini","media e giornalismo","gioco"],"f":["lezione"],"de":"Nel racconto per numeri e stereotipi che caratterizza gran parte dell’informazione sui movimenti migratori nel Mediterraneo, faticano a trovare spazio non soltanto le storie individuali, ma soprattutto le prospettive, gli immaginari e le forme di solidarietà che accomunano le esperienze di chi affronta il viaggio. Nelle loro ricerche a bordo delle navi di soccorso e nei centri di accoglienza, gli antropologi e antropologhe dell’equipaggio della Tanimar hanno raccolto una serie di parole ibride elaborate dai migranti, i lemmi di una lingua franca del mare usata insieme come strumento di sopravvivenza e di autorappresentazione (Controdizionario del confine). Nella lezione orizzontale queste parole diventano un mazzo di carte disposto sul tavolo per riflettere collettivamente sui temi del confine e della migrazione. Guidati dall’equipaggio, i partecipanti saranno stimolati a mettere in connessione le carte per cercare di dare vita a un racconto nuovo."},{"n":"74","t":"NULLA SI CREA, NULLA SI DISTRUGGE","p":[["Roberto Battiston",0],["Marco Faggioli",1]],"raw":"Roberto Battiston con Marco Faggioli","d":"ven","h":"10:30","l":"basilica palatina di santa barbara","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["scienza","ambiente e clima"],"de":"Dall’infinitamente piccolo delle cellule del corpo umano, fino all’infinitamente grande dei pianeti del cosmo, c’è una costante che permette il funzionamento di ogni cosa: l’energia. Motore di tutto ciò che avviene attorno a noi, che si parli di produzione industriale, nutrizione o astrofisica; spesso viene data per scontata, ma la politica di gestione delle sue fonti è un campo cruciale per l’umanità e per l’ambiente che la circonda. “Oggi ne conosciamo le leggi con precisione, ma spesso le ignoriamo nel momento di decidere come produrre, consumare e distribuire risorse su un pianeta sempre più popolato e fragile. Comprendere che cos’è l’energia, come si trasforma e come si conserva significa saper leggere il presente e il futuro, dall’economia alla tecnologia, dall’industria alla nostra vita quotidiana” afferma il fisico e divulgatore scientifico Roberto Battiston (Energia), pronto a obbedire anche sul palco alle leggi della termodinamica."},{"n":"75","t":"LASSÙ NOI ESISTIAMO","p":[["Mikael Niemi",0],["Marco Malvaldi",1]],"raw":"Mikael Niemi con Marco Malvaldi","d":"ven","h":"10:30","l":"palazzo san sebastiano","pr":"7,50 €","tg":["narrativa","viaggi e luoghi","natura e animali"],"de":"“Fiumi e rivi presi al laccio / dell’inverno, son di ghiaccio” scriveva Ernesto Ragazzoni parlando dei “pacifici lapponi”. Nell’estremo nord della Svezia, territorio in cui vive la popolazione indigena dei Sami, si trova il piccolo paese di Pajala, dove risiede Mikael Niemi (Cucinare un orso, L’uomo che morì come un salmone, Musica rock da Vittula) e dove, quasi ne fosse coprotagonista, sono ambientate molte delle misteriose e tragicomiche vicende che prendono vita tra le pagine delle sue opere. Ispirato dalle memorie del bisnonno cacciatore e del padre poliziotto, Niemi è capace di spaziare dal noir urbano al romanzo storico ambientato nella fredda taiga, senza mai perdere l’ironia che permea i suoi scritti. Affiancato da Marco Malvaldi, l’autore di La pietra e la seta (in uscita a settembre) metterà in guardia i presenti dal dare eccessiva confidenza ai suoi conterranei: “non vi fidate mai di una superficie bionda con gli occhi azzurri che sorride”.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con Kulturrådet / Swedish Arts Council."},{"n":"76","t":"LETTER BIRBS","p":[["Giovanni Colaneri",0]],"raw":"Giovanni Colaneri","s":"laboratorio di calligrafia impertinente","e":"dai 6 ai 10 anni","d":"ven","h":"10:30","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["arte e fotografia","infanzia ed educazione","lingua e parole"],"f":["per bambini","laboratorio"],"de":"Dopo aver raccontato in breve le avventure dei pappagalli pazzerelli Katio e Leona, chi parteciperà al laboratorio si dedicherà – con l’aiuto di Giovanni Colaneri (Katio & Leona. Due pappagallini e un senso di colpa) – alla realizzazione di una o più lettere in stile prettamente impertinente come solo una vera calopsitta saprebbe fare. Non è necessario conoscere tutto l’alfabeto e nemmeno saper disegnare!"},{"n":"77","t":"GAZA TRA PASSATO E FUTURO","p":[["Paola Caridi",0],["Christian Greco",0]],"raw":"Paola Caridi e Christian Greco","e":"dai 12 anni","d":"ven","h":"11:00","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["geopolitica e guerre","storia","infanzia ed educazione"],"f":["per ragazzi"],"de":"La domanda è apparentemente semplice: cosa sappiamo davvero delle regioni che oggi sono teatro di conflitto? Palestina e Gaza sono molto più che scenari di guerra; sono terre che per millenni hanno fatto da crocevia tra Africa, Asia ed Europa, attraversate da commerci, popoli e idee. È questa stratificazione che rischia di andare perduta quando la Storia viene ridotta a strumento di legittimazione politica o a giustificazione archeologica per rivendicazioni territoriali. Per “restituire a questi territori la loro profondità storica e culturale e sottrarli a una lettura esclusivamente contingente”, la Fondazione Merz di Torino ha allestito la mostra “Gaza, il futuro ha un cuore antico”, che mette in dialogo artiste e artisti palestinesi contemporanei e antichi reperti custoditi al MAH di Ginevra e al Museo Egizio del capoluogo piemontese. Partendo da questo progetto, due voci si confrontano sul senso reale della memoria: Christian Greco – direttore del Museo Egizio di Torino – e l’esperta di Medio Oriente Paola Caridi (La voce di Gaza)."},{"t":"SENZA FINE","p":[["Davide Ferrario",0]],"raw":"Davide Ferrario","s":"accenti","d":"ven","h":"11:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["cinema e tv","filosofia e idee"],"de":"In un’epoca dominata dalla frenesia tecnologica e da una serialità televisiva in cui le storie vengono spesso interrotte bruscamente da logiche di ascolto, o frettolosamente rimaneggiate, il regista Davide Ferrario (La fine della fine) indaga come la perdita del finale stia trasformando il senso naturale della narrazione per immagini."},{"n":"78","t":"LE MASCHERE E LA STORIA","p":[["Olivier Guez",0],["Carlo Lucarelli",1]],"raw":"Olivier Guez con Carlo Lucarelli","s":"kaléidoscope français","d":"ven","h":"11:00","l":"teatro bibiena","pr":"7,50 €","tg":["narrativa","storia"],"de":"Una costante dell’opera letteraria di Olivier Guez è il filo sottilissimo che separa i fatti dalla dissimulazione, la pressione della realtà esteriore dall’ansia continua di reinventarsi: i suoi personaggi romanzeschi – per esempio l’avventuriera e diplomatica britannica Gertrude Bell raccontata in Mesopotamia, o il famigerato gerarca nazista protagonista del cupo La scomparsa di Josef Mengele – attraversano e determinano la Storia senza farsi mai catturare del tutto dalle sue maglie. Anche nel romanzo d'esordio Le rivoluzioni di Jacques Koskas, il narratore francese introduce uno spaesato antieroe dei nostri giorni, costretto suo malgrado a impersonare le contraddizioni di un tempo personale (e collettivo) in cui non riesce mai a trovare una collocazione. Questa, e molte altre identità scivolose, sono al centro della sua conversazione con il collega scrittore Carlo Lucarelli (Almeno tu).","no":"L’autore parlerà in italiano."},{"n":"79","t":"LE ISOLE DI ARMIN GREDER","p":[["Armin Greder",0],["Giulio Macaione",1]],"raw":"Armin Greder con Giulio Macaione","e":"dai 13 anni","d":"ven","h":"11:00","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["fumetto e illustrazione","migrazioni e confini","infanzia ed educazione"],"f":["per ragazzi"],"de":"“Sono nato nel 1942 in Svizzera, in una piccola città in cui i nomi delle strade sono scritti in tedesco e in francese, e dove non sai quale delle due lingue usare per rivolgerti a chi sta dietro al bancone del negozio… e così ho capito che la lingua non è il suono che fai quando parli, ma qualcosa che rende tangibili i tuoi pensieri”. Nato in Svizzera, emigrato in Australia, poi trasferitosi in Perù, Armin Greder oggi vive in Italia e dopo aver insegnato per anni design e illustrazione al Queensland College of Art, ha cominciato a illustrarli, i libri, prima quelli di altri autori, poi i suoi. Al suo lavoro sono state dedicate numerose mostre personali e collettive, dalla Germania al Giappone. Al Festival avremo la grande occasione di viaggiare nel percorso artistico di Armin Greder, a partire dalle sue opere – da L’isola ai recenti Poi sei arrivata tu e L’orsa maggiore – e insieme nella sua biblioteca letteraria e artistica, per conoscere le voci e le matite con cui ha dialogato e gli incontri che l’hanno via via reso la persona e l’artista che è diventato. Lo incontra il fumettista Giulio Macaione.","no":"L’autore parlerà in italiano."},{"n":"80","t":"L’OPERA D’ARTE NELL’EPOCA DELLA SUA RIPRODUCIBILITÀ ALGORITMICA","p":[["Alberto “Bebo” Guidetti",0],["Espérance Hakuzwimana",0],["Lorenzo Fantoni",1]],"raw":"Alberto “Bebo” Guidetti ed Espérance Hakuzwimana con Lorenzo Fantoni","d":"ven","h":"11:00","l":"aula magna dell'universita","pr":"7,50 €","tg":["musica","tecnologia e IA","arte e fotografia"],"f":["laboratorio"],"de":"La musica è stata la prima arte a essere completamente digitalizzata – da Napster a Spotify – e per questo, sostiene Alberto “Bebo” Guidetti, è il laboratorio perfetto per capire il capitalismo di oggi. In Il capitale musicale il musicista, tra i fondatori dello Stato Sociale, smonta la macchina: l’algoritmo non ci consiglia la musica, ma decide cosa esiste; non possediamo più musica, paghiamo un abbonamento per fruirne; e mentre il biglietto di un concerto costa quanto un mese d’affitto, al musicista restano frazioni di centesimo. Ma la “piattaformizzazione” tocca tutti i settori del lavoro culturale. Nell’economia dell’attenzione l’arte diventa “contenuto” e l’artista un “imprenditore di sé stesso” obbligato a coltivare un marchio personale; e il desiderio di “fare ciò che si ama” finisce per diventare una maschera della precarietà. Di tutto questo Guidetti discute con la scrittrice e attivista Espérance Hakuzwimana (Tutta intera) e con il giornalista ed esperto di cultura digitale Lorenzo Fantoni (Quel che non è salvato è perso)."},{"n":"81","t":"LE COLLEZIONI DI ALBI ILLUSTRATI RACCONTANO","p":[["James Bradburne",0],["Francesca Ferrari",1]],"raw":"James Bradburne con Francesca Ferrari","d":"ven","h":"11:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["fumetto e illustrazione","editoria e traduzione","arte e fotografia"],"de":"Quando James Bradburne era direttore della Pinacoteca di Brera e dell’annessa Biblioteca Braidense, quest’ultima ricevette due preziose donazioni: la collezione Adler di libri sovietici per l’infanzia e un corpus di volumi illustrati dei primi anni del XX secolo, appartenuti all’architetto viennese Otto Prutscher e alle sue figlie. Terreno di sperimentazioni grafiche e iconografiche, la letteratura per l’infanzia è sempre stata capace di raccontare il contesto sociale e i modelli culturali in cui era prodotta: insieme alla Fondazione Circi, Bradburne ha raccolto e analizzato un’altra straordinaria collezione, quella dello storico dell’arte russo Il’dar Galeyev. Riportando i presenti indietro nel tempo di un secolo, il curatore di Modernità inquieta. La collezione Il’dar Galeyev di libri sovietici per bambini parlerà di questo fenomeno unico, che vide operare insieme artisti e scrittori d’avanguardia. Lo incontra la direttrice delle biblioteche comunali di Mantova Francesca Ferrari."},{"n":"82","t":"DI QUA E DI LÀ DEL MARE","p":[["Pina Irace",0],["Elisabetta Mitrovic",0],["Silvia Mengali",1]],"raw":"Pina Irace ed Elisabetta Mitrovic con Silvia Mengali","e":"dai 9 ai 13 anni","d":"ven","h":"11:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["natura e animali","infanzia ed educazione","ambiente e clima"],"f":["per bambini"],"de":"Dalle creature minuscole che popolano i litorali ai cetacei che attraversano gli oceani, il mare accoglie milioni di specie viventi diverse, per non parlare delle creature fantastiche che, nei secoli, i popoli naviganti hanno immaginato muoversi nelle sue profondità. Proprio per questo è una miniera inesauribile di storie e insieme un territorio infinito di scoperte scientifiche. La scrittrice Pina Irace (La stanza delle sirene) e l’illustratrice naturalista Elisabetta Mitrovic (In alto mare) hanno entrambe il mare nel cuore e provano ad aprircelo un po’, in modo da riuscire a tuffarcisi dentro!"},{"n":"83","t":"ERRORI DA OSCAR","p":[["Manlio Castagna",0],["Nicola Lucchi",0]],"raw":"Manlio Castagna e Nicola Lucchi","e":"dai 13 anni","d":"ven","h":"11:00","l":"cinema oberdan","pr":"7,50 €","tg":["cinema e tv","infanzia ed educazione"],"f":["per ragazzi"],"de":"Un viaggio nel mondo del cinema raccontato attraverso i suoi errori più celebri: dai clamorosi problemi di continuità ai dettagli sfuggiti sul set, ogni “errore” diventa l’occasione per scoprire come nasce un film, quali sono i ruoli delle professioni che lo rendono possibile e come il linguaggio cinematografico si è evoluto nel tempo. Un laboratorio coinvolgente e ricco di curiosità, che invita il pubblico a guardare i film con occhi nuovi. A condurlo saranno gli scrittori Manlio Castagna, regista, seguitissimo critico cinematografico e autore di 160 film e serie tv da vedere prima dei 16 anni (ma anche dopo) e Cosa guardiamo stasera, e Nicola Lucchi, sceneggiatore ed esperto di storia del cinema che ha lavorato molti anni proprio a Hollywood."},{"n":"84","t":"NIEVO INCONTRA NIEVO","st":"2. il critico musicale e il visionario","p":[["Giovanni Bietti",0],["Emilio Russo",0],["Martina Dal Cengio",1]],"raw":"Giovanni Bietti ed Emilio Russo con Martina Dal Cengio","s":"tutto nievo minuto per minuto","d":"ven","h":"11:00","l":"biblioteca teresiana","pr":"7,50 €","tg":["narrativa","musica","Mantova e territorio"],"de":"In questo confronto in tre round di Ippolito Nievo con sé medesimo, oggi vedremo faccia a faccia l’intellettuale che frequenta i luoghi e gli avvenimenti culturali considerati all’epoca irrinunciabili, intervenendo al dibattito pubblico che ne nasce intorno, e il visionario che proietta tensioni, speranze e fallimenti del proprio tempo in un futuro remotissimo, inventandosi pioniere della fantascienza. A incarnare queste due anime di Nievo saranno il musicologo Giovanni Bietti (Ascoltare Verdi) ed Emilio Russo, curatore di una recente edizione della Storia filosofica dei secoli futuri. Conduce Martina Dal Cengio. Per Nievo incontra Nievo vedi n. 47; su Tutto Nievo minuto per minuto vedi p. 152"},{"n":"85","t":"SUL FILO DELL’OBBEDIENZA","st":"Predicazione e dissenso","p":[["Antonio Montefusco",0],["Michele Lodone",1]],"raw":"Antonio Montefusco con Michele Lodone","s":"la parola in piazza","d":"ven","h":"11:00","l":"tempio di san sebastiano","pr":"7,50 €","tg":["religione e spiritualità","storia","politica e attualità"],"de":"Chi può dare voce e imporre il silenzio? Nel Medioevo e nel Rinascimento la predicazione doveva essere autorizzata dalla Chiesa, impegnata nel frenare la diffusione delle dottrine dissidenti. Il rischio era di un conflitto sociale e religioso. Lo mostra la vicenda dei fraticelli, eredi degli spirituali francescani, che fanno della povertà assoluta il cuore della fedeltà a Francesco e al Vangelo, fino a mettere in discussione l’obbedienza dovuta alla gerarchia ecclesiastica. Ma la predicazione serve anche a combattere il dissenso: nel Quattrocento la riforma dell’Osservanza porta frati come Giovanni da Capestrano e Giacomo della Marca ad attraversare l’Italia e l’Europa per denunciare eretici, infedeli e nemici della fede. A raccontarci come la predicazione abbia contribuito a tracciare i confini dell’obbedienza sarà il filologo Antonio Montefusco. Lo incontra Michele Lodone.","no":"Su La parola in piazza vedi p. 183"},{"n":"503","t":"VALUTARE I LIBRI PER ADOLESCENTI","p":[["Alice Bigli",0],["Beatrice Masini",0],["Marco Magnone",1]],"raw":"Alice Bigli e Beatrice Masini con Marco Magnone","s":"libri in classe con read more– nel cantiere della letteratura giovanile","d":"ven","h":"12:00","l":"politecnico di milano - campus di mantova","pr":"ingresso gratuito con prenotazione","tg":["editoria e traduzione","infanzia ed educazione","scrittura e lettura"],"f":["laboratorio"],"de":"Come orientarsi nella vasta produzione dedicata a ragazzi e ragazze adolescenti? Alice Bigli, una delle guide più seguite e stimate nel panorama dell’educazione alla lettura, condivide le sue strategie con Beatrice Masini, che di scelte editoriali ne ha fatte moltissime, e con lo sguardo autoriale di Marco Magnone."},{"t":"IL FUOCO SACRO DELLA SCRITTURA","p":[["Samantha Bruzzone",0],["Marco Malvaldi",0],["Elsa Riccadonna",1]],"raw":"Samantha Bruzzone e Marco Malvaldi con Elsa Riccadonna","d":"ven","h":"12:00","l":"piazza dei libri","pr":"ingresso libero","ic":["streaming"],"tg":["scrittura e lettura","narrativa"],"no":"Sul Fuoco sacro della scrittura vedi p. 105"},{"t":"LA MIA STORIA CON LA LETTURA","p":[["Dente",0],["Mohamed Maalel",1]],"raw":"Dente con Mohamed Maalel","s":"read more – circuiti di lettura integrati","d":"ven","h":"12:00","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["scrittura e lettura"],"no":"Su La mia storia con la lettura vedi p. 101"},{"n":"86","t":"MOSTRI DAL PROFONDO","p":[["Bruno Tognolini",0],["Alice Bigli",1]],"raw":"Bruno Tognolini con Alice Bigli","e":"dagli 11 anni","d":"ven","h":"14:15","l":"casa del mantegna","pr":"7,50 €","tg":["miti e fiabe","fantastico e horror","infanzia ed educazione"],"f":["per ragazzi"],"de":"Dai tempi antichi, ogni civiltà ha raccontato e continua a raccontare di creature mostruose, che abitano sogni, incubi, storie e leggende. Un grande autore contemporaneo le ha liberate e messe al centro del suo ultimo romanzo. Cosa accade quando i mostri escono dagli spazi del mito e della favola ed entrano nel nostro presente o nel futuro? In compagnia di Alice Bigli, esperta di letteratura per ragazzi, Bruno Tognolini (Monsterium) racconterà come questi esseri siano arrivati ad abitare la sua immaginazione e a entrare – o a uscire? – nella/dalla sua storia."},{"n":"87","t":"ALBANIA, ALBUM DI FAMIGLIA","p":[["Lea Ypi",0],["Christian Elia",1]],"raw":"Lea Ypi con Christian Elia","d":"ven","h":"14:30","l":"palazzo san sebastiano","pr":"7,50 €","tg":["memoria e biografia","storia","politica e attualità"],"de":"Una vecchia foto, postata sui social da uno sconosciuto, diventa virale in Albania: ritrae i nonni di Lea Ypi in viaggio di nozze a Cortina d'Ampezzo nel 1941. Nei commenti qualcuno accusa la nonna Leman, figura amatissima, di essere stata una spia comunista, altri una collaborazionista fascista, altri ancora di entrambe le cose. Da quell’oltraggio nasce Dignità, in cui Ypi – filosofa politica alla London School of Economics – entra negli archivi della polizia segreta per ricostruire la vita della nonna. Quel che ne esce è un libro ibrido, a metà tra memoir e ricostruzione romanzesca dove, come nel precedente Libera, i ricordi familiari si stagliano sulle grandi vicende dell’Albania del Novecento: il tramonto dell’Impero ottomano – a cui apparteneva un pascià tra gli avi di Leman –, la nascita dello Stato albanese, con il bisnonno Xhafer primo ministro negli anni Venti e Trenta, fino al regime comunista che incarcera il nonno Asllan. Sotto la trama corre però un’indagine filosofica: che cos’è la dignità? A dialogare con lei, il giornalista Christian Elia (Grande Padre. Viaggio nella memoria dell’Albania).","no":"L’autrice parlerà in italiano."},{"n":"88","t":"ESISTE LA TECNOCRAZIA?","p":[["Carlo Galli",0]],"raw":"Carlo Galli","d":"ven","h":"14:30","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["filosofia e idee","politica e attualità","tecnologia e IA"],"de":"La saldatura tra tecnica e potere sussiste da tempi immemorabili, ma è nella modernità che acquista vigore ed è nel Novecento che diviene uno dei leitmotiv delle riflessioni di filosofi come Max Scheler e Martin Heidegger. È proprio quest’ultimo ad averci ricordato che la tecnica non è mai neutra, e deplorare élite tecnocratiche, o cervelloni artificiali che decidono le nostre sorti, è un modo pericoloso di schivare il vero problema: se la tecnica si fonde con l’utile, l’intero orizzonte dell’essere si riduce a un ammasso di risorse da sfruttare, umani compresi. Da qui prende le mosse anche il filosofo Carlo Galli – già docente di Storia delle dottrine politiche all’Università di Bologna – nel suo più recente lavoro (Tecnica) e in una lectio in cui la domanda principale non è se l’IA sia un destino ineluttabile, ma se il pensiero critico ecceda quello tecnico e possa ancora determinare il suo alleato fondamentale: l’agire politico."},{"n":"89","t":"LE SEPPIE, L’ARCHITETTURA E L’EUROPA CHE VIENE","p":[["Rita Elvira Adamo",0],["Annalisa Metta",1]],"raw":"Rita Elvira Adamo con Annalisa Metta","d":"ven","h":"14:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["città e architettura","politica e attualità","ambiente e clima"],"de":"L’Europa è attraversata da profonde differenze economiche, sociali, culturali e territoriali, spesso raccontate come fratture tra poli attrattivi e aree interne, mete e luoghi di partenza. Ma cosa accade quando queste polarizzazioni diventano occasioni per immaginare nuove forme di abitare e di costruire comunità? A partire dall’esperienza della Rivoluzione delle Seppie – fondata nel 2016 da un collettivo internazionale di architetti, artisti, grafici e professionisti della comunicazione, con base tra Londra e Belmonte Calabro –, il dialogo esplora il rapporto tra migrazione, ritorno, apprendimento e rigenerazione territoriale. Attraverso residenze, pratiche collettive e progetti che coinvolgono abitanti, nuovi arrivati e comunità temporanee, le Seppie sperimentano come trasformare territori da cui di solito si parte in luoghi di produzione culturale e sociale. Con Rita Elvira Adamo, architetta e docente tra Londra e la Calabria – o, come ama dire, tra ’nduja e fish and chips –, in conversazione con Annalisa Metta, rifletteremo su come la provincia possa diventare un laboratorio per immaginare il futuro dell’Europa, attorno e oltre i binomi centro/periferia, mobilità/radicamento, migrazione/ appartenenza, innovazione/tradizione."},{"n":"90","t":"IL LINGUAGGIO È MAI NEUTRALE?","p":[["Natasha Brown",0],["Nadeesha Uyangoda",1]],"raw":"Natasha Brown con Nadeesha Uyangoda","d":"ven","h":"14:30","l":"teatro bibiena","pr":"7,50 €","tg":["lingua e parole","narrativa","politica e attualità"],"de":"Nell’epoca della post-verità, le parole sembrano aver perso la loro innocenza: più che strumenti per raccontare il reale, diventano spesso mezzi per orientare il pubblico sentire, costruire consenso o occultare responsabilità. È proprio in questa frattura tra linguaggio e verità che si inserisce la riflessione di Natasha Brown (Universality), autrice britannica con un background di studi matematici che, attraverso i suoi romanzi, cerca di raccontare come il potere, il denaro e le parole creino dinamiche di forza capaci di piegare la narrazione alla base non solo della vita quotidiana, ma soprattutto della letteratura e del giornalismo. Per discutere di questo tema attualissimo e cruciale Brown si confronta con la scrittrice Nadeesha Uyangoda (Acqua sporca).","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"91","t":"IL MALESSERE È UN DIRITTO?","p":[["Valeria Corciolani",0],["Sadagari",0],["Simonetta Bitasi",1],["Alice Torreggiani",0]],"raw":"Valeria Corciolani e Sadagari con Simonetta Bitasi e Alice Torreggiani","s":"yq – young questions","e":"dai 14 anni","d":"ven","h":"14:30","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["mente e psicologia","infanzia ed educazione","diritti e società"],"f":["per ragazzi"],"de":"Affermare il proprio diritto al malessere può essere un atto rivoluzionario? Il mondo contemporaneo ci vuole conformi e felici, o perlomeno efficienti, e se non possiamo esserlo, pretende almeno che lo sembriamo. Ma cosa vuol dire aderire a un’idea di normalità, e qual è il prezzo che paghiamo per uniformarci? A confrontarsi su questo aspetto fondamentale del nostro rapporto con gli altri e con noi stessi saranno la scrittrice e illustratrice Valeria Corciolani, che ne La trappola del tempo racconta di una protagonista che da mesi non mette più piede fuori casa, e il grafico e illustratore Sadagari, che nel suo graphic novel Diritto al malessere si e ci interroga sul turbamento psicologico come condizione socialmente diffusa."},{"n":"92","t":"LUNGO LE RIVE DEL LIFFEY","p":[["Caitríona Lally",0],["Enrico Terrinoni",1]],"raw":"Caitríona Lally con Enrico Terrinoni","d":"ven","h":"14:30","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["narrativa","città e architettura"],"de":"La periferia nord di Dublino non è certamente un luogo che richiama l’immaginario classico dell’Irlanda, ricco di verdi prati e corsi d’acqua battuti da piogge improvvise e veloci quanto una giga. E, se già The Commitments di Roddy Doyle ce ne aveva dato un assaggio quasi quarant’anni fa, Caitríona Lally ne dipinge un quadro contemporaneo ironico e disilluso. Il suo primo romanzo (Gusci d'uova) è nato mentre vagava – in un periodo di disoccupazione – per le strade della capitale irlandese, mentre il recente memoir Home Economics riflette sulla necessità di coniugare la scrittura al lavoro di addetta alle pulizie presso il Trinity College e alla cura della casa: “Ho vinto un premio letterario da centomila dollari, ma ho guadagnato di più facendo le pulizie”. Della realtà di scrittrici e scrittori lontani dal mondo delle celebrità, Lally ragiona insieme al traduttore e docente di Lingua e letteratura inglese Enrico Terrinoni (James Joyce e la fine del romanzo).","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con Literature Ireland."},{"n":"93","t":"LEGGERE LE CARTE DELLA MIGRAZIONE","p":[["Equipaggio della Tanimar",0]],"raw":"Equipaggio della Tanimar","s":"lezioni orizzontali - in gioco","v":"vedi n. 73","d":"ven","h":"14:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["migrazioni e confini","media e giornalismo","gioco"],"f":["lezione"]},{"n":"94","t":"PER UNA FENOMENOLOGIA DEL CORPO","p":[["Giulia Calvi",0]],"raw":"Giulia Calvi","s":"lezioni orizzontali","d":"ven","h":"14:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["corpo e benessere","storia","filosofia e idee"],"f":["lezione"],"de":"Corpo malato, sacro, materno o sensuale, entità fisica o morale: concetti e simboli esperibili in contesti strettamente limitati nel tempo e dello spazio o globalizzati. Fonti, testi e immagini comunicano nel tempo concezioni diverse della corporeità, delle sue metamorfosi e manipolazioni. Per riconoscerle nel proprio vissuto e nella contemporaneità, Giulia Calvi – esperta di cultura materiale e di world history – proporrà ai e alle partecipanti alcune di queste rappresentazioni risalenti a epoche differenti come punto di avvio della riflessione collettiva."},{"n":"95","t":"MASCHERE MATTE E MOSTRI DA PASSEGGIO","st":"laboratorio di fantazoologia da parata","p":[["Ruggge",0]],"raw":"Ruggge","e":"dagli 8 ai 12 anni","v":"vedi n. 1","d":"ven","h":"14:30","l":"cappella di palazzo del mago","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["arte e fotografia","miti e fiabe","infanzia ed educazione"],"f":["per bambini","laboratorio"]},{"n":"96","t":"UN
