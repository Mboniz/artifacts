onsuma nello spazio? Eyal Weizman ha dedicato vent’anni a costruire una risposta: Forensic Architecture, l’organizzazione che dirige, usa immagini satellitari, modelli tridimensionali, analisi del suolo e delle strutture per produrre prove di violazioni dei diritti umani davanti alle corti internazionali. In Ungrounding. Architettura del genocidio, il suo lavoro più recente, Weizman porta questo metodo al confronto con Gaza: un viaggio nella “cartografia profonda” del territorio, dai tunnel sotterranei alla topografia militarizzata, dai villaggi distrutti nella Nakba del 1948 alle campagne di demolizione sistematica degli ultimi anni. La tesi è che il territorio non sia mai uno sfondo neutro: è il luogo dove si inscrivono i rapporti di forza tra colonizzatore e colonizzato, e dove – se si sa come guardare – quei rapporti diventano leggibili e documentabili. A Festivaletteratura Weizman parlerà del suo metodo e di cosa significa costruire prove in un momento in cui le immagini sono ovunque ma la verità resta contesa. A dialogare con lui, Nicolò Porcelluzzi (Medusa, Sonar).","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"213","t":"UNA CITTÀ IN FORMA DI VIRGILIO","p":[["Stefano Scansani",0]],"raw":"Stefano Scansani","s":"percorsi","v":"vedi n. 54","d":"dom","h":"10:00","l":"piazza virgiliana","pr":"10,00 €","tg":["Mantova e territorio","storia","viaggi e luoghi"],"f":["percorso/visita"]},{"n":"214","t":"AUTOBIOGRAFIA IN DUE TEMPI","p":[["Fabrizio Lombardo",0],["Fabio Franzin",1]],"raw":"Fabrizio Lombardo con Fabio Franzin","d":"dom","h":"10:00","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["poesia","memoria e biografia"],"de":"La memoria torna sempre in forme inattese, intrecciando esperienza personale e storia collettiva. Finalista al Premio Strega Poesia 2026, La linea spezzata di Fabrizio Lombardo ripercorre gli anni delle lotte operaie e dei conflitti politici tra Settanta e Ottanta, mettendoli in dialogo con il presente attraverso una scrittura che unisce autobiografia, memoria familiare e poesia. In relazione, Opera operaia di Fabio Franzin sposta lo sguardo sul lavoro contemporaneo: se Lombardo restituisce la memoria di una stagione di mobilitazione collettiva, Franzin racconta la quotidianità del lavoro di oggi, segnata da precarietà e invisibilità. Due libri che, attraverso la poesia, riflettono sull'evoluzione dell'esperienza operaia e sul rapporto tra memoria, lavoro e identità."},{"t":"QUELLA SVENTURATA","p":[["Edgarda Ferri",0],["Luigi Caracciolo",1]],"raw":"Edgarda Ferri con Luigi Caracciolo","s":"accenti","d":"dom","h":"10:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["storia","religione e spiritualità","genere e femminismo"],"de":"Costretta dal padre a entrare nell’Ordine di San Benedetto, Marianna de Leyva pronunciò i voti ancora giovanissima, diventando suor Virginia Maria, universalmente nota – grazie ad Alessandro Manzoni – come la Monaca di Monza. Sulla base di documenti dell’epoca, di atti e trascrizioni notarili del processo che la vide coinvolta, Edgarda Ferri (La sventurata) prova a restituire chiarezza storica alla sua figura, insieme al criminologo Luigi Caracciolo."},{"t":"MEGLIO DI UN ROMANZO","st":"Safe place – I consultori tra diritto e cura","p":[["Caterina Carradori",0],["Lella Costa",0],["Grace Fainelli",0],["Christian Elia",1]],"raw":"Caterina Carradori, Lella Costa e Grace Fainelli con Christian Elia","d":"dom","h":"10:00","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["media e giornalismo","salute e medicina","genere e femminismo"],"de":"È il 1975 quando nei locali occupati di un condominio nella periferia di Torino nasce il primo consultorio autogestito, in Barriera di Milano. Oggi i consultori fanno parte del Servizio sanitario nazionale e sono un presidio di salute territoriale. Nel percorso che li ha portati a essere da luoghi di mutuo aiuto e di lotta sociale a spazi istituzionalizzati del sistema sanitario si sono modificati molto e molte volte. Ma come e perché sono cambiati? Con il podcast Safe Place – il progetto selezionato dalle giurie di Meglio di un romanzo nel 2025 – Caterina Carradori ha cercato di rispondere a questa domanda raccogliendo le testimonianze dalle attiviste che diedero vita a quell’esperienza pionieristica torinese, e quelle di mediche, storiche, associazioni, nuove generazioni di femministe. Insieme a Lella Costa – attrice e già presidente del CEMP, il più antico consultorio laico italiano – e a Grace Fainelli (Decolonizzare lo sguardo), Carradori si interrogherà sul ruolo odierno e sulle prospettive future dei consultori. Conduce l’incontro Christian Elia.","no":"Al termine dell’incontro verrà proclamato il progetto scelto dalla giuria tra quelli presentati nell’edizione 2026."},{"n":"215","t":"DOVE VA LA POESIA?","st":"laboratorio di esplorazione letteraria","p":[["Silvia Vecchini",0]],"raw":"Silvia Vecchini","e":"dai 13 ai 17 anni","d":"dom","h":"10:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["poesia","scrittura e lettura"],"f":["per ragazzi","laboratorio"],"de":"Scrivere poesia può essere un atto collettivo? La poesia cambia e trasforma, crea e unisce, e lo sa bene Silvia Vecchini, scrittrice e poeta per tutte le età (C’è una poesia che ti aspetta. Pensieri e pratiche per scrivere insieme). Guidati da una maestra d’eccezione, lettori e lettrici entreranno nel luogo in cui le parole, i suoni e la voce prendono forma, vengono scelti, modellati, tramutati e condivisi. Per provare a capire insieme dove nasce la poesia e, soprattutto, dove va."},{"n":"216","t":"PICCOLO INVENTARIO DEI GIORNI","p":[["Samy Ramos",0]],"raw":"Samy Ramos","e":"dai 4 ai 6 anni","d":"dom","h":"10:30","l":"casa del mantegna","pr":"7,50 €","ic":["accompagnatore adulto richiesto"],"tg":["infanzia ed educazione","narrativa"],"f":["per bambini"],"de":"Prendete un giorno qualsiasi. Fatto? State a vedere come inizia e vi accorgerete che abbastanza in fretta diventerà un giorno felice, o un giorno leeeento, o un giorno esplosivo… Insomma, ogni giorno assume un aspetto diverso secondo il nostro umore, ma anche in base a quello che può accadere o che non accadrà. E come vi sembra questo giorno a Festivaletteratura? Insieme a Samy Ramos (Ci Sono Giorni) proveremo a guardarlo meglio e a capire com’è: potrebbe risultare molto più simpatico di come vi era sembrato!","no":"L’autrice parlerà in spagnolo, con interpretazione consecutiva in italiano."},{"n":"217","t":"HISTORIA MAGISTRA VITAE","p":[["Bruna Bagnato",0],["Elvira Mujčić",0],["Cecilia Sala",0],["Neri Marcorè",1]],"raw":"Bruna Bagnato, Elvira Mujčić e Cecilia Sala con Neri Marcorè","s":"inedita energia","d":"dom","h":"11:00","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["storia","geopolitica e guerre","media e giornalismo"],"de":"Definendo la Storia “maestra di vita”, Cicerone affidava al passato il compito di istruire il presente, di offrire agli uomini gli strumenti per comprendere il proprio tempo attraverso l'esperienza di chi li ha preceduti. È un'idea antica, eppure mai come oggi necessaria: nel centesimo anniversario dalla fondazione di Agip, scegliamo di riscoprire come la storia non sia un deposito inerte di fatti conclusi, ma un giacimento di indizi, di segnali che possono orientarci nelle strade da percorrere, se ci dimostriamo in grado (ma soprattutto volenterosi) di leggerli. Guidati da Neri Marcorè, percorriamo questo viaggio tra le pieghe del tempo, correndo verso il futuro con lo sguardo rivolto al passato."},{"t":"ABITARE LA CREPA: UNA VOCE CONFESSIONALE","p":[["NicoNote",0]],"raw":"NicoNote","s":"accenti","d":"dom","h":"11:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["musica","filosofia e idee"],"de":"La ricerca musicale di NicoNote attraversa le crisi contemporanee che non chiedono una ricomposizione, ma piuttosto un ascolto. Nei suoi lavori torna questa attenzione alla crepa come spazio abitabile: dai Lieder di Schumann, al lavoro su Hildegard von Bingen con paesaggi vocali ed elettronici quasi techno, fino alle Limbo Session, dove voce, poesia e improvvisazione si muovono tra errore, frammento e lapsus come forme di verità. La musica diventa allora una voce confessionale che raccoglie le fragilità del presente senza chiuderle in una forma definitiva."},{"n":"218","t":"UNA VOCE VISIONARIA","st":"Ildegarda di Bingen e la predicazione delle donne","p":[["Marina Montesano",0],["Michele Lodone",1]],"raw":"Marina Montesano con Michele Lodone","s":"la parola in piazza","d":"dom","h":"11:00","l":"tempio di san sebastiano","pr":"7,50 €","tg":["religione e spiritualità","genere e femminismo","storia"],"de":"Nel Medioevo la parola pubblica delle donne è sorvegliata, discussa, spesso guardata con sospetto. Eppure alcune figure femminili riescono a farsi ascoltare ben oltre le mura del monastero. Scrittrice e compositrice, badessa e interlocutrice di papi e imperatori, Ildegarda di Bingen è una di queste. L’autorità di Ildegarda nasce dalle sue visioni, da una voce che lei presenta come ricevuta dall’alto e che le consente di parlare a un mondo dominato dagli uomini. Attorno a Ildegarda si apre così una domanda che arriva fino a noi: come si rivendica il diritto di parola quando il dibattito pubblico sembra precluso alle donne? A raccontare questa vicenda sarà la storica Marina Montesano, in compagnia di Michele Lodone.","no":"Su La parola in piazza vedi p. 183"},{"n":"219","t":"A COSA SERVE RACCONTARE STORIE?","p":[["Luigi Dal Cin",0]],"raw":"Luigi Dal Cin","e":"dai 7 anni","d":"dom","h":"11:00","l":"casa del mantegna","pr":"7,50 €","tg":["scrittura e lettura","infanzia ed educazione"],"f":["per bambini"],"de":"Come te lo immagini uno scrittore da piccolo? Pensi che andasse bene in italiano, che fosse bravo a inventare e scrivere storie? Che cosa lo avrà convinto a fare lo scrittore? Con Luigi Dal Cin (Tondi orizzonti) cercheremo di capire perché ha scelto questo mestiere e che cosa trova di così entusiasmante nella lettura. Parleremo di parole che passano soltanto per la mente, lasciando appena qualche traccia, e di quelle che invece arrivano anche al nostro cuore e ci restano a lungo, suscitando emozioni e sentimenti inattesi, spingendoci spesso ad agire e a cambiare nel profondo."},{"t":"CONTA PIÙ LA GENETICA O L’AMBIENTE?","p":[["Paolo Vineis",0]],"raw":"Paolo Vineis","s":"lavagne","d":"dom","h":"11:00","l":"piazza mantegna","pr":"ingresso libero","ic":["consapevolezza verde"],"tg":["salute e medicina","ambiente e clima","scienza"],"f":["lezione"],"de":"Si stima che ogni anno in Europa oltre 250.000 persone muoiano di cancro per cause attribuibili all’inquinamento atmosferico: la salute non è solo una questione genetica, ma è anche il riflesso del nostro rapporto con il territorio e con le politiche ambientali che lo governano. La qualità dell’aria che respiriamo nei centri urbani o la gestione dei rifiuti industriali agiscono come determinanti invisibili del nostro benessere. Discutere dell’incidenza dei tumori in relazione a queste variabili significa interrogarsi su come costruire comunità più sane, dove la prevenzione passi necessariamente attraverso scelte di sostenibilità."},{"n":"505","t":"MA COME FANNO I TRADUTTORI…","d":"dom","h":"11:30","l":"politecnico di milano - campus di mantova","pr":"ingresso gratuito con prenotazione","tg":["editoria e traduzione","lingua e parole"],"f":["laboratorio"],"de":"Metti intorno a un tavolo una dozzina di traduttrici e traduttori ed è subito TableT. Il format, nato nel 2017 per iniziativa delle associazioni AITI e StradeLab in collaborazione con il Laboratorio FAAM di Milano, si ispira alla tradizione tedesca dello Stammtisch, un’occasione di confronto “peer-to-peer” sui temi pratici e teorici della traduzione editoriale. Traduttrici e traduttori di varie età ed esperienza portano alla discussione dubbi da risolvere, giochi di parole o argomenti più ampi, in un clima informale che favorisce la partecipazione. Quest’anno il TableT si presenta al pubblico di Festivaletteratura, che potrà assistere alla discussione su alcuni aspetti metodologici della professione, scoprendo così i risvolti nascosti di un lavoro ancora poco noto a gran parte dei lettori. L’incontro è realizzato con il sostegno di Calibro e del Fondo per il diritto di prestito pubblico presso il Ministero della cultura."},{"n":"220","t":"UN RICORDO SU SFONDO BLU LAPISLAZZULO","p":[["Claudia Daniotti",0],["Paolo Sachet",0],["Barbara Furlotti",1]],"raw":"Claudia Daniotti e Paolo Sachet con Barbara Furlotti","d":"dom","h":"11:30","l":"biblioteca teresiana","pr":"7,50 €","tg":["arte e fotografia","storia"],"de":"La Cronaca Crespi è un manoscritto miniato, illustrato da Leonardo da Besozzo, che riprende un ciclo di affreschi eseguiti intorno al 1432 da Masolino da Panicale, presso Palazzo Orsini a Roma. Si trattava di un ambizioso ciclo pittorico, svanito in soli cinquant’anni, che raccontava la storia del mondo secondo una prospettiva cristiana, dalla sua creazione fino alla figura di Tamerlano, e che oggi possiamo ammirare presso la Biblioteca Nazionale Braidense proprio grazie alla “trascrizione visiva” che ne tramanda la memoria. Ce ne parlano la storica dell’arte Claudia Daniotti e lo storico e paleografo Paolo Sachet, autori di La cronaca Crespi. Una storia per figure nel primo Rinascimento. A tenere le fila del discorso sarà la curatrice museale Barbara Furlotti."},{"n":"221","t":"SCRIVERE E LEGGERE L’AMORE","p":[["Marco Magnone",0],["Beatrice Masini",0],["Chiara Codecà",1]],"raw":"Marco Magnone e Beatrice Masini con Chiara Codecà","e":"dai anni","d":"dom","h":"12:00","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["narrativa","scrittura e lettura","infanzia ed educazione"],"f":["per ragazzi"],"de":"Come si scrive e legge di sentimenti oggi? Come si scriveva e leggeva ieri? Le storie d’amore sono forse tra le più narrate, frequentate, amate, discusse, ricordate di tutte. Ogni epoca letteraria ha avuto le proprie, con caratteristiche e tendenze diverse, e continuiamo a cercarle senza sosta. Ma cosa le lega e cosa ci troviamo dentro di così attrattivo e irrinunciabile? Su questi interrogativi si confrontano un autore e un’autrice che di storie di sentimenti rivolte alle e agli adolescenti hanno scritto e letto tanto, per tracciare un percorso da Ciao, tu di Beatrice Masini a La notte delle lucciole di Marco Magnone, e per riflettere su come sono cambiati i canoni del racconto d’amore e i modi in cui raggiunge lettori e lettrici."},{"n":"506","t":"FARE ARRIVARE I LIBRI AGLI ADOLESCENTI","p":[["Espérance Hakuzwimana",0],["Alice Torreggiani",0]],"raw":"Espérance Hakuzwimana e Alice Torreggiani","s":"libri in classe con read more– nel cantiere della letteratura giovanile","d":"dom","h":"12:00","l":"politecnico di milano - campus di mantova","pr":"ingresso gratuito con prenotazione","tg":["editoria e traduzione","infanzia ed educazione","scrittura e lettura"],"f":["laboratorio"],"de":"Come fare incontrare libri e adolescenti? Cosa serve perché ragazze e ragazzi possano avere accesso a un’ampia scelta di titoli, generi, punti di vista? Ne parlano una scrittrice e una formatrice ed esperta di letteratura giovanile che si confrontano ogni anno con tantissime classi e gruppi di lettura adolescenti."},{"t":"IL FUOCO SACRO DELLA SCRITTURA","p":[["Piergiorgio Pulixi",0],["Ilenia Caito",1]],"raw":"Piergiorgio Pulixi con Ilenia Caito","d":"dom","h":"12:00","l":"piazza dei libri","pr":"ingresso libero","ic":["streaming"],"tg":["scrittura e lettura","narrativa"],"no":"Sul Fuoco sacro della scrittura vedi p. 105"},{"t":"LA MIA STORIA CON LA LETTURA","p":[["Gabriele Romagnoli",0],["Elsa Riccadonna",1]],"raw":"Gabriele Romagnoli con Elsa Riccadonna","s":"read more – circuiti di lettura integrati","d":"dom","h":"12:00","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["scrittura e lettura"],"no":"Su La mia storia con la lettura vedi p. 101"},{"n":"222","t":"UNA NATURALE EVOLUZIONE DELLA POLITICA","p":[["Pierre Charbonnier",0],["Matteo De Giuli",1]],"raw":"Pierre Charbonnier con Matteo De Giuli","s":"kaléidoscope français","d":"dom","h":"12:15","l":"basilica palatina di santa barbara","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["filosofia e idee","ambiente e clima","politica e attualità"],"de":"Pierre Charbonnier è un filosofo francese che lavora presso il Centre national de la recherche scientifique di Parigi e da sempre è impegnato ad analizzare il rapporto tra la politica, il suo sviluppo nel tempo e il modo in cui si è pensato alla questione ambientale in epoca moderna: dal XVII secolo fino al secondo dopoguerra, l’aumento dell’uso di energia e risorse ha trasformato la società, ampliando benessere e diritti sociali; le libertà materiali e la forza contrattuale delle classi lavoratrici affondano quindi le loro radici nel legame storico tra umanità e ambiente. Non solo la crescita economica, ma anche la guerra, il cambiamento climatico e le vicende del Novecento sono strettamente connessi all’ecologia e sono tutti ambiti che hanno interessato la riflessione dell’autore di Abbondanza e libertà, attento a mantenere il focus su “una storia ambientale delle idee, e non su una storia delle idee ambientali”. Ne ragiona a Mantova insieme a Matteo De Giuli.","no":"L’autore parlerà in francese, con interpretazione consecutiva in italiano."},{"n":"223","t":"CHOOSE LIFE","p":[["Irvine Welsh",0],["Carlo Mazza Galanti",1]],"raw":"Irvine Welsh con Carlo Mazza Galanti","d":"dom","h":"12:15","l":"palazzo san sebastiano","pr":"7,50 €","tg":["narrativa","musica","politica e attualità"],"de":"Trent’anni fa Trainspotting ha fotografato una generazione con una lingua nuova e brutale: l’eroina, la disoccupazione, il Thatcherismo visto dal basso, la periferia di Edimburgo come paesaggio morale di un intero sistema. Da allora Irvine Welsh è tornato più volte su quei personaggi (Renton, Spud, Sick Boy, Begbie) ma con Men in Love li ritrova in un momento diverso: la fine degli anni Ottanta, dopo il punk e prima dell’acid house, mentre cercano di costruirsi qualcosa che assomigli a una vita adulta, e trovano nell’amore e nella pista da ballo una possibilità di redenzione che l’eroina non aveva saputo dare. A parlarne con Welsh, autore tra gli altri della raccolta Ecstasy, ci sarà lo scrittore e critico letterario Carlo Mazza Galanti.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"224","t":"COME NASCE UNA POESIA (E COME RITORNA)","p":[["Valerio Magrelli",0],["Stefano Bottero",1]],"raw":"Valerio Magrelli con Stefano Bottero","d":"dom","h":"12:15","l":"teatro bibiena","pr":"7,50 €","tg":["poesia","scrittura e lettura"],"de":"Che cosa accade quando un poeta torna sui propri versi e li rilegge alla luce del tempo? In Bel passato, Valerio Magrelli costruisce un libro in cui poesia e riflessione critica si specchiano l’una nell’altra: ai testi poetici si affiancano annotazioni, ricordi, rimandi e commenti che ne svelano la genesi e le relazioni con una più ampia tradizione letteraria. Ne nasce un’opera originale, in cui il laboratorio della scrittura si apre al lettore senza perdere il mistero della poesia. In dialogo con il critico e scrittore Stefano Bottero, Magrelli accompagnerà il pubblico dentro questo percorso di autoesegesi, affrontando temi centrali della sua ricerca, che comprende anche ardite sperimentazioni di traduzione, come quella recentemente affrontata con Il misantropo di Molière."},{"n":"225","t":"MARI E FIUMI CHE TRAVOLGONO","p":[["Bruno Arpaia",0],["Alessandra Castellazzi",0],["Silvia Righi",1]],"raw":"Bruno Arpaia e Alessandra Castellazzi con Silvia Righi","s":"avere trent'anni","d":"dom","h":"12:15","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["ambiente e clima","migrazioni e confini","narrativa"],"de":"L’Europa mediterranea è un luogo sempre più caldo: ogni anno i fenomeni atmosferici eccezionali si moltiplicano; dappertutto, le persone lasciano terre che stanno diventando incompatibili con la vita umana. I personaggi di Bruno Arpaia (Il mondo senza inverno) attraversano un continente in parte sommerso e in parte arso dal sole. Le ragazze del libro di Alessandra Castellazzi (La radura) scompaiono in un’ambientazione ciclicamente frustata da piogge infestanti e siccità. La narrativa speculativa, la climate fiction e il weird si incontrano in una conversazione tra due autori nati a tre decenni di distanza, per capire come i trentenni di ieri e di oggi hanno raccontato il cambiamento climatico. Dialoga con loro la poeta Silvia Righi."},{"n":"226","t":"TOCCARE CON MANO","p":[["Marta Paterlini",0],["Silvia Lazzaris",1]],"raw":"Marta Paterlini con Silvia Lazzaris","d":"dom","h":"12:15","l":"aula magna dell'universita","pr":"7,50 €","tg":["scienza","corpo e benessere","salute e medicina"],"de":"Il tatto è senza dubbio uno dei sensi più universali e la nostra cute è un vero e proprio organo che funge da interfaccia tra il cervello e il mondo esterno. Ogni centimetro quadrato di epidermide contiene recettori specializzati che traducono gli stimoli fisici in segnali elettrici, monitorano i pericoli e i cambiamenti termici, senza dimenticare la funzione cruciale per il benessere psicofisico tramite l’attivazione del sistema parasimpatico. La neurobiologa Marta Paterlini (La pelle che pensa) ci accompagnerà in un viaggio tra scienze, storia e filosofia per farci capire l’importanza del toccare come bisogno biologico primario. La incontra la giornalista Silvia Lazzaris."},{"t":"LA STORIA SU MISURA","p":[["Carlo Marco Belfanti",0]],"raw":"Carlo Marco Belfanti","s":"accenti","d":"dom","h":"14:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["storia","media e giornalismo"],"de":"Dall’intrattenimento al marketing, fino al dibattito politico, la storia è oggi sempre più piegata alle esigenze della comunicazione contemporanea. Lo storico Carlo Marco Belfanti analizza il fenomeno della “storiografia fai da te”, interrogandosi sui rischi e le distorsioni che emergono quando il passato viene strumentalizzato, trasformandosi da oggetto di studio rigoroso in un prodotto confezionato secondo le necessità del presente. Mantova.","no":"In collaborazione con l’Istituto mantovano di storia contemporanea e con l’ANPI provinciale di"},{"n":"227","t":"LA VERGOGNA DEVE CAMBIARE LATO","p":[["Gino Cecchettin",0],["Gisèle Pelicot",0],["Ilenia Caito",1]],"raw":"Gino Cecchettin e Gisèle Pelicot con Ilenia Caito","s":"kaléidoscope français","d":"dom","h":"14:30","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["genere e femminismo","diritti e società","memoria e biografia"],"f":["percorso/visita"],"de":"Due storie segnate dalla violenza di genere, due percorsi di elaborazione pubblica del dolore. Gisèle Pelicot (Un inno alla vita), sopravvissuta a dieci anni di abusi perpetrati dal marito con la complicità di decine di uomini conosciuti in rete, ha scelto di affrontare il processo a porte aperte, trasformando la propria vicenda in un atto collettivo di denuncia e in un simbolo della lotta contro la cultura dello stupro. Gino Cecchettin, padre di Giulia – vittima di femminicidio per mano dell’ex fidanzato – ha deciso di non chiudersi nel silenzio del lutto, ma di impegnarsi pubblicamente per l’educazione affettiva e il contrasto alla violenza maschile sulle donne. uno strumento di cambiamento sociale e sulla responsabilità della memoria. A tenere le fila dell’incontro sarà Ilenia Caito, animatrice di gruppi di lettura. Gisèle Pelicot parlerà in francese, con interpretazione consecutiva in italiano.","no":"Sul palco di piazza Castello si confronteranno sul significato di fare della propria tragedia"},{"n":"228","t":"IL GIOCO DEL TRADURRE E L’INTELLIGENZA ARTIFICIALE","p":[["Franco Nasi",0]],"raw":"Franco Nasi","s":"lezioni orizzontali","d":"dom","h":"14:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["editoria e traduzione","tecnologia e IA","lingua e parole"],"f":["lezione"],"de":"Uno spettro si aggira per il mondo della traduzione editoriale: è lo spettro dell’Intelligenza Artificiale. Muovendo dall’illustrazione di alcuni esempi di traduzione realizzati con l’impiego di traduttori neurali, la lezione cercherà di riflettere e di sollecitare un dialogo sull’utilità e il danno dell’AI nella formazione dei traduttori, nei processi di produzione editoriale e nelle sorti della letteratura."},{"n":"229","t":"SE FA CALDO CI SARÀ UNA RAGIONE","p":[["Michele Freppaz",0],["Telmo Pievani",0],["Valentina Vitali",1]],"raw":"Michele Freppaz e Telmo Pievani con Valentina Vitali","e":"dai 7 ai 10 anni","d":"dom","h":"14:30","l":"casa del mantegna","pr":"7,50 €","ic":["consapevolezza verde","no accompagnatori adulti"],"tg":["ambiente e clima","scienza","infanzia ed educazione"],"f":["per bambini"],"de":"Siamo ancora qui che sudiamo per il caldo torrido di quest’estate infinita. Temperature fuori dalla norma, fiumi prosciugati, notti trascorse insonni e boccheggiando: ma tutto questo è veramente “eccezionale” come ci sentiamo ripetere da ogni parte o è la nuova normalità con cui ormai ci dobbiamo misurare? Che cosa ci aspetta nel prossimo futuro: vedremo ancora la neve in pianura o presto coltiveremo banane? Insieme alla naturalista Valentina Vitali, Telmo Pievani (coautore di Viaggio nell’Italia dell’antropocene) e il nivologo Michele Freppaz cercheranno di fare il punto della situazione sullo stato del cambiamento climatico e sulle conseguenze che sta avendo sulla nostra quotidianità, raccogliendo e commentando domande e considerazioni portate dal pubblico di bambine e bambini."},{"n":"230","t":"TUTTO PARTE DA UN PUNTINO","p":[["Francesca Seravalle",0],["Marco Belpoliti",1]],"raw":"Francesca Seravalle con Marco Belpoliti","d":"dom","h":"15:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["arte e fotografia","tecnologia e IA","storia"],"de":"Oggi siamo quotidianamente immersi nei pixel, attraverso gli schermi dei nostri smartphone o computer, nei videogiochi che ci intrattengono, nelle griglie composte da milioni di puntini luminosi dei nostri televisori. La fotografa e curatrice Francesca Seravalle (The Pixel) ha intrapreso una riflessione su come il picture element abbia cambiato completamente la nostra comunicazione, la trasmissione di informazioni e persino il modo di fare arte, soprattutto nel campo della fotografia contemporanea. Ne ragiona insieme al critico letterario Marco Belpoliti (Nord nord)."},{"n":"231","t":"IL RITORNO DEI CAZALET","p":[["Louisa Young",0],["Chiara Valerio",1]],"raw":"Louisa Young con Chiara Valerio","d":"dom","h":"15:00","l":"palazzo san sebastiano","pr":"7,50 €","tg":["narrativa"],"de":"Ci sono storie che vorremmo non finissero mai, saghe familiari che coprono generazioni e tengono il lettore incollato alle pagine: quella dei Cazalet è certamente una delle epopee più note e amate, un dipinto realistico dell’Inghilterra tra gli anni Trenta e il dopoguerra, interrottasi dopo cinque volumi nel 2013, poco prima della scomparsa dell’autrice Elizabeth Jane Howard. Nel frattempo Londra e il Regno Unito sono cambiati, anche nell’universo fittizio della letteratura: Louisa Young (L’inverno si era sbagliato, I giorni del ritorno), nipote della scrittrice britannica, ha deciso di gettarsi in un’avventura appassionante, colmando un vuoto narrativo e portando nei “favolosi anni Sessanta” le vicende dei discendenti di William e Kitty. Il prossimo settembre uscirà il primo volume di una nuova trilogia (Le ore d'oro) e, insieme a Chiara Valerio, Young racconterà al pubblico le sfide affrontate per accompagnare i Cazalet in una nuova epoca, senza perdere ciò che li ha resi indimenticabili.","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"232","t":"MANUALI DI AUTO AIUTO PER CUORI AMMACCATI","p":[["Lorrie Moore",0],["Claudia Durastanti",1]],"raw":"Lorrie Moore con Claudia Durastanti","d":"dom","h":"15:00","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["narrativa","mente e psicologia"],"de":"Da un lato c’è la battuta, fulminea, che innesca un po’ d’ironia per proteggerci da bestie nere come la malattia, il lutto, la perdita del lavoro, la fine di un amore. Dall’altro la memoria, che stende il suo manto sui nostri vissuti e li guarda con chirurgico distacco, senza giudicarli. In mezzo, ad arbitrare insieme a decine di personaggi alle prese con piccole e grandi derive del quotidiano, sta ben piantata la maestra del racconto Lorrie Moore, che migliaia di lettrici e lettori hanno amato – e mai più abbandonato – grazie a indimenticabili romanzi d’amicizia come L’ospedale delle rane, o a decine di perfette prose brevi finalmente raccolte, in ordine volutamente non cronologico, nel volume Tutti i racconti. A Claudia Durastanti (Cleopatra va in prigione, Missitalia) spetta il compito – e il piacere – di incontrare una delle voci più temerarie e riconoscibili della narrativa nordamericana contemporanea.","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"233","t":"SULLE NOTE DELLA POESIA","p":[["Nicola Cinquetti",0],["Marco Padovani",1]],"raw":"Nicola Cinquetti con Marco Padovani","e":"dai 6 anni","d":"dom","h":"15:00","l":"casa del mantegna","pr":"7,50 €","tg":["poesia","musica","infanzia ed educazione"],"f":["per bambini"],"de":"Cosa succede se la poesia per bambini incontra le corde di una chitarra? A trent’anni dalla pubblicazione della sua prima raccolta (Eroi, re, regine e altre rime), Nicola Cinquetti ripercorre un cammino poetico fatto di ironia, grazia e parole leggere. Un percorso che qui si fa ascolto e melodia: insieme all’autore, il musicista Marco Padovani tradurrà i versi in canzoni, intrecciando parole lette e note cantate in un intimo dialogo tra poesia e musica."},{"t":"TAX THE RICH","p":[["Riccardo Staglianò",0]],"raw":"Riccardo Staglianò","s":"accenti","d":"dom","h":"15:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["economia e lavoro","politica e attualità","diritti e società"],"de":"In Italia il sette per cento più ricco versa al fisco, in proporzione, meno di un onesto contribuente del ceto medio. Eppure esisterebbe una misura semplice, dagli effetti rapidi e – stando ai sondaggi – piuttosto popolare per iniziare a correggere questa stortura. Riccardo Staglianò (Tassare i milionari) ci racconta quale."},{"n":"234","t":"IL MESTIERE DELL’ATTORE","p":[["Fabrizio Bentivoglio",0]],"raw":"Fabrizio Bentivoglio","d":"dom","h":"15:00","l":"teatro bibiena","pr":"7,50 €","tg":["teatro e performance","cinema e tv"],"de":"Quando chiesero a Ronald Reagan come un attore potesse fare il Presidente, lui rispose: “Come può un Presidente non fare l’attore?”. D’altra parte, dal teatro greco fino ai giullari di corte e alla Commedia dell’arte, il mestiere dell’uomo di spettacolo ha sempre previsto il sapersi rapportare con il pubblico presente, sapendone cogliere umori ed emozioni. Ma qual è il modo migliore per farlo? Esistono regole codificate? Fabrizio Bentivoglio (Marrakech Express, Puerto Escondido, Loro), tra i maggiori interpreti del cinema e del teatro italiano, da anni calca palchi – e pellicole – in tutto lo Stivale e ha deciso di condividere la propria esperienza in un Piccolo almanacco dell’attore, un assolo sulla professione attoriale che trasforma la sua lunga carriera in materiale didattico per chi sente il desiderio di intraprendere la strada che nasce quando si apre il sipario o sbatte l’asticella del ciak."},{"t":"PARATA STRAMPALATA!","p":[["Ruggge",0],["Banda Città di Mantova",0]],"raw":"Ruggge, la Banda Città di Mantova e tutti voi!","d":"dom","h":"15:00","l":"cappella di palazzo del mago piazza sordello","tg":["Mantova e territorio","arte e fotografia","infanzia ed educazione"],"de":"È il momento della festa! Elefanti volanti, giraffe a due teste, coccodrilli nani e leoni col riporto sono solo alcune delle creature fantastiche che hanno assicurato la loro partecipazione al fantasmagorico corteo che oggi invaderà le piazze di Mantova. Tutti gli animali fantastici progettati e (s)combinati nell’officina di Maschere matte e mostri da passeggio aperta al Festival da Ruggge (vedi n. 1) usciranno finalmente in strada per seminare spavento e allegria per il centro storico della città, coinvolgendo tutti in un’irresistibile danza collettiva, grazie alla complicità musicale di ottoni e grancasse della Banda Città di Mantova. Il folleggiante corteo si muoverà dalla Cappella di Palazzo del Mago in piazza San Leonardo a piazza Sordello, passando per piazza Mantegna e piazza Erbe. Chi vuole unirsi è il benvenuto!"},{"n":"235","t":"LA MOLECOLA E IL MONDO","p":[["Carlo Mazza Galanti",0],["Matteo De Giuli",1]],"raw":"Carlo Mazza Galanti con Matteo De Giuli","d":"dom","h":"15:00","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["scienza","mente e psicologia","storia"],"de":"Cosa unisce le vasche di deprivazione sensoriale degli anni Settanta, le tecniche di interrogatorio della CIA, i rave party, Elon Musk e le storie d’amore tra esseri umani e delfini? La risposta, sostiene Carlo Mazza Galanti, è una molecola sola: la ketamina. In K-Hole, il critico letterario e giornalista culturale costruisce qualcosa di difficile da classificare: non un saggio sulla dipendenza, non un pamphlet, non un manuale di farmacologia, ma un tentativo di leggere l’intera contemporaneità attraverso una sostanza chimica. L’esperienza del cosiddetto “k-hole”, quella dissoluzione dell’ego in cui il soggetto si percepisce come entità disincarnata che fluttua senza coordinate, diventa la metafora perfetta delle fantasie tecno-utopiste del nostro tempo: il sogno della mente caricata nel cloud, il transumanesimo, l’intelligenza artificiale come estensione di sé oltre i limiti della carne. Mazza Galanti ne parla con Matteo De Giuli (Medusa)."},{"n":"236","t":"CHI SCONTA LA PENA?","p":[["Kento",0],["Sualzo",0],["Silvia Vecchini",0],["Alice Torreggiani",1]],"raw":"Kento, Sualzo e Silvia Vecchini con Alice Torreggiani","s":"yq – young questions","e":"dai 13 anni","d":"dom","h":"15:00","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["diritti e società","fumetto e illustrazione","infanzia ed educazione"],"f":["per ragazzi"],"de":"La parola giustizia è un termine controverso? E la pena comminata per i delitti condanna solo chi va in carcere o anche chi rimane fuori? Parlare e interrogarsi sulla giustizia e del suo valore all’interno di una società è da sempre un modo per consultare e paragonare le nostre bussole, per spingerci a entrare e sostare in temi complessi, a rivedere e correggere la nostra idea di mondo e di comunità. A confrontarsi con gli e le adolescenti, e con il pubblico di ogni età, su responsabilità collettiva e individuale, sul significato del potere e della lotta alla prevaricazione sono il rapper e scrittore Kento – che in Barre. Rap, sogni e segreti in un carcere minorile e in Con una pistola alla tempia. Storia vera di Aladin Hussain Al Baraduni ha dato voce a chi dell’ingiustizia è vittima –, la scrittrice e poetessa Silvia Vecchini, e l’illustratore e fumettista Sualzo – che insieme hanno raccontato, in Del buio non ho paura, il destino di un’adolescente vittima suo malgrado di un delitto, anche se dal carcere rimane fuori, invisibile."},{"n":"237","t":"FILOSOFIA ED ESTETICA DEL CIBO","p":[["Nicola Perullo",0]],"raw":"Nicola Perullo","d":"dom","h":"15:15","l":"aula magna dell'universita","pr":"7,50 €","tg":["cibo","filosofia e idee"],"de":"Ad alcuni potrà sembrare peculiare che il rettore dell’Università di Scienze Gastronomiche di Pollenzo sia un filosofo, eppure l’approccio estetico e ontologico all’esperienza del cibo permette di affrontare l’argomento da un punto di vista che getta nuova luce sulla produzione culinaria. Nicola Perullo (Contro i cuochi, Epistenologia) da anni ragiona sulle modalità con cui l’essere umano vive l’atto del nutrirsi, sia esso inteso come acquisizione di energia, tradizione o puro piacere. “Non ridurre la complessità della cucina a un fenomeno mediatico” è una delle linee guida che l’autore del celebre saggio Il gusto come esperienza utilizza come bussola per le sue riflessioni, improntate alla costruzione di una narrazione alternativa del cibo e della cucina: “non un circolo ricreativo per acquiescenti signori ma un laboratorio, uno spazio attivo nel quale la filosofia, le scienze umane, le arti e le scienze della natura possano riflettere sul proprio tempo”."},{"n":"238","t":"CACCIA AL TESORO","p":[["Angelo Mozzillo",0],["Davide Panizza",0],["Anna Ravelli",1]],"raw":"Angelo Mozzillo e Davide Panizza con Anna Ravelli","e":"dai 9 ai 12 anni","d":"dom","h":"16:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["infanzia ed educazione","gioco","fumetto e illustrazione"],"f":["per bambini"],"de":"Lo scrittore Angelo Mozzillo e l’illustratore Davide Panizza possono ormai dirsi dei grandi esperti di avventure, soprattutto dopo l’impresa al limite dell’incredibile che hanno raccontato in Bello il bosco ma… non ci vivrei!. I due possiedono anche impressionanti capacità investigative, apprese grazie alla serie di Detective Linus e Un agente troppo segreto. Ecco perché, dopo essere sopravvissuti a mille peripezie, hanno pensato di trasmettere a ragazze e ragazzi la loro saggezza (poca) e le loro abilità (pochissime), organizzando una spericolata caccia al tesoro alla Casa del Mantegna, che durante il Festival diventerà il luogo più selvaggio di Mantova, pieno zeppo di indizi, trappole e misteri, che toccherà a lettori e lettrici svelare. Essendo l’impresa capitanata da Angelo e Davide, ovviamente non garantiamo la sopravvivenza dei partecipanti."},{"n":"239","t":"NELLE SEGRETE DELLA MEMORIA","p":[["Siri Hustvedt",0],["Gaia Manzini",1]],"raw":"Siri Hustvedt con Gaia Manzini","d":"dom","h":"16:30","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["narrativa","mente e psicologia","memoria e biografia"],"de":"Siri Hustvedt è una delle più lucide e colte narratrici della letteratura contemporanea, capace di unire la passione per la psicologia e le neuroscienze alla costante ricerca sul tema della memoria. “Ricordare è cambiare”, scrive l’autrice statunitense e proprio il ricordo è base fondante di molte delle sue opere (come Vivere, pensare, guardare o Ricordi del futuro), nelle quali il vissuto familiare funziona da motore di analisi dell’identità e della percezione dei rapporti interpersonali. Così accade anche nel recente Storie di fantasmi, un memoir in cui ripercorre quarant’anni di vita insieme al marito Paul Auster, scomparso nel 2024 e al quale era “unita dalla letteratura”: “Mi manca Paul, ma il più delle volte mi mancano Siri e Paul […]. Mi manca come una semplice congiunzione mi facesse sentire”. Dialoga insieme a Hustvedt la scrittrice Gaia Manzini.","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano."},{"t":"DOV’È FINITA L’ANTIMATERIA?","p":[["Marco S. Sozzi",0]],"raw":"Marco S. Sozzi","s":"lavagne – energie","d":"dom","h":"16:30","l":"piazza mantegna","pr":"ingresso libero","tg":["scienza"],"f":["lezione"],"de":"Tutto ciò che ci circonda è fatto di materia. Sembra scontato, ma invece non lo è. Da circa un secolo sappiamo infatti che per ogni particella di materia ne dovrebbe esistere in natura una speculare di antimateria, uguale per massa ma di carica elettrica di segno opposto. Secondo la teoria del Big Bang, all’inizio dei tempi si sarebbero dovute formare uguali quantità di particelle e antiparticelle, scatenando – attraverso il loro incontro – il fenomeno dell’“annichilazione”, ovvero la loro completa conversione in energia. Se oggi siamo qui a parlarne, per fortuna non è andata così, ma la scomparsa dell’antimateria resta uno dei più grandi misteri che appassionano la fisica contemporanea."},{"n":"240","t":"SULLA SOGLIA DELLE GRANDI DOMANDE","p":[["Silvia Demozzi",0]],"raw":"Silvia Demozzi","s":"sfogliare l’universo – lezioni grandi","d":"dom","h":"16:30","l":"chiesa di san cristoforo","pr":"7,50 €","tg":["filosofia e idee","infanzia ed educazione","corpo e benessere"],"f":["lezione"],"de":"Che cos’è un corpo? Che cosa significa nascere? Che cosa significa morire? Che rapporto abbiamo con ciò che non capiamo, non vediamo, non controlliamo, non sappiamo nominare? Arrivati all’età adulta spesso indietreggiamo di fronte alle domande che toccano il senso e il mistero dell’esistenza. Gli albi illustrati per bambini invece le attraversano senza timore, consentendo di sostare davanti a temi difficili senza addomesticarli. A partire da una selezione dei titoli presenti nella biblioteca meraviglia (tra cui Il corpo umano, A che pensi?, Nel mio corpo, Mortale, My Little Book of Big Questions e Si può svuotare una pozzanghera?), Silvia Demozzi ci stimola a riprendere l’abitudine di porci di fronte alle “grandi domande” che continuano a riguardarci.","no":"Su Sfogliare l’universo vedi p. 126"},{"t":"SI PUÒ INSEGNARE A LEGGERE LA POESIA?","p":[["Valerio Magrelli",0]],"raw":"Valerio Magrelli","s":"accenti","d":"dom","h":"17:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["poesia","scrittura e lettura"],"de":"La parola poesia deriva dal verbo greco poiein, che significa “fare”: si può dunque pensare di insegnare come farla ma, una volta costruite relazioni tra parole che infondono un senso nuovo, si può insegnare come leggerla? Ne ragiona il poeta e critico letterario Valerio Magrelli (Che cos’è la poesia?)."},{"n":"241","t":"IL VALORE DELLA FILANTROPIA","p":[["Maria Silvia Sacchi",0],["Annarosa Buttarelli",1]],"raw":"Maria Silvia Sacchi con Annarosa Buttarelli","d":"dom","h":"17:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["economia e lavoro","diritti e società","genere e femminismo"],"de":"Quante volte avete letto o sentito di persone che chiedono a gran voce interventi munifici da parte di coloro che vengono comunemente chiamati “super-ricchi”? Gli esempi di azioni filantropiche da parte di chi fa impresa sono numerosi, non solo negli Stati Uniti, ma anche in Italia, dove questo impegno diventa frequentemente un’asse portante dell’identità aziendale, con fondazioni spesso guidate da figure femminili che affrontano sfide fiscali, gestionali e anche valoriali. La giornalista Maria Silvia Sacchi (Cuore e impresa) analizza come queste realtà traducano il patrimonio in impatto sociale, interrogandosi sul delicato confine tra potere d’influenza privato e responsabilità pubblica. La incontra la filosofa Annarosa Buttarelli (Sovrane)."},{"n":"242","t":"VOCE E GESTO: LA POESIA COME LINGUAGGIO INCLUSIVO","p":[["Antigone",0],["Chiara Araldi",1]],"raw":"Antigone con Chiara Araldi","d":"dom","h":"17:00","l":"cinema oberdan","pr":"7,50 €","tg":["poesia","lingua e parole","teatro e performance"],"de":"Antigone è il celebre alter ego artistico di Eugenia Giancaspro, linguista clinica, interprete LIS e figura di riferimento nel panorama della poesia performativa e del poetry slam in Italia. Nelle sue esibizioni, la dimensione tragica e politica dell’omonima eroina sofoclea si intreccia con una ricerca sul corpo e sulla voce come strumenti espressivi, in cui rabbia, vulnerabilità ed energia creativa diventano materia viva della scena. In questa occasione Antigone presenta uno spettacolo di poesia performativa in dialogo con la Lingua dei Segni Italiana (LIS), in cui parola, segno e movimento costruiscono una partitura scenica integrata e accessibile, capace di far convivere diverse modalità di espressione all’interno dello stesso evento poetico. L’incontro sarà introdotto da una conversazione con la performer Chiara Araldi."},{"n":"243","t":"VECCHIO E NUOVO ANTISEMITISMO","p":[["Valentina Pisanty",0]],"raw":"Valentina Pisanty","s":"lezioni orizzontali","d":"dom","h":"17:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["diritti e società","geopolitica e guerre","lingua e parole"],"f":["lezione"],"de":"Le parole d’odio contro il popolo ebraico hanno una storia antica. Negli ultimi anni, e soprattutto dopo i fatti del 7 ottobre 2023, si è fatta strada una nuova accezione di antisemitismo che risente della militarizzazione dello scontro politico in atto. Che definizione diamo, oggi, alla parola “antisemita”? A partire da un corpus di vignette satiriche di diversi periodici storici e dai contenuti più o meno sospettabili di antisemitismo, durante la lezione si chiederà ai partecipanti di decidere dove passa il confine che stabilisce se una vignetta è o non è antisemita. Le valutazioni emerse dalla discussione verranno poi messe a confronto con le definizioni alternative di questo concetto proposte da IHRA e JDA, allargando la riflessione ai limiti della libertà d’espressione e di satira, nonché ai meccanismi propri degli stereotipi e dell’umorismo."},{"n":"244","t":"SUONA CHE TI PARLO CHE TI GIOCO","st":"laboratorio fonoludomusicale","p":[["Giovanna Pezzetta",0]],"raw":"Giovanna Pezzetta","e":"dai 2 ai 5 anni","d":"dom","h":"17:00","l":"casa del mantegna","pr":"7,50 €","ic":["accompagnatore adulto richiesto"],"tg":["musica","infanzia ed educazione","lingua e parole"],"f":["per bambini","laboratorio"],"de":"Musica si fa parola, parola si fa suono, suono si fa gioco. Avete mai pensato di girare il mondo con la lentezza di una chiocciola? Poesia, gioco e canto si mescolano insieme e si fanno acqua di torrente, sassi, fuoco che scoppietta, mondo da scoprire insieme, adulti e bambini. Grazie ai fono-poteri di Giovanna Pezzetta (La musica è di casa, Melacanti) diventeremo per incanto degli alchimisti della musica, capaci di trasformare la materia in suono, e viceversa!"},{"n":"245","t":"L’EVOLUZIONE È UN GIOCO DI SQUADRA","p":[["Maurizio Casiraghi",0],["Telmo Pievani",0],["Silvia Lazzaris",1]],"raw":"Maurizio Casiraghi e Telmo Pievani con Silvia Lazzaris","d":"dom","h":"17:15","l":"palazzo san sebastiano","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["scienza","natura e animali"],"f":["lezione"],"de":"La natura, si sa, ha da sempre alimentato la creatività umana e il progresso: treni ispirati al becco degli uccelli, tessuti autopulenti come le foglie del loto… Una lezione che dovremmo fare nostra è però quella della costante collaborazione tra le specie, motore principale dell’evoluzione. Simbiosi e mutualismo interessano tutti gli ecosistemi della Terra, passando dal microcosmo dei batteri fino ad animali di notevoli dimensioni come il coccodrillo e la manta: la storia di queste relazioni è, al contempo, la storia degli scienziati che ne hanno studiato i meccanismi e compreso l’importanza, come la visionaria biologa statunitense Lynn Margulis negli anni Sessanta. Insieme alla giornalista Silvia Lazzaris, Telmo Pievani e Maurizio Casiraghi (autori di Uniti per la vita) illustreranno le avventurose vicende di queste scoperte, spiegando perché “specie diverse, anziché competere per le risorse, collaborano al punto tale da diventare indispensabili l’una per l’altra”. Come si suol dire, l’unione fa la forza."},{"n":"246","t":"SCRIVERE DALLA GUERRA, SCRIVERE LA GUERRA","p":[["Haidar al-Ghazali",0],["Francesca Mannocchi",0],["Mario Soldaini",1]],"raw":"Haidar al-Ghazali e Francesca Mannocchi con Mario Soldaini","d":"dom","h":"17:15","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["geopolitica e guerre","poesia","media e giornalismo"],"de":"Come si racconta una guerra quando non è un evento eccezionale, ma la materia stessa della vita quotidiana? È la domanda che attraversa l’incontro tra Haidar al-Ghazali e Francesca Mannocchi. Originario di Gaza, al-Ghazali – una poesia del quale è stata pubblicata nella raccolta Il loro grido è la mia voce – appartiene a una generazione cresciuta dentro il conflitto, in un tempo in cui l’esperienza della guerra coincide con quella della formazione, della memoria e dell’identità. Il dialogo prende avvio anche dalle parole di Crescere, la guerra, il libro in versi con cui Mannocchi trasforma anni di testimonianze raccolte in Siria, Afghanistan, Palestina e in altri territori di conflitto in una riflessione poetica sulla perdita, sulla memoria e sulla responsabilità dello sguardo. Due percorsi diversi si incontrano così attorno a questioni condivise: quali parole possono ancora raccontare la guerra senza ridurla a cronaca o a spettacolo? E quale spazio resta alla poesia e alla testimonianza quando la violenza invade la vita quotidiana?","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"247","t":"MARI INFETTI, TERRORI SPAZIALI","p":[["Kim Bo-young",0],["Luca Crovi",1]],"raw":"Kim Bo-young con Luca Crovi","s":"i miti oscuri di h.p. lovecraft","d":"dom","h":"17:30","l":"aula magna dell'universita","pr":"7,50 €","tg":["fantastico e horror","narrativa"],"de":"Se guardiamo all’Asia, e in particolare a Giappone e Corea, l’estetica di H.P. Lovecraft ha fatto breccia su narratori, registi, artisti e disegnatori molto più rapidamente che in Occidente, dove la sua opera, difesa da un manipolo di fan sfegatati e critici lungimiranti, ha faticato non poco per non esser più considerata paraletteratura o, peggio, spazzatura. Non si tratta solo di una diversa ricezione critica, ma di una vera e propria consonanza d’immaginari che autrici del calibro di Kim Bo-young – nota per le sue consulenze alla scrittura in ambito cinematografico ma soprattutto per aver fuso magistralmente weird, fantascienza e romanzo filosofico in opere come Il mare infetto e Odissea stellare – hanno interiorizzato e rinnovato completamente. Luca Crovi la incontra per parlare di prodigi alieni, misteriosi villaggi di pescatori e altre amenità miskatoniche!","no":"L’autrice parlerà in coreano, con interpretazione consecutiva in italiano. In collaborazione con LTI Korea (Literature Translation Institute of Korea). Su I miti oscuri di H.P. Lovecraft vedi p. 153"},{"n":"248","t":"CAPIRE L’IRAN","p":[["Majid Bita",0],["Paola Rivetti",0],["Eugenio Cau",1]],"raw":"Majid Bita e Paola Rivetti con Eugenio Cau","d":"dom","h":"17:30","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["geopolitica e guerre","politica e attualità","fumetto e illustrazione"],"de":"“Dopo più di un secolo di lotta per ottenere la libertà e la democrazia […] ancora non si può parlare e urlare a testa alta per distruggere i tiranni che regnano sul nostro paese. Vorrei essere iraniano a tutti i costi, ma questa mia identità mi soffoca certe volte”: il fumettista Majid Bita (L’autobus incantato) si è trasferito in Italia nel 2014, ben prima che la sua terra natia diventasse – come abbiamo letto negli ultimi mesi – l’ago della bilancia del Medio Oriente. Al Festival si confronta con la docente di Relazioni internazionali Paola Rivetti (Storia dell’Iran), per gettare insieme uno sguardo consapevole sulla complessa realtà odierna della regione. Tra fragili cessate il fuoco, minacce economiche, nuove tecnologie belliche e dichiarazioni contraddittorie, è difficile capire l’ostilità tra l’Iran e gli Stati Uniti (ma non solo) se non si parte dalla rivoluzione iraniana del 1979. Conduce il dialogo il giornalista Eugenio Cau."},{"n":"249","t":"LE STREGHE SON TORNATE","p":[["Luca Scarlini",0]],"raw":"Luca Scarlini","d":"dom","h":"17:30","l":"teatro bibiena","pr":"7,50 €","tg":["storia","miti e fiabe","genere e femminismo","arte e fotografia"],"de":"Streghe: si fa presto a usare questo termine, sostanzialmente inventato dall’opinione pubblica cattolica per definire donne che avevano qualità e virtù speciali. Ma va notato, come ricordava Mario Mieli nei suoi Elementi di critica omosessuale, che la parola “streghe” veniva utilizzata anche per gli uomini, per le persone che avessero diversa opinione, per gli eretici, per gli omosessuali. Con questo termine, la chiesa di Roma e le chiese protestanti hanno colpito tutte le figure indipendenti del pensiero. Il racconto è quello di una figura che in realtà è stata straordinaria per la nostra vita e la nostra società, restituita nella sua interezza attraverso le immagini della storia dell’arte. Un’arte spesso consenziente ai diktat del potere, ma talvolta anche in grado di far arrivare fino a noi l’idea che queste signore – o questi signori – fossero molto amati dalle comunità intorno a loro perché erano sempre in grado di aiutare al momento della malattia e del bisogno."},{"n":"250","t":"SUNT LACRIMAE RERUM","p":[["Patrizia Valduga",0]],"raw":"Patrizia Valduga","d":"dom","h":"18:00","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["poesia"],"de":"La poesia può diventare una forma di conoscenza proprio là dove l’esperienza si sottrae alla comprensione immediata: nel dolore, nella guerra, nella fragilità della condizione umana. Nel suo ultimo libro di versi, Lacrimae Rerum, Patrizia Valduga esplora una scrittura che si muove in quello spazio in cui il vissuto individuale e il destino collettivo si incontrano, riattivando una delle tensioni fondamentali della tradizione poetica. Corpo, amore, lutto e tempo diventano materia di una lingua che non si limita a rappresentare, ma lavora sull’esperienza stessa, trasformandola in linguaggio. In questa tessitura rigorosa e mobile, la sofferenza non è il contenuto da esprimere, ma la forza che modella ritmo e struttura, aprendo alla possibilità di una conoscenza che nasce dalla vulnerabilità e dalla sua elaborazione poetica."},{"t":"IL FUOCO SACRO DELLA SCRITTURA","p":[["Dario Ferrari",0],["Elsa Riccadonna",1]],"raw":"Dario Ferrari con Elsa Riccadonna","d":"dom","h":"18:00","l":"piazza dei libri","pr":"ingresso libero","ic":["streaming"],"tg":["scrittura e lettura","narrativa"],"no":"Sul Fuoco sacro della scrittura vedi p. 105"},{"t":"LE TRE CAUSE DELLA CRISI ECONOMICA AMERICANA","p":[["Alessandro Volpi",0]],"raw":"Alessandro Volpi","s":"lavagne","d":"dom","h":"18:00","l":"piazza mantegna","pr":"ingresso libero","tg":["economia e lavoro","politica e attualità"],"f":["lezione"],"de":"Gli Stati Uniti non sono più la maggiore potenza industriale del mondo e sono attraversati da una profonda crisi che coinvolge almeno tre aspetti essenziali: un debito federale in costante crescita (anche a causa dell’erosione del primato del dollaro), l’indebitamento privato di famiglie e aziende e, infine, la bolla finanziaria delle borse, spinte dalle quotazioni dei grandi colossi dell’intelligenza artificiale. Lo storico dell’economia ed esperto di sistemi finanziari Alessandro Volpi ricostruisce alla lavagna le criticità sistemiche dell’economia americana e le sue possibili ricadute sull’intero sistema mondiale."},{"n":"251","t":"MEMOIR GENEALOGICO","p":[["Emmanuel Carrère",0],["Gabriele Romagnoli",1]],"raw":"Emmanuel Carrère con Gabriele Romagnoli","s":"kaléidoscope français","d":"dom","h":"18:30","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["memoria e biografia","narrativa","storia"],"de":"La festa collettiva per questa trentesima edizione di Festivaletteratura si chiude nell’abbraccio di piazza Castello col ritorno di uno dei massimi scrittori contemporanei. Emmanuel Carrère (V13, Ucronia, Vite che non sono la mia) è abile e preciso testimone dello spirito dei tempi, capace di mettere in rapporto la letteratura con gli eventi della Storia, attraverso lo studio di archivi, dossier e testimonianze. Così accade anche in Kolchoz, in cui l’opera di ricostruzione è legata alla famiglia dell’autore e alla figura della madre, la storica e accademica Hélène Carrère d’Encausse, nata Zourabichvili. Insieme al giornalista Gabriele Romagnoli (La prima cosa bella) Carrère condurrà il pubblico in un viaggio ideale lungo il Novecento, passando dall’Unione Sovietica fino alla Georgia e alla Francia, per concludersi con una domanda fondamentale: qual è il lascito generazionale di chi è venuto prima di noi? anche grazie al sostegno di","no":"L’autore parlerà in francese, con interpretazione consecutiva in italiano."}],"luoghi":{"casa del mantegna":{"nome":"Casa del Mantegna","ind":"Via Giovanni Acerbi 47, Mantova","lat":45.1513203,"lng":10.7880822,"pid":"ChIJmZA4AxTUgUcRfVX41mK4ndE"},"politecnico di milano - campus di mantova":{"nome":"Politecnico di Milano – Campus di Mantova","ind":"Piazza Carlo d'Arco 3, Mantova","lat":45.1603792,"lng":10.7890531,"pid":"ChIJIakr9RvUgUcRBYQJWoAhkkI"},"tenda sordello":{"nome":"Tenda Sordello","ind":"Piazza Sordello, Mantova","lat":45.160247,"lng":10.7975976,"pid":"ChIJN38q-iHUgUcRlD3srLxVLOg"},"piazza dei libri":{"nome":"Piazza dei Libri","ind":"Piazza Sordello, Mantova","lat":45.1601,"lng":10.797,"pid":"ChIJN38q-iHUgUcRlD3srLxVLOg"},"aula magna dell'universita":{"nome":"Aula Magna dell'Università","ind":"Via Angelo Scarsellini 2, Mantova","lat":45.1601485,"lng":10.787867,"pid":"ChIJHU_OohvUgUcR8k6ptpvx1rI"},"piazza castello":{"nome":"Piazza Castello","ind":"Piazza Castello, Mantova","lat":45.1606993,"lng":10.7991904,"pid":"ChIJe4uVSuTVgUcRkbCwdqz7A6U"},"chiesa di santa maria della vittoria":{"nome":"Chiesa di Santa Maria della Vittoria","ind":"Via Claudio Monteverdi 1, Mantova","lat":45.1602725,"lng":10.7915151,"pid":"ChIJBe9LCBzUgUcRhoJJcfyHCkM"},"seminario vescovile - aula magna":{"nome":"Seminario Vescovile – Aula Magna","ind":"Via Fratelli Cairoli 20, Mantova","lat":45.1609606,"lng":10.7967055,"pid":"ChIJPXzAXh_UgUcRC9clk1TTy2w"},"palazzo san sebastiano":{"nome":"Palazzo San Sebastiano – Museo della Città","ind":"Largo XXIV Maggio 12, Mantova","lat":45.1503071,"lng":10.7869234,"pid":"ChIJgziyCxTUgUcRptDtfDeC_68"},"basilica palatina di santa barbara":{"nome":"Basilica Palatina di Santa Barbara","ind":"Piazzetta Santa Barbara, Mantova","lat":45.1601768,"lng":10.7993528,"pid":"ChIJBWHihiHUgUcRP864Y4724Ng"},"teatro bibiena":{"nome":"Teatro Scientifico del Bibiena","ind":"Via Accademia 47, Mantova","lat":45.1579173,"lng":10.7981246,"pid":"ChIJUXIeUCLUgUcRsC6-C1XYFps"},"piazza leon battista alberti":{"nome":"Piazza Leon Battista Alberti","ind":"Piazza Leon Battista Alberti, Mantova","lat":45.1595125,"lng":10.7943525,"pid":"ChIJ2VJ00BjUgUcRpDgh_YeigWA"},"piazza mantegna":{"nome":"Piazza Andrea Mantegna","ind":"Piazza Andrea Mantegna, Mantova","lat":45.1584733,"lng":10.7940016,"pid":"ChIJceQ15RjUgUcR_-CKqZfwZ-M"},"cappella di palazzo del mago":{"nome":"Cappella di Palazzo del Mago","ind":"Piazza San Leonardo, Mantova","lat":45.1647147,"lng":10.7925097,"pid":"ChIJu7-QBx7UgUcRulPFnGwvWpM"},"tempio di san sebastiano":{"nome":"Tempio di San Sebastiano","ind":"Via Giovanni Acerbi, Mantova","lat":45.1509771,"lng":10.7880673,"pid":"ChIJr6xnAxTUgUcRpFXgJKbMAHU"},"chiesa di san cristoforo":{"nome":"Ex Chiesa di San Cristoforo","ind":"Via Giulio Romano 1, Mantova","lat":45.1530534,"lng":10.7895163,"pid":"ChIJHfXB5xbUgUcRaq57sjSTjCI"},"cinema oberdan":{"nome":"Cinema Oberdan","ind":"Via Guglielmo Oberdan, Mantova","lat":45.1581171,"lng":10.7916851,"pid":"ChIJ6VlQ0xrUgUcRCt4rNi7Oy8E"},"pontile pescherie di giulio romano":{"nome":"Pescherie di Giulio Romano","ind":"Via Pescheria 20, Mantova","lat":45.1560913,"lng":10.7929484,"pid":"ChIJ_WntLxjUgUcRCpYEpk4C59Y"},"biblioteca teresiana":{"nome":"Biblioteca Teresiana","ind":"Via Roberto Ardigò 13, Mantova","lat":45.1580168,"lng":10.7972052,"pid":"ChIJrbOCZyLUgUcRl5pPIoipKHw"},"piazza concordia":{"nome":"Piazza Concordia","ind":"Piazza Concordia, Mantova","lat":45.1579542,"lng":10.7946156,"pid":"ChIJ7aSpixjUgUcR4QnhlJzpH84"},"sotterranei del castello di san giorgio":{"nome":"Sotterranei del Castello di San Giorgio","ind":"Piazza Sordello 40, Mantova","lat":45.1608055,"lng":10.7998153,"pid":"ChIJreJ0kCHUgUcRYN8aSd_0xT4"},"palazzo te":{"nome":"Palazzo Te","ind":"Viale Te 13, Mantova","lat":45.1475198,"lng":10.7865928,"pid":"ChIJTWv1fxTUgUcRm_IOVB5SG-I"},"piazza virgiliana":{"nome":"Piazza Virgiliana","ind":"Piazza Virgiliana, Mantova","lat":45.1628829,"lng":10.7947108,"pid":"ChIJm2uEVh7UgUcRmUOiJAE-_6o"},"parco belfiore":{"nome":"Parco Belfiore","ind":"Viale VII Dicembre 4, Mantova","lat":45.1563224,"lng":10.7715298,"pid":"ChIJpz-I2PfTgUcR1dx48GLuCLM"},"palazzo del podesta - museo virgilio":{"nome":"Museo Virgilio – Palazzo del Podestà","ind":"Piazza Broletto, Mantova","lat":45.1587784,"lng":10.7952804,"pid":"ChIJv4EHlhjUgUcRkHEEB5uC68Y"},"parco museo virgilio - forte di pietole":{"nome":"Parco Museo Virgilio – Forte di Pietole","ind":"Strada del Corriere, Borgo Virgilio (MN)","lat":45.1299805,"lng":10.8129337,"pid":"ChIJ25CTbavVgUcRBab93VdoceE"},"fossato di rodigo - villa nievo":{"nome":"Villa Nievo – Fossato di Rodigo","ind":"Strada Mirandola 1, Fossato di Rodigo (MN)","lat":45.206068,"lng":10.6441,"pid":"ChIJ4SQ3WRvPgUcRwD_ySiv-fWE"},"via tasso":{"nome":"Via Tasso","ind":"Via Torquato Tasso, Mantova","lat":45.1516837,"lng":10.789928,"pid":"ChIJH6SMfRbUgUcRU85Hj22ftFM"},"cappella di palazzo del mago piazza sordello":{"nome":"Da Palazzo del Mago a Piazza Sordello (parata)","ind":"Da Piazza San Leonardo a Piazza Sordello, Mantova","lat":45.1647147,"lng":10.7925097,"pid":"ChIJu7-QBx7UgUcRulPFnGwvWpM"}}}</script>
<script>
'use strict';
const DATA = JSON.parse(document.getElementById('dati').textContent);
const EV = DATA.eventi, LU = DATA.luoghi;
EV.forEach((e,ix)=>e.i=ix);
const GIORNI = [
  {k:'mer', label:'Mer', num:'9',  full:'mercoledì 9',  col:'var(--c-mer)'},
  {k:'gio', label:'Gio', num:'10', full:'giovedì 10',   col:'var(--c-gio)'},
  {k:'ven', label:'Ven', num:'11', full:'venerdì 11',   col:'var(--c-ven)'},
  {k:'sab', label:'Sab', num:'12', full:'sabato 12',    col:'var(--c-sab)'},
  {k:'dom', label:'Dom', num:'13', full:'domenica 13',  col:'var(--c-dom)'},
  {k:'tutti', label:'Tutti i giorni', num:'', full:'tutti i giorni', col:'var(--c-tutti)'}
];
const GMAP = Object.fromEntries(GIORNI.map(g=>[g.k,g]));
const FASCE = [ {k:'mattina',l:'Mattina',t:'fino alle 13'}, {k:'pomeriggio',l:'Pomeriggio',t:'13–18'}, {k:'sera',l:'Sera',t:'dalle 18'} ];
const TAGS = [...new Set(EV.flatMap(e=>e.tg||[]))].sort((a,b)=>a.localeCompare(b,'it'));
const LKEYS = Object.keys(LU).sort((a,b)=>LU[a].nome.localeCompare(LU[b].nome,'it'));

/* ---------- preferiti (localStorage con fallback) ---------- */
let favMem = new Set();
function loadFav(){ try{ const s=localStorage.getItem('fl26fav'); if(s) favMem=new Set(JSON.parse(s)); }catch(e){} }
function saveFav(){ try{ localStorage.setItem('fl26fav', JSON.stringify([...favMem])); }catch(e){} updBadge(); }
function isFav(i){ return favMem.has(i); }
let toastT=null;
function toast(msg){ const t=document.getElementById('toast'); if(!t) return;
  t.innerHTML=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1700); }
function toggleFav(i,ev){ if(ev)ev.stopPropagation();
  const adding=!favMem.has(i);
  adding?favMem.add(i):favMem.delete(i); saveFav(); refreshHearts(i);
  document.querySelectorAll(`[data-h="${i}"]`).forEach(el=>{el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');});
  const g=GMAP[EV[i].d]||{};
  toast(adding?`<span class="th">♥</span> Aggiunto al diario di ${g.full||''}`:`Rimosso dal diario`);
  if(tab==='diario') render(); }
function updBadge(){ const b=document.getElementById('favbdg'); if(favMem.size){b.style.display='';b.textContent=favMem.size;} else b.style.display='none'; }
loadFav();

/* ---------- helpers ---------- */
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const mins = h => { if(!h) return 9999; const [a,b]=h.split(':').map(Number); return a*60+b; };
function fascia(h){ const m=mins(h); return m<13*60?'mattina':(m<18*60?'pomeriggio':'sera'); }
function durata(e){ const f=e.f||[]; if(f.includes('laboratorio'))return 135; if(f.includes('percorso/visita'))return 105; return 80; }
function gratis(e){ return e.pr && /ingresso/i.test(e.pr); }
const heartSvg='<svg viewBox="0 0 24 24"><path d="M12 20.5s-8-4.7-8-10a4.6 4.6 0 0 1 8-3.1 4.6 4.6 0 0 1 8 3.1c0 5.3-8 10-8 10z"/></svg>';
function refreshHearts(i){ document.querySelectorAll(`[data-h="${i}"]`).forEach(el=>el.classList.toggle('on',isFav(i))); }
function haversine(a,b){ const R=6371e3,r=Math.PI/180; const dLa=(b.lat-a.lat)*r, dLo=(b.lng-a.lng)*r;
  const x=Math.sin(dLa/2)**2 + Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(x)); }
function walkMin(a,b){ return Math.max(1, Math.round(haversine(a,b)*1.3/80)); }
function gmapsUrl(l){ return `https://www.google.com/maps/search/?api=1&query=${l.lat},${l.lng}&query_place_id=${l.pid}`; }
function dirUrl(a,b){ return `https://www.google.com/maps/dir/?api=1&origin=${a.lat},${a.lng}&destination=${b.lat},${b.lng}&travelmode=walking`; }

/* ---------- stato ---------- */
let tab='eventi';
let ST = { day:'mer', fasce:new Set(), luogo:'', tags:new Set(), fopen:false, qa:'', ql:'', diaDay:'gio', openA:new Set(), openL:new Set() };

function go(t){ tab=t; window.scrollTo(0,0); render(); }
function render(){
  ['eventi','autori','luoghi','diario'].forEach(t=>document.getElementById('nb-'+t).classList.toggle('on',t===tab));
  const v=document.getElementById('view');
  if(tab==='eventi') v.innerHTML=viewEventi();
  else if(tab==='autori') v.innerHTML=viewAutori();
  else if(tab==='luoghi') v.innerHTML=viewLuoghi();
  else { v.innerHTML=viewDiario(); setTimeout(initMap,30); }
  updBadge();
}

/* ---------- card evento ---------- */
function card(e){
  const l = e.l?LU[e.l]:null;
  const persone = (e.p||[]).map(p=>p[0]).join(', ');
  return `<div class="card" onclick="openSheet(${e.i})">
    <div class="num ${gratis(e)?'free':''}">${e.n||'•'}</div>
    <div class="cbody">
      <div class="ctime">${e.h||''}${e.d==='tutti'?'tutti i giorni':''}
        ${gratis(e)?'<span class="gratis">libero</span>':''}
        ${e.e?`<span class="eta">${esc(e.e)}</span>`:''}</div>
      <div class="ctit">${esc(e.t)}</div>
      ${persone?`<div class="caut">${esc(persone)}</div>`:''}
      ${l?`<div class="cluogo">📍 ${esc(l.nome)}</div>`:''}
      ${(e.tg&&e.tg.length)?`<div class="ctags">${e.tg.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
    </div>
    <button class="heart ${isFav(e.i)?'on':''}" data-h="${e.i}" onclick="toggleFav(${e.i},event)">${heartSvg}</button>
  </div>`;
}

/* ---------- vista EVENTI ---------- */
function nFiltri(){ return ST.fasce.size + (ST.luogo?1:0) + ST.tags.size; }
function filtrati(){
  return EV.filter(e=>{
    if(e.d!==ST.day) return false;
    if(ST.fasce.size && e.d!=='tutti' && !ST.fasce.has(fascia(e.h))) return false;
    if(ST.luogo && e.l!==ST.luogo) return false;
    if(ST.tags.size && !(e.tg||[]).some(t=>ST.tags.has(t))) return false;
    return true;
  }).sort((a,b)=> mins(a.h)-mins(b.h) || (parseInt(a.n)||999)-(parseInt(b.n)||999));
}
function viewEventi(){
  const list=filtrati();
  const g=GMAP[ST.day];
  let groups='';
  if(ST.day==='tutti'){
    groups = list.map(card).join('');
  } else {
    const by={mattina:[],pomeriggio:[],sera:[]};
    list.forEach(e=>by[fascia(e.h)].push(e));
    groups = FASCE.filter(f=>by[f.k].length).map(f=>
      `<div class="gruppo-h"><span class="pallino" style="background:${g.col}"></span>${f.l} <span style="color:var(--grigio);font-weight:500;text-transform:none">· ${f.t}</span></div>`
      + by[f.k].map(card).join('')).join('');
  }
  return `
  <div class="daybar">${GIORNI.map(d=>`<button class="chip ${ST.day===d.k?'on':''}" onclick="setDay('${d.k}')">${d.label}${d.num?' '+d.num:''}</button>`).join('')}</div>
  <button class="filterbtn" onclick="ST.fopen=!ST.fopen;render()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="17" x2="14" y2="17"/></svg>
    Filtri ${nFiltri()?`<span class="dot">${nFiltri()}</span>`:''}</button>
  <div class="fpanel ${ST.fopen?'open':''}">
    <h4>Fascia oraria</h4>
    <div class="fchips">${FASCE.map(f=>`<button class="chip ${ST.fasce.has(f.k)?'on':''}" onclick="tgSet(ST.fasce,'${f.k}')">${f.l}</button>`).join('')}</div>
    <h4>Luogo</h4>
    <select class="fsel" onchange="ST.luogo=this.value;render()">
      <option value="">Tutti i luoghi</option>
      ${LKEYS.map(k=>`<option value="${k}" ${ST.luogo===k?'selected':''}>${esc(LU[k].nome)}</option>`).join('')}
    </select>
    <h4>Tag</h4>
    <div class="fchips">${TAGS.map((t,ti)=>`<button class="chip ${ST.tags.has(t)?'on':''}" onclick="tgTag(${ti})">${esc(t)}</button>`).join('')}</div>
    ${nFiltri()?'<button class="freset" onclick="resetF()">Azzera filtri</button>':''}
  </div>
  <div class="count">${list.length} eventi · ${g.full} settembre</div>
  ${groups || '<div class="vuoto">Nessun evento con questi filtri.<br>Prova ad allargarli!</div>'}`;
}
function setDay(k){ ST.day=k; render(); window.scrollTo(0,0); }
function tgSet(s,v){ s.has(v)?s.delete(v):s.add(v); render(); }
function tgA(i){ tgSet(ST.openA, AUTORI[i].n); }
function tgL(i){ tgSet(ST.openL, LKEYS[i]); }
function tgTag(i){ tgSet(ST.tags, TAGS[i]); }
function resetF(){ ST.fasce.clear(); ST.tags.clear(); ST.luogo=''; render(); }

/* ---------- modale dettaglio ---------- */
function openSheet(i){
  const e=EV[i], l=e.l?LU[e.l]:null, g=GMAP[e.d]||{};
  const persone=(e.p||[]).map(p=>`<span class="persona">${esc(p[0])}${p[1]?' <small>· conduce</small>':''}</span>`).join('');
  const rif = e.v ? EV.find(x=>x.n===e.v.replace('vedi n. ','') && x.de) : null;
  const desc = e.de || (rif?rif.de:'');
  document.getElementById('sheet').innerHTML=`
    <div class="sheet-head">
      <button class="x" onclick="closeSheet()">✕</button>
      ${e.n?`<div class="snum">${e.n}</div>`:''}
      <h2>${esc(e.t)}</h2>
      ${e.st?`<div class="ssub">${esc(e.st)}</div>`:''}
      ${e.s?`<div class="ssub">${esc(e.s)}</div>`:''}
    </div>
    <div class="sheet-body">
      <div class="riga"><span class="ic">🗓</span><div><b style="text-transform:capitalize">${e.d==='tutti'?'Tutti i giorni':g.full+' settembre'}</b>${e.h?' · ore <b>'+e.h+'</b>':''}${e.hh?'<br><span style="font-size:12px;color:var(--grigio)">'+esc(e.hh)+'</span>':''}</div></div>
      ${l?`<div class="riga"><span class="ic">📍</span><div><b>${esc(l.nome)}</b><br><span style="font-size:12px;color:var(--grigio)">${esc(l.ind)}</span></div></div>`:''}
      ${e.pr?`<div class="riga"><span class="ic">🎟</span><div>${esc(e.pr)}</div></div>`:''}
      ${e.e?`<div class="riga"><span class="ic">🧒</span><div>${esc(e.e)}</div></div>`:''}
      ${(e.ic&&e.ic.length)?`<div class="riga"><span class="ic">ℹ️</span><div style="font-size:12.5px">${e.ic.map(esc).join(' · ')}</div></div>`:''}
      ${persone?`<div class="persone-list">${persone}</div>`:''}
      <div class="sheet-actions">
        <button class="abtn fav ${isFav(e.i)?'on':''}" data-h="${e.i}" onclick="toggleFav(${e.i});this.classList.toggle('on',isFav(${e.i}));this.textContent=isFav(${e.i})?'♥ Nel diario':'♡ Aggiungi al diario'">${isFav(e.i)?'♥ Nel diario':'♡ Aggiungi al diario'}</button>
        ${l?`<a class="abtn maps" target="_blank" rel="noopener" href="${gmapsUrl(l)}">Apri in Maps</a>`:''}
      </div>
      ${e.v?`<div class="warn" style="margin-top:8px">Replica — descrizione dell'evento n. ${esc(e.v.replace('vedi n. ',''))}</div>`:''}
      ${desc?`<div class="sdesc">${esc(desc)}</div>`:''}
      ${e.no?`<div class="snote">${esc(e.no)}</div>`:''}
      ${(e.tg&&e.tg.length)?`<div class="stagwrap">${e.tg.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
    </div>`;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow='';
  if(tab==='eventi'||tab==='diario') render();
}

/* ---------- vista AUTORI ---------- */
const AUTORI = (()=>{ const m={};
  EV.forEach(e=>(e.p||[]).forEach(p=>{ (m[p[0]]=m[p[0]]||[]).push({i:e.i,ruolo:p[1]}); }));
  return Object.keys(m).sort((a,b)=>{
    const la=a.split(' ').slice(-1)[0], lb=b.split(' ').slice(-1)[0];
    return la.localeCompare(lb,'it')||a.localeCompare(b,'it');
  }).map(n=>({n, evs:m[n].sort((x,y)=>ordEv(EV[x.i])-ordEv(EV[y.i]))}));
})();
function ordEv(e){ const d={mer:0,gio:1,ven:2,sab:3,dom:4,tutti:5}[e.d]??9; return d*10000+mins(e.h); }
function cognome(n){ return n.split(' ').slice(-1)[0]; }
function normTxt(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function viewAutori(){
  const q=normTxt(ST.qa);
  const list=AUTORI.filter(a=>!q||normTxt(a.n).includes(q));
  let html='',last='';
  list.forEach(a=>{
    const L=cognome(a.n)[0].toUpperCase();
    if(L!==last && !q){ html+=`<div class="aletter">${L}</div>`; last=L; }
    const ai=AUTORI.indexOf(a);
    const open=ST.openA.has(a.n);
    html+=`<div class="arow ${open?'open':''}">
      <div class="arow-h" onclick="tgA(${ai})">
        <span>${esc(a.n)}</span><span class="cnt">${a.evs.length}</span></div>
      <div class="arow-ev">${a.evs.map(x=>{ const e=EV[x.i], g=GMAP[e.d]||{};
        return `<div class="mini-ev" onclick="openSheet(${e.i})">
          <span class="md">${e.d==='tutti'?'sempre':g.label+' '+g.num+(e.h?' '+e.h:'')}</span>
          <span class="mt">${esc(e.t)}${x.ruolo?' <span class="mruolo">(conduce)</span>':''}</span></div>`; }).join('')}</div>
    </div>`;
  });
  return `<div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    <input type="search" placeholder="Cerca per nome o cognome…" value="${esc(ST.qa)}" oninput="ST.qa=this.value;render();this.focus();this.setSelectionRange(this.value.length,this.value.length)"></div>
  <div class="count">${list.length} autrici e autori</div>
  ${html || '<div class="vuoto">Nessun autore trovato.</div>'}`;
}

/* ---------- vista LUOGHI ---------- */
const PERLUOGO=(()=>{ const m={}; EV.forEach(e=>{ if(e.l)(m[e.l]=m[e.l]||[]).push(e.i); });
  Object.values(m).forEach(a=>a.sort((x,y)=>ordEv(EV[x])-ordEv(EV[y]))); return m; })();
function viewLuoghi(){
  const q=normTxt(ST.ql);
  const keys=LKEYS.filter(k=>PERLUOGO[k]&&(!q||normTxt(LU[k].nome).includes(q)));
  return `<div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    <input type="search" placeholder="Cerca un luogo…" value="${esc(ST.ql)}" oninput="ST.ql=this.value;render();this.focus();this.setSelectionRange(this.value.length,this.value.length)"></div>
  <div class="count">${keys.length} luoghi del Festival</div>
  ${keys.map(k=>{ const l=LU[k], open=ST.openL.has(k), li=LKEYS.indexOf(k);
    return `<div class="arow ${open?'open':''}">
      <div class="arow-h" onclick="tgL(${li})">
        <span>${esc(l.nome)}<div class="lrow-addr">${esc(l.ind)}</div></span><span class="cnt">${PERLUOGO[k].length}</span></div>
      <div class="arow-ev">
        <div style="padding:2px 0 7px"><a href="${gmapsUrl(l)}" target="_blank" rel="noopener" style="color:var(--blu);font-weight:700;text-decoration:none;font-size:12px">📍 Apri in Google Maps</a></div>
        ${PERLUOGO[k].map(i=>{ const e=EV[i], g=GMAP[e.d]||{};
          return `<div class="mini-ev" onclick="openSheet(${e.i})">
            <span class="md">${e.d==='tutti'?'sempre':g.label+' '+g.num+(e.h?' '+e.h:'')}</span>
            <span class="mt">${esc(e.t)}</span></div>`; }).join('')}
      </div></div>`; }).join('')}`;
}

/* ---------- vista DIARIO ---------- */
let map=null, mapLayer=null;
function favByDay(d){ return [...favMem].map(i=>EV[i]).filter(e=>e.d===d||e.d==='tutti').filter(e=>e.d!=='tutti'||d!=='tutti')
  .filter(e=>e.d===d).sort((a,b)=>mins(a.h)-mins(b.h)); }
function viewDiario(){
  if(!favMem.size) return `<div class="dvuoto"><div class="big">♡</div>
    Il tuo diario è vuoto.<br>Tocca il cuore sugli eventi che ti interessano:<br>li ritroverai qui, giorno per giorno, con mappa e spostamenti.</div>`;
  const days=GIORNI.filter(g=>g.k!=='tutti');
  const cnt=Object.fromEntries(days.map(g=>[g.k,favByDay(g.k).length]));
  const sempre=[...favMem].map(i=>EV[i]).filter(e=>e.d==='tutti');
  const list=favByDay(ST.diaDay);
  let steps='';
  list.forEach((e,ix)=>{
    const l=e.l?LU[e.l]:null;
    let conflitto='', trasf='';
    if(ix>0){
      const prev=list[ix-1], lp=prev.l?LU[prev.l]:null;
      const fine=mins(prev.h)+durata(prev);
      const gap=mins(e.h)-fine;
      if(lp&&l&&lp!==l){
        const w=walkMin(lp,l);
        trasf=`<div class="transfer"><div class="rail2"><span></span></div>
          <div class="tinfo">🚶 <b>~${w} min</b> a piedi → ${esc(l.nome)} · <a style="color:var(--blu)" target="_blank" rel="noopener" href="${dirUrl(lp,l)}">percorso</a>${gap<w?` <span style="color:var(--rosso);font-weight:700">· stretto!</span>`:''}</div></div>`;
      } else if(lp&&l&&lp===l){
        trasf=`<div class="transfer"><div class="rail2"><span></span></div><div class="tinfo">stesso luogo — nessuno spostamento</div></div>`;
      }
      if(gap<0) conflitto=`<div class="warn">⚠️ Possibile sovrapposizione con «${esc(prev.t)}» (durata stimata)</div>`;
    }
    steps+=trasf+`<div class="step">
      <div class="rail"><div class="rnum">${ix+1}</div>${ix<list.length-1?'<div class="rline"></div>':''}</div>
      <div class="scard" onclick="openSheet(${e.i})">
        <div class="stime">${e.h||''}</div>
        <div class="stit">${esc(e.t)}</div>
        ${l?`<div class="sluo">📍 ${esc(l.nome)}</div>`:''}
        ${conflitto}
      </div></div>`;
  });
  const tot=list.length;
  let statline='';
  if(tot){
    let walkTot=0;
    for(let ix=1;ix<list.length;ix++){ const a=list[ix-1].l?LU[list[ix-1].l]:null, b=list[ix].l?LU[list[ix].l]:null;
      if(a&&b&&a!==b) walkTot+=walkMin(a,b); }
    statline=`<div class="dstat">${tot} eventi · dalle ${list[0].h} alle ${list[tot-1].h} · ~${walkTot} min di cammino totali</div>`;
  }
  return `
  <div class="daybar">${days.map(d=>`<button class="chip ${ST.diaDay===d.k?'on':''}" onclick="ST.diaDay='${d.k}';render()">${d.label} ${d.num}${cnt[d.k]?` <small>${cnt[d.k]} ev</small>`:''}</button>`).join('')}</div>
  ${tot?`<div id="map"></div>${statline}${steps}`:
    `<div class="dvuoto">Nessun preferito ${GMAP[ST.diaDay].full} settembre.<br>Aggiungine dalla lista eventi!</div>`}
  ${sempre.length?`<div class="gruppo-h" style="margin-top:14px"><span class="pallino" style="background:var(--c-tutti)"></span>Aperti tutti i giorni</div>${sempre.map(card).join('')}`:''}`;
}
function initMap(){
  const el=document.getElementById('map'); if(!el) return;
  const list=favByDay(ST.diaDay).filter(e=>e.l);
  if(map){ map.remove(); map=null; }
  map=L.map('map',{scrollWheelZoom:false});
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  const pts=[], seen={};
  list.forEach((e,ix)=>{
    const l=LU[e.l]; pts.push([l.lat,l.lng]);
    const key=e.l; const label=(seen[key]?seen[key]+',':'')+(ix+1); seen[key]=label;
  });
  const done=new Set();
  list.forEach((e,ix)=>{
    if(done.has(e.l)) return; done.add(e.l);
    const l=LU[e.l];
    const icon=L.divIcon({className:'', html:`<div style="background:var(--blu);color:#fff;border:2px solid #fff;border-radius:50%;min-width:26px;height:26px;line-height:22px;text-align:center;font-weight:800;font-size:11px;box-shadow:0 1px 4px rgba(0,0,0,.4);padding:0 3px">${seen[e.l]}</div>`, iconSize:[26,26], iconAnchor:[13,13]});
    L.marker([l.lat,l.lng],{icon}).addTo(map).bindPopup(`<b>${esc(l.nome)}</b><br><a target="_blank" rel="noopener" href="${gmapsUrl(l)}">Apri in Maps</a>`);
  });
  if(pts.length>1) L.polyline(pts,{color:'#1d3fa3',weight:3,opacity:.55,dashArray:'6 6'}).addTo(map);
  if(pts.length) map.fitBounds(pts,{padding:[34,34],maxZoom:16}); else map.setView([45.1585,10.795],14);
}

render();
</script>
</body>
