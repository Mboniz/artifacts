O SPAESAMENTO COLLETTIVO","p":[["Ece Temelkuran",0],["Francesca Mannocchi",1]],"raw":"Ece Temelkuran con Francesca Mannocchi","d":"ven","h":"14:45","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["migrazioni e confini","geopolitica e guerre","politica e attualità"],"de":"Alla base dei grandi movimenti migratori contemporanei si intrecciano cause diverse: i conflitti armati, le profonde disparità economiche, le crisi ambientali e il bisogno di costruire una vita più dignitosa. Da queste dinamiche emerge una crescente moltitudine di persone costrette a lasciare il proprio luogo d’origine, in una condizione di sradicamento che le priva di un vero senso di appartenenza e, spesso, coinvolge persino “chi si sente fuori luogo anche dentro il proprio paese”. È una caratteristica comune a milioni di individui che vivono in modo diasporico sulla Terra. La giornalista e attivista Ece Temelkuran (Come sfasciare un paese in sette mosse) fa parte di questo vasto gruppo e ha ragionato di tale condizione di spaesamento collettivo nel saggio-memoir Stranieri come te. Di questo “zigzagare all’infinito tra orgoglio e dignità” l’autrice turca discute insieme a Francesca Mannocchi (Crescere, la guerra, Sulla mia terra).","no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"97","t":"IL CONFLITTO NON ERA FINITO","p":[["Valerio Mattioli",0],["Wu Ming 1",0],["Annalisa Camilli",1]],"raw":"Valerio Mattioli e Wu Ming 1 con Annalisa Camilli","d":"ven","h":"14:45","l":"aula magna dell'universita","pr":"7,50 €","tg":["politica e attualità","storia","diritti e società"],"de":"In un momento in cui centri sociali e spazi autogestiti sono sotto attacco e gli sgomberi si succedono, vale la pena tornare a chiedersi cosa siano stati, e cosa siano ancora, questi spazi. È quanto ha fatto Valerio Mattioli nel saggio Novanta, ricostruendo la vivace scena culturale e politica nata in quel decennio dentro e intorno ai centri sociali. Luoghi dove si è ritrovata una generazione che, ignara della presunta fine della storia, pensava che il conflitto non fosse finito, scriveva su riviste underground e frequentava spazi alternativi. Veri e propri laboratori creativi che hanno contribuito alla nascita di fenomeni come il primo rap in italiano, le visionarie distopie cyberpunk, ma anche progetti letterari anomali come Luther Blissett prima, e Wu Ming poi. A ripercorrere quella stagione, e a interrogarne l’eredità, insieme a Mattioli saranno Wu Ming 1 (Gli uomini pesce) e la giornalista Annalisa Camilli (Divieto di protestare)."},{"n":"98","t":"SULLA SOGLIA DI ME","p":[["Pina Irace",0]],"raw":"Pina Irace","s":"laboratorio di trasformazione","e":"dai 7 ai 10 anni","d":"ven","h":"15:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["infanzia ed educazione","arte e fotografia","mente e psicologia"],"f":["per bambini","laboratorio"],"de":"Ti piacerebbe creare un personaggio che sei tu o forse no? Che ti assomiglia ma è anche molto diverso? Che è come vorresti essere o come ti immagini? Insieme a Pina Irace (Un po' più in là) proveremo a raccontare la doppia storia di te e te, scrivendo e disegnando."},{"t":"LE BIOGRAFIE DEGLI OGGETTI","p":[["Christian Greco",0]],"raw":"Christian Greco","s":"accenti","d":"ven","h":"15:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["arte e fotografia","storia"],"de":"Che cosa succede se smettiamo di guardare gli oggetti di un museo come reperti fermi nel tempo e iniziamo a considerarli come presenze che hanno una biografia? Visto in questa prospettiva, secondo il direttore del Museo Egizio di Torino Christian Greco, l’oggetto museale diventa meno distante: non più soltanto “pezzo” da osservare dietro una vetrina, ma frammento di vita materiale capace di risuonare con la nostra esperienza quotidiana."},{"t":"NATI DAL FUOCO","p":[["Lorenzo Casadei",0]],"raw":"Lorenzo Casadei","s":"accenti","d":"ven","h":"16:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["miti e fiabe","fantastico e horror","religione e spiritualità"],"de":"Nella mitologia araba i jinn sono entità soprannaturali, come il celebre genio della lampada di Aladino. Entità intermedie tra il mondo angelico e gli esseri umani, queste creature sono già presenti nelle leggende di epoca preislamica: Lorenzo Casadei, che ha curato il volume Il mondo dei jinn di Amira El-Zein, ci porterà in viaggio in questo immaginario dalla grande complessità teologica e antropologica."},{"n":"99","t":"UN FUTURO SU MISURA","p":[["Konstantin Grcic",0],["Paolo Ferrarini",1]],"raw":"Konstantin Grcic con Paolo Ferrarini","d":"ven","h":"16:30","l":"teatro bibiena","pr":"7,50 €","tg":["arte e fotografia","città e architettura","tecnologia e IA"],"de":"Tra i più iconici prodotti d’arredo degli ultimi vent’anni appare una sedia entrata ormai nell’immaginario collettivo: la Chair_One è una scocca in alluminio pressofuso dalla forte geometria tridimensionale, ispirata alla tassellatura esterna di un pallone da calcio e nata dalla mente di Konstantin Grcic. Il designer tedesco, che già alle scuole superiori restaurava mobili per diletto, ha studiato ebanisteria prima di specializzarsi in design industriale a Londra e da sempre guarda con attenzione a un mondo dello sport in cui la progettazione delle attrezzature si basa sul principio di “ottenere il massimo con il minimo”. Di come “gli sviluppi dell’equipaggiamento sportivo arriveranno a influenzare la nostra pratica del prodotto”, portando il design verso soluzioni su misura per singoli committenti, il due volte vincitore del Compasso d’Oro ragionerà insieme al docente e curatore Paolo Ferrarini.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con il Goethe-Institut Mailand."},{"n":"100","t":"IL MIO PINOCCHIO","p":[["Daniele Fior",0],["Igiaba Scego",0],["Bruno Tognolini",0],["Pino Costalunga",1]],"raw":"Daniele Fior, Igiaba Scego e Bruno Tognolini con Pino Costalunga","e":"dai 7 anni","d":"ven","h":"16:30","l":"casa del mantegna","pr":"7,50 €","tg":["narrativa","infanzia ed educazione","miti e fiabe"],"f":["per bambini"],"de":"Le avventure di Pinocchio è senz’altro uno dei libri italiani più amati e conosciuti al mondo. Non si contano gli adattamenti teatrali e cinematografici, le citazioni e gli omaggi più o meno espliciti a questo classico della letteratura per ragazzi (e non solo) che si ritrovano in moltissimi romanzi di tutte le lingue. Nato dalla fantasia di Carlo Collodi, di cui ricorrono quest’anno i duecento anni dalla nascita, Pinocchio fa parte dell’immaginario di ciascuno di noi: a esso colleghiamo ricordi e fantasie personali, tanto che ciascuno ha un “suo” Pinocchio, forse con un naso un po’ più lungo di quello degli altri. Per festeggiare questo anniversario collodiano, Pino Costalunga ci proporrà una galleria di singolarissimi Pinocchi: quelli letti, vissuti, sognati da autrici e autori presenti a Festivaletteratura 2026. E chi vorrà raccontare il proprio Pinocchio, potrà unirsi alla compagnia! Per l’incontro è previsto un servizio di interpretazione nella lingua dei segni italiana."},{"n":"101","t":"SCEGLIERE?","p":[["Hélène Vignal",0],["Simonetta Bitasi",1]],"raw":"Hélène Vignal con Simonetta Bitasi","s":"kaléidoscope français","e":"dai 14 anni","d":"ven","h":"16:30","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["narrativa","infanzia ed educazione"],"f":["per ragazzi"],"de":"Hélène Vignal è da molti anni un punto di riferimento della letteratura per ragazze, ragazzi e adolescenti. È stata finalista al Premio Andersen 2012, selezionata per l’Ibby Honour List 2012 e, con Queen Kong, nel 2021 ha vinto la Pépite d’or, il più importante premio della letteratura per ragazzi francese. “Ho scelto senza aspettare di essere scelta”, dice la protagonista di Queen Kong, aprendo un importante confronto sui limiti dello scoprire il proprio corpo e la propria sessualità in un mondo in cui nessuno è libero di essere come è. Isolata da amici e compagni, coperta di insulti sul telefono e sui social, sceglierà comunque come essere e cosa fare. Di libri necessari, di storie che mettono al centro la realtà di ragazze e ragazzi e di come la letteratura può combattere ingiustizie e stereotipi la scrittrice francese parla con le giovani lettrici e i giovani lettori e con Simonetta Bitasi.","no":"L’autrice parlerà in francese, con interpretazione consecutiva in italiano."},{"n":"102","t":"TORNARE ALLA PROPRIA GABBIA","p":[["Tommy Wieringa",0],["Nicolò Porcelluzzi",1]],"raw":"Tommy Wieringa con Nicolò Porcelluzzi","d":"ven","h":"16:30","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["narrativa","memoria e biografia"],"de":"“Per me l’identità rappresenta moltissimo, spesso quando si sa da dove si viene, si sa anche chi si è”: cresciuto in una fattoria a due ore dalla scuola più vicina, Tommy Wieringa (Nirvana, Questi sono i nomi, Santa Rita) aveva a disposizione quattro ore di viaggio ogni giorno per dedicarsi alla scrittura come forma di comprensione del proprio posto nel mondo. E forse è anche per l’infanzia passata in un piccolo villaggio che lo scrittore e giornalista, tra le più importanti penne della letteratura olandese contemporanea, utilizza ambientazioni liminali e personaggi marginalizzati, una “provincia degli ultimi” dove modernità, progresso e cambiamenti hanno spesso una connotazione negativa in quanto portatori di caos. Per parlare dell’evoluzione della sua opera e delle tematiche che la contraddistinguono, l’autore incontra sul palco Nicolò Porcelluzzi (Medusa). con l’Ambasciata e Consolato Generale del Regno dei Paesi Bassi in Italia.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con il Nederlands Letterenfonds (Fondazione neerlandese per la letteratura) e"},{"n":"103","t":"VOGLIO ANDARE A VIVERE IN MONTAGNA","p":[["Andrea Membretti",0],["Luigi Chiarella",1]],"raw":"Andrea Membretti con Luigi Chiarella","d":"ven","h":"16:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["viaggi e luoghi","natura e animali","città e architettura"],"de":"L’idea che abbiamo degli abitanti delle vette è probabilmente frutto di preconcetti mutuati da un’epoca in cui le zone montane subivano un movimento migratorio “dall’alto verso il basso”, con una conseguente desertificazione del territorio. Oggi questa tendenza sembra essersi però invertita: Andrea Membretti (Diventare montanari) ha analizzato a fondo questo fenomeno, studiando la trasformazione demografica di chi vive le montagne oggi: c’è chi fugge da inquinamento e caos urbano, chi cerca seconde case di lusso, chi si accoda alle enormi masse di turisti accalcati nei luoghi alla moda e chi – completamente sradicato dalla propria terra d’origine – si adatta per necessità ai lavori più faticosi in altura. Affiancato dallo scrittore e componente di Alpinismo Molotov Luigi Chiarella, Membretti compirà un’analisi di come upper, middle e under class stiano ridisegnando la componente sociale e l’economia delle Alpi."},{"n":"104","t":"BIRDWATCHING TRA LE STANZE DEL PRINCIPE","p":[["Francesca Ballarini",0],["Valentina Vitali",1]],"raw":"Francesca Ballarini con Valentina Vitali","s":"laboratorio d’esplorazione artistico-ornitologica","e":"dai 7 ai 10 anni","d":"ven","h":"16:30","l":"palazzo te","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["natura e animali","arte e fotografia","infanzia ed educazione","Mantova e territorio"],"f":["per bambini","laboratorio"],"de":"Le pareti di Palazzo Te nascondono un intero stormo di creature alate e, insieme all’illustratrice Francesca Ballarini, ispirandoci alle atmosfere del suo L’isola di Axel, ci trasformeremo in esploratori ornitologici. Taccuino alla mano, accompagnati dalla naturalista Valentina Vitali, andremo alla ricerca di piume, becchi e ali dipinte nei magnifici affreschi del Palazzo, imparando a osservarli con la pazienza degli scienziati e l’immaginazione degli artisti."},{"n":"105","t":"LE COLLEZIONISTE","p":[["Melania G. Mazzucco",0],["Mario Codognato",0],["Lorenzo Balbi",1]],"raw":"Melania G. Mazzucco e Mario Codognato con Lorenzo Balbi","d":"ven","h":"16:45","l":"palazzo san sebastiano","pr":"7,50 €","tg":["arte e fotografia","storia","genere e femminismo"],"de":"Spesso associamo il mecenatismo a icone internazionali come Isabella Stewart Gardner o Peggy Guggenheim. Eppure, seguendo un ideale filo rosso, scopriamo che la storia del collezionismo artistico femminile ha radici profonde proprio a Mantova. Dallo Studiolo di Isabella d’Este – scrigno rinascimentale che ha ridefinito il gusto di un’epoca – fino alla contemporaneità della Sonnabend Collection, che racconta la storia del Novecento attraverso lo sguardo della gallerista statunitense Ileana Sonnabend, la città si conferma centro di una visione che attraversa i secoli. A riflettere sul ruolo, spesso sottostimato, delle donne come esperte e custodi dell’arte, saranno Melania G. Mazzucco (Self-portrait. Il museo del mondo delle donne) e Mario Codognato, direttore artistico della Sonnabend Collection Mantova, insieme al critico d’arte e curatore Lorenzo Balbi. L’incontro rientra nel progetto speciale Mantova e l’arte contemporanea – Museo di Palazzo della","no":"Ragione e Sonnabend Collection Foundation."},{"t":"CHE SUCCEDE NEI BALCANI?","p":[["Anna Dietzel",0],["Christian Elia",0]],"raw":"Anna Dietzel e Christian Elia","s":"accenti","d":"ven","h":"17:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["geopolitica e guerre","politica e attualità","media e giornalismo"],"de":"In Serbia, il movimento di protesta capitanato dagli studenti mobilita decine di migliaia di persone, portando il premier Aleksandar Vučić ad annunciare le sue dimissioni. In Albania, la rivoluzione dei fenicotteri invade le strade di Tirana, mettendo in crisi la leadership di Edi Rama. La società civile ritrova fiducia e occupa lo spazio pubblico: con quali prospettive? Christian Elia, redattore della nuova rivista R/EST, e la fumettista Anna Dietzel provano a rispondere."},{"n":"106","t":"TRANSLATION SLAM","p":[["Mikael Niemi",0],["Katia De Marco",0],["Alessandra Scali",0],["Laura Cangemi",1]],"raw":"Mikael Niemi, Katia De Marco e Alessandra Scali con Laura Cangemi","d":"ven","h":"17:00","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["editoria e traduzione","lingua e parole"],"de":"Due pagine inedite e, sul palco, uno scrittore e due traduttrici che hanno avuto una settimana di tempo per lavorare sul testo: sono questi i semplici ingredienti del Translation Slam, che a quindici anni dal suo debutto a Festivaletteratura vedrà nuovamente protagonista uno scrittore svedese. Katia De Marco e Alessandra Scali, due delle traduttrici di Mikael Niemi, avranno modo di discutere con l’autore delle loro scelte traduttive, e come sempre il pubblico, arbitro della partita, sarà invitato a fare domande e a partecipare al dibattito. Modera Laura Cangemi.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con Kulturrådet / Swedish Arts Council."},{"n":"107","t":"LA GESTAZIONE PER ALTRI: UNA PROSPETTIVA BIOETICA","p":[["Luca Savarino",0]],"raw":"Luca Savarino","s":"lezioni orizzontali","d":"ven","h":"17:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["salute e medicina","filosofia e idee","genere e femminismo"],"f":["lezione"],"de":"La lezione mira a introdurre in modo chiaro e non ideologico i principali nodi bioetici legati alla gestazione per altri: autonomia delle donne, desiderio di genitorialità, rischi di mercificazione del corpo e del nascituro. Una prima parte frontale di circa mezz’ora offrirà al pubblico una mappa dei concetti fondamentali e dei diversi modelli normativi; nella seconda parte, la discussione guidata permetterà alle persone presenti di confrontare posizioni, dubbi e intuizioni morali. L’incontro è pensato per un pubblico non specialistico, che voglia affrontare un tema spesso divisivo con strumenti critici, ascolto reciproco e attenzione alla complessità."},{"n":"108","t":"PER FARE UN CAPODOGLIO","p":[["Elisabetta Mitrovic",0]],"raw":"Elisabetta Mitrovic","s":"laboratorio di disegno marino","e":"dai 3 ai 6 anni","d":"ven","h":"17:00","l":"casa del mantegna","pr":"7,50 €","ic":["accompagnatore adulto richiesto","consapevolezza verde"],"tg":["natura e animali","arte e fotografia","infanzia ed educazione"],"f":["per bambini","laboratorio"],"de":"Elisabetta Mitrovic è un’appassionata naturalista che da molti anni naviga in lungo e in largo il Mediterraneo in spedizioni di ricerca impegnate nello studio dei cetacei. La sua grande passione è il capodoglio. Enorme, inattaccabile, capace di inabissarsi fino a oltre 2000 metri di profondità, Elisabetta è riuscita a immortalarlo nei suoi rari affioramenti in superficie, usando come sempre le matite e il taccuino. Al Festival l’autrice di In alto mare inviterà piccoli e piccole artiste (con i loro genitori) a unire le forze per dare vita a un gigantesco capodoglio collettivo, dipinto e decorato a più mani. Un’esperienza condivisa per esplorare la biologia marina attraverso l’emozione del disegno e del colore."},{"n":"109","t":"PSICOPATOLOGIA DI ROCCO SCHIAVONE","p":[["Antonio Manzini",0],["Massimo Cirri",1]],"raw":"Antonio Manzini con Massimo Cirri","d":"ven","h":"17:00","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["giallo e noir","narrativa","mente e psicologia"],"de":"Fresco dei suoi sessant’anni, Rocco Schiavone delinea al Festival un bilancio pubblico della sua vita e della sua carriera. Insieme a Massimo Cirri, Antonio Manzini ripercorre le tappe dell’esistenza del più celebre vicequestore d’Italia, dal trasferimento ad Aosta alla celebre lista delle “rotture di coglioni”. Così, grazie anche ai racconti de I tramezzini di Rocco Schiavone, si potrà tornare a Rocco bambino con gli inseparabili Brizio, Furio e Seba sino alla prima apparizione, in una Panarea settembrina eletta a triste rifugio, del fantasma di Marina, la moglie assassinata e compagna per sempre. Un album dei ricordi che definisce la complessa personalità del personaggio e l’occasione per scoprire la musica e i libri che ama e il rapporto con il suo padre letterario."},{"n":"110","t":"PUNTI, MACCHIE, FORME E COLORI","p":[["Hervé Tullet",0],["Vera Salton",1]],"raw":"Hervé Tullet con Vera Salton","s":"kaléidoscope français","d":"ven","h":"17:00","l":"aula magna dell'universita","pr":"7,50 €","tg":["fumetto e illustrazione","arte e fotografia","infanzia ed educazione"],"de":"Hervé Tullet (Forme!, Pallini pallini, La mano che disegna) è conosciuto come “il re dei libri prescolari”. Da oltre trent’anni l’illustratore francese lavora su opere in cui i segni fondamentali diventano stimolo per la curiosità e l’immaginazione dei giovanissimi lettori, catapultati in un viaggio tra forme, colori e variazioni materiali all’interno della pagina stessa. A Festivaletteratura l’autore del recente memoir Il bambino a colori incontra – questa volta – un pubblico di adulti: partendo dalla sua infanzia Tullet condurrà i presenti alla scoperta del suo personalissimo alfabeto astratto, per entrare nel modus operandi di un “artista sociale” che trova arte ovunque e crede fermamente nel potere del creare insieme. Lo incontra la libraia Vera Salton.","no":"L’autore parlerà in francese, con interpretazione consecutiva in italiano."},{"n":"111","t":"LA VILLA DELLE CONFESSIONI","p":[["Luca Scarlini",0],["Maria Arampatzi",1],["Carlo Saletti",0]],"raw":"Luca Scarlini con Maria Arampatzi alla fisarmonica con una visita guidata di Carlo Saletti a Villa Balestra di Rodigo","s":"tutto nievo minuto per minuto","d":"ven","h":"17:30","l":"fossato di rodigo - villa nievo","pr":"15,00 €","tg":["Mantova e territorio","storia","narrativa"],"de":"Ippolito Nievo ha passato il breve tempo della sua vita a inventare storie, scrivere pagine bellissime, ma anche a fare la rivoluzione, prendere parte al Risorgimento e impegnarsi militarmente. Figuriamoci se non amava le vacanze, che all’epoca erano una cosa che si faceva in campagna, in un posto più fresco a dieci, quindici chilometri dalla città. Fossato di Rodigo è il luogo in cui Nievo, fin dall’infanzia e dall’adolescenza, concepì storie che sarebbero giunte in seguito a una loro condensazione. Sarà quindi il caso che in questa casa di campagna vengano a risuonare le vicende umane, storiche e sentimentali di Carlino e della Pisana, al centro della sua opera maggiore: Le Confessioni d’un italiano. Luca Scarlini racconta a passo di carica un’opera capitale della letteratura italiana, meno frequentata di quanto meriti e soprattutto esilarante. La lettura spettacolo sarà preceduta dalla visita guidata al percorso espositivo dedicato a Ippolito Nievo di Villa Balestra a Rodigo, condotta dallo storico Carlo Saletti. Per raggiungere Rodigo è disponibile un servizio di bus navetta gratuito A/R, con partenza da piazza Sordello quaranta minuti prima dell’evento. La navetta raggiungerà Villa Balestra e da lì, al termine della visita guidata, condurrà gli spettatori a Villa Nievo, per riportarli a Mantova al termine della lettura/spettacolo. Il rientro è previsto per le ore 20:15."},{"n":"112","t":"LA CONFERENZA DEGLI ANIMALI","p":[["Erich Kästner",0],["Daniele Fior",0],["Davide Bagilliere",1]],"raw":"lettura in musica del romanzo di Erich Kästner diretta da Daniele Fior con Davide Bagilliere","e":"dai 7 anni","d":"ven","h":"18:00","l":"cinema oberdan","pr":"10,00 €","tg":["infanzia ed educazione","teatro e performance","natura e animali"],"f":["per bambini"],"de":"“Terminata conferenza a Londra – STOP – Trattative inconcludenti – STOP […] – Nessun accordo sul luogo della prossima sessione – STOPSTOPSTOP”. Cosa succede quando le persone non riescono più a mettersi d’accordo su nulla? Come è possibile mettere fine alle guerre e alla devastazione della natura di cui sono responsabili, e farle tornare a ragionare sulle conseguenze che le loro azioni insensate hanno su bambine e bambini e sul mondo intero? Una sola soluzione è possibile: devono intervenire gli animali! La conferenza degli animali, capolavoro della letteratura per ragazzi scritto da Erich Kästner all’indomani della Seconda guerra mondiale, torna a nuova vita in questo spettacolo polifonico che unisce la voce dal vivo di Daniele Fior a quelle registrate di elefanti, leoni, scimmie, tapiri e giraffe impegnati nella conferenza, incluse quelle raccolte durante il laboratorio tenuto a Festivaletteratura (vedi n. 20), il tutto con l’accompagnamento musicale di Davide Bagilliere."},{"t":"IL FUOCO SACRO DELLA SCRITTURA","p":[["Pilar Quintana",0],["Ilenia Caito",1]],"raw":"Pilar Quintana con Ilenia Caito","d":"ven","h":"18:00","l":"piazza dei libri","pr":"ingresso libero","ic":["streaming"],"tg":["scrittura e lettura","narrativa"],"no":"L’autrice parlerà in spagnolo, con interpretazione consecutiva in italiano. In collaborazione con IILA – Organizzazione Internazionale Italo-Latino Americana. Sul Fuoco sacro della scrittura vedi p. 105"},{"t":"IL PIACERE DEL RICORDO","p":[["Laura Ferreri",0]],"raw":"Laura Ferreri","s":"lavagne – onde cerebrali","d":"ven","h":"18:00","l":"piazza mantegna","pr":"ingresso libero","tg":["mente e psicologia","scienza"],"f":["lezione"],"de":"Perché alcuni ricordi restano impressi nella mente mentre altri svaniscono rapidamente? La neuroscienziata Laura Ferreri illustrerà il legame tra sistema di ricompensa cerebrale e formazione della memoria, approfondendo come la gratificazione e il rilascio di dopamina influenzino ciò che viene appreso, contribuendo a rendere i ricordi più solidi e duraturi. Un modo per comprendere come il piacere non accompagni soltanto le nostre esperienze, ma ne determini anche la persistenza nel tempo."},{"n":"113","t":"MASCHERE MATTE E MOSTRI DA PASSEGGIO","st":"laboratorio di fantazoologia da parata","p":[["Ruggge",0]],"raw":"Ruggge","e":"dagli 8 anni","v":"vedi n. 1","d":"ven","h":"18:00","l":"cappella di palazzo del mago","pr":"7,50 €","tg":["arte e fotografia","miti e fiabe","infanzia ed educazione"],"f":["per bambini","laboratorio"]},{"n":"114","t":"LE PAROLE STANNO IN PIEDI!","st":"laboratorio di parole in 3D","p":[["Agnese Baruzzi",0],["Silvia Vecchini",0]],"raw":"Agnese Baruzzi e Silvia Vecchini","e":"dagli 8 ai 10 anni","d":"ven","h":"18:15","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["lingua e parole","arte e fotografia","infanzia ed educazione"],"f":["per bambini","laboratorio"],"de":"Cosa succede quando una parola si stacca dalla superficie piatta del foglio e impara a stare in piedi? Questo laboratorio, condotto dalle autrici di Solo il seme lo sa, è una sfida creativa tra due mondi che si fondono: la scrittura poetica e l’ingegneria della carta. Ispirandosi alle metamorfosi della natura, Silvia Vecchini aiuterà ragazze e ragazzi a dare peso, ritmo e voce ai propri pensieri, mentre Agnese Baruzzi svelerà i segreti per dare a quei pensieri una terza dimensione."},{"n":"115","t":"SCAVI","p":[["Ruska Jorjoliani",0],["Yeniffer Lilibell Aliaga Chávez",0],["Georgiana Ursache",1]],"raw":"Ruska Jorjoliani e Yeniffer Lilibell Aliaga Chávez con Georgiana Ursache","s":"passports","e":"dai 14 anni","d":"ven","h":"18:30","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["migrazioni e confini","narrativa","lingua e parole"],"f":["per ragazzi"],"de":"Due scrittrici, una di origine georgiana l’altra di origine peruviana, usano la lingua di adozione, l’italiano, per scavare anche nel loro passato, raccontando due storie di ritorno nei Paesi in cui sono nate. Ruska Jorjoliani (Ardesia) ci fa vivere una giornata nella Georgia contemporanea, attraverso gli sguardi della protagonista che torna nel paese di origine, di una coppia di turisti italiani e di quelli di chi non se n’è mai andato. Anche grazie a uno scavo reale e metaforico nel passato della famiglia e della terra d’origine, Yeniffer Lilibell Aliaga Chávez, nel romanzo familiare Occhi foresta, esplora cosmologie non occidentali in un piccolo pueblo delle Ande, raccontando la storia di sua nonna Adela e le campagne archeologiche di nonno Octavio. Con l’aiuto di Georgiana Ursache indagheranno a fondo nelle loro storie e nelle loro scritture."},{"n":"116","t":"ARCHIVI POCO ARCHIVISTICI","st":"Memorie scomposte dell’oggi e del domani","p":[["Federico Valacchi",0],["Manuela Soldi",1]],"raw":"Federico Valacchi con Manuela Soldi","d":"ven","h":"18:30","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["memoria e biografia","tecnologia e IA","storia"],"de":"C’era una volta il vecchio caro archivio di stato… fonti riconoscibili, istituzioni consolidate, supporti tangibili. Poi è arrivato il presente: digitale dall’apparenza evanescente, archivi partecipati e nati dal basso, nuove forme di memoria che stentiamo a riconoscere come tale. E il futuro? Di quanto ancora ci serviranno gli archivi, che siano irregolari (Carte irrequiete. La memoria dei movimenti, con Lorenzo Pezzica) o aumentati (L’archivio aumentato. Tempi e modi di una digitalizzazione critica), e di archivi come strumenti di costruzione della conoscenza e della democrazia (Gli archivi tra storia, uso e futuro), il docente e archivista Federico Valacchi parlerà con Manuela Soldi."},{"n":"117","t":"IL GIARDINO DEGLI UCCELLI","st":"passeggiata spettacolo","p":[["Jean Boucault",0],["Johnny Rasse",0],["Vincent Lochet",0]],"raw":"Jean Boucault e Johnny Rasse, clarinetto Vincent Lochet","s":"kaléidoscope français","d":"ven","h":"18:30","l":"parco belfiore","pr":"15,00 €","ic":["consapevolezza verde"],"tg":["natura e animali","musica","viaggi e luoghi"],"f":["percorso/visita","spettacolo/lettura"],"de":"Un invito a rallentare il passo, ad affinare l’ascolto, a lasciarsi condurre dentro un paesaggio che, poco a poco, smette di essere semplice sfondo e diventa presenza viva. Il gruppo avanza in silenzio. I sensi si risvegliano, l’attenzione si fa sottile: ogni fruscio, ogni richiamo, ogni pausa può rivelare un incontro. All’improvviso, i cantori di uccelli intessono il loro dialogo con il bosco. Trilli, fischi, canti risuonano nell’aria e gli uccelli rispondono. Jean Boucault e Johnny Rasse, chanteurs d’oiseaux e autori di Quando imparammo a cantare come gli uccelli, ne raccolgono le voci e le restituiscono in una partitura che nasce dall’ascolto e dall’incontro, trasformando il paesaggio in una scena aperta, dove musica e ambiente si riflettono l’una nell’altro. Il Giardino degli Uccelli è un’esperienza di ascolto condiviso, una poesia effimera che prende forma nell’istante e svanisce con esso, lasciando negli spettatori la memoria di un dialogo possibile tra l’essere umano e il mondo vivente. Il punto di ritrovo dell’evento è presso il Monumento ai Martiri di Belfiore. Per raggiungere Parco Belfiore è disponibile un servizio di bus navetta gratuito A/R, con partenza da Piazza Sordello venti minuti prima dell’evento, e rientro alla sua conclusione."},{"n":"118","t":"LA NATURA NOSTRA CONTEMPORANEA","p":[["Amitav Ghosh",0],["Barbara Furlotti",1]],"raw":"Amitav Ghosh con Barbara Furlotti","s":"idee naturali","d":"ven","h":"18:30","l":"palazzo te","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["natura e animali","ambiente e clima","filosofia e idee"],"de":"Forza generatrice, cieca furia distruttrice, inesauribile fonte di meraviglia, sterminato territorio di scoperta e conoscenza, modello da imitare, ricchezza da depredare. Che idee ci siamo fatti della natura, come esseri umani, nel corso della nostra storia? Le innumerevoli rappresentazioni artistiche e letterarie della realtà naturale che abbiamo prodotto nei secoli testimoniano di un rapporto sempre ambivalente, in costante tensione tra attrazione e paura, curiosità e desiderio di possesso. Per rimettere in connessione la dissonante eredità di questo pensiero a un'attualità che con la natura è chiamata ancora fare i conti, Barbara Furlotti e Guido Rebecchini - curatori della mostra \"Inventare la natura. Leonardo, Arcimboldo, Caravaggio\" in programma a Palazzo Te dalla fine di settembre - dialogano con due degli ospiti di Festivaletteratura 2026. Il primo incontro è con Amitav Ghosh, scrittore indiano che ha posto al centro della propria ricerca letteraria e intellettuale i temi dell'ecologia e della giustizia climatica.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano."},{"n":"119","t":"LE MERAVIGLIE DEL MULTILINGUISMO","p":[["Federico Faloppa",0]],"raw":"Federico Faloppa","s":"sfogliare l’universo – lezioni grandi","d":"ven","h":"18:30","l":"chiesa di san cristoforo","pr":"7,50 €","tg":["lingua e parole","tecnologia e IA","editoria e traduzione"],"f":["lezione"],"de":"Con l’avvento dell’intelligenza artificiale sperimentiamo con straordinaria velocità la traduzione di testi più o meno complessi. Questo forse ci illude sull’esistenza di una corrispondenza quasi perfetta tra una lingua e l’altra. Per fortuna così non è. Chi ha una conoscenza meno superficiale di diverse lingue sa benissimo che non c’è mai una perfetta coincidenza di senso anche nei termini d’uso più comune, ed esistono anzi delle vere e proprie parole intraducibili, molto legate all’identità e alle consuetudini di una specifica comunità linguistica. Attraverso l’albo Che bella parola! di Nicola Edwards, Federico Faloppa ci invita a confrontarci con quello che, “con parole nostre”, non riusciamo a dire, e a guardare alle lingue come territori di continue scoperte.","no":"Su Sfogliare l’universo vedi p. 126"},{"n":"120","t":"LEGGO DUNQUE GIOCO","p":[["Stefano Bartezzaghi",0],["Pier Mauro Tamburini",0],["Marco Malvaldi",1]],"raw":"Stefano Bartezzaghi e Pier Mauro Tamburini con Marco Malvaldi","d":"ven","h":"19:00","l":"palazzo san sebastiano","pr":"7,50 €","tg":["gioco","lingua e parole","giallo e noir"],"de":"Cosa c’è di più rilassante, nelle torride giornate estive, di sdraiarsi in riva al mare con un buon libro giallo o qualche gioco linguistico da risolvere? E se fosse possibile unire le due attività? Beh, ancora meglio! Ci hanno pensato l’enigmista e semiologo Stefano Bartezzaghi e lo sceneggiatore Pier Mauro Tamburini (co-creatore della serie Escape Book), nascondendo un misterioso delitto dietro a errori grammaticali, refusi e omissioni, che spetta alle lettrici e ai lettori correggere per scoprire quanto realmente accaduto. Gli autori di Bozze non corrette e L’ultimo giro di bozze si incontrano a Mantova per ragionare di come si sia sviluppata ed evoluta nel tempo l’idea del libro “da giocare”, passando dalle celebri storie a bivi – di cui già in Borges si trovano dei prodromi – fino alla recente rinascita dei librogame. Li incontra lo scrittore Marco Malvaldi."},{"n":"121","t":"CHIEDI CHI ERANO I BEATLES","p":[["Ian Leslie",0],["Peter Florence",1]],"raw":"Ian Leslie con Peter Florence","d":"ven","h":"19:00","l":"aula magna dell'universita","pr":"7,50 €","tg":["musica","storia"],"de":"Siamo a Woolton, un sobborgo di Liverpool, il giorno è il 6 luglio 1957 e, alla festa parrocchiale della chiesa di St. Peter, si esibiscono i Quarrymen: è la sera in cui l’allora quindicenne Paul McCartney incontra per la prima volta John Lennon. Il resto è storia, l’inizio di un sodalizio che portò alla formazione dei Beatles e alla nascita di brani immortali. Prendendo in esame 43 brani del loro repertorio, l’autore britannico Ian Leslie (John + Paul) ha raccontato l’amicizia “appassionata, tenera e tempestosa” tra i due cantautori, analizzando come la competizione fungesse per loro da stimolo al miglioramento artistico reciproco. “La nostra vita era come salire una lunga scala, e lo abbiamo fatto l’uno a fianco dell’altro” disse Paul McCartney: di questo percorso in equilibrio tra caos e controllo, Ian Leslie ragiona insieme a Peter Florence.","no":"Gli autori parleranno in inglese, con interpretazione consecutiva in italiano."},{"t":"L’ESEMPIO DI BOSCO FONTANA","p":[["Maurizio Casiraghi",0]],"raw":"Maurizio Casiraghi","s":"accenti – territori resilienti","d":"ven","h":"19:00","l":"tenda sordello","pr":"ingresso libero","ic":["consapevolezza verde","streaming"],"tg":["natura e animali","ambiente e clima","Mantova e territorio"],"de":"Già riserva di caccia al tempo dei Gonzaga, Bosco Fontana è una delle poche foreste planiziali di latifoglie pressoché intatte ancora esistenti in Europa, e per questo un esempio di resistenza nella resilienza. La sua evoluzione nel corso dei secoli risulta particolarmente emblematica dal punto di vista dell’intreccio tra storia umana e storia ambientale."},{"n":"122","t":"UN RAP PER NOI","p":[["Kento",0]],"raw":"Kento","s":"mah! – mantegna after hours","e":"dai 10 anni","d":"ven","h":"19:00","l":"casa del mantegna","pr":"7,50 €","tg":["musica","infanzia ed educazione"],"f":["per bambini","spettacolo/lettura"],"de":"Tante speranze altalenanti, tanti sentimenti contrastanti, tante cose che si avrebbero da dire o che si vorrebbero ascoltare… se vi sentite un po’ così, in cerca di una musica capace di farvi tirar fuori ciò che avete dentro, questa sera passate al MAH! Kento, una delle figure più importanti della scena del rap italiano, salirà sulla pedana della Casa del Mantegna per farvi muovere seguendo il suo flow. A scandire il ritmo saranno le parole delle sue canzoni e quelle che raccoglie tra ragazze e ragazzi nei laboratori che tiene in giro per l’Italia. Parole che dicono del mondo intorno a noi e di quello che ci portiamo dentro; parole da condividere e su cui ballare insieme. MAH finalmente! Musica e cocktail (analcolici) a gogo tornano alla Casa del Mantegna nell’after hours più atteso di tutto Festivaletteratura. Bambine e bambini - e i loro genitori - potranno meritatamente rilassarsi dopo la consueta maratona di eventi godendosi lo spettacolo. I drink sono compresi nel prezzo del biglietto!"},{"n":"123","t":"IL SESSO AL TEMPO DI INTERNET","p":[["Salvatore Falzone",0],["Nicola Gardini",0],["Vincenzo Latronico",1]],"raw":"Salvatore Falzone e Nicola Gardini con Vincenzo Latronico","s":"avere trent'anni","d":"ven","h":"19:00","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["genere e femminismo","tecnologia e IA","narrativa"],"de":"Tinder, Grindr, OnlyFans: il sesso, nelle sue diverse forme, è su internet dagli albori del web. Oggi si ramifica dal virtuale al reale, definendo e ridefinendo le relazioni tra amanti. Modella, soprattutto, i confini tra estetica e sostanza, tra realtà e fantasia, tra desiderio e prestazione. Salvatore Falzone (Brutale) e Nicola Gardini (Daddy), mettendo in scena due storie di violenza e dominazione, di dipendenza e affettività bulimica, tratteggiano le diverse sfere della mascolinità contemporanea nelle relazioni omosessuali; esplorano il mondo familiare di questi uomini attraverso i rapporti con i propri padri e, dunque, con loro stessi. Si tratta di personaggi che si scoprono e si definiscono attraverso il sesso. Gli autori ne parlano con Vincenzo Latronico, in un confronto su corpi e identità, su educazione sentimentale, consenso e fantasia sessuale, per capire che cosa resta dell’esperienza amorosa quando il desiderio passa anche attraverso algoritmi, immagini e dispositivi."},{"n":"124","t":"PARTIRE, RITROVARSI","p":[["Theodor Kallifatides",0],["Federica Manzon",1]],"raw":"Theodor Kallifatides con Federica Manzon","d":"ven","h":"19:15","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["migrazioni e confini","narrativa","memoria e biografia"],"de":"Se c’è un narratore che ha fatto della migrazione l’unione perfetta tra libro e vita, questi è Theodor Kallifatides. Greco di origine, emigrato in Svezia nei primi anni Sessanta, nell’arco di cinque decenni Kallifatides diviene un’icona della narrativa europea contemporanea, facendo propri registri e sfumature di una lingua scandinava per raccontare un mondo mediterraneo sospeso tra l’eco millenaria di una cultura rurale e il vorticoso turbinio di eventi che in pochi anni lo catapulta nella violenta via Crucis del Novecento. Dalla sua poetica, ricostruita al Festival insieme alla scrittrice Federica Manzon (Alma), prendono il largo romanzi come Contadini e signori, L’aratro e la spada, Una pace crudele, ma anche testi a ragione considerati capolavori del memoir, quali Madri e figli e Una vita, ancora, in cui l’esperienza radicale del sentirsi sempre stranieri si accompagna a una scrittura disseminata di affetti e parole perdute nel tempo.","no":"L’autore parlerà in inglese, con interpretazione consecutiva in italiano. In collaborazione con Kulturrådet / Swedish Arts Council."},{"n":"125","t":"IL RICHIAMO DELL’ABISSO: DA “L’ORRORE DI DUNWICH”","p":[["Compagnia della Lettura",0],["Luca Scarlini",0],["Spartaco Cortesi",0]],"raw":"un’installazione sonora con le voci della Compagnia della Lettura adattamento di Luca Scarlini; musiche e suoni di Spartaco Cortesi","s":"i miti oscuri di h.p. lovecraft","v":"vedi n. 60","d":"ven","h":"19:30","l":"sotterranei del castello di san giorgio","pr":"7,50 €","tg":["fantastico e horror","musica","teatro e performance"]},{"n":"126","t":"MAESTRE DI STORIE","p":[["Maria Attanasio",0],["Bianca Pitzorno",0],["Melania G. Mazzucco",1]],"raw":"Maria Attanasio e Bianca Pitzorno con Melania G. Mazzucco","d":"ven","h":"19:30","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["narrativa","genere e femminismo","storia"],"de":"“Come un’acrobata tra romanzo picaresco, sentimentale, fantastico e storico, riattraversa tradizioni popolari e colte, ne ribalta le convenzioni e ci trascina in una sarabanda sorprendente, dove ogni frammento si fonda su un dato storico e si fonde con l’invenzione romanzesca”; “un racconto che parte dalla Sicilia e dall’Italia del Settecento e si proietta verso e oltre di noi, di nuovo stretti tra potenti e aggressivi despoti, di nuovo immersi nel vortice di un mondo che sull’orlo del cambiamento alterna speranza e disperazione, coraggio e depravazione”. Così Roberta Mazzanti e Ottavia Piccolo presentavano la candidatura al Premio Strega rispettivamente di La sonnambula di Bianca Pitzorno e La rosa inversa di Maria Attanasio. Partendo proprio dai loro romanzi più recenti, le due indiscusse affabulatrici e grandi maestre di storie raccontano il loro rapporto con l’isola natia, con la ricerca storica e con la scrittura, affiancate dalla scrittrice Melania G. Mazzucco."},{"t":"DAL BALCONE","st":"più un affaccio che un concerto","p":[["Emma Nolde",0]],"raw":"Emma Nolde","d":"ven","h":"19:45","l":"piazza concordia","pr":"ingresso libero","tg":["musica"],"f":["spettacolo/lettura"],"de":"Una chitarra e una voce che raccontano i vent’anni: la notte, le distanze, il caos da mettere in ordine. Toscana, classe 2000, Emma Nolde è tra i talenti più limpidi del nuovo cantautorato italiano. Per il tempo di qualche brano, si affaccia sul balcone di piazza Concordia in versione acustica."},{"t":"MIO CUGINO","p":[["Marco Archetti",0],["Paola Caridi",0],["Valeria Corciolani",0],["Gian Piero Piretto",0],["Mauro Pescio",1],["Stefano Malatesta",0]],"raw":"Marco Archetti, Paola Caridi, Valeria Corciolani e Gian Piero Piretto con Mauro Pescio e l’accompagnamento musicale di Stefano Malatesta","d":"ven","h":"20:30","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["narrativa","teatro e performance"],"de":"Quattro ospiti di Festivaletteratura 2026 salgono sul palco di piazza Alberti per raccontare una storia molto personale che li vede estremamente coinvolti. Sono eventi quasi incredibili, per lo più divertenti, a tratti esilaranti, ma non senza pieghe malinconiche o aspetti che fanno riflettere. Una di queste storie però è falsa. Sta al pubblico capire quale è inventata di sana pianta, ponendo le giuste domande al termine del racconto. Mio cugino è un gioco collettivo che celebra il potere incantatore delle narrazioni, ma ancor più l’intelligenza di chi le ascolta. Pronti a dire la vostra su chi sta mentendo?"},{"t":"ANATOMIA DEL TORMENTONE MUSICALE","p":[["Alberto “Bebo” Guidetti",0]],"raw":"Alberto “Bebo” Guidetti","s":"accenti","d":"ven","h":"20:30","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["musica","tecnologia e IA"],"de":"Come sono prodotti (si potrebbe dire progettati) i tormentoni musicali contemporanei? Quali caratteristiche hanno in comune quei pezzi ottimizzati per piacere agli algoritmi e quindi al pubblico (o viceversa)? Ce lo svela Alberto “Bebo” Guidetti, tra i fondatori della band Lo Stato Sociale."},{"t":"BLURANDEVÙ","p":[["Francesco Costa",0]],"raw":"Francesco Costa","d":"ven","h":"20:45","l":"seminario vescovile - aula magna","pr":"ingresso libero","tg":["media e giornalismo","politica e attualità"],"de":"Per chi è cresciuto ascoltando il podcast Da Costa a Costa, America è sinonimo di Francesco Costa. Il giornalista direttore de Il Post ha, negli anni, descritto i mille volti degli Stati Uniti (Questa è l’America, California, Frontiera, Come se ne esce) e tenuto migliaia di persone in ascolto, commentando quotidianamente rassegne stampa e temi di attualità con Morning e Wilson, tanto che il prestigioso periodico The New Yorker lo ha elogiato per aver saputo “modernizzare il ruolo del giornalista nella società civile italiana”. Alle domande di volontarie e volontari di Blurandevù risponderà in completa sincerità… costi quel che costi."},{"t":"ACCUMULARE","p":[["Fabrizio Luisi",0]],"raw":"Fabrizio Luisi","s":"lavagne – meccaniche di gioco","d":"ven","h":"21:00","l":"piazza mantegna","pr":"ingresso libero","tg":["gioco","economia e lavoro"],"f":["lezione"],"de":"Nei giochi non si vince soltanto conquistando, ma anche diventando ricchi. Per gioco, ovviamente. Questa lavagna è dedicata ai giochi in cui la logica è fare scorte, accumulare risorse, moltiplicare il bottino. Da Monopoli ai classici di gestione delle risorse, Fabrizio Luisi (sceneggiatore e game designer, co-creatore della serie di libri-gioco Escape Book) racconta cosa succede quando il successo si misura in quantità. Cosa ci rivelano, questi giochi, sul rapporto che abbiamo con la proprietà, la ricchezza e la povertà?"},{"n":"127","t":"AMBIENTARSI","st":"lezione/laboratorio","p":[["Marco Bartoli",0],["Erica Barzoni",0]],"raw":"Marco Bartoli ed Erica Barzoni","s":"spazio rio","d":"ven","h":"21:00","l":"pontile pescherie di giulio romano","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["ambiente e clima","scienza","natura e animali","Mantova e territorio"],"f":["laboratorio","lezione","percorso/visita"],"de":"Un percorso per ri-scoprire il nostro ruolo e il nostro rapporto con l’ambiente. Tra storia, scienza e società, cullati dallo scorrere del Rio, daremo vita a un’esperienza visiva, sonora e culturale che ci accompagnerà alla scoperta del legame profondo che ci unisce al mondo che abitiamo – e che, allo stesso tempo, ci abita. Un invito a osservare e ascoltare l’acqua e il fiume in modo nuovo, lasciandoci sorprendere dalle relazioni che ogni giorno intrecciamo con ciò che ci circonda.","no":"Su Spazio Rio vedi p. 91"},{"n":"128","t":"CONCERTO AL BUIO","p":[["Georg Friedrich Haas",0],["Sentieri Selvaggi",0]],"raw":"In iij. Noct di Georg Friedrich Haas Sentieri Selvaggi","d":"ven","h":"21:00","l":"tempio di san sebastiano","pr":"12,00 €","tg":["musica"],"f":["spettacolo/lettura"],"de":"Il terzo Quartetto per archi In iij. Noct è un lavoro di Georg Friedrich Haas che ha la particolarità di dover essere eseguito in un ambiente totalmente immerso nel buio. In questa composizione, come dice Alex Ross, critico musicale del New Yorker, gli strumentisti sono impegnati a costruire un’affascinante trama sonora dagli esiti imprevedibili perché ovviamente condizionata dalla particolare modalità performativa richiesta dal pezzo. Ma è come sempre un dato biografico a caratterizzare la personale cifra di un artista: nel caso di Haas la dolorosa presa di coscienza del passato nazista della sua famiglia. Con In iij. Noct l’ascoltatore è chiamato ad affrontare un viaggio sonoro capace di “trasformare la sala da concerto in un luogo di misteriosi brividi, suggerendo che la via della verità passa attraverso il buio”. Piercarlo Sacco violino I, Daniele Richiedei violino II, Virginia Luca viola, Aya Shimura violoncello. Evento realizzato da Mantovamusica-Eterotopie."},{"n":"129","t":"L’IMPORTANTE È VINCERE","p":[["Moris Gasparri",0],["Federico Buffa",1]],"raw":"Moris Gasparri con Federico Buffa","d":"ven","h":"21:15","l":"palazzo san sebastiano","pr":"7,50 €","tg":["sport","politica e attualità","storia"],"de":"Rivisitando una celebre frase del generale Carl Von Clausewitz, si potrebbe dire che “lo sport è la prosecuzione della politica con altri mezzi”. Siamo abituati a immaginare come neutrale l’agone atletico, ma, sin dai tempi dell’antica Grecia, era chiaro come le competizioni fossero terreno di rivendicazioni ideologiche e specchio dei rapporti geopolitici delle nazioni partecipanti. Basti pensare alle magnificazioni del regime nei Mondiali di calcio italiani del 1934 e alle Olimpiadi di Berlino del 1936, o alle più recenti sanzioni inflitte agli atleti russi a seguito dell’invasione dell’Ucraina. Moris Gasparri (Il potere della vittoria) si occupa da oltre dieci anni di studi in ambito sportivo e ha recentemente ragionato di quanto i leader autoritari utilizzino lo sport come mezzo di propaganda (La partita del potere): ne discute sul palco insieme a Federico Buffa (L’ultima estate di Berlino, scritto con Paolo Frusca). Per l’incontro è previsto un servizio di interpretazione nella lingua dei segni italiana."},{"n":"130","t":"IL PERÙ DEGLI INSORTI","p":[["Gabriela Wiener",0],["Nadeesha Uyangoda",1]],"raw":"Gabriela Wiener con Nadeesha Uyangoda","d":"ven","h":"21:15","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["narrativa","politica e attualità","migrazioni e confini"],"de":"“Siamo i pionieri peruviani che consumano narrativa russa nella lotta contro l’imperialismo culturale in piena Guerra fredda. Cantiamo in russo per intrattenere i marinai e convincerli della nostra idoneità quali epigoni della Repubblica socialista. Noi siamo il terzo mondo, gli schiavi senza pane, i paria della Terra, famelica legione, quelli che dovrebbero stare in alto invece che in basso, secondo l’inno ufficiale dei lavoratori”. Nata come giornalista “gonzo”, con reportage sulla violenza di genere e lo sfruttamento sessuale, Gabriela Wiener è poi diventata una voce di spicco della narrativa latinoamericana. Erede e insieme dissacratrice della tradizione letteraria indigenista, in Atusparia intreccia memoria personale (fatta di desiderio, dipendenza, ricerca di senso) e memoria collettiva, riattraversando gli ultimi quarant’anni di storia del Perù: dagli anni Ottanta segnati dalla violenza di Sendero Luminoso a un futuro autoritario così prossimo da sembrare presente. A dialogare con lei, la scrittrice Nadeesha Uyangoda.","no":"L’autrice parlerà in spagnolo, con interpretazione consecutiva in italiano."},{"n":"131","t":"QUALE DESTINO ALLA FRONTIERA?","p":[["Anne-Claire Defossez",0],["Didier Fassin",0],["Lorenzo Alunni",1]],"raw":"Anne-Claire Defossez e Didier Fassin con Lorenzo Alunni","s":"kaléidoscope français","d":"ven","h":"21:30","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["migrazioni e confini","diritti e società","politica e attualità"],"de":"Il poeta Vittorio Sereni diceva che la frontiera è quel luogo in cui si tinge il confine / tra il già e il non ancora. I luoghi liminali vivono in un costante stato di equilibrio tra l’essere ponte e l’essere linea invalicabile tra due mondi diversi. Quello dei migranti che fuggono da guerre, persecuzioni ed emergenze climatiche è un tema che troppe volte attira pregiudizi che portano parte della popolazione a vedere individui disperati come invasori. L’antropologo Didier Fassin e la sociologa Anne-Claire Defossez (che insieme hanno scritto Umanità in esilio) hanno speso cinque anni nella striscia di terra alpina che divide Francia e Italia, seguendo e intervistando uomini e donne esuli, raccogliendo le loro storie e analizzando dati che dipingono un quadro importante delle dinamiche della migrazione contemporanea. Su questo lavoro sul campo, che ha coinvolto non solo i migranti, ma anche attivisti e forze dell’ordine, i due ricercatori si confronteranno con l’antropologo Lorenzo Alunni.","no":"Gli autori parleranno in francese, con interpretazione consecutiva in italiano."},{"n":"132","t":"UN CERTO SENSO OSCURO","p":[["Niccolò Ammaniti",0],["Gaia Manzini",1]],"raw":"Niccolò Ammaniti con Gaia Manzini","d":"ven","h":"21:30","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["narrativa"],"de":"Nel 2001 usciva Io non ho paura, e Niccolò Ammaniti partecipava per la prima volta a Festivaletteratura, affiancato da Susanna Tamaro. Di adolescenze tormentate ha molto raccontato Ammaniti nella sua lunga carriera (Branchie, Io e te), muovendosi tra favole nere, echi di thriller e letteratura fantastica, come nel recente Il custode, dove lo schema narrativo del segreto mostruoso da proteggere diventa metafora e analisi del peso della tradizione familiare, vissuta come imposizione “che non mettiamo in discussione almeno fino alla pubertà”. In un viaggio tra cinema, scrittura e “lettura come ancora di salvezza”, Ammaniti torna a Mantova per raccontarsi, affiancato dalla scrittrice Gaia Manzini."},{"n":"133","t":"DARK SKY RESERVATION","p":[["L.Y.R.",0]],"raw":"L.Y.R.","d":"ven","h":"21:30","l":"teatro bibiena","pr":"15,00 €","tg":["musica","poesia"],"f":["spettacolo/lettura"],"de":"L.Y.R. nasce dall’incontro tra la poesia di Simon Armitage – uno dei maggiori poeti contemporanei e Poet Laureate del Regno Unito –, la voce di Richard Walters e le trame sonore del produttore e polistrumentista Patrick J. Pearson. In concerto, il trio trasforma i versi di Armitage in un’esperienza immersiva, dove spoken word, canzone d’autore ed elettronica si fondono con naturalezza. Le liriche prendono nuova vita attraverso melodie sospese e tessiture sonore intense ed eleganti, dando forma a uno dei progetti più originali della scena musicale britannica contemporanea. Dark Sky Reservation, titolo dell’ultimo album e di una delle poesie di Armitage, ne è il manifesto. Ogni brano è un racconto, un viaggio che attraversa confini e linguaggi: i versi si fanno suono, l’elettronica dialoga con la voce e l’immaginazione trova il suo spazio."},{"n":"134","t":"NON È MORTO CIÒ CHE IN ETERNO RIPOSA","p":[["Tullio Avoledo",0],["Luca Crovi",0],["Daniele Serra",0]],"raw":"Tullio Avoledo, Luca Crovi e Daniele Serra","s":"i miti oscuri di h.p. lovecraft","d":"ven","h":"21:30","l":"aula magna dell'universita","pr":"7,50 €","tg":["fantastico e horror","narrativa","fumetto e illustrazione"],"de":"“Ci sono più cose in cielo e in terra, Orazio, di quante non ne sogni la tua filosofia”: è da questo scarto inquieto rispetto all’ignoto, cantato nell’immortale verso dell’Amleto, che si dirama la narrativa di H.P. Lovecraft, una meteora giunta dallo spazio profondo per sconvolgere la letteratura del Novecento. Il terreno per contenerla era già stato preparato da geniacci come Edgar Allan Poe e Lord Dunsany, ma la nuova materia era davvero incandescente, tanto che da essa si sprigionarono fascinazioni gotiche e orrori – come il Ciclo dei Grandi Antichi – destinati a influenzare non solo centinaia di scrittori, ma anche il cinema, il fumetto, l’heavy metal. Sulle orme di Azathoth, Yog-Sothoth e altre divinità di un pantheon ripugnante, Luca Crovi, Tullio Avoledo e l’illustratore Daniele Serra celebrano in punta di penna e pennello il “mostruoso caos nucleare” nato dall’immaginazione dello scrittore statunitense.","no":"Su I miti oscuri di H.P. Lovecraft vedi p. 153"},{"t":"IL MONDIALE CHE CI MANCA","p":[["Giuseppe Pastore",0]],"raw":"Giuseppe Pastore","s":"accenti","d":"ven","h":"21:30","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["sport","memoria e biografia"],"de":"Chi oggi ha meno di dodici anni non ha mai visto la Nazionale di calcio italiana giocare in un Mondiale. Partendo da questa malinconica constatazione, il giornalista Giuseppe Pastore racconta cinque episodi poco noti della storia azzurra ai Mondiali – partite, gol, aneddoti memorabili – che meritano di (ri)entrare nell’immaginario collettivo. Anche in quello di chi oggi ha dodici anni."},{"t":"VOLUME!","p":[["Euro Nettuno",0]],"raw":"Euro Nettuno","d":"ven","h":"22:00","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["musica"],"de":"Italo disco, cumbia, funk e ritmi tropicali: Euro Nettuno è un duo che pesca a piene mani nel Mediterraneo immaginario degli anni Ottanta e lo spedisce dritto in pista. Tra basslines irresistibili e vibrazioni balneari, in piazza Alberti il loro DJ set trasformerà la notte mantovana in una crociera danzereccia tra synth vintage, sirene, schiuma di mare e paillettes. consapevolezza verde Orientarsi nel dedalo di strade che attraversano il programma di Festivaletteratura non sempre è facile. Chi però, sfogliando il catalogo, è alla ricerca di incontri, laboratori, lezioni ecologicamente orientati basta che presti attenzione alle foglie. Anche quest’anno il tradizionale simbolo di Consapevolezza Verde campeggia in cima alle schede di presentazione di oltre venti appuntamenti, da mercoledì a domenica. Per lo Spazio Rio e i workshop collegati (35, 127, 200, 210) vi rimandiamo a pag. 91. Per il resto, ecco l’elenco completo: mercoledì 9 settembre 11.o0 Piazza Mantegna 17.00 Politecnico di Milano – Campus di Mantova IL FLUSSO DI ENERGIA NEGLI ECOSISTEMI SOPRAVVIVENZE. LA CITTÀ EUROPEA CONTEMPORANEA Marco Bartoli Paola Viganò con Annalisa Metta 11.00 Tenda Sordello MIGRAZIONI VERTICALI giovedì 10 settembre Andrea Membretti 17.00 Tenda Sordello LA CONTRORA 12.15 Basilica Palatina di Santa Barbara Annalisa Metta L’UMANITÀ IN NATURA Andrea Wulf con Telmo Pievani 18.00 Piazza Mantegna DOVE VA L’ENERGIA DEL MONDO 17.00 Aula Magna dell’Università Roberto Battiston CRISI AMBIENTALE E SANITARIA Luca Savarino e Paolo Vineis con Silvia Lazzaris 18.15 Palazzo San Sebastiano SOSTENIBILITÀ E FUTURO: 18.30 Chiesa di San Cristoforo DUE FACCE DELLA STESSA MEDAGLIA UN MONDO IN TUTTI I SENSI Enrico Giovannini con Alessio Malcevschi Maurizio Casiraghi 18.30 Palazzo Te venerdì 11 settembre LA NATURA MADRE ANTICA 10.30 Basilica Palatina di Santa Barbara Giulia Sissa con Guido Rebecchini NULLA SI CREA, NULLA SI DISTRUGGE Roberto Battiston con Marco Faggioli 19.00 Chiesa di Santa Maria della Vittoria CHI ABITA IL MONDO CON NOI? 14.30 Politecnico di Milano – Campus di Mantova Simon Armitage con Peter Florence LE SEPPIE, L’ARCHITETTURA E L’EUROPA CHE VIENE Rita Elvira Adamo con Annalisa Metta 19.00 Piazza Castello LA LUNGA SCIA DEL COLONIALISMO 16.30 Politecnico di Milano – Campus di Mantova Amitav Ghosh con Matteo De Giuli VOGLIO ANDARE A VIVERE IN MONTAGNA Andrea Membretti con Luigi Chiarella 20.30 Tenda Sordello ALLE RAGAZZE PIACE IL VERDE 17.00 Casa del Mantegna Elisabetta Tola PER FARE UN CAPODOGLIO Elisabetta Mitrovic domenica 13 settembre 18.30 Parco Belfiore 11.00 Piazza Mantegna IL GIARDINO DEGLI UCCELLI CONTA PIÙ LA GENETICA O L’AMBIENTE? Jean Boucault e Johnny Rasse Paolo Vineis 18.30 Palazzo Te 12.15 Basilica Palatina di Santa Barbara LA NATURA NOSTRA CONTEMPORANEA UNA NATURALE EVOLUZIONE DELLA POLITICA Amitav Ghosh con Barbara Furlotti Pierre Charbonnier con Matteo De Giuli 19.00 Tenda Sordello 14.30 Casa del Mantegna L’ESEMPIO DI BOSCO FONTANA SE FA CALDO CI SARÀ UNA RAGIONE Maurizio Casiraghi Michele Freppaz e Telmo Pievani con Valentina Vitali 17.15 Palazzo San Sebastiano sabato 12 settembre L’EVOLUZIONE È UN GIOCO DI SQUADRA 10.00 Parco Belfiore"},{"n":"135","t":"YOGA PER LEGGERE","p":[["Susanna Binelli",0]],"raw":"Susanna Binelli","v":"vedi n. 69","d":"sab","h":"8:00","l":"casa del mantegna","pr":"7,50 €","tg":["corpo e benessere"]},{"n":"136","t":"STATI UNITI E CINA ALLO SPECCHIO","p":[["Francesco Costa",0],["Simone Pieranni",0],["Veronica Fernandes",1]],"raw":"Francesco Costa e Simone Pieranni con Veronica Fernandes","d":"sab","h":"10:00","l":"piazza castello","pr":"8,50 €","ic":["streaming"],"tg":["geopolitica e guerre","politica e attualità","media e giornalismo"],"de":"L’imprevedibilità di Trump contro la strategia di lungo periodo della dirigenza del Partito Comunista Cinese; una democrazia che appare sempre più disfunzionale e inceppata contro un autoritarismo che si mostra inquietantemente efficiente; un’opinione pubblica estremamente polarizzata contro un popolo in cui contraddizioni e conflitti covano in modo più sotterraneo; un paese in cui spesso prevale la pulsione verso un passato in cui tornare Great Again contro un altro che sembra proiettato nel futuro, anche un futuro per certi versi distopico. Quali visioni del mondo, di loro stessi e dell’altro si stanno affermando nei due paesi? Come ne esce l’ideale democratico da questo confronto? Alla vigilia delle elezioni di metà mandato statunitensi, l’americanista Francesco Costa (Come se ne esce) e l’esperto di Cina Simone Pieranni (Lo specchio americano) cercheranno di rispondere a queste domande, intervistati dalla giornalista Veronica Fernandes."},{"n":"137","t":"NORD, SUD, OVEST, EST","p":[["Mathias Enard",0],["Lorenzo Alunni",1]],"raw":"Mathias Enard con Lorenzo Alunni","s":"kaléidoscope français","d":"sab","h":"10:00","l":"palazzo san sebastiano","pr":"7,50 €","tg":["narrativa","viaggi e luoghi","geopolitica e guerre"],"de":"Dieci anni fa Mathias Enard incontrava il pubblico del Festival nella Basilica di Santa Barbara, in veste di vincitore del premio Goncourt con il romanzo Bussola. Su quella metaforica bussola, oggi, l’autore francese ha deciso di intraprendere un’esplorazione dei quattro punti cardinali, ideando una tetralogia che vuole essere analisi della proteiforme concezione di frontiera e confine, tanto geografica quanto interiore. Partendo da un’immagine della malinconia, “il lutto di quello che non è successo”, Enard compirà un viaggio che inizia a Berlino (Malinconia dei confini. Nord) e, passando per la penisola iberica (il sud) e i Balcani (l’est), terminerà nel continente americano (l’ovest). Il mezzo di trasporto? La letteratura, “motore che permette di esplorare mondi diversi anche se non vi si arriva mai completamente”. Dialoga con lui l’antropologo Lorenzo Alunni (Le cicatrici di Ulisse).","no":"L’autore parlerà in italiano."},{"t":"MEGLIO DI UN ROMANZO","st":"2. pitching in piazza","p":[["Eugenio Cau",0],["Riccardo Staglianò",0],["Christian Elia",1]],"raw":"Eugenio Cau e Riccardo Staglianò con Christian Elia","d":"sab","h":"10:00","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["media e giornalismo","scrittura e lettura"],"de":"Ai partecipanti dell’edizione 2026 di Meglio di un romanzo è stato chiesto di scrivere di ciò che non condividono, di raccontare storie che li tirassero fuori dal rassicurante perimetro delle loro convinzioni e del loro sistema di valori, proprio per cercare di superare quel tipo di radicalizzazione che poco aiuta nella comprensione della realtà. Ad analizzare due delle prove selezionate per i pitching saranno oggi Eugenio Cau, conduttore del podcast Globo, e Riccardo Staglianò (Scrivere dal vero. Manuale di giornalismo narrativo)."},{"n":"138","t":"CECIL BEATON: UNO, NESSUNO E CENTOMILA","p":[["Judith Clark",0],["Laura Grandi",0],["Manuela Soldi",1]],"raw":"Judith Clark e Laura Grandi con Manuela Soldi","d":"sab","h":"10:00","l":"teatro bibiena","pr":"7,50 €","tg":["arte e fotografia","cinema e tv","storia"],"de":"Fotografo di moda, ma anche delle star del cinema, della corte britannica e degli orrori della guerra, costumista e scenografo da Oscar (My Fair Lady, Gigi), arbitro della moda e curatore di Fashion: An Anthology (Victoria & Albert Museum, 1971), mostra che ha cambiato il modo di intendere la moda nel museo. Tutto questo, e molto di più, era Cecil Beaton. Per raccontare la straordinaria varietà di interessi, relazioni, attività che lo contraddistinguono, niente è più efficace dei suoi diari, tenuti per oltre cinquant’anni. Ne parlano Laura Grandi, curatrice e traduttrice dell’edizione italiana dei diari di Beaton (Molto dipendeva dal futuro. Diari 1922-1974) e l’exhibition-maker Judith Clark (Exhibiting Fashion: Before and After 1971, con Amy de la Haie) insieme a Manuela Soldi, storica e archivista. Judith Clark parlerà in italiano."},{"n":"139","t":"NARRAZIONI E RINARRAZIONI","p":[["Espérance Hakuzwimana",0],["Rita Petruccioli",0],["Grace Fainelli",1]],"raw":"Espérance Hakuzwimana e Rita Petruccioli con Grace Fainelli","e":"dai 12 anni","d":"sab","h":"10:00","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["narrativa","fumetto e illustrazione","infanzia ed educazione"],"f":["per ragazzi"],"de":"Come si ri-narra una storia del passato e come la si rende attuale e significativa per lettori e lettrici di oggi? Questa è una delle sfide che la scrittrice Espérance Hakuzwimana e la fumettista Rita Petruccioli si sono poste, scegliendo e ridando vita a due storie, una vera e l’altra mitologica, che sono in modi diversi fondative e che hanno raccontato e ancora hanno tanto da raccontare delle nostre società passate e presenti. La giovane protagonista di Hakuzwimana, in MentiRosa, si trova a fare i conti con la vicenda biografica di Rosa Parks e con il portato che essa ha all’interno della sua vita e quella di compagne e compagni di scuola. Petruccioli ha affrontato Medea, illuminandola di uno sguardo nuovo e contemporaneo, che si posa sul ruolo della donna come su quella della profuga, che Medea incarna. A intrecciare queste trame sarà Grace Fainelli, fondatrice, insieme ad Hakuzwimana, di Na.Co – Narrazioni Contaminate."},{"n":"140","t":"I BARBARI DELLE PERIFERIE","p":[["Houria Bouteldja",0],["Annalisa Camilli",1]],"raw":"Houria Bouteldja con Annalisa Camilli","s":"kaléidoscope français","d":"sab","h":"10:00","l":"chiesa di santa maria della vittoria","pr":"7,50 €","tg":["diritti e società","città e architettura","politica e attualità"],"de":"Il razzismo viene spesso raccontato come un problema legato a comportamenti individuali o alle posizioni più esplicite dell’estrema destra. Una prospettiva di questo tipo, però, rischia di nascondere la dimensione strutturale del fenomeno, riducendolo a una questione morale e non politica e collettiva. L’attivista franco-algerina Houria Bouteldja (Maranza di tutto il mondo, unitevi!) sostiene la necessità di trovare una convergenza tra “i ’barbari’ delle metropoli postcoloniali e i ’bifolchi’ del lavoro povero in Europa”, tra le classi popolari bianche cioè e le persone razzializzate. Partendo dalla realtà delle periferie francesi, Bouteldja ragionerà di come la lotta di classe non debba essere a discapito dei popoli colonizzati. La incontra la giornalista Annalisa Camilli.","no":"L’autrice parlerà in francese, con interpretazione consecutiva in italiano."},{"n":"141","t":"MASCHERE MATTE E MOSTRI DA PASSEGGIO","st":"laboratorio di fantazoologia da parata","p":[["Ruggge",0]],"raw":"Ruggge","e":"dagli 8 ai 12 anni","v":"vedi n. 1","d":"sab","h":"10:00","l":"cappella di palazzo del mago","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["arte e fotografia","miti e fiabe","infanzia ed educazione"],"f":["per bambini","laboratorio"]},{"t":"CALVINO, CELATI E ALÌ BABÀ","p":[["Marco Belpoliti",0]],"raw":"Marco Belpoliti","s":"accenti","d":"sab","h":"10:00","l":"tenda sordello","pr":"ingresso libero","ic":["streaming"],"tg":["narrativa","editoria e traduzione","memoria e biografia"],"de":"Tra il 1968 e il 1984 Italo Calvino e Gianni Celati tennero una corrispondenza appassionata, lavorando insieme a una rivista che avrebbe dovuto chiamarsi Alì Babà e che non vide mai la luce. Marco Belpoliti è tra i curatori del numero 48 di Riga, che racconta proprio il loro ambizioso progetto di “riportare alla luce i tesori nascosti della cultura occidentale”."},{"n":"142","t":"UMANAMENTE ARTIFICIALE O ARTIFICIALMENTE UMANO?","p":[["Irene Fabbri",0]],"raw":"Irene Fabbri","s":"spazio rio / lezioni orizzontali - in gioco","d":"sab","h":"10:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["tecnologia e IA","lingua e parole","gioco"],"f":["laboratorio","lezione"],"de":"Si può riconoscere un testo scritto con l’intelligenza artificiale? In questo laboratorio interattivo, umani e macchine si sfidano a colpi di risposte brevi, intuizioni, inganni e… qualche allucinazione. Il laboratorio si sviluppa come un gioco a squadre ispirato al Test di Turing e, passo dopo passo, diventa un piccolo esperimento di linguistica, psicologia cognitiva e creatività collettiva. Un percorso che fa emergere meccanismi e caratteristiche dei sistemi generativi e in particolare dei modelli linguistici di grandi dimensioni (Large Language Models). Un gioco che diventa allenamento dello sguardo: per capire come scrivono i sistemi generativi, ma anche come noi stessi ci adattiamo.","no":"Su Spazio Rio vedi p. 91"},{"n":"143","t":"LA CULTURA NON È UN AFFARE PER PAVIDI","p":[["Valeria Corciolani",0],["Piergiorgio Pulixi",0],["Luca Crovi",1]],"raw":"Valeria Corciolani e Piergiorgio Pulixi con Luca Crovi","d":"sab","h":"10:00","l":"aula magna dell'universita","pr":"7,50 €","tg":["giallo e noir","narrativa"],"de":"Siamo abituati a leggere romanzi gialli in cui gli investigatori sono uomini o donne d’azione, navigati membri delle forze dell’ordine o scienziate dedite alla medicina forense; eppure lo spirito indagatore alberga anche nei cuori più avvezzi alla tranquillità (apparente?) del mondo culturale. Edna Silvera è una storica dell’arte, “un lavoro che affila lo sguardo”, Marzio Montecristo di professione fa il libraio e gestisce gruppi di lettura: sono i protagonisti degli improbabili mystery nati dalla penna di Valeria Corciolani (Delitto in bianco, Di rosso e di luce) e Piergiorgio Pulixi (Se i gatti potessero parlare, La libreria dei gatti neri). Tra percorsi squisitamente letterari e rimandi ai grandi classici del genere, i due autori si confrontano sul palco insieme a Luca Crovi."},{"n":"144","t":"STORIE TRA I RISVOLTI","p":[["Angelo Mozzillo",0]],"raw":"Angelo Mozzillo","s":"la casetta editrice","e":"dai 7 ai 10 anni","d":"sab","h":"10:00","l":"casa del mantegna","pr":"7,50 €","ic":["no accompagnatori adulti"],"tg":["editoria e traduzione","infanzia ed educazione","scrittura e lettura"],"f":["per bambini"],"de":"Ma non bastano cento o più pagine bianche e facili da sfogliare per scrivere tutto quello che serve in un libro? Eh no, c’è sempre qualcosa da aggiungere! Tanto che, per trovare altro spazio, si è pensato di allargare le copertine attraverso un paio di alette pieghevoli laterali. È lì che troviamo di solito qualche notizia sull’autrice o sull’autore, o più spesso un riassunto della storia che stiamo per leggere. Con Angelo Mozzillo occuperemo quello spazio in modo molto più creativo: prendendo spunto da titoli di veri romanzi, ci inventeremo trame di opere che non esistono e vite di scrittori di fantasia, per arrivare a pubblicare un libro fatto solo di risvolti!","no":"Su La casetta editrice vedi p. 125"},{"n":"145","t":"MISSIONE TACCUINO","st":"laboratorio di investigazione lacustre","p":[["Elisabetta Mitrovic",0]],"raw":"Elisabetta Mitrovic","e":"dai 6 anni","d":"sab","h":"10:00","l":"parco belfiore","pr":"7,50 €","ic":["consapevolezza verde"],"tg":["natura e animali","infanzia ed educazione","Mantova e territorio"],"f":["per bambini","laboratorio"],"de":"Sei pronto a esplorare i laghi di Mantova con gli occhi di un vero naturalista? Sei pronta a catturare ogni segreto della riva sul tuo taccuino? L’illustratrice Elisabetta Mitrovic (Rimanere sul sentiero) guiderà grandi e bambini in una speciale passeggiata investigativa. Passo dopo passo, ci tufferemo nel paesaggio per scovare dettagli segreti e raccogliere le tracce delle creature che abitano le rive. Il nostro taccuino diventerà un diario di viaggio all’aperto, pronto a prendere vita tra schizzi, forme e colori. Porta la tua curiosità, al resto pensiamo noi! Il punto di ritrovo dell’evento è presso il Monumento ai Martiri di Belfiore. Per raggiungere Parco Belfiore è disponibile un servizio di bus navetta gratuito A/R, con partenza da Piazza Sordello venti minuti prima dell’evento, e rientro alla sua conclusione."},{"n":"146","t":"TESTE CORONATE E PIEDI SCALZI","p":[["Francesca Ballarini",0]],"raw":"Francesca Ballarini","e":"dai 3 ai 7 anni","d":"sab","h":"10:30","l":"casa del mantegna","pr":"7,50 €","ic":["accompagnatore adulto richiesto"],"tg":["infanzia ed educazione","arte e fotografia","fumetto e illustrazione"],"f":["per bambini"],"de":"Chi l’ha detto che per essere re serve un castello? A volte bastano un pigiama da lupo come quello di Max, personaggio di Maurice Sendak, o le domande buffe del re di Wolf Erlbruch. Insieme all’illustratrice Francesca Ballarini (Il piccolo re), andremo alla scoperta di un regno speciale: quello dei bambini e delle bambine, sovrani e sovrane di storie, grandi avventure e sogni grandiosi. E ovviamente a ciascuno… la propria corona!"},{"n":"147","t":"IL DISAGIO DEMOCRATICO","p":[["Michele Ainis",0],["Ece Temelkuran",0],["Giacomo Bottos",1]],"raw":"Michele Ainis ed Ece Temelkuran con Giacomo Bottos","s":"l’europa, in prospettiva","d":"sab","h":"10:30","l":"basilica palatina di santa barbara","pr":"7,50 €","tg":["politica e attualità","geopolitica e guerre","filosofia e idee"],"de":"In un mondo segnato dalla crisi dell’ordine internazionale, modellato in modo sempre più diretto ed esplicito dai rapporti di forza, le democrazie appaiono affette da un disagio crescente. Messe a confronto con altri modelli che sembrano prosperare con maggiore facilità nel mondo in cui ci troviamo, faticano a trovare modalità per interpretare la volontà popolare mettendo al tempo stesso in campo una visione strategica di lungo periodo. Da dove nasce questa situazione di crisi e come si manifesta? La giornalista Ece Temelkuran e il costituzionalista Michele Ainis si interrogheranno sulle radici, sulle cause e le dinamiche di questo stato di cose e sui percorsi possibili per immaginare scenari alternativi. Dialoga con loro Giacomo Bottos, direttore di Pandora rivista. Ece Temelkuran parlerà in inglese, con interpretazione consecutiva in italiano.","no":"In collaborazione con Pandora Rivista."},{"t":"IL FLUSSO DI ENERGIA NEGLI ECOSISTEMI","p":[["Marco Bartoli",0]],"raw":"Marco Bartoli","s":"lavagne – energie","d":"sab","h":"11:00","l":"piazza mantegna","pr":"ingresso libero","ic":["consapevolezza verde"],"tg":["scienza","ambiente e clima","natura e animali"],"f":["lezione"],"de":"L’energia è il filo invisibile che attraversa, sostiene e plasma gli ecosistemi. Marco Bartoli ci guida alla scoperta dei flussi e degli usi dell’energia in natura, mostrando come questo elemento fondamentale orienta la vita nei diversi ambienti. Partendo dalla luce solare e dalla fotosintesi, capiremo il modo in cui l’energia si muove lungo le catene trofiche, influenzando biodiversità, stabilità e resilienza degli ecosistemi. Attraverso esempi concreti tratti da sistemi terrestri, acquatici e antropici, scopriremo come l’energia viene catturata, trasformata e dissipata, e come le attività umane introducono nuovi equilibri ma anche nuove vulnerabilità."},{"n":"148","t":"LA SIGNORA CANAGLIETTA E ALTRI ADULTI INSOPPORTABILI","p":[["Beppe Severgnini",0]],"raw":"Beppe Severgnini","e":"dai 4 anni","d":"sab","h":"11:00","l":"casa del mantegna","pr":"7,50 €","tg":["infanzia ed educazione","narrativa","miti e fiabe"],"f":["per bambini"],"de":"Avete mai scritto una favola per i vostri bambini e le vostre bambine? “Che bisogno c’è?” direte voi: “Ce ne sono già così tante, e magnifiche: non ne vale proprio la pena!”. Tutto vero, ma una favola scritta apposta per loro ha tutto un altro sapore. Beppe Severgnini ci ha provato, e dedicataria nonché musa ispiratrice di questa produzione fiabesca è stata l’ormai celebre nipotina Agata, già protagonista di Socrate, Agata e il futuro. In un incontro aperto a nonni e nonne, genitori, bambine e bambini, Severgnini leggerà questi suoi piccoli componimenti, in cui difetti e assurdità del mondo adulto sono messi scopertamente alla berlina, per il divertimento di Agata e di tutti noi!"},{"n":"149","t":"SHAKESPEARE IN ITALY: KISS ME, KATE","p":[["Peter Florence",0]],"raw":"Peter Florence","d":"sab","h":"11:00","l":"politecnico di milano - campus di mantova","pr":"7,50 €","tg":["teatro e performance","genere e femminismo","narrativa"],"de":"Is William Shakespeare’s play The Taming of the Shrew a misogynist joke, a product of 1590s patriarchy and a ghastly tale of toxic masculinity on the rampage? How are we supposed to watch it today? And what would Cole Porter say? In his annual session on Shakespeare in Italy, Peter Florence un-cancels the problem play. He offers a re-reading that reminds us of who wrote it and what he’s asking of who watches it, then and now.","no":"L’autore parlerà in inglese, senza interpretazione."},{"t":"MIGRAZIONI VERTICALI","p":[["Andrea Membretti",0]],"raw":"Andrea Membretti","s":"accenti – territori resilienti","d":"sab","h":"11:00","l":"tenda sordello","pr":"ingresso libero","ic":["consapevolezza verde","streaming"],"tg":["viaggi e luoghi","città e architettura","ambiente e clima"],"de":"Città bollenti, opportunità di lavoro da remoto e la ricerca di nuovi stili di vita spingono categorie diverse di persone verso la montagna italiana. Una migrazione verso l’alto che crea occasioni di sviluppo e nuove relazioni metromontane ma che può anche accentuare diseguaglianze sociali e forme di appropriazione del territorio, se non gestita da politiche pubbliche che tutelino il bene comune. La montagna chi salverà?"},{"n":"150","t":"LA PREDICAZIONE PER GLI ULTIMI GIORNI","st":"Girolamo Savonarola e l’Apocalisse nelle piazze","p":[["Michele Lodone",0],["Luca Ughetti",1]],"raw":"Michele Lodone con Luca Ughetti","s":"la parola in piazza","d":"sab","h":"11:00","l":"tempio di san sebastiano","pr":"7,50 €","tg":["religione e spiritualità","storia"],"de":"Ci sono momenti in cui il presente sembra parlare per segni: guerre, epidemie, crisi della Chiesa, tracollo delle istituzioni, timore del futuro. Tra Medioevo e prima età moderna molti predicatori insegnano a leggere questi eventi come presagio della fine dei tempi. Le loro parole non si limitano a spaventare: mettono ordine tra le paure, esortano a cambiare vita, indicano colpe, promettono castighi o salvezza. Nella Firenze del Rinascimento, Girolamo Savonarola mostra quanto una parola profetica pronunciata in pubblico possa avere conseguenze politiche concrete; in altri casi, l’annuncio della fine spinge alla penitenza, al ritiro, all’attesa passiva. Parlare della fine voleva dire parlare del proprio tempo, con una forza capace di scuotere chi ascoltava. A raccontare la forza e l’ambiguità di questi annunci sarà lo storico Michele Lodone. Lo incontra Luca Ughetti.","no":"Su La parola in piazza vedi p. 183"},{"n":"151","t":"VEDI ALLA VOCE: POESIA","p":[["Beatrice Masini",0],["Silvia Vecchini",0],["Silvia Righi",1]],"raw":"Beatrice Masini e Silvia Vecchini con Silvia Righi","d":"sab","h":"12:00","l":"seminario vescovile - aula magna","pr":"7,50 €","tg":["poesia","scrittura e lettura"],"f":["percorso/visita"],"de":"Un dialogo poetico ad ampio raggio insieme a lettrici e lettori, che cerca di indagare il rapporto quotidiano con la poesia, grazie a chi la scrive, a chi la pubblica e a chi la legge e a chi fa tutte e tre le cose. Un percorso anche generazionale per vedere come nel nostro Paese sia cambiata la percezione dell’opera poetica attraverso le considerazioni e i versi di Beatrice Masini (Dammi per sempre giugno), Silvia Vecchini (Se tutte insieme. Poesie di madri, figli e sorelle, C’è una poesia che ti aspetta) e Silvia Righi (Ex voto suscepto). Per scoprire come si parlano le poete, come vivono la scrittura dei versi e quali poesie le abitano mentre scrivono. E per capire cosa significa la poesia oggi e cosa rappresenta e può rappresentare per i più giovani."},{"n":"504","t":"SCEGLIERE I LIBRI DA PUBBLICARE PER GLI ADOLESCENTI","p":[["Chiara Codecà",0],["Flavio Sorrentino",0],["Francesca Mignemi",1]],"raw":"Chiara Codecà e Flavio Sorrentino con Francesca Mignemi","s":"libri in classe con read more– nel cantiere della letteratura giovanile","d":"sab","h":"12:00","l":"politecnico di milano - campus di mantova","pr":"ingresso gratuito con prenotazione","tg":["editoria e traduzione","infanzia ed educazione"],"f":["laboratorio"],"de":"Flavio Sorrentino, dopo aver lavorato in altre realtà editoriali, insieme alla docente Marina Guglielmi esordisce con il marchio Faros con una collana coraggiosa e necessaria che vuole offrire a lettrici e lettori adolescenti romanzi di qualità con cui poter scoprire l’universo della sessualità e del corpo, senza falsi pudori e senza moralismi. Sul complesso mercato librario e sul rapporto con giovani lettrici e lettori si confronta con la editor Chiara Codecà. Conduce l’incontro l’esperta di educazione alla lettura Francesca Mignemi."},{"t":"IL FUOCO SACRO DELLA SCRITTURA","p":[["Helen Oyeyemi",0],["Elsa Riccadonna",1]],"raw":"Helen Oyeyemi con Elsa Riccadonna","d":"sab","h":"12:00","l":"piazza dei libri","pr":"ingresso libero","ic":["streaming"],"tg":["scrittura e lettura","narrativa"],"no":"L’autrice parlerà in inglese, con interpretazione consecutiva in italiano. Sul Fuoco sacro della scrittura vedi p. 105"},{"t":"LA MIA STORIA CON LA LETTURA","p":[["Enrico Terrinoni",0],["Simonetta Bitasi",1]],"raw":"Enrico Terrinoni con Simonetta Bitasi","s":"read more – circuiti di lettura integrati","d":"sab","h":"12:00","l":"piazza leon battista alberti","pr":"ingresso libero","tg":["scrittura e lettura"],"no":"Su La mia storia con la lettura vedi p. 101"},{"n":"152","t":"LA NEOLINGUA SPORTIVA","p":[["Emanuele Attur
