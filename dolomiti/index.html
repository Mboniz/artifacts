  if(r.pr_count) chips.push(`<span class="pp-chip" style="background:#fff4d6;color:#a67c00">🏆 ${r.pr_count} PR</span>`);
  return `<div class="pp"><div class="pp-h"><span class="pp-emoji">${K.emoji}</span>
    <div><div class="pp-title">${r.name}</div><div class="pp-date">${r.day} ${r.year}</div></div></div>
    <div class="pp-hero"><div><div class="pp-hv">${r.km.toFixed(1)}</div><div class="pp-hl">km</div></div>
    <div><div class="pp-hv">+${r.vert}</div><div class="pp-hl">m D+</div></div>
    <div><div class="pp-hv">${Math.round(r.vert/r.km)}</div><div class="pp-hl">m/km</div></div></div>
    <div class="pp-grid">${rows.join("")}</div>${chips.length?`<div class="pp-foot">${chips.join("")}</div>`:""}</div>`;
}
const fmtDate=d=>{if(!d)return"";const[y,m,dd]=d.split("-");
  const mn=["","gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"][+m];return `${+dd} ${mn} ${y}`;};
const COLS=[
 {id:"date",label:"Data",get:r=>r._date,num:false},
 {id:"name",label:"Attività",get:r=>r.name,num:false,cls:"tname",render:r=>KIND[r.kind].emoji+" "+r.name},
 {id:"start",label:"Inizio",get:r=>r._start,num:false},
 {id:"end",label:"Fine",get:r=>r._end,num:false},
 {id:"tot",label:"Tot",get:r=>r.elapsed_time||0,num:true,render:r=>r._tot},
 {id:"mov",label:"Movim.",get:r=>r.moving_time||0,num:true,render:r=>r._mov},
 {id:"stop",label:"Fermo",get:r=>(r.elapsed_time&&r.moving_time)?r.elapsed_time-r.moving_time:0,num:true,render:r=>r._stop},
 {id:"km",label:"Km",get:r=>r.km,num:true,render:r=>r.km.toFixed(1)},
 {id:"asc",label:"Ascesa",get:r=>r.vert,num:true,render:r=>"+"+r.vert},
 {id:"desc",label:"Discesa",get:r=>r.descent??0,num:true,render:r=>r.descent!=null?"−"+r.descent:""},
 {id:"net",label:"Disliv. netto",get:r=>r.net??0,num:true,render:r=>r.net===0?"0":(r.net>0?"+":"")+r.net},
 {id:"grad",label:"Pendenza",get:r=>r.vert/(r.km*10),num:true,render:r=>(r.vert/(r.km*10)).toFixed(1)+"%"},
 {id:"kmh",label:"Vel. media",get:r=>r._kmh??0,num:true,render:r=>r._kmh!=null?r._kmh+" km/h":""},
 {id:"pace",label:"Passo",get:r=>r._pace_s??1e9,num:true,render:r=>r._pace?r._pace+"/km":""},
 {id:"vam",label:"VAM",get:r=>r._vam??0,num:true,render:r=>r._vam!=null?r._vam+" m/h":""},
 {id:"kcal",label:"Kcal",get:r=>r.total_calories??0,num:true,render:r=>r.total_calories??""},
];

function buildMapView(key){
  const cfg=REG[key];
  const host=document.getElementById(`view-${key}-map`);
  host.innerHTML=`<div id="map-${key}" class="lmap"></div>
    <div class="panel"><h1>${cfg.title}</h1><div class="sub">${cfg.sub}</div>
      <div id="years-${key}"></div><div class="legend" id="legend-${key}"></div>
      <div class="credit">${cfg.routes.length} attività · dati Strava</div></div>
    <div class="isoBanner" id="iso-${key}"><span>📍 Attività isolata dalla tabella</span>
      <button>Mostra tutte</button></div>`;
  const map=L.map(`map-${key}`,{zoomControl:true});
  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
    {maxZoom:17,attribution:'© OpenTopoMap (CC-BY-SA) · © OpenStreetMap'}).addTo(map);
  const yrs={},knd={hike:true,ride:true,run:true}; cfg.years.forEach(y=>yrs[y]=true);
  const st={year:yrs,kind:knd,isolate:null}, layers=[], all=[];
  cfg.routes.forEach(r=>{
    const c=r.coords; c.forEach(p=>all.push(p));
    const col=KIND[r.kind].color;
    const halo=L.polyline(c,{color:'#fff',weight:6,opacity:.7});
    const line=L.polyline(c,{color:col,weight:3.2,opacity:.95,dashArray:cfg.dash[r.year]||null,lineJoin:'round'});
    const h=popupHTML(r),o={maxWidth:280}; line.bindPopup(h,o); halo.bindPopup(h,o);
    line.on('mouseover',()=>line.setStyle({weight:5})); line.on('mouseout',()=>line.setStyle({weight:3.2}));
    layers.push({id:r.id,year:r.year,kind:r.kind,line,halo});
  });
  L.circleMarker(cfg.center,{radius:6,color:'#222',weight:2,fillColor:'#ffd54a',fillOpacity:1}).bindTooltip(cfg.clabel).addTo(map);
  function refresh(){layers.forEach(o=>{
    const on=st.isolate?(o.id===st.isolate):(st.year[o.year]&&st.kind[o.kind]);
    if(on){if(!map.hasLayer(o.halo)){o.halo.addTo(map);o.line.addTo(map);}}
    else{if(map.hasLayer(o.halo)){map.removeLayer(o.halo);map.removeLayer(o.line);}}});
    document.getElementById(`iso-${key}`).style.display=st.isolate?'flex':'none';}
  const bounds=L.latLngBounds(all).pad(0.05);
  map.fitBounds(bounds); refresh();
  const yb=document.getElementById(`years-${key}`);
  cfg.years.forEach(y=>{const s=cfg.summary[y];const row=document.createElement('label');row.className='yr';
    row.innerHTML=`<input type="checkbox" checked><b>${y}</b> <small>&nbsp;${s.hike}🥾 &nbsp;${s.ride}🚴 &nbsp;${s.run}🏃 &nbsp;· ${Math.round(s.km)} km</small>`;
    row.querySelector('input').addEventListener('change',e=>{st.isolate=null;st.year[y]=e.target.checked;refresh();});
    yb.appendChild(row);});
  const lg=document.getElementById(`legend-${key}`);
  Object.keys(KIND).forEach(k=>{const d=document.createElement('div');
    d.innerHTML=`<input type="checkbox" checked style="accent-color:${KIND[k].color}"><span class="swatch" style="background:${KIND[k].color}"></span>${KIND[k].label}`;
    d.querySelector('input').addEventListener('change',e=>{st.isolate=null;st.kind[k]=e.target.checked;refresh();});
    lg.appendChild(d);});
  document.querySelector(`#iso-${key} button`).addEventListener('click',()=>{st.isolate=null;refresh();map.fitBounds(bounds);});
  return {map,bounds,layers,st,refresh,
    showOnMap(id){const o=layers.find(x=>x.id===id);if(!o)return;st.isolate=id;refresh();
      map.fitBounds(o.line.getBounds().pad(0.25));setTimeout(()=>o.line.openPopup(),80);}};
}

function buildTableView(key){
  const cfg=REG[key];
  const host=document.getElementById(`view-${key}-table`);
  const yrChips=cfg.years.map(y=>`<span class="chip on" data-y="${y}">${y}</span>`).join("");
  host.innerHTML=`<div class="tview"><div class="filters">
      <span class="fl">Tipo</span>
      <span class="chip on" data-k="hike">🥾 Hike</span>
      <span class="chip on" data-k="ride">🚴 Bici</span>
      <span class="chip on" data-k="run">🏃 Corsa</span>
      <span class="fl" style="margin-left:12px">Anno</span>${yrChips}</div>
    <div class="twrap"><table><thead></thead><tbody></tbody></table></div>
    <div class="tfoot"></div></div>`;
  const yrs={},knd={hike:true,ride:true,run:true}; cfg.years.forEach(y=>yrs[y]=true);
  const ts={sort:"date",dir:1,kinds:knd,years:yrs};
  const table=host.querySelector("table"), foot=host.querySelector(".tfoot");
  function render(){
    const thead=table.querySelector("thead");
    thead.innerHTML="<tr>"+COLS.map(c=>{const s=ts.sort===c.id;const arr=s?(ts.dir>0?"▲":"▼"):"⇅";
      return `<th data-c="${c.id}" class="${s?'sorted':''}">${c.label}<span class="arr">${arr}</span></th>`;}).join("")+"</tr>";
    thead.querySelectorAll("th").forEach(th=>th.addEventListener("click",()=>{
      const id=th.dataset.c; if(ts.sort===id)ts.dir*=-1; else{ts.sort=id;ts.dir=1;} render();}));
    const col=COLS.find(c=>c.id===ts.sort);
    let rows=cfg.routes.filter(r=>ts.kinds[r.kind]&&ts.years[r.year]);
    rows.sort((a,b)=>{const va=col.get(a),vb=col.get(b);
      return (col.num?(va-vb):String(va).localeCompare(String(vb)))*ts.dir;});
    const tb=table.querySelector("tbody");
    tb.innerHTML=rows.map(r=>`<tr data-id="${r.id}" title="Vedi sulla mappa">`+COLS.map(c=>{
      let v=c.render?c.render(r):c.get(r); if(c.id==="date")v=fmtDate(r._date);
      return `<td class="${c.cls||''}">${v??""}</td>`;}).join("")+"</tr>").join("");
    tb.querySelectorAll("tr").forEach(tr=>tr.addEventListener("click",()=>{
      activate(key,"map"); API[key].map.showOnMap(tr.dataset.id);}));
    const km=rows.reduce((s,r)=>s+r.km,0),up=rows.reduce((s,r)=>s+r.vert,0),dn=rows.reduce((s,r)=>s+(r.descent||0),0);
    foot.textContent=`${rows.length} attività · ${km.toFixed(0)} km · +${up} m ascesa · −${dn} m discesa`;
  }
  host.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>{ch.classList.toggle("on");
    if(ch.dataset.k)ts.kinds[ch.dataset.k]=ch.classList.contains("on");
    if(ch.dataset.y)ts.years[ch.dataset.y]=ch.classList.contains("on"); render();}));
  return {render};
}

const API={fassa:{},pust:{}};
function activate(reg,view){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.reg===reg&&t.dataset.view===view));
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));
  document.getElementById(`view-${reg}-${view}`).classList.add("on");
  if(view==="map"){ if(!API[reg].map) API[reg].map=buildMapView(reg);
    setTimeout(()=>{API[reg].map.map.invalidateSize();API[reg].map.map.fitBounds(API[reg].map.bounds);},30); }
  else { if(!API[reg].table) API[reg].table=buildTableView(reg); API[reg].table.render(); }
}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>activate(t.dataset.reg,t.dataset.view)));

(function wait(){ if(typeof L!=='undefined'){ API.fassa.map=buildMapView("fassa"); return; }
  let n=0;const t=setInterval(()=>{ if(typeof L!=='undefined'){clearInterval(t);API.fassa.map=buildMapView("fassa");}
    else if(++n>100){clearInterval(t);console.error('Leaflet failed to load');}},50);})();
</script></body></html>
