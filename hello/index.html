<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline attiva 🚀</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #e2e8f0;
  }
  .card {
    text-align: center; padding: 3rem 2.5rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; backdrop-filter: blur(10px);
    max-width: 480px; margin: 1rem;
  }
  h1 { font-size: 2rem; margin-bottom: 0.75rem; }
  .ok { color: #4ade80; font-size: 3.5rem; margin-bottom: 1rem; }
  p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
  code {
    background: rgba(0,0,0,0.4); padding: 0.2rem 0.5rem;
    border-radius: 6px; font-size: 0.85rem; color: #7dd3fc;
  }
  .ts { font-size: 0.8rem; color: #64748b; margin-top: 1rem; margin-bottom: 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="ok">✓</div>
    <h1>Pipeline attiva</h1>
    <p>Questo artifact è stato generato in chat con Claude e deployato via API su <code>Mboniz/artifacts</code>.<br>Ogni modifica futura = un commit, stesso URL.</p>
    <p class="ts">Deploy #1 — 20 luglio 2026</p>
  </div>
</body>
</html>
