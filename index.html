<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artifacts — Marco</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%F0%9F%A5%A6%3C/text%3E%3C/svg%3E">
<!-- Non indicizzabile da motori di ricerca e crawler AI -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<meta name="robots" content="noai, noimageai">
<meta name="referrer" content="no-referrer">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;450;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eceef2;
    --surface: #ffffff;
    --ink: #14171d;
    --muted: #767c88;
    --faint: #aab0bb;
    --line: #dde1e8;
    --accent: #2d43e0;
    --accent-soft: #eaecfb;
    --live: #12a670;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
    padding: clamp(1.25rem, 5vw, 4rem) 1.25rem 3rem;
    display: flex;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 680px; }

  /* Header */
  header { margin-bottom: 2.25rem; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.02em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.1rem;
  }
  .eyebrow .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 0 rgba(18,166,112,0.5);
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(18,166,112,0.45); }
    70% { box-shadow: 0 0 0 7px rgba(18,166,112,0); }
    100% { box-shadow: 0 0 0 0 rgba(18,166,112,0); }
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2.4rem, 9vw, 3.4rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 0.85rem;
  }
  .sub {
    font-size: 0.95rem;
    color: var(--muted);
    max-width: 30rem;
  }
  .count {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink);
    font-weight: 500;
  }

  /* List */
  .list { border-top: 1px solid var(--line); }
  a.entry {
    display: grid;
    grid-template-columns: 2.6rem 1fr auto;
    align-items: center;
    gap: 0.9rem;
    padding: 1.15rem 0.9rem 1.15rem 0.4rem;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: inherit;
    position: relative;
    transition: background 0.18s ease, padding 0.18s ease;
  }
  a.entry::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: center;
    transition: transform 0.18s ease;
  }
  a.entry:hover {
    background: var(--surface);
    padding-left: 1rem;
    border-radius: var(--radius);
    border-bottom-color: transparent;
  }
  a.entry:hover::before { transform: scaleY(0.55); }
  a.entry:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: var(--radius);
  }
  .idx {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 500;
    text-align: right;
  }
  .body { min-width: 0; }
  .name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.12rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.25;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    overflow-wrap: anywhere;
  }
  .path {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: 0.2rem;
    overflow-wrap: anywhere;
  }
  .arrow {
    color: var(--faint);
    transition: transform 0.18s ease, color 0.18s ease;
    flex-shrink: 0;
  }
  a.entry:hover .arrow { transform: translateX(3px); color: var(--accent); }

  /* Reveal */
  a.entry { opacity: 0; transform: translateY(6px); animation: rise 0.45s ease forwards; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  /* States */
  .state {
    padding: 2.5rem 0.4rem;
    color: var(--muted);
    font-size: 0.95rem;
  }
  .state code {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 0.1rem 0.4rem;
    border-radius: 5px;
    font-size: 0.85em;
  }
  .skeleton {
    height: 1px; background: var(--line); margin: 0;
    border-bottom: 1px solid var(--line);
    padding: 1.15rem 0;
  }
  .retry {
    margin-top: 0.8rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    background: none; border: 1px solid var(--line);
    padding: 0.45rem 0.9rem; border-radius: 8px;
    cursor: pointer; transition: background 0.15s;
  }
  .retry:hover { background: var(--accent-soft); }

  footer {
    margin-top: 2rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--faint);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    .eyebrow .dot { animation: none; }
    a.entry { opacity: 1 !important; transform: none !important; }
  }

  /* Gate */
  body.locked { overflow: hidden; }
  .wrap { display: none; }
  body.unlocked .wrap { display: block; }
  #gate {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    z-index: 50;
  }
  body.unlocked #gate { display: none; }
  .gate-card {
    width: 100%;
    max-width: 22rem;
    text-align: center;
  }
  .gate-lock { font-size: 2rem; line-height: 1; margin-bottom: 1.1rem; }
  .gate-card h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }
  .gate-card p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  #pwd {
    width: 100%;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.25rem;
    letter-spacing: 0.35em;
    text-align: center;
    padding: 0.9rem 0.6rem;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #pwd::placeholder { letter-spacing: 0.2em; color: var(--faint); }
  #pwd:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  #gate.error #pwd { border-color: #d93b3b; box-shadow: 0 0 0 3px rgba(217,59,59,0.12); }
  #gate.error .gate-card { animation: shake 0.35s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-7px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(2px); }
  }
  .gate-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: #d93b3b;
    margin-top: 0.9rem;
    min-height: 1rem;
    visibility: hidden;
  }
  #gate.error .gate-msg { visibility: visible; }
  .gate-btn {
    margin-top: 1rem;
    width: 100%;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    padding: 0.8rem;
    border-radius: var(--radius);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .gate-btn:hover { opacity: 0.88; }

  /* Mobile: righe più leggibili, colonne compatte */
  @media (max-width: 520px) {
    a.entry {
      grid-template-columns: 1.6rem 1fr auto;
      gap: 0.7rem;
      padding: 1.1rem 0.5rem 1.1rem 0.3rem;
      align-items: start;
    }
    a.entry:hover { padding-left: 0.5rem; }
    .idx { font-size: 0.72rem; padding-top: 0.15rem; }
    .name { font-size: 1.08rem; }
    .path { font-size: 0.72rem; }
    .arrow { margin-top: 0.15rem; }
    h1 { font-size: 2.6rem; }
  }
</style>
</head>
<body class="locked">
  <div id="gate">
    <div class="gate-card">
      <div class="gate-lock">🔒</div>
      <h2>Artifacts</h2>
      <p>Inserisci la password del giorno</p>
      <input id="pwd" type="password" inputmode="numeric" autocomplete="off"
             autocorrect="off" spellcheck="false" maxlength="8" placeholder="GGMMAAAA" aria-label="Password">
      <button class="gate-btn" id="gateBtn">Entra</button>
      <div class="gate-msg" id="gateMsg">Password non valida</div>
    </div>
  </div>

  <div class="wrap">
    <header>
      <div class="eyebrow"><span class="dot"></span>mboniz.github.io / artifacts</div>
      <h1>Artifacts</h1>
      <p class="sub">Tutto quello che costruisco in chat, pubblicato e in un posto solo. <span class="count" id="count">—</span></p>
    </header>

    <main>
      <div class="list" id="list">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </main>

    <footer>
      <span id="updated">Aggiornata in tempo reale dal repo</span>
      <a href="https://github.com/Mboniz/artifacts" target="_blank" rel="noopener">Mboniz/artifacts →</a>
    </footer>
  </div>

<script>
  // Cartelle da NON mostrare in home (aggiungi qui slug da nascondere)
  const EXCLUDE = ['hello'];
  const API = 'https://api.github.com/repos/Mboniz/artifacts/contents/';

  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');

  function prettify(slug) {
    return slug.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function render(dirs) {
    if (!dirs.length) {
      listEl.innerHTML = '<div class="state">Ancora niente qui. Pubblica il primo artifact dalla chat e comparirà da solo.</div>';
      countEl.textContent = '0 live';
      return;
    }
    countEl.textContent = dirs.length + (dirs.length === 1 ? ' live' : ' live');
    listEl.innerHTML = '';
    dirs.forEach((slug, i) => {
      const a = document.createElement('a');
      a.className = 'entry';
      a.href = slug + '/';
      a.style.animationDelay = (i * 45) + 'ms';
      a.innerHTML =
        '<span class="idx">' + String(i + 1).padStart(2, '0') + '</span>' +
        '<span class="body">' +
          '<span class="name" data-slug="' + slug + '">' + prettify(slug) + '</span>' +
          '<span class="path">/' + slug + '/</span>' +
        '</span>' +
        '<svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
      listEl.appendChild(a);
      // Migliora il nome leggendo il <title> reale della pagina (same-origin, nessun rate limit)
      upgradeTitle(slug, a.querySelector('.name'));
    });
  }

  async function upgradeTitle(slug, nameEl) {
    try {
      const res = await fetch(slug + '/', { cache: 'no-store' });
      if (!res.ok) return;
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const t = doc.querySelector('title');
      if (t && t.textContent.trim()) {
        // pulisce eventuali suffissi tipo " — Marco" o " | ..."
        const clean = t.textContent.trim().split(/\s[—|·]\s/)[0].trim();
        if (clean) nameEl.textContent = clean;
      }
    } catch (e) { /* fallback: resta lo slug prettificato */ }
  }

  function showError(rateLimited) {
    countEl.textContent = '—';
    listEl.innerHTML =
      '<div class="state">' +
      (rateLimited
        ? 'GitHub ha temporaneamente limitato le richieste (troppi refresh ravvicinati). Riprova tra un minuto.'
        : 'Non riesco a leggere la lista dal repo in questo momento.') +
      '<br><button class="retry" onclick="load()">Riprova</button></div>';
  }

  async function load() {
    listEl.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
    try {
      const res = await fetch(API, { headers: { 'Accept': 'application/vnd.github+json' }, cache: 'no-store' });
      if (res.status === 403) { showError(true); return; }
      if (!res.ok) { showError(false); return; }
      const data = await res.json();
      const dirs = data
        .filter(x => x.type === 'dir' && !EXCLUDE.includes(x.name))
        .map(x => x.name)
        .sort((a, b) => a.localeCompare(b));
      render(dirs);
    } catch (e) {
      showError(false);
    }
  }

  /* ---- Gate: password = data odierna in formato GGMMAAAA ---- */
  const gate = document.getElementById('gate');
  const pwd = document.getElementById('pwd');
  const KEY = 'artifacts-unlocked';

  function today() {
    const d = new Date();
    return String(d.getDate()).padStart(2, '0')
         + String(d.getMonth() + 1).padStart(2, '0')
         + d.getFullYear();
  }

  function unlock() {
    document.body.classList.remove('locked');
    document.body.classList.add('unlocked');
    try { localStorage.setItem(KEY, today()); } catch (e) {}
    load();
  }

  function attempt() {
    if (pwd.value.trim() === today()) {
      unlock();
    } else {
      gate.classList.add('error');
      pwd.value = '';
      pwd.focus();
      setTimeout(() => gate.classList.remove('error'), 2500);
    }
  }

  document.getElementById('gateBtn').addEventListener('click', attempt);
  pwd.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  pwd.addEventListener('input', () => gate.classList.remove('error'));

  // Se già sbloccata oggi, salta il gate (lo sblocco scade a mezzanotte)
  let saved = null;
  try { saved = localStorage.getItem(KEY); } catch (e) {}
  if (saved === today()) {
    unlock();
  } else {
    pwd.focus();
  }
</script>
</body>
</html>
